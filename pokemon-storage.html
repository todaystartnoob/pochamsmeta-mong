  <style>
    :root {
      --card-bg: rgba(238,230,250,.97);
      --chart-bg: #3f3858;
      --accent: #7b3fa0;
      --purple: #b89dcc;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Malgun Gothic','Apple SD Gothic Neo',sans-serif; background: var(--purple); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    /* ── NAVBAR ── */
    .navbar { height: 54px; background: rgba(255,255,255,.97); flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; box-shadow: 0 2px 10px rgba(0,0,0,.12); z-index: 20; }
    .nav-logo { display:flex; align-items:center; }
    .nav-logo img { height:46px; object-fit:contain; }
    .nav-links { display: flex; gap: 6px; }
    .nav-links a { text-decoration: none; color: #444; font-size: 14px; padding: 5px 14px; border-radius: 6px; transition: background .2s,color .2s; }
    .nav-links a:hover  { background: #ede0f5; color: var(--accent); }
    .nav-links a.active { background: #d4b8e8; color: #4a1d8a; font-weight: 600; }

    /* ── LAYOUT ── */
    .box-layout { flex: 1; min-height: 0; display: flex; flex-direction: row; align-items: stretch; }

    .nav-arrow-btn {
      flex: 0 0 52px;
      border: none; background: transparent; color: rgba(255,255,255,.6); font-size: 20px;
      cursor: pointer; transition: color .15s, transform .12s;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-arrow-btn:hover:not(:disabled) { color: #fff; transform: scale(1.15); }
    .nav-arrow-btn:disabled { opacity: .25; cursor: default; transform: none; }

    .box-center { flex: 1; min-width: 0; display: flex; flex-direction: column; padding: 10px 0 0; gap: 8px; }

    /* ── HEADER ── */
    .box-header { display: flex; align-items: center; gap: 10px; padding: 0 14px; flex-shrink: 0; }
    .back-link { text-decoration: none; background: rgba(255,255,255,.75); color: #5a2d7a; padding: 4px 10px; border-radius: 7px; font-size: 12px; font-weight: 600; transition: background .14s; }
    .back-link:hover { background: #fff; }
    .box-name { font-size: 17px; font-weight: 700; color: #fff; }
    .box-count { font-size: 11px; color: rgba(255,255,255,.8); }
    .box-dots { display: flex; gap: 5px; margin-left: 6px; }
    .box-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,.35); cursor: pointer; transition: background .15s; }
    .box-dot.active { background: #fff; }
    .clear-btn { margin-left: auto; background: rgba(200,40,40,.8); color: #fff; border: none; padding: 5px 12px; border-radius: 7px; font-size: 11px; cursor: pointer; font-family: inherit; transition: background .15s; }
    .clear-btn:hover { background: #c00; }

    /* ── BOX VIEWPORT ── */
    .box-viewport { flex: 1; min-height: 0; overflow: hidden; position: relative; padding-bottom: 10px; }
    .box-grid {
      height: 100%;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 8px;
      padding: 2px 14px 0;
      transition: transform .24s ease, opacity .24s;
    }

    /* ── SLOTS ── */
    .box-slot {
      background: rgba(255,255,255,.42);
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background .14s, transform .15s, box-shadow .15s;
      position: relative; overflow: hidden;
      border: 2px solid transparent;
    }
    .box-slot:hover { background: rgba(255,255,255,.72); transform: scale(1.05); box-shadow: 0 4px 14px rgba(0,0,0,.18); }
    .box-slot.filled { background: rgba(255,255,255,.82); }
    .box-slot.filled:hover { border-color: var(--accent); }
    .box-slot .slot-plus { font-size: 22px; color: rgba(200,170,230,.7); user-select: none; }
    .box-slot img { width: 72%; height: 72%; image-rendering: pixelated; object-fit: contain; }

    /* ── DETAIL OVERLAY ── */
    .detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.48); z-index: 50; opacity: 0; pointer-events: none; transition: opacity .22s; display: flex; align-items: center; justify-content: center; }
    .detail-overlay.visible { opacity: 1; pointer-events: all; }

    /* ── DETAIL CARD ── */
    .detail-card {
      background: var(--card-bg); border-radius: 16px;
      padding: 18px 20px 20px; width: 430px; max-width: 96vw; max-height: 90vh;
      overflow-y: auto; box-shadow: 0 10px 48px rgba(0,0,0,.32);
      transform: translateY(18px); opacity: 0;
      transition: transform .24s ease, opacity .24s;
    }
    .detail-overlay.visible .detail-card { transform: translateY(0); opacity: 1; }

    .dc-topbar { display: flex; align-items: center; gap: 6px; margin-bottom: 14px; }
    .dc-close { margin-left: auto; background: #e0d4f0; border: none; padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; color: #666; font-family: inherit; transition: all .14s; }
    .dc-close:hover { background: #f0c8c8; color: #c00; }
    .dc-add-btn { background: var(--accent); color: #fff; border: none; padding: 5px 14px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background .14s; }
    .dc-add-btn:hover { background: #5a2d7a; }
    .dc-del-btn { background: #fde0e0; color: #c00; border: none; padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background .14s; }
    .dc-del-btn:hover { background: #f5b8b8; }

    .dc-poke-header { display: flex; gap: 14px; margin-bottom: 14px; align-items: flex-start; }
    .dc-sprite-wrap { flex-shrink: 0; width: 110px; height: 110px; display: flex; align-items: center; justify-content: center; background: rgba(160,120,200,.12); border-radius: 12px; }
    .dc-sprite { width: 94px; height: 94px; image-rendering: pixelated; object-fit: contain; }
    .dc-info { flex: 1; min-width: 0; }
    .dc-name { font-size: 17px; font-weight: 700; color: #2a1050; margin-bottom: 6px; }
    .dc-no { font-size: 10px; color: #aaa; margin-bottom: 4px; }
    .dc-types { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
    .type-badge { padding: 2px 8px; border-radius: 4px; font-size: 10px; color: #fff; font-weight: 700; }
    .dc-build-chips { display: flex; gap: 5px; flex-wrap: wrap; }
    .dc-chip { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: rgba(100,60,160,.12); color: #5a2d7a; font-weight: 600; }
    .dc-chip.nat-up { background: #ffeedd; color: #b05000; }
    .dc-chip.nat-dn { background: #ddeeff; color: #0060b0; }

    /* Stats */
    .dc-section-title { font-size: 10px; font-weight: 700; color: #9080b8; letter-spacing: .5px; margin-bottom: 6px; margin-top: 12px; }
    .stat-row { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
    .stat-lbl { font-size: 9px; color: #888; width: 26px; text-align: right; flex-shrink: 0; }
    .stat-base { font-size: 10px; color: #aaa; width: 22px; text-align: right; flex-shrink: 0; }
    .stat-bar-wrap { flex: 1; height: 7px; background: rgba(0,0,0,.08); border-radius: 4px; overflow: hidden; }
    .stat-bar { height: 100%; border-radius: 4px; transition: width .3s; }
    .stat-val { font-size: 11px; font-weight: 700; color: #333; width: 28px; flex-shrink: 0; }

    /* Moves */
    .dc-moves-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
    .dc-move { padding: 5px 10px; border-radius: 6px; font-size: 11px; color: #fff; font-weight: 600; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dc-move.empty { background: rgba(0,0,0,.1); color: #bbb; }

    /* EVs */
    .dc-evs { display: flex; gap: 6px; flex-wrap: wrap; }
    .dc-ev { font-size: 10px; background: rgba(100,60,160,.1); border-radius: 4px; padding: 2px 7px; color: #5a2d7a; font-weight: 600; }

    /* Toast */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #5a2d7a; color: #fff; padding: 9px 22px; border-radius: 20px; font-size: 12px; z-index: 9999; pointer-events: none; opacity: 0; transition: opacity .3s; white-space: nowrap; box-shadow: 0 4px 14px rgba(0,0,0,.25); }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,.05); border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,.18); border-radius: 3px; }

    .mob-box-ad{display:none;}

    /* ── RESPONSIVE ── */
    @media (max-width:1280px),(pointer:coarse){
      .navbar{height:48px;padding:0 16px;}
      .nav-logo img{height:36px;}
      .nav-links a{padding:5px 8px;font-size:11.5px;}
    }
    @media (max-width:1024px),(pointer:coarse){
      .nav-arrow-btn{display:none!important;}
      .box-header{padding:0 10px;gap:6px;}
      .back-link,.clear-btn{white-space:nowrap;}
      .box-name{font-size:15px;}
      .box-count{display:none;}
      .box-dots{gap:3px;}
      .box-dot{width:5px;height:5px;}
      .box-viewport{flex:none;height:auto;padding-bottom:0;}
      .box-grid{height:auto;grid-template-rows:repeat(5,auto);gap:5px;padding:2px 10px;}
      .box-slot{aspect-ratio:1;}
      .box-slot:hover{background:rgba(255,255,255,.42)!important;transform:none!important;box-shadow:none!important;}
      .box-slot.filled:hover{border-color:transparent!important;background:rgba(255,255,255,.82)!important;}
      .mob-box-ad{
        display:flex;flex:1;min-height:70px;
        margin:8px 10px 10px;
        background:rgba(0,0,0,.12);border-radius:10px;
        align-items:center;justify-content:center;
        font-size:14px;font-weight:700;
        color:rgba(255,255,255,.5);letter-spacing:2px;
      }
    }

    /* ── MODALS (index.html 동일) ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal-box{background:#fff;border-radius:14px;padding:18px 20px;width:620px;max-width:92vw;max-height:84vh;display:flex;flex-direction:column;gap:9px;box-shadow:0 12px 44px rgba(0,0,0,.3);}
    .modal-head{display:flex;align-items:center;justify-content:space-between;}
    .modal-title{font-size:14px;font-weight:700;color:#333;}
    .modal-x{background:none;border:none;font-size:17px;cursor:pointer;color:#777;transition:color .15s;}
    .modal-x:hover{color:#c00;}
    .modal-search{width:100%;padding:7px 12px;border:2px solid #ddd;border-radius:8px;font-size:13px;outline:none;transition:border-color .18s;font-family:inherit;}
    .modal-search:focus{border-color:var(--accent);}
    .filter-row{display:flex;gap:5px;flex-wrap:wrap;}
    .f-btn{padding:3px 10px;border:1px solid #ccc;border-radius:20px;font-size:11px;cursor:pointer;background:#fff;color:#444;transition:all .15s;font-family:inherit;}
    .f-btn.on{background:var(--accent);color:#fff;border-color:var(--accent);}
    .f-btn[data-if="포챔스"]{background:#f3e8fd;color:#7b3fa0;border-color:#c9a0e8;}
    .f-btn[data-if="포챔스"].on{background:var(--accent);color:#fff;border-color:var(--accent);}
    .poke-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;overflow-y:auto;max-height:400px;padding:2px;}
    .poke-card{display:flex;flex-direction:column;align-items:center;padding:6px 4px;border-radius:8px;cursor:pointer;border:2px solid transparent;background:#f8f8f8;transition:all .14s;}
    .poke-card:hover{border-color:var(--accent);background:#f0e6fa;transform:scale(1.04);}
    .poke-card img{width:52px;height:52px;image-rendering:pixelated;}
    .pc-no{font-size:9px;color:#bbb;}
    .pc-name{font-size:10px;color:#333;text-align:center;word-break:keep-all;line-height:1.3;}
    .pc-types{display:flex;gap:2px;margin-top:2px;}
    .pc-tbadge{padding:1px 4px;border-radius:3px;font-size:8px;color:#fff;font-weight:600;}
    .move-list-wrap{overflow-y:auto;max-height:420px;}
    .move-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;transition:background .12s;}
    .move-item:hover{background:#f0e6fa;}
    .mi-type{padding:2px 7px;border-radius:4px;font-size:10px;color:#fff;font-weight:600;min-width:42px;text-align:center;}
    .mi-name{font-size:12px;font-weight:600;min-width:110px;color:#333;}
    .mi-cat{font-size:10px;color:#999;min-width:28px;}
    .mi-pow{font-size:11px;color:#555;min-width:32px;}
    .mi-acc{font-size:10px;color:#888;min-width:36px;}
    .mi-desc{font-size:10px;color:#aaa;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1;}
    .item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:6px;overflow-y:auto;max-height:400px;padding:2px;}
    .item-card{display:flex;flex-direction:column;align-items:center;padding:7px 4px 5px;border-radius:8px;cursor:pointer;border:2px solid transparent;background:#f8f8f8;transition:all .14s;position:relative;}
    .item-card:hover{border-color:var(--accent);background:#f0e6fa;}
    .item-card img{width:32px;height:32px;image-rendering:pixelated;}
    .item-no-img{width:32px;height:32px;background:#e0d0f0;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;}
    .item-name{font-size:10px;color:#333;text-align:center;word-break:keep-all;margin-top:3px;line-height:1.3;}
    .item-cat-badge{font-size:8px;color:#888;text-align:center;}
    .item-effect-panel{background:#f5eefa;border-radius:8px;padding:8px 10px;font-size:11px;color:#555;display:none;}
    .item-effect-panel.show{display:block;}
    .ability-list{overflow-y:auto;max-height:350px;}
    .ability-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all .14s;margin-bottom:4px;background:#f9f9f9;}
    .ability-item:hover{border-color:var(--accent);background:#f0e6fa;}
    .ability-item.selected{border-color:var(--accent);background:#e8d5f8;}
    .ability-item .ab-name{font-size:13px;font-weight:700;color:#333;min-width:90px;}
    .ability-item .ab-desc{font-size:11px;color:#777;flex:1;line-height:1.5;}
    .ability-item .ab-tag{font-size:9px;background:#ddd;color:#666;border-radius:3px;padding:1px 5px;flex-shrink:0;height:fit-content;}
    .ability-item .ab-tag.hidden-tag{background:#ffe0b2;color:#e65100;}
    .nature-table{width:100%;border-collapse:collapse;font-size:11px;}
    .nature-table th{padding:5px 6px;background:#f0e6fa;color:#555;font-weight:700;text-align:center;font-size:10px;border:1px solid #ddd;}
    .nature-table td{padding:4px 6px;text-align:center;border:1px solid #eee;cursor:pointer;transition:background .12s;}
    .nature-table td:hover{background:#e8d5f8;}
    .nature-table td.nat-neutral{background:#f0f0f0;color:#999;}
    .nature-table td.nat-neutral:hover{background:#e6e0f0;}
    .nature-table td.nat-selected{background:var(--accent)!important;color:#fff!important;font-weight:700;}
    .nature-table .row-lbl{background:#fff0f0;color:#e53935;font-weight:700;cursor:default;}
    .nature-table .row-lbl:hover{background:#fff0f0;}
    .nature-table .col-lbl{background:#e8f0fe;color:#1976d2;font-weight:700;cursor:default;}
    .nature-table .col-lbl:hover{background:#e8f0fe;}

    /* ── BUILDER OVERLAY ── */

    .builder-overlay.open{display:flex;}
    .builder-card{background:#fff;border-radius:14px;padding:22px 26px;width:600px;max-width:94vw;max-height:92vh;overflow-y:auto;box-shadow:0 12px 44px rgba(0,0,0,.3);display:flex;flex-direction:column;gap:11px;}
    .b-topbar{display:flex;align-items:center;gap:8px;}
    .b-back-btn{background:#e8d8f8;border:none;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;color:#5a2d7a;font-family:inherit;}
    .b-save-btn{background:var(--accent);color:#fff;border:none;padding:6px 20px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
    .b-save-btn:hover{background:#5a2d7a;}
    .b-close-btn{margin-left:auto;background:none;border:none;font-size:19px;cursor:pointer;color:#777;}
    .b-close-btn:hover{color:#c00;}
    .b-poke-row{display:flex;gap:14px;align-items:flex-start;}
    .b-sprite-wrap{flex-shrink:0;width:110px;height:110px;background:#f0e6fa;border-radius:12px;display:flex;align-items:center;justify-content:center;}
    .b-sprite{width:96px;height:96px;image-rendering:pixelated;object-fit:contain;}
    .b-info{flex:1;min-width:0;}
    .b-poke-name{font-size:16px;font-weight:700;color:#2a1050;}
    .b-types-row{display:flex;gap:4px;flex-wrap:wrap;margin:5px 0;}
    .b-gender-row{display:flex;gap:5px;}
    .b-gender-btn{padding:3px 10px;border:1.5px solid #ddd;border-radius:5px;font-size:12px;cursor:pointer;background:#f8f8f8;color:#555;font-family:inherit;transition:all .1s;}

    .b-cfg-name{font-size:13px;color:#2a1050;font-weight:600;}
    .b-cfg-name.ph{color:#bbb;font-weight:400;}
    .b-cfg-desc{font-size:11px;color:#aaa;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1;}
    .b-stat-row{display:flex;align-items:center;gap:8px;margin-bottom:1px;}
    .b-stat-lbl{font-size:10px;color:#888;width:30px;text-align:right;flex-shrink:0;}
    .b-stat-base{font-size:11px;color:#bbb;width:24px;text-align:right;flex-shrink:0;}

    .b-stat-val{font-size:12px;font-weight:700;color:#333;width:32px;}

    .b-ev-input:focus{border-color:var(--accent);}
    .b-ev-total{font-size:11px;color:#888;text-align:right;}
    .b-moves-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
    .b-move-slot{padding:9px 12px;border-radius:8px;font-size:12px;font-weight:600;text-align:center;cursor:pointer;transition:opacity .12s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .b-move-slot.empty{background:#f0f0f0;color:#bbb;}
    .b-move-slot:hover{opacity:.8;}
    .type-f-btn{padding:2px 7px;border:1.5px solid transparent;border-radius:20px;font-size:10px;cursor:pointer;color:#fff;font-weight:600;font-family:inherit;transition:opacity .15s,box-shadow .15s;opacity:.55;}
    .type-f-btn.on{opacity:1;box-shadow:0 0 0 2px #fff,0 0 0 4px var(--btn-col,#888);}
    .box-tt{position:fixed;z-index:500;background:rgba(18,10,34,.97);border:1px solid #6040a0;border-radius:10px;padding:9px 11px;width:220px;font-size:10px;color:#c8c0e8;pointer-events:none;opacity:0;transition:opacity .15s ease;box-shadow:0 6px 24px rgba(0,0,0,.55);line-height:1.55;}

<script>
const TYPE_COLORS = {
  '노말':'#9A9A7A','불꽃':'#F08030','물':'#6890F0','풀':'#78C850',
  '전기':'#F8C600','얼음':'#98D8D8','격투':'#C03028','독':'#A040A0',
  '땅':'#C8A840','비행':'#A890F0','에스퍼':'#F85888','벌레':'#A8B820',
  '바위':'#B8A038','고스트':'#705898','드래곤':'#7038F8','악':'#6B5040',
  '강철':'#A8A8C0','페어리':'#EE99AC'
};
const NATURES = [
  /* +Atk */
  {name:'변덕',      up:null, dn:null},
  {name:'외로움',    up:'A',  dn:'B'},
  {name:'고집',      up:'A',  dn:'C'},
  {name:'개구쟁이',  up:'A',  dn:'D'},
  {name:'용감',      up:'A',  dn:'S'},
  /* +Def */
  {name:'대담',      up:'B',  dn:'A'},
  {name:'수줍',      up:null, dn:null},
  {name:'장난꾸러기',up:'B',  dn:'C'},
  {name:'촐랑',      up:'B',  dn:'D'},
  {name:'무사태평',  up:'B',  dn:'S'},
  /* +SpAtk */
  {name:'조심',      up:'C',  dn:'A'},
  {name:'의젓',      up:'C',  dn:'B'},
  {name:'노력',      up:null, dn:null},
  {name:'덜렁',      up:'C',  dn:'D'},
  {name:'냉정',      up:'C',  dn:'S'},
  /* +SpDef */
  {name:'차분',      up:'D',  dn:'A'},
  {name:'얌전',      up:'D',  dn:'B'},
  {name:'신중',      up:'D',  dn:'C'},
  {name:'온순',      up:'D',  dn:'S'},
  {name:'건방',      up:null, dn:null},
  /* +Spe */
  {name:'겁쟁이',    up:'S',  dn:'A'},
  {name:'성급',      up:'S',  dn:'B'},
  {name:'명랑',      up:'S',  dn:'C'},
  {name:'천진난만',  up:'S',  dn:'D'},
  {name:'성실',      up:null, dn:null},
];
const STAT_KEYS  = ['H','A','B','C','D','S'];
const STAT_NAMES = {'H':'HP','A':'공격','B':'방어','C':'특공','D':'특방','S':'스피드'};
const NAT_STATS  = ['A','B','C','D','S'];
const NAT_LABELS = {A:'공격',B:'방어',C:'특공',D:'특방',S:'스피드'};

const SLOTS_PER_BOX = 30;
let currentBox = 0;
let selectedBoxIdx = -1;

function getBoxData() {
  try { return JSON.parse(localStorage.getItem('pochams_box') || '[]'); } catch(e) { return []; }
}
function setBoxData(arr) { localStorage.setItem('pochams_box', JSON.stringify(arr)); }

function numBoxes() { return 5; }

function spriteUrl(name, no) {
  return POKEMON_SPRITES?.[name] || `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${no}.png`;
}

function showToast(msg) {
  const t = document.getElementById('toastEl');
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(t._t); t._t = setTimeout(() => t.style.opacity = '0', 2400);
}

function natMult(nat, key) {
  if (!nat) return 1;
  return nat.up === key ? 1.1 : nat.dn === key ? 0.9 : 1;
}

/* ── 박스 툴팁 ── */
function buildBoxTtHtml(entry) {
  const pk = POKEMON_DATA[entry.pkIdx];
  if (!pk) return '';
  const item   = (entry.itIdx  >= 0 && ITEM_DATA[entry.itIdx])  ? ITEM_DATA[entry.itIdx]  : null;
  const nature = (entry.natIdx >= 0 && NATURES[entry.natIdx])   ? NATURES[entry.natIdx]   : null;
  const evs    = entry.evs || {H:0,A:0,B:0,C:0,D:0,S:0};
  const moves  = (entry.moves||[]).map(mi => (mi>=0&&MOVE_DATA[mi]) ? MOVE_DATA[mi] : null);
  const hp   = calcStat(pk.H, evs.H, true);
  const def  = Math.floor(calcStat(pk.B, evs.B, false, natMult(nature,'B')));
  const spdf = Math.floor(calcStat(pk.D, evs.D, false, natMult(nature,'D')));
  const spd  = Math.floor(calcStat(pk.S, evs.S, false, natMult(nature,'S')));
  const tb   = t => `<span style="background:${TYPE_COLORS[t]||'#888'};color:#fff;border-radius:4px;padding:0 5px;font-size:9px;font-weight:700;margin-left:3px">${t}</span>`;
  const evStr = ['H','A','B','C','D','S'].filter(k=>evs[k]>0).map(k=>`${k}:${evs[k]}`).join(' ');
  return `
    <div style="font-size:11px;font-weight:700;margin-bottom:3px">${pk.name}${tb(pk.type1)}${pk.type2?tb(pk.type2):''}</div>
    ${(item||entry.ability)?`<div style="color:#b0a0d0;margin-bottom:2px">${item?`도구 ${item.name} `:''}${entry.ability?`특성 ${entry.ability.name}`:''}</div>`:''}
    ${nature?`<div>성격 ${nature.name}</div>`:''}
    ${evStr?`<div>노력치 ${evStr}</div>`:''}
    <div style="margin-top:4px;color:#d0c8f0">${moves.map(mv=>mv?`<div>● ${mv.name}</div>`:'').join('')}</div>
    <div style="margin-top:5px;border-top:1px solid #403060;padding-top:4px">물리내구 ${Math.floor(hp*def/0.411).toLocaleString()} 특수내구 ${Math.floor(hp*spdf/0.411).toLocaleString()}<br>스피드 ${spd}</div>
  `;
}
function showBoxTt(anchorEl, html) {
  const tt = document.getElementById('boxTt');
  if (!tt||!html) return;
  tt.innerHTML = html;
  tt.classList.remove('show');
  const rect = anchorEl.getBoundingClientRect();
  const goRight = (rect.left + rect.width/2) < window.innerWidth/2;
  if (goRight) { tt.style.left = (rect.right+10)+'px'; tt.style.right='auto'; }
  else          { tt.style.left='auto'; tt.style.right=(window.innerWidth-rect.left+10)+'px'; }
  tt.style.top = rect.top+'px'; tt.style.bottom='auto';
  requestAnimationFrame(() => {
    const tr = tt.getBoundingClientRect();
    if (tr.bottom > window.innerHeight-8) tt.style.top = Math.max(8,window.innerHeight-tr.height-8)+'px';
    tt.classList.add('show');
  });
}
function hideBoxTt() {
  const tt = document.getElementById('boxTt');
  if (tt) tt.classList.remove('show');
}
function calcStat(base, ev, isHP, nm) {
  ev = Math.min(32, ev || 0);
  return isHP ? base + 75 + ev : Math.floor((base + 20 + ev) * nm);
}
function statColor(v) {
  if (v < 80)  return '#e05050';
  if (v < 110) return '#e09030';
  if (v < 140) return '#c8b020';
  if (v < 170) return '#50b050';
  return '#30a880';
}

/* ── RENDER BOX GRID ── */
function renderGrid(animate, dir) {
  const box = getBoxData();
  const grid = document.getElementById('boxGrid');
  const start = currentBox * SLOTS_PER_BOX;

  const html = [];
  for (let i = 0; i < SLOTS_PER_BOX; i++) {
    const entry = box[start + i];
    const absIdx = start + i;
    if (entry && POKEMON_DATA[entry.pkIdx]) {
      const pk = POKEMON_DATA[entry.pkIdx];
      html.push(`<div class="box-slot filled" data-idx="${absIdx}" title="${pk.name}">
        <img src="${spriteUrl(pk.name, pk.no)}" alt="${pk.name}" loading="lazy">
      </div>`);
    } else {
      html.push(`<div class="box-slot empty" data-idx="${absIdx}"><span class="slot-plus">+</span></div>`);
    }
  }

  if (animate) {
    grid.style.transform = `translateX(${dir > 0 ? '-' : ''}100%)`;
    grid.style.opacity = '0';
    setTimeout(() => {
      grid.innerHTML = html.join('');
      grid.style.transition = 'none';
      grid.style.transform = `translateX(${dir > 0 ? '' : '-'}100%)`;
      grid.style.opacity = '0';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        grid.style.transition = '';
        grid.style.transform = '';
        grid.style.opacity = '1';
      }));
    }, 240);
  } else {
    grid.innerHTML = html.join('');
  }

  updateHeader();
}

function updateHeader() {
  const box = getBoxData();
  const total = box.filter(Boolean).length;
  const n = numBoxes();
  document.getElementById('boxName').textContent = `박스 ${currentBox + 1}`;
  document.getElementById('boxCount').textContent = total ? `전체 ${total}마리` : '';
  document.getElementById('prevBtn').disabled = false;
  document.getElementById('nextBtn').disabled = false;

  const dots = document.getElementById('boxDots');
  dots.innerHTML = Array.from({length: n}, (_, i) =>
    `<div class="box-dot${i === currentBox ? ' active' : ''}" data-box="${i}"></div>`
  ).join('');
}

/* ── DETAIL CARD (보기 전용) ── */
function openDetail(absIdx) {
  const box = getBoxData();
  const entry = box[absIdx];
  if (!entry) return;
  const pk = POKEMON_DATA[entry.pkIdx];
  if (!pk) return;
  selectedBoxIdx = absIdx;

  const nat = entry.natIdx >= 0 ? NATURES[entry.natIdx] : null;
  const it  = entry.itIdx  >= 0 ? ITEM_DATA[entry.itIdx]  : null;
  const evs = entry.evs || {H:0,A:0,B:0,C:0,D:0,S:0};
  const moves = (entry.moves || []).map(mi => mi >= 0 && MOVE_DATA[mi] ? MOVE_DATA[mi] : null);

  const natChips = nat ? [
    nat.up ? `<span class="dc-chip nat-up">${nat.name} ${STAT_NAMES[nat.up]}↑</span>` : '',
    nat.dn ? `<span class="dc-chip nat-dn">${STAT_NAMES[nat.dn]}↓</span>` : '',
    !nat.up ? `<span class="dc-chip">${nat.name}</span>` : ''
  ].filter(Boolean).join('') : '';

  const statsHtml = STAT_KEYS.map(k => {
    const isHP = k === 'H';
    const nm   = natMult(nat, k);
    const val  = calcStat(pk[k], evs[k], isHP, nm);
    const pct  = Math.min(100, Math.round(val / 3));
    const col  = statColor(val);
    return `<div class="stat-row">
      <div class="stat-lbl">${STAT_NAMES[k]}</div>
      <div class="stat-base">${pk[k]}</div>
      <div class="stat-bar-wrap"><div class="stat-bar" style="width:${pct}%;background:${col}"></div></div>
      <div class="stat-val">${val}</div>
    </div>`;
  }).join('');

  const movesHtml = [0,1,2,3].map(i => {
    const mv = moves[i];
    if (!mv) return `<div class="dc-move empty">—</div>`;
    const bg = TYPE_COLORS[mv.type] || '#888';
    return `<div class="dc-move" style="background:${bg}">${mv.name}</div>`;
  }).join('');

  const evList = STAT_KEYS.filter(k => evs[k] > 0)
    .map(k => `<span class="dc-ev">${STAT_NAMES[k]} ${evs[k]}</span>`).join('');

  const types = [pk.type1, pk.type2].filter(Boolean).map(t =>
    `<span class="type-badge" style="background:${TYPE_COLORS[t]||'#888'}">${t}</span>`
  ).join('');

  document.getElementById('detailCard').innerHTML = `
    <div class="dc-topbar">
      <button class="dc-add-btn" id="dcAddBtn">파티에 추가</button>
      <button class="dc-del-btn" id="dcDelBtn">삭제</button>
      <button class="dc-close" id="dcClose">닫기 ✕</button>
    </div>
    <div class="dc-poke-header">
      <div class="dc-sprite-wrap">
        <img class="dc-sprite" src="${spriteUrl(pk.name, pk.no)}" alt="${pk.name}">
      </div>
      <div class="dc-info">
        <div class="dc-no">#${pk.no}</div>
        <div class="dc-name">${pk.name}${entry.gender ? ' ' + entry.gender : ''}</div>
        <div class="dc-types">${types}</div>
        <div class="dc-build-chips">
          ${natChips}
          ${it ? `<span class="dc-chip">📦 ${it.name}</span>` : ''}
          ${entry.ability ? `<span class="dc-chip">${entry.ability.name}</span>` : ''}
        </div>
      </div>
    </div>
    <div class="dc-section-title">스탯</div>
    ${statsHtml}
    <div class="dc-section-title">기술</div>
    <div class="dc-moves-grid">${movesHtml}</div>
    ${evList ? `<div class="dc-section-title">노력치</div><div class="dc-evs">${evList}</div>` : ''}
  `;

  document.getElementById('dcClose').onclick = closeDetail;
  document.getElementById('dcAddBtn').onclick = () => {
    localStorage.setItem('pochams_box_add', JSON.stringify(entry));
    window.location.href = 'index.html';
  };
  document.getElementById('dcDelBtn').onclick = () => {
    if (!confirm(`${pk.name}을(를) 삭제하시겠습니까?`)) return;
    const b = getBoxData();
    b[absIdx] = null;
    setBoxData(b);
    closeDetail();
    renderGrid(false);
    showToast(`${pk.name}을(를) 삭제했습니다.`);
  };

  document.getElementById('detailOverlay').classList.add('visible');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('visible');
  selectedBoxIdx = -1;
}

/* ── EVENT LISTENERS ── */
document.getElementById('boxGrid').addEventListener('click', e => {
  const filled = e.target.closest('.box-slot.filled');
  if (filled) { openDetail(+filled.dataset.idx); return; }
  const empty = e.target.closest('.box-slot.empty');
  if (empty) openPokeModal(+empty.dataset.idx);
});
document.getElementById('boxGrid').addEventListener('mouseover', e => {
  const slot = e.target.closest('.box-slot.filled');
  if (!slot) return;
  const box = getBoxData();
  const entry = box[+slot.dataset.idx];
  if (!entry) return;
  showBoxTt(slot, buildBoxTtHtml(entry));
});
document.getElementById('boxGrid').addEventListener('mouseleave', hideBoxTt);
document.getElementById('boxGrid').addEventListener('mouseout', e => {
  if (!e.relatedTarget || !document.getElementById('boxGrid').contains(e.relatedTarget)) hideBoxTt();
});

document.getElementById('detailOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('detailOverlay')) closeDetail();
});

document.getElementById('prevBtn').addEventListener('click', () => {
  currentBox = (currentBox - 1 + numBoxes()) % numBoxes();
  renderGrid(true, -1);
});
document.getElementById('nextBtn').addEventListener('click', () => {
  currentBox = (currentBox + 1) % numBoxes();
  renderGrid(true, 1);
});

document.getElementById('boxDots').addEventListener('click', e => {
  const dot = e.target.closest('.box-dot');
  if (!dot || +dot.dataset.box === currentBox) return;
  const dir = +dot.dataset.box > currentBox ? 1 : -1;
  currentBox = +dot.dataset.box;
  renderGrid(true, dir);
});

document.getElementById('clearBtn').addEventListener('click', () => {
  const box = getBoxData();
  const start = currentBox * SLOTS_PER_BOX;
  const inBox = box.slice(start, start + SLOTS_PER_BOX).filter(e => e && POKEMON_DATA[e?.pkIdx]);
  if (!inBox.length) { showToast('이 박스는 비어 있습니다.'); return; }
  if (!confirm(`박스 ${currentBox + 1}의 포켓몬 ${inBox.length}마리를 삭제하시겠습니까?`)) return;
  for (let i = start; i < start + SLOTS_PER_BOX; i++) box[i] = null;
  setBoxData(box);
  renderGrid(false);
  showToast(`박스 ${currentBox + 1}을 비웠습니다.`);
});

/* ── INIT ── */
renderGrid(false);

/* ════════════════════════════
   ADD TO BOX FLOW
════════════════════════════ */
let addSlotIdx   = -1;
let addPokemon   = null;
let addNature    = null;
let addItem      = null;
let addAbility   = null;
let addMoves     = [null,null,null,null];
let addEvs       = {H:0,A:0,B:0,C:0,D:0,S:0};
let addGender    = null;
let addMoveEditIdx = -1;
let addPokeFilter  = 'all';
let addTypeFilter  = null;
let addMoveFilter  = 'all';
let addItemFilter  = 'all';
let _addAbilList   = [];

/* ── Poke Modal ── */
function buildTypeFilterRow() {
  const types = Object.keys(TYPE_COLORS);
  document.getElementById('typeFilterRow').innerHTML = types.map(t =>
    `<button class="type-f-btn${addTypeFilter===t?' on':''}" data-t="${t}" style="background:${TYPE_COLORS[t]};--btn-col:${TYPE_COLORS[t]}">${t}</button>`
  ).join('');
}

function openPokeModal(slotIdx) {
  addSlotIdx = slotIdx;
  addPokeFilter = 'all';
  addTypeFilter = null;
  document.querySelectorAll('#pokeFilterRow .f-btn').forEach(b => b.classList.toggle('on', b.dataset.f === 'all'));
  document.getElementById('pokeSearch').value = '';
  buildTypeFilterRow();
  renderPokeGrid('');
  document.getElementById('pokeModal').classList.add('open');
  setTimeout(() => document.getElementById('pokeSearch').focus(), 50);
}
function closePokeModal() { document.getElementById('pokeModal').classList.remove('open'); }

function renderPokeGrid(q) {
  let list = POKEMON_DATA.map((p,i) => ({p,i}));
  if (addPokeFilter === 'ingame') list = list.filter(({p}) => p.champions);
  if (addTypeFilter) list = list.filter(({p}) => p.type1 === addTypeFilter || p.type2 === addTypeFilter);
  if (q) list = list.filter(({p}) => p.name.includes(q));
  document.getElementById('pokeGrid').innerHTML = list.map(({p:pk,i}) => `
    <div class="poke-card" data-idx="${i}">
      <img src="${spriteUrl(pk.name, pk.no)}" alt="${pk.name}" loading="lazy">
      <div class="pc-no">#${pk.no}</div>
      <div class="pc-name">${pk.name}</div>
      <div class="pc-types">${[pk.type1,pk.type2].filter(Boolean).map(t=>`<span class="pc-tbadge" style="background:${TYPE_COLORS[t]||'#888'}">${t}</span>`).join('')}</div>
    </div>`).join('');
}

document.getElementById('pokeGrid').addEventListener('click', e => {
  const card = e.target.closest('.poke-card');
  if (!card) return;
  const pk = POKEMON_DATA[+card.dataset.idx];
  if (!pk) return;
  addPokemon = pk;
  addNature = null; addItem = null;
  addMoves = [null,null,null,null];
  addEvs = {H:0,A:0,B:0,C:0,D:0,S:0};
  addGender = pk.name.endsWith('♂') ? '♂' : pk.name.endsWith('♀') ? '♀' : null;
  const abd = ABILITY_DATA?.[pk.name];
  addAbility = abd?.normal?.[0] || null;
  closePokeModal();
  openBuilder();
});

document.getElementById('closePokeModal').addEventListener('click', closePokeModal);
document.getElementById('pokeModal').addEventListener('click', e => { if(e.target===document.getElementById('pokeModal')) closePokeModal(); });
document.getElementById('pokeSearch').addEventListener('input', e => renderPokeGrid(e.target.value));
document.getElementById('pokeFilterRow').addEventListener('click', e => {
  const btn = e.target.closest('.f-btn');
  if (!btn) return;
  document.querySelectorAll('#pokeFilterRow .f-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on'); addPokeFilter = btn.dataset.f;
  renderPokeGrid(document.getElementById('pokeSearch').value);
});
document.getElementById('typeFilterRow').addEventListener('click', e => {
  const btn = e.target.closest('.type-f-btn');
  if (!btn) return;
  const t = btn.dataset.t;
  addTypeFilter = (addTypeFilter === t) ? null : t;
  buildTypeFilterRow();
  renderPokeGrid(document.getElementById('pokeSearch').value);
});

/* ── Builder ── */
function openBuilder() { renderBuilder(); document.getElementById('builderOverlay').classList.add('open'); }
function closeBuilder() { document.getElementById('builderOverlay').classList.remove('open'); }

function renderBuilder() {
  const pk = addPokemon;
  if (!pk) return;
  const types = [pk.type1,pk.type2].filter(Boolean).map(t =>
    `<span class="type-badge" style="background:${TYPE_COLORS[t]||'#888'};padding:2px 8px;border-radius:4px;font-size:10px;color:#fff;font-weight:700;">${t}</span>`
  ).join('');
  const natLabel = addNature
    ? (addNature.up ? `${addNature.name} (${NAT_LABELS[addNature.up]}↑ ${NAT_LABELS[addNature.dn]}↓)` : addNature.name)
    : null;
  const statRows = STAT_KEYS.map(k => {
    const isHP = k==='H', nm = addNature?.up===k ? 1.1 : addNature?.dn===k ? 0.9 : 1;
    const val = calcStat(pk[k], addEvs[k]||0, isHP, nm);
    const pct = Math.min(100, Math.round(val/3)), col = statColor(val);
    return `<div class="b-stat-row">
      <div class="b-stat-lbl">${STAT_NAMES[k]}</div>
      <div class="b-stat-base">${pk[k]}</div>
      <div class="b-stat-bar-wrap"><div class="b-stat-bar" style="width:${pct}%;background:${col}"></div></div>
      <div class="b-stat-val">${val}</div>
      <input class="b-ev-input" type="text" inputmode="numeric" value="${addEvs[k]||0}" data-stat="${k}">
    </div>`;
  }).join('');
  const evTotal = Object.values(addEvs).reduce((a,b)=>a+b,0);
  const movesHtml = [0,1,2,3].map(i => {
    const mv = addMoves[i];
    return mv
      ? `<div class="b-move-slot" data-mi="${i}" style="background:${TYPE_COLORS[mv.type]||'#888'};color:#fff">${mv.name}</div>`
      : `<div class="b-move-slot empty" data-mi="${i}">— 기술 없음</div>`;
  }).join('');
  const genderHtml = [['','무성'],['♂','♂'],['♀','♀']].map(([g,lbl]) =>
    `<button class="b-gender-btn${addGender===(g||null)?' on':''}" data-gender="${g}">${lbl}</button>`
  ).join('');

  document.getElementById('builderCard').innerHTML = `
    <div class="b-topbar">
      <button class="b-back-btn" id="builderBack">← 포켓몬 변경</button>
      <button class="b-save-btn" id="builderSave">저장</button>
      <button class="b-close-btn" id="builderClose">✕</button>
    </div>
    <div class="b-poke-row">
      <div class="b-sprite-wrap"><img class="b-sprite" src="${spriteUrl(pk.name,pk.no)}" alt="${pk.name}"></div>
      <div class="b-info">
        <div class="b-poke-name">#${pk.no} ${pk.name}</div>
        <div class="b-types-row">${types}</div>
        <div class="b-section">성별</div>
        <div class="b-gender-row">${genderHtml}</div>
      </div>
    </div>
    <div class="b-cfg-row" id="bNatureRow">
      <span class="b-cfg-lbl">성격</span>
      <span class="b-cfg-name${natLabel?'':' ph'}">${natLabel||'성격 선택'}</span>
    </div>
    <div class="b-cfg-row" id="bAbilityRow">
      <span class="b-cfg-lbl">특성</span>
      <span class="b-cfg-name${addAbility?.name?'':' ph'}">${addAbility?.name||'특성 선택'}</span>
      ${addAbility?.desc ? `<span class="b-cfg-desc">${addAbility.desc}</span>` : ''}
    </div>
    <div class="b-cfg-row" id="bItemRow">
      <span class="b-cfg-lbl">도구</span>
      ${addItem?.sprite ? `<img src="${addItem.sprite}" style="width:18px;height:18px;object-fit:contain;flex-shrink:0">` : ''}
      <span class="b-cfg-name${addItem?.name?'':' ph'}">${addItem?.name||'도구 선택'}</span>
    </div>
    <div class="b-section">스탯 &amp; 노력치</div>
    ${statRows}
    <div class="b-ev-total">노력치 합계 ${evTotal}/66</div>
    <div class="b-section">기술</div>
    <div class="b-moves-grid">${movesHtml}</div>
  `;

  document.getElementById('builderBack').onclick = () => { closeBuilder(); openPokeModal(addSlotIdx); };
  document.getElementById('builderClose').onclick = () => { closeBuilder(); addSlotIdx = -1; };
  document.getElementById('builderSave').onclick = saveAddToBox;
  document.getElementById('bNatureRow').onclick = openNatureModal;
  document.getElementById('bAbilityRow').onclick = openAbilityModal;
  document.getElementById('bItemRow').onclick = openItemModal;
  document.querySelectorAll('.b-gender-btn').forEach(btn => {
    btn.onclick = () => { addGender = btn.dataset.gender || null; renderBuilder(); };
  });
  document.querySelectorAll('.b-move-slot').forEach(slot => {
    slot.onclick = () => { addMoveEditIdx = +slot.dataset.mi; openMoveModal(); };
  });
  document.querySelectorAll('.b-ev-input').forEach(inp => {
    inp.onfocus = () => { if (inp.value === '0') inp.value = ''; else setTimeout(() => inp.select(), 0); };
    inp.oninput = () => {
      const k = inp.dataset.stat;
      let v = Math.min(32, Math.max(0, +inp.value || 0));
      const others = Object.entries(addEvs).filter(([sk]) => sk !== k).reduce((a, [, val]) => a + val, 0);
      if (others + v > 66) v = 66 - others;
      inp.value = v;
      addEvs[k] = v;
      const total = Object.values(addEvs).reduce((a, b) => a + b, 0);
      const totalEl = document.querySelector('.b-ev-total');
      if (totalEl) totalEl.textContent = `노력치 합계 ${total}/66`;
    };
    inp.onblur = () => renderBuilder();
  });
}

document.getElementById('builderOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('builderOverlay')) { closeBuilder(); addSlotIdx = -1; }
});

function saveAddToBox() {
  if (!addPokemon || addSlotIdx < 0) return;
  const box = getBoxData();
  const entry = {
    pkIdx:   POKEMON_DATA.indexOf(addPokemon),
    itIdx:   addItem   ? ITEM_DATA.indexOf(addItem)   : -1,
    natIdx:  addNature ? NATURES.indexOf(addNature)   : -1,
    ability: addAbility ? {name: addAbility.name, desc: addAbility.desc||''} : null,
    moves:   addMoves.map(mv => mv ? MOVE_DATA.indexOf(mv) : -1),
    evs:     {...addEvs},
    gender:  addGender || null,
    savedAt: Date.now()
  };
  while (box.length <= addSlotIdx) box.push(null);
  box[addSlotIdx] = entry;
  setBoxData(box);
  const name = addPokemon.name;
  closeBuilder(); addSlotIdx = -1;
  renderGrid(false);
  showToast(`${name}을(를) 저장했습니다!`);
}

/* ── Move Modal ── */
function openMoveModal() {
  addMoveFilter = 'all';
  document.querySelectorAll('#moveFilterRow .f-btn').forEach(b => b.classList.toggle('on', b.dataset.mf === 'all'));
  document.getElementById('moveSearch').value = '';
  document.getElementById('moveModalTitle').textContent = `기술 선택 (${addMoveEditIdx+1}번)`;
  renderMoveList('');
  document.getElementById('moveModal').classList.add('open');
  setTimeout(() => document.getElementById('moveSearch').focus(), 50);
}
function closeMoveModal() { document.getElementById('moveModal').classList.remove('open'); }

function renderMoveList(q) {
  let list = MOVE_DATA.map((m,i) => ({m,i}));
  if (addPokemon) {
    const baseName = addPokemon.name.replace(/[♂♀]/g,'').trim();
    const ls = LEARNSET_DATA?.[baseName] ?? LEARNSET_DATA?.[addPokemon.name];
    if (ls) { const lsSet = new Set(ls); list = list.filter(({m}) => lsSet.has(m.name)); }
  }
  if (addMoveFilter !== 'all') list = list.filter(({m}) => m.category === addMoveFilter);
  if (q) list = list.filter(({m}) => m.name.includes(q));
  const clearRow = `<div class="move-item" data-idx="-1" style="background:#fff5f5">
    <span class="mi-type" style="background:#e53935">✕</span>
    <span class="mi-name" style="color:#e53935">기술 해제</span>
    <span class="mi-cat"></span><span class="mi-pow"></span><span class="mi-acc"></span>
  </div>`;
  document.getElementById('moveList').innerHTML = clearRow + list.map(({m,i}) => `
    <div class="move-item" data-idx="${i}">
      <span class="mi-type" style="background:${TYPE_COLORS[m.type]||'#888'}">${m.type}</span>
      <span class="mi-name">${m.name}</span>
      <span class="mi-cat">${m.category}</span>
      <span class="mi-pow">${m.power??'—'}</span>
      <span class="mi-acc">${m.accuracy?m.accuracy+'%':'—'}</span>
      <span class="mi-desc">${typeof MOVE_DESCS!=='undefined'?MOVE_DESCS?.[m.name]||'':''}</span>
    </div>`).join('');
}

document.getElementById('moveList').addEventListener('click', e => {
  const item = e.target.closest('.move-item');
  if (!item || addMoveEditIdx < 0) return;
  const idx = +item.dataset.idx;
  addMoves[addMoveEditIdx] = idx === -1 ? null : (MOVE_DATA[idx]||null);
  closeMoveModal(); renderBuilder();
});
document.getElementById('closeMoveModal').addEventListener('click', closeMoveModal);
document.getElementById('moveModal').addEventListener('click', e => { if(e.target===document.getElementById('moveModal')) closeMoveModal(); });
document.getElementById('moveSearch').addEventListener('input', e => renderMoveList(e.target.value));
document.getElementById('moveFilterRow').addEventListener('click', e => {
  const btn = e.target.closest('.f-btn');
  if (!btn) return;
  document.querySelectorAll('#moveFilterRow .f-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on'); addMoveFilter = btn.dataset.mf;
  renderMoveList(document.getElementById('moveSearch').value);
});

/* ── Item Modal ── */
function openItemModal() {
  addItemFilter = 'all';
  document.querySelectorAll('#itemFilterRow .f-btn').forEach(b => b.classList.toggle('on', b.dataset.if === 'all'));
  document.getElementById('itemSearch').value = '';
  document.getElementById('itemEffectPanel').classList.remove('show');
  renderItemGrid('');
  document.getElementById('itemModal').classList.add('open');
  setTimeout(() => document.getElementById('itemSearch').focus(), 50);
}
function closeItemModal() { document.getElementById('itemModal').classList.remove('open'); }

function renderItemGrid(q) {
  let list = (ITEM_DATA||[]).map((it,i) => ({it,i}));
  if (q) list = list.filter(({it}) => it.name.includes(q));
  if (addItemFilter === '포챔스') list = list.filter(({it}) => POCHAMS_ITEM_NAMES?.has(it.name));
  else if (addItemFilter !== 'all') list = list.filter(({it}) => it.category === addItemFilter);
  const clearCard = `<div class="item-card" data-idx="-1" style="border-color:#e53935">
    <div class="item-no-img" style="font-size:20px">✕</div>
    <div class="item-name" style="color:#e53935">도구 없음</div>
    <div class="item-cat-badge">해제</div>
  </div>`;
  document.getElementById('itemGrid').innerHTML = clearCard + list.map(({it,i}) => `
    <div class="item-card" data-idx="${i}">
      ${it.sprite ? `<img src="${it.sprite}" alt="${it.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="item-no-img" style="display:none">🎒</div>` : '<div class="item-no-img">🎒</div>'}
      <div class="item-name">${it.name}</div>
      <div class="item-cat-badge">${it.category}</div>
    </div>`).join('');
}

document.getElementById('itemGrid').addEventListener('click', e => {
  const card = e.target.closest('.item-card');
  if (!card) return;
  const idx = +card.dataset.idx;
  if (idx === -1) { addItem = null; closeItemModal(); renderBuilder(); return; }
  const it = ITEM_DATA[idx];
  if (!it) return;
  addItem = it;
  closeItemModal();
  renderBuilder();
});
document.getElementById('itemGrid').addEventListener('mouseover', e => {
  const card = e.target.closest('.item-card[data-idx]');
  if (!card || card.dataset.idx === '-1') return;
  const it = ITEM_DATA[+card.dataset.idx];
  if (!it || !it.effect) return;
  const ep = document.getElementById('itemEffectPanel');
  ep.innerHTML = `<strong>${it.name}</strong>　${it.effect}`;
  ep.classList.add('show');
});
document.getElementById('itemGrid').addEventListener('mouseout', e => {
  if (!e.target.closest('.item-card')) document.getElementById('itemEffectPanel').classList.remove('show');
});
document.getElementById('closeItemModal').addEventListener('click', closeItemModal);
document.getElementById('itemModal').addEventListener('click', e => { if(e.target===document.getElementById('itemModal')) closeItemModal(); });
document.getElementById('itemSearch').addEventListener('input', e => renderItemGrid(e.target.value));
document.getElementById('itemFilterRow').addEventListener('click', e => {
  const btn = e.target.closest('.f-btn');
  if (!btn) return;
  document.querySelectorAll('#itemFilterRow .f-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on'); addItemFilter = btn.dataset.if;
  renderItemGrid(document.getElementById('itemSearch').value);
});

/* ── Ability Modal ── */
function openAbilityModal() {
  const pk = addPokemon;
  if (!pk) return;
  const abd = ABILITY_DATA?.[pk.name];
  document.getElementById('abilityModalTitle').textContent = `특성 선택 — ${pk.name}`;
  const list = document.getElementById('abilityList');
  if (!abd) {
    _addAbilList = [];
    list.innerHTML = '<div style="color:#aaa;font-size:13px;padding:12px">특성 데이터 없음</div>';
  } else {
    _addAbilList = [...(abd.normal||[]).map(a=>({...a,tag:'일반'}))];
    if (abd.hidden?.name) _addAbilList.push({...abd.hidden, tag:'숨겨진 특성'});
    const cur = addAbility?.name||'';
    list.innerHTML = _addAbilList.map((a,i) => `
      <div class="ability-item${a.name===cur?' selected':''}" data-i="${i}">
        <span class="ab-name">${a.name}</span>
        <span class="ab-desc">${a.desc||''}</span>
        <span class="ab-tag${a.tag==='숨겨진 특성'?' hidden-tag':''}">${a.tag}</span>
      </div>`).join('');
  }
  document.getElementById('abilityModal').classList.add('open');
}
function closeAbilityModal() { document.getElementById('abilityModal').classList.remove('open'); }

document.getElementById('abilityList').addEventListener('click', e => {
  const item = e.target.closest('.ability-item');
  if (!item) return;
  addAbility = _addAbilList[+item.dataset.i];
  closeAbilityModal(); renderBuilder();
});
document.getElementById('closeAbilityModal').addEventListener('click', closeAbilityModal);
document.getElementById('abilityModal').addEventListener('click', e => { if(e.target===document.getElementById('abilityModal')) closeAbilityModal(); });

/* ── Nature Modal ── */
function buildNatureTable(curNature) {
  const rows = NAT_STATS, cols = NAT_STATS;
  const natGrid = {};
  rows.forEach(r => { natGrid[r] = {}; cols.forEach(c => natGrid[r][c] = null); });
  NATURES.forEach(n => { if (n.up && n.dn) natGrid[n.up][n.dn] = n; });
  const neutralByRow = {};
  NATURES.filter(n=>!n.up).forEach((n,i) => { neutralByRow[rows[i]] = n; });

  let html = `<thead><tr><th></th>${cols.map(c=>`<th class="col-lbl">▼${NAT_LABELS[c]}</th>`).join('')}</tr></thead><tbody>`;
  rows.forEach((r,ri) => {
    html += `<tr><th class="row-lbl">▲${NAT_LABELS[r]}</th>`;
    cols.forEach(c => {
      if (r===c) {
        const n = neutralByRow[r] || NATURES.filter(n=>!n.up)[ri];
        html += `<td class="nat-neutral${curNature?.name===n?.name?' nat-selected':''}" data-nidx="${NATURES.indexOf(n)}">${n?.name||'-'}</td>`;
      } else {
        const n = natGrid[r][c];
        html += `<td class="${curNature?.name===n?.name?'nat-selected':''}" data-nidx="${NATURES.indexOf(n)}">${n?.name||'?'}</td>`;
      }
    });
    html += '</tr>';
  });
  html += '</tbody>';
  return html;
}

function openNatureModal() {
  document.getElementById('natureTable').innerHTML = buildNatureTable(addNature);
  document.getElementById('natureModal').classList.add('open');
}
function closeNatureModal() { document.getElementById('natureModal').classList.remove('open'); }

document.getElementById('closeNatureModal').addEventListener('click', closeNatureModal);
document.getElementById('natureModal').addEventListener('click', e => {
  if (e.target === document.getElementById('natureModal')) { closeNatureModal(); return; }
  const td = e.target.closest('td[data-nidx]');
  if (!td) return;
  const n = NATURES[+td.dataset.nidx];
  if (!n) return;
  addNature = n;
  closeNatureModal(); renderBuilder();
});

/* ── Mobile swipe to change box ── */
;(function(){
  const vp = document.querySelector('.box-viewport');
  if (!vp) return;
  let tx0 = 0, ty0 = 0;
  vp.addEventListener('touchstart', e => {
    tx0 = e.touches[0].clientX;
    ty0 = e.touches[0].clientY;
  }, {passive: true});
  vp.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx0;
    const dy = e.changedTouches[0].clientY - ty0;
    if (Math.abs(dx) < 40 || Math.abs(dx) < Math.abs(dy) * 1.2) return;
    if (dx < 0) document.getElementById('nextBtn').click();
    else document.getElementById('prevBtn').click();
  }, {passive: true});
})();
</script>
