    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Malgun Gothic','Apple SD Gothic Neo',sans-serif; background: var(--purple); height: 100vh; overflow: hidden; display: flex; flex-direction: column; transition: background-color .25s ease; }

    /* ── NAVBAR ── */
    .navbar { height: 54px; background: var(--navbar-bg); flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; box-shadow: 0 2px 10px rgba(0,0,0,.12); z-index: 20; }
    .nav-logo { display:flex; align-items:center; }
    .nav-logo img { height:46px; object-fit:contain; }
    .nav-links { display: flex; gap: 6px; }
    .nav-links a { text-decoration: none; color: var(--text-dim); font-size: 14px; padding: 5px 14px; border-radius: 6px; transition: background .2s,color .2s; }
    .nav-links a:hover  { background: var(--hover-bg); color: var(--accent); }
    .nav-settings-btn{background:none;border:none;font-size:17px;cursor:pointer;color:var(--text-faint);padding:4px 9px;border-radius:6px;transition:background .15s,color .15s;margin-left:2px;line-height:1;}
    .nav-settings-btn:hover{background:var(--hover-bg);color:var(--accent);}
    .nav-links a.active { background: var(--nav-active-bg); color: var(--nav-active-text); font-weight: 600; }

    /* ── LAYOUT ── */
    .box-layout { flex: 1; min-height: 0; display: flex; flex-direction: row; align-items: stretch; }

    .nav-arrow-btn {
      flex: 0 0 52px;
      border: none; background: transparent; color: rgba(255,255,255,.6); font-size: 20px;
      cursor: pointer; transition: color .15s, transform .12s;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-arrow-btn:hover:not(:disabled) { color: #fff; transform: scale(1.15); }
    .nav-arrow-btn:disabled { opacity: .25; cursor: default; transform: none; }

    .box-center { flex: 1; min-width: 0; display: flex; flex-direction: column; padding: 10px 0 0; gap: 8px; }

    /* ── HEADER ── */
    .box-header { display: flex; align-items: center; gap: 10px; padding: 0 14px; flex-shrink: 0; }
    .back-link { text-decoration: none; background: rgba(255,255,255,.75); color: var(--accent-dark); padding: 4px 10px; border-radius: 7px; font-size: 12px; font-weight: 600; transition: background .14s; }
    .back-link:hover { background: #fff; }
    .box-name { font-size: 17px; font-weight: 700; color: #fff; }
    .box-count { font-size: 11px; color: rgba(255,255,255,.8); }
    .box-dots { display: flex; gap: 5px; margin-left: 6px; }
    .box-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,.35); cursor: pointer; transition: background .15s; }
    .box-dot.active { background: #fff; }
    .clear-btn { margin-left: auto; background: rgba(200,40,40,.8); color: #fff; border: none; padding: 5px 12px; border-radius: 7px; font-size: 11px; cursor: pointer; font-family: inherit; transition: background .15s; }
    .clear-btn:hover { background: #c00; }

    /* ── BOX VIEWPORT ── */
    .box-viewport { flex: 1; min-height: 0; overflow: hidden; position: relative; padding-bottom: 10px; }
    .box-grid {
      height: 100%;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 8px;
      padding: 2px 14px 0;
      transition: transform .24s ease, opacity .24s;
    }

    /* ── SLOTS ── */
    .box-slot {
      background: var(--slot-bg);
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background .14s, transform .15s, box-shadow .15s;
      position: relative; overflow: hidden;
      border: 2px solid transparent;
    }
    .box-slot:hover { background: var(--hover-bg); transform: scale(1.05); box-shadow: 0 4px 14px rgba(0,0,0,.18); }
    .box-slot.filled { background: var(--card-bg); }
    .box-slot.filled:hover { border-color: var(--accent); }
    .box-slot .slot-plus { font-size: 22px; color: var(--accent); user-select: none; }
    .box-slot img { width: 72%; height: 72%; image-rendering: pixelated; object-fit: contain; }

    /* ── DETAIL OVERLAY ── */
    .detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.48); z-index: 50; opacity: 0; pointer-events: none; transition: opacity .22s; display: flex; align-items: center; justify-content: center; }
    .detail-overlay.visible { opacity: 1; pointer-events: all; }

    /* ── DETAIL CARD ── */
    .detail-card {
      background: var(--card-bg); border-radius: 16px;
      padding: 18px 20px 20px; width: 430px; max-width: 96vw; max-height: 90vh;
      overflow-y: auto; box-shadow: 0 10px 48px rgba(0,0,0,.32);
      transform: translateY(18px); opacity: 0;
      transition: transform .24s ease, opacity .24s;
    }
    .detail-overlay.visible .detail-card { transform: translateY(0); opacity: 1; }

    .dc-topbar { display: flex; align-items: center; gap: 6px; margin-bottom: 14px; }
    .dc-close { margin-left: auto; background: var(--hover-bg); border: none; padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; color: var(--text-dim); font-family: inherit; transition: all .14s; }
    .dc-close:hover { background: #f0c8c8; color: #c00; }
    .dc-add-btn { background: var(--accent); color: #fff; border: none; padding: 5px 14px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background .14s; }
    .dc-add-btn:hover { background: var(--accent-dark); }
    .dc-del-btn { background: #fde0e0; color: #c00; border: none; padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background .14s; }
    .dc-del-btn:hover { background: #f5b8b8; }

    .dc-poke-header { display: flex; gap: 14px; margin-bottom: 14px; align-items: flex-start; }
    .dc-sprite-wrap { flex-shrink: 0; width: 110px; height: 110px; display: flex; align-items: center; justify-content: center; background: var(--slot-bg); border-radius: 12px; }
    .dc-sprite { width: 94px; height: 94px; image-rendering: pixelated; object-fit: contain; }
    .dc-info { flex: 1; min-width: 0; }
    .dc-name { font-size: 17px; font-weight: 700; color: var(--text-main); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dc-nickname-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .dc-nickname-inp { flex: 1; min-width: 0; border: 1.5px solid var(--nav-active-bg); border-radius: 7px; padding: 4px 10px; font-size: 12px; font-family: inherit; outline: none; transition: border-color .15s; background: var(--card-bg); color: var(--text-main); }
    .dc-nickname-inp:focus { border-color: var(--accent); background: var(--card-bg); }
    .dc-save-nick-btn { flex-shrink: 0; background: var(--accent); color: #fff; border: none; border-radius: 7px; padding: 4px 11px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background .14s; }
    .dc-save-nick-btn:hover { background: var(--accent-dark); }
    .dc-no { font-size: 10px; color: var(--text-mute); margin-bottom: 4px; }
    .dc-types { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
    .type-badge { padding: 2px 8px; border-radius: 4px; font-size: 10px; color: #fff; font-weight: 700; }
    .dc-build-chips { display: flex; gap: 5px; flex-wrap: wrap; }
    .dc-chip { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: rgba(100,60,160,.12); color: var(--accent-dark); font-weight: 600; }
    .dc-chip.nat-up { background: #ffeedd; color: #b05000; }
    .dc-chip.nat-dn { background: #ddeeff; color: #0060b0; }

    /* Stats */
    .dc-section-title { font-size: 10px; font-weight: 700; color: #9080b8; letter-spacing: .5px; margin-bottom: 6px; margin-top: 12px; }
    .stat-row { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
    .stat-lbl { font-size: 9px; color: var(--text-mute); width: 26px; text-align: right; flex-shrink: 0; }
    .stat-base { font-size: 10px; color: #aaa; width: 22px; text-align: right; flex-shrink: 0; }
    .stat-bar-wrap { flex: 1; height: 7px; background: rgba(0,0,0,.08); border-radius: 4px; overflow: hidden; }
    .stat-bar { height: 100%; border-radius: 4px; transition: width .3s; }
    .stat-val { font-size: 11px; font-weight: 700; color: var(--text-main); width: 28px; flex-shrink: 0; }

    /* Moves */
    .dc-moves-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
    .dc-move { padding: 5px 10px; border-radius: 6px; font-size: 11px; color: #fff; font-weight: 600; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dc-move.empty { background: rgba(0,0,0,.1); color: #bbb; }

    /* EVs */
    .dc-evs { display: flex; gap: 6px; flex-wrap: wrap; }
    .dc-ev { font-size: 10px; background: rgba(100,60,160,.1); border-radius: 4px; padding: 2px 7px; color: var(--accent-dark); font-weight: 600; }

    /* Toast */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--accent-dark); color: #fff; padding: 9px 22px; border-radius: 20px; font-size: 12px; z-index: 9999; pointer-events: none; opacity: 0; transition: opacity .3s; white-space: nowrap; box-shadow: 0 4px 14px rgba(0,0,0,.25); }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--scroll-track); border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 3px; }

    .mob-box-ad{display:none;}

    /* ── RESPONSIVE ── */
    @media (max-width:1280px),(pointer:coarse){
      .navbar{height:48px;padding:0 16px;}
      .nav-logo img{height:36px;}
      .nav-links a{padding:5px 8px;font-size:11.5px;}
    }
    @media (max-width:1024px),(pointer:coarse){
      .nav-arrow-btn{display:none!important;}
      .box-header{padding:0 10px;gap:6px;}
      .back-link,.clear-btn{white-space:nowrap;}
      .box-name{font-size:15px;}
      .box-count{display:none;}
      .box-dots{gap:3px;}
      .box-dot{width:5px;height:5px;}
      .box-viewport{flex:none;height:auto;padding-bottom:0;}
      .box-grid{height:auto;grid-template-rows:repeat(5,auto);gap:5px;padding:2px 10px;}
      .box-slot{aspect-ratio:1;}
      .box-slot:hover{background:var(--slot-bg)!important;transform:none!important;box-shadow:none!important;}
      .box-slot.filled:hover{border-color:transparent!important;background:var(--card-bg)!important;}
      .mob-box-ad{
        display:flex;flex:1;min-height:70px;
        margin:8px 10px 10px;
        background:rgba(0,0,0,.12);border-radius:10px;
        align-items:center;justify-content:center;
        font-size:14px;font-weight:700;
        color:rgba(255,255,255,.5);letter-spacing:2px;
        opacity:0;
      }
    }

    /* ── MODALS (index.html 동일) ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal-box{background:var(--card-bg);border-radius:14px;padding:18px 20px;width:620px;max-width:92vw;max-height:84vh;display:flex;flex-direction:column;gap:9px;box-shadow:0 12px 44px rgba(0,0,0,.3);}
    .modal-head{display:flex;align-items:center;justify-content:space-between;}
    .modal-title{font-size:14px;font-weight:700;color:var(--text-main);}
    .modal-x{background:none;border:none;font-size:17px;cursor:pointer;color:var(--text-faint);transition:color .15s;}
    .modal-x:hover{color:#c00;}
    .modal-search{width:100%;padding:7px 12px;border:2px solid var(--slot-bg);border-radius:8px;font-size:13px;outline:none;transition:border-color .18s;font-family:inherit;background:var(--card-bg);color:var(--text-main);}
    .modal-search:focus{border-color:var(--accent);}
    .filter-row{display:flex;gap:5px;flex-wrap:wrap;}
    .f-btn{padding:3px 10px;border:1px solid var(--slot-bg);border-radius:20px;font-size:11px;cursor:pointer;background:var(--slot-bg);color:var(--text-dim);transition:all .15s;font-family:inherit;}
    .f-btn.on{background:var(--accent);color:#fff;border-color:var(--accent);}
    .f-btn[data-if="포챔스"]{background:var(--hover-bg);color:var(--accent);border-color:var(--accent);}
    .f-btn[data-if="포챔스"].on{background:var(--accent);color:#fff;border-color:var(--accent);}
    .poke-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));align-content:start;gap:6px;overflow-y:auto;height:400px;padding:2px;}
    .poke-card{display:flex;flex-direction:column;align-items:center;padding:6px 4px;border-radius:8px;cursor:pointer;border:2px solid transparent;background:var(--slot-bg);transition:all .14s;}
    .poke-card:hover{border-color:var(--accent);background:var(--hover-bg);transform:scale(1.04);}
    .poke-card img{width:52px;height:52px;image-rendering:pixelated;}
    .pc-no{font-size:9px;color:#bbb;}
    .pc-name{font-size:10px;color:var(--text-main);text-align:center;word-break:keep-all;line-height:1.3;}
    .pc-types{display:flex;gap:2px;margin-top:2px;}
    .pc-tbadge{padding:1px 4px;border-radius:3px;font-size:8px;color:#fff;font-weight:600;}
    .move-list-wrap{overflow-y:auto;height:420px;}
    .move-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;transition:background .12s;}
    .move-item:hover{background:var(--hover-bg);}
    .mi-type{padding:2px 7px;border-radius:4px;font-size:10px;color:#fff;font-weight:600;min-width:42px;text-align:center;}
    .mi-name{font-size:12px;font-weight:600;min-width:110px;color:var(--text-main);}
    .mi-cat{font-size:10px;color:var(--text-mute);min-width:28px;}
    .mi-pow{font-size:11px;color:var(--text-soft);min-width:32px;}

<script>
/* ── i18n (한/영/일) — 메인 스크립트보다 먼저 정의되어야 함 ── */
let I18N = null;
function detectDefaultLang() {
  const saved = localStorage.getItem('lang');
  if (saved) return saved;
  const nav = (navigator.language || navigator.userLanguage || '').toLowerCase();
  if (nav.startsWith('ko')) return 'ko';
  if (nav.startsWith('ja')) return 'ja';
  if (nav.startsWith('en')) return 'en';
  return 'en';
}
let LANG = detectDefaultLang();

async function loadI18n() {
  try { I18N = await fetch('i18n_names.json').then(r => r.json()); }
  catch (e) { console.error('i18n_names.json fetch 실패:', e); I18N = null; }
}

function pokeName(koName, dexNo) {
  if (LANG === 'ko' || !I18N || !koName) return koName;
  const full = I18N.pokemonFullNames && I18N.pokemonFullNames[koName];
  if (full && full[LANG]) return full[LANG];
  const p = I18N.pokemon[String(dexNo)];
  if (!p) return koName;
  const base = p[LANG] || p.ko;
  let result = koName.split(p.ko).join(base);
  /* 괄호 접미사 폼 (예: 아르세우스(강철), 디아루가(오리진폼)) */
  const suffixMatch = result.match(/\(([^)]+)\)$/);
  if (suffixMatch) {
    const formKo = suffixMatch[1];
    const src = I18N.forms[formKo] || I18N.types[formKo];
    const formTrans = src && src[LANG];
    if (formTrans) result = result.slice(0, suffixMatch.index) + '(' + formTrans + ')';
  }
  for (const formKo in I18N.forms) {
    if (result.includes(formKo)) {
      const f = (I18N.forms[formKo][LANG] || formKo) + ' ';
      result = result.split(formKo).join(f);
    }
  }
  return result.replace(/\s+/g, ' ').trim();
}

const LOC_MAP_FIELD = {items:'item_ja2ko', abilities:'ability_ja2ko', moves:'move_ja2ko', natures:'nature_ja2ko'};
function normKoName(category, koName) {
  if (typeof CHAMPIONS_LOC_MAP !== 'undefined') {
    const field = LOC_MAP_FIELD[category];
    const fixed = field && CHAMPIONS_LOC_MAP[field]?.[koName];
    if (fixed) return fixed;
  }
  return koName;
}
function term(category, koName) {
  if (!koName) return koName;
  koName = normKoName(category, koName);
  if (LANG === 'ko' || !I18N) return koName;
  const m = I18N[category]?.[koName];
  return (m && m[LANG]) || koName;
}
function termDesc(category, koName, koDesc) {
  if (LANG === 'ko' || !koName || !I18N) return koDesc;
  koName = normKoName(category, koName);
  const m = I18N[category]?.[koName];
  if (!m) return koDesc;
  const d = LANG === 'en' ? m.descEn : LANG === 'ja' ? m.descJa : null;
  return d || koDesc;
}

/* 검색어가 한국어 원문 또는 영/일 번역명과 일치하는지 확인 (언어 모드와 무관하게 항상 다 검사) */

const CHOSEONG_LIST = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function getChoseong(str) {
  let result = '';
  for (const ch of str) {
    const code = ch.charCodeAt(0) - 0xAC00;
    if (code >= 0 && code <= 11171) result += CHOSEONG_LIST[Math.floor(code / 588)];
    else result += ch;
  }
  return result;
}
function isChoseongOnly(q) { return /^[ㄱ-ㅎ]+$/.test(q); }

function matchPokemonQuery(pk, q) {
  if (!q) return true;
  if (pk.name.includes(q)) return true;
  if (isChoseongOnly(q) && getChoseong(pk.name).includes(q)) return true;
  if (!I18N) return false;
  const ql = q.toLowerCase();
  const p = I18N.pokemon[String(pk.no)];
  if (p) {
    if (p.en && p.en.toLowerCase().includes(ql)) return true;
    if (p.ja && p.ja.includes(q)) return true;
  }
  for (const formKo in I18N.forms) {
    if (pk.name.includes(formKo)) {
      const f = I18N.forms[formKo];
      if (f.en && p?.en && (f.en + ' ' + p.en).toLowerCase().includes(ql)) return true;
      if (f.ja && p?.ja && (f.ja + p.ja).includes(q)) return true;
    }
  }
  return false;
}
function matchTermQuery(category, koName, q) {
  if (!q) return true;
  if (koName.includes(q)) return true;
  if (isChoseongOnly(q) && getChoseong(koName).includes(q)) return true;
  if (!I18N) return false;
  koName = normKoName(category, koName);
  if (koName.includes(q)) return true;
  const m = I18N[category]?.[koName];
  if (!m) return false;
  const ql = q.toLowerCase();
  if (m.en && m.en.toLowerCase().includes(ql)) return true;
  if (m.ja && m.ja.includes(q)) return true;
  return false;
}

function t(key, vars) {
  if (!I18N) return key;
  const e = I18N.ui[key];
  let s = (e && (e[LANG] || e.ko)) || key;
  if (vars) for (const k in vars) s = s.replace(`{${k}}`, vars[k]);
  return s;
}

const ITEM_CAT_I18N_MAP = {
  'Z크리스털':'cat_z_crystal','구애도구':'cat_choice','노력치도구':'cat_ev_item','메가스톤':'cat_megastone',
  '메모리':'cat_memory','보석':'cat_gem','스카프':'cat_scarf','열매':'cat_berry','전용도구':'cat_signature',
  '지닌도구':'cat_held','지닌도구(역효과)':'cat_held_neg','타입강화':'cat_type_boost','플레이트':'cat_plate','훈련도구':'cat_training',
};
function itemCat(koCat) {
  const key = ITEM_CAT_I18N_MAP[koCat];
  return key ? t(key) : koCat;
}
</script>
<script>
const TYPE_COLORS = {
  '노말':'#9A9A7A','불꽃':'#F08030','물':'#6890F0','풀':'#78C850',
  '전기':'#F8C600','얼음':'#98D8D8','격투':'#C03028','독':'#A040A0',
  '땅':'#C8A840','비행':'#A890F0','에스퍼':'#F85888','벌레':'#A8B820',
  '바위':'#B8A038','고스트':'#705898','드래곤':'#7038F8','악':'#6B5040',
  '강철':'#A8A8C0','페어리':'#EE99AC'
};
const NATURES = [
  /* +Atk */
  {name:'변덕',      up:null, dn:null},
  {name:'외로움',    up:'A',  dn:'B'},
  {name:'고집',      up:'A',  dn:'C'},
  {name:'개구쟁이',  up:'A',  dn:'D'},
  {name:'용감',      up:'A',  dn:'S'},
  /* +Def */
  {name:'대담',      up:'B',  dn:'A'},
  {name:'수줍',      up:null, dn:null},
  {name:'장난꾸러기',up:'B',  dn:'C'},
  {name:'촐랑',      up:'B',  dn:'D'},
  {name:'무사태평',  up:'B',  dn:'S'},
  /* +SpAtk */
  {name:'조심',      up:'C',  dn:'A'},
  {name:'의젓',      up:'C',  dn:'B'},
  {name:'노력',      up:null, dn:null},
  {name:'덜렁',      up:'C',  dn:'D'},
  {name:'냉정',      up:'C',  dn:'S'},
  /* +SpDef */
  {name:'차분',      up:'D',  dn:'A'},
  {name:'얌전',      up:'D',  dn:'B'},
  {name:'신중',      up:'D',  dn:'C'},
  {name:'온순',      up:'D',  dn:'S'},
  {name:'건방',      up:null, dn:null},
  /* +Spe */
  {name:'겁쟁이',    up:'S',  dn:'A'},
  {name:'성급',      up:'S',  dn:'B'},
  {name:'명랑',      up:'S',  dn:'C'},
  {name:'천진난만',  up:'S',  dn:'D'},
  {name:'성실',      up:null, dn:null},
];
const STAT_KEYS  = ['H','A','B','C','D','S'];
const STAT_NAMES = {'H':'HP','A':'공격','B':'방어','C':'특공','D':'특방','S':'스피드'};
const NAT_STATS  = ['A','B','C','D','S'];
const NAT_LABELS = {A:'공격',B:'방어',C:'특공',D:'특방',S:'스피드'};

const SLOTS_PER_BOX = 30;
let currentBox = 0;
let selectedBoxIdx = -1;

function getBoxData() {
  try { return JSON.parse(localStorage.getItem('pochams_box') || '[]'); } catch(e) { return []; }
}
function setBoxData(arr) { localStorage.setItem('pochams_box', JSON.stringify(arr)); }

function numBoxes() { return 5; }

function spriteUrl(name, no) {
  return POKEMON_SPRITES?.[name] || `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${no}.png`;
}

function showToast(msg) {
  const t = document.getElementById('toastEl');
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(t._t); t._t = setTimeout(() => t.style.opacity = '0', 2400);
}

function natMult(nat, key) {
  if (!nat) return 1;
  return nat.up === key ? 1.1 : nat.dn === key ? 0.9 : 1;
}

/* ── 박스 툴팁 ── */
function buildBoxTtHtml(entry) {
  const pk = POKEMON_DATA[entry.pkIdx];
  if (!pk) return '';
  const item   = (entry.itIdx  >= 0 && ITEM_DATA[entry.itIdx])  ? ITEM_DATA[entry.itIdx]  : null;
  const nature = (entry.natIdx >= 0 && NATURES[entry.natIdx])   ? NATURES[entry.natIdx]   : null;
  const evs    = entry.evs || {H:0,A:0,B:0,C:0,D:0,S:0};
  const moves  = (entry.moves||[]).map(mi => (mi>=0&&MOVE_DATA[mi]) ? MOVE_DATA[mi] : null);
  const hp   = calcStat(pk.H, evs.H, true);
  const def  = Math.floor(calcStat(pk.B, evs.B, false, natMult(nature,'B')));
  const spdf = Math.floor(calcStat(pk.D, evs.D, false, natMult(nature,'D')));
  const spd  = Math.floor(calcStat(pk.S, evs.S, false, natMult(nature,'S')));
  const tb   = tp => `<span style="background:${TYPE_COLORS[tp]||'#888'};color:#fff;border-radius:4px;padding:0 5px;font-size:9px;font-weight:700;margin-left:3px">${term('types', tp)}</span>`;
  const evStr = ['H','A','B','C','D','S'].filter(k=>evs[k]>0).map(k=>`${k}:${evs[k]}`).join(' ');
  const dispPkName = pokeName(pk.name, pk.no);
  return `
    <div style="font-size:11px;font-weight:700;margin-bottom:3px">${entry.nickname || dispPkName}${entry.nickname ? ` <span style="opacity:.6;font-size:9px;font-weight:400">(${dispPkName})</span>` : ''}${tb(pk.type1)}${pk.type2?tb(pk.type2):''}</div>
    ${(item||entry.ability)?`<div style="color:var(--label-muted);margin-bottom:2px">${item?`${t('item')} ${term('items', item.name)} `:''}${entry.ability?`${t('ability')} ${term('abilities', entry.ability.name)}`:''}</div>`:''}
    ${nature?`<div>${t('nature')} ${term('natures', nature.name)}</div>`:''}
    ${evStr?`<div>${t('evs')} ${evStr}</div>`:''}
    <div style="margin-top:4px;color:var(--tooltip-text)">${moves.map(mv=>mv?`<div>● ${term('moves', mv.name)}</div>`:'').join('')}</div>
    <div style="margin-top:5px;border-top:1px solid var(--tooltip-border);padding-top:4px">${t('phys_dur')} ${Math.floor(hp*def/0.411).toLocaleString()} ${t('spec_dur')} ${Math.floor(hp*spdf/0.411).toLocaleString()}<br>${t('speed_short')} ${spd}</div>
  `;
}
function showBoxTt(anchorEl, html) {
  const tt = document.getElementById('boxTt');
  if (!tt||!html) return;
  tt.innerHTML = html;
  tt.classList.remove('show');
  const rect = anchorEl.getBoundingClientRect();
  const goRight = (rect.left + rect.width/2) < window.innerWidth/2;
  if (goRight) { tt.style.left = (rect.right+10)+'px'; tt.style.right='auto'; }
  else          { tt.style.left='auto'; tt.style.right=(window.innerWidth-rect.left+10)+'px'; }
  tt.style.top = rect.top+'px'; tt.style.bottom='auto';
  requestAnimationFrame(() => {
    const tr = tt.getBoundingClientRect();
    if (tr.bottom > window.innerHeight-8) tt.style.top = Math.max(8,window.innerHeight-tr.height-8)+'px';
    tt.classList.add('show');
  });
}
function hideBoxTt() {
  const tt = document.getElementById('boxTt');
  if (tt) tt.classList.remove('show');
}
function calcStat(base, ev, isHP, nm) {
  ev = Math.min(32, ev || 0);
  return isHP ? base + 75 + ev : Math.floor((base + 20 + ev) * nm);
}
function statColor(v) {
  if (v < 80)  return '#e05050';
  if (v < 110) return '#e09030';
  if (v < 140) return '#c8b020';
  if (v < 170) return '#50b050';
  return '#30a880';
}

/* ── RENDER BOX GRID ── */
function renderGrid(animate, dir) {
  const box = getBoxData();
  const grid = document.getElementById('boxGrid');
  const start = currentBox * SLOTS_PER_BOX;

  const html = [];
  for (let i = 0; i < SLOTS_PER_BOX; i++) {
    const entry = box[start + i];
    const absIdx = start + i;
    if (entry && POKEMON_DATA[entry.pkIdx]) {
      const pk = POKEMON_DATA[entry.pkIdx];
      const dispPkName = pokeName(pk.name, pk.no);
      html.push(`<div class="box-slot filled" data-idx="${absIdx}" title="${entry.nickname ? entry.nickname + ' (' + dispPkName + ')' : dispPkName}">
        <img src="${spriteUrl(pk.name, pk.no)}" alt="${entry.nickname || dispPkName}" loading="lazy">
      </div>`);
    } else {
      html.push(`<div class="box-slot empty" data-idx="${absIdx}"><span class="slot-plus">+</span></div>`);
    }
  }

  if (animate) {
    grid.style.transform = `translateX(${dir > 0 ? '-' : ''}100%)`;
    grid.style.opacity = '0';
    setTimeout(() => {
      grid.innerHTML = html.join('');
      grid.style.transition = 'none';
      grid.style.transform = `translateX(${dir > 0 ? '' : '-'}100%)`;
      grid.style.opacity = '0';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        grid.style.transition = '';
        grid.style.transform = '';
        grid.style.opacity = '1';
      }));
    }, 240);
  } else {
    grid.innerHTML = html.join('');
  }

  updateHeader();
}

function updateHeader() {
  const box = getBoxData();
  const total = box.filter(Boolean).length;
  const n = numBoxes();
  document.getElementById('boxName').textContent = t('box_n', {n: currentBox + 1});
  document.getElementById('boxCount').textContent = total ? t('total_creatures', {n: total}) : '';
  document.getElementById('prevBtn').disabled = false;
  document.getElementById('nextBtn').disabled = false;

  const dots = document.getElementById('boxDots');
  dots.innerHTML = Array.from({length: n}, (_, i) =>
    `<div class="box-dot${i === currentBox ? ' active' : ''}" data-box="${i}"></div>`
  ).join('');
}

/* ── DETAIL CARD (보기 전용) ── */
function openDetail(absIdx) {
  const box = getBoxData();
  const entry = box[absIdx];
  if (!entry) return;
  const pk = POKEMON_DATA[entry.pkIdx];
  if (!pk) return;
  selectedBoxIdx = absIdx;

  const nat = entry.natIdx >= 0 ? NATURES[entry.natIdx] : null;
  const it  = entry.itIdx  >= 0 ? ITEM_DATA[entry.itIdx]  : null;
  const evs = entry.evs || {H:0,A:0,B:0,C:0,D:0,S:0};
  const moves = (entry.moves || []).map(mi => mi >= 0 && MOVE_DATA[mi] ? MOVE_DATA[mi] : null);

  const NAT_LABELS_I18N = {A:t('stat_atk'),B:t('stat_def'),C:t('stat_spatk'),D:t('stat_spdef'),S:t('stat_speed')};
  const dispPkName = pokeName(pk.name, pk.no);
  const natChips = nat ? [
    nat.up ? `<span class="dc-chip nat-up">${term('natures', nat.name)} ${NAT_LABELS_I18N[nat.up]}↑</span>` : '',
    nat.dn ? `<span class="dc-chip nat-dn">${NAT_LABELS_I18N[nat.dn]}↓</span>` : '',
    !nat.up ? `<span class="dc-chip">${term('natures', nat.name)}</span>` : ''
  ].filter(Boolean).join('') : '';

  const STAT_NAMES_I18N = {H:t('hp_lbl'),A:t('stat_atk'),B:t('stat_def'),C:t('stat_spatk'),D:t('stat_spdef'),S:t('stat_speed')};
  const statsHtml = STAT_KEYS.map(k => {
    const isHP = k === 'H';
    const nm   = natMult(nat, k);
    const val  = calcStat(pk[k], evs[k], isHP, nm);
    const pct  = Math.min(100, Math.round(val / 3));
    const col  = statColor(val);
    return `<div class="stat-row">
      <div class="stat-lbl">${STAT_NAMES_I18N[k]}</div>
      <div class="stat-base">${pk[k]}</div>
      <div class="stat-bar-wrap"><div class="stat-bar" style="width:${pct}%;background:${col}"></div></div>
      <div class="stat-val">${val}</div>
    </div>`;
  }).join('');

  const movesHtml = [0,1,2,3].map(i => {
    const mv = moves[i];
    if (!mv) return `<div class="dc-move empty">—</div>`;
    const bg = TYPE_COLORS[mv.type] || '#888';
    return `<div class="dc-move" style="background:${bg}">${term('moves', mv.name)}</div>`;
  }).join('');

  const evList = STAT_KEYS.filter(k => evs[k] > 0)
    .map(k => `<span class="dc-ev">${STAT_NAMES_I18N[k]} ${evs[k]}</span>`).join('');

  const types = [pk.type1, pk.type2].filter(Boolean).map(tp =>
    `<span class="type-badge" style="background:${TYPE_COLORS[tp]||'#888'}">${term('types', tp)}</span>`
  ).join('');

  document.getElementById('detailCard').innerHTML = `
    <div class="dc-topbar">
      <button class="dc-add-btn" id="dcAddBtn">${t('add_to_party_btn')}</button>
      <button class="dc-del-btn" id="dcDelBtn">${t('delete_btn')}</button>
      <button class="dc-close" id="dcClose">${t('close')} ✕</button>
    </div>
    <div class="dc-poke-header">
      <div class="dc-sprite-wrap">
        <img class="dc-sprite" src="${spriteUrl(pk.name, pk.no)}" alt="${dispPkName}">
      </div>
      <div class="dc-info">
        <div class="dc-no">#${pk.no} · ${dispPkName}${entry.gender ? ' ' + entry.gender : ''}</div>
        <div class="dc-name">${entry.nickname || dispPkName}</div>
        <div class="dc-nickname-row">
          <input type="text" class="dc-nickname-inp" id="dcNicknameInp" placeholder="${t('nickname_input_placeholder')}" maxlength="20" autocomplete="off" value="${(entry.nickname || '').replace(/"/g, '&quot;')}">
          <button class="dc-save-nick-btn" id="dcSaveNickBtn">${t('save_btn')}</button>
        </div>
        <div class="dc-types">${types}</div>
        <div class="dc-build-chips">
          ${natChips}
          ${it ? `<span class="dc-chip">📦 ${term('items', it.name)}</span>` : ''}
          ${entry.ability ? `<span class="dc-chip">${term('abilities', entry.ability.name)}</span>` : ''}
        </div>
      </div>
    </div>
    <div class="dc-section-title">${t('stats_lbl')}</div>
    ${statsHtml}
    <div class="dc-section-title">${t('moves')}</div>
    <div class="dc-moves-grid">${movesHtml}</div>
    ${evList ? `<div class="dc-section-title">${t('evs')}</div><div class="dc-evs">${evList}</div>` : ''}
  `;

  document.getElementById('dcClose').onclick = closeDetail;
  document.getElementById('dcSaveNickBtn').onclick = () => {
    const nick = document.getElementById('dcNicknameInp').value.trim();
    const b = getBoxData();
    if (b[absIdx] != null) { b[absIdx].nickname = nick || undefined; setBoxData(b); }
    showToast(nick ? t('nickname_saved_toast', {nick}) : t('nickname_deleted_toast'));
    renderGrid(false);
  };
  document.getElementById('dcNicknameInp').addEventListener('keydown', ev => {
    if (ev.key === 'Enter') document.getElementById('dcSaveNickBtn').click();
  });
  document.getElementById('dcAddBtn').onclick = () => {
    localStorage.setItem('pochams_box_add', JSON.stringify(entry));
    window.location.href = 'index.html';
  };
  document.getElementById('dcDelBtn').onclick = () => {
    if (!confirm(t('confirm_delete_pokemon', {name: dispPkName}))) return;
    const b = getBoxData();
    b[absIdx] = null;
    setBoxData(b);
    closeDetail();
    renderGrid(false);
    showToast(t('deleted_pokemon_toast', {name: dispPkName}));
  };

  document.getElementById('detailOverlay').classList.add('visible');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('visible');
  selectedBoxIdx = -1;
}

/* ── EVENT LISTENERS ── */
document.getElementById('boxGrid').addEventListener('click', e => {
  const filled = e.target.closest('.box-slot.filled');
  if (filled) { openDetail(+filled.dataset.idx); return; }
  const empty = e.target.closest('.box-slot.empty');
  if (empty) openPokeModal(+empty.dataset.idx);
});
document.getElementById('boxGrid').addEventListener('mouseover', e => {
  const slot = e.target.closest('.box-slot.filled');
  if (!slot) return;
  const box = getBoxData();
  const entry = box[+slot.dataset.idx];
  if (!entry) return;
  showBoxTt(slot, buildBoxTtHtml(entry));
});
document.getElementById('boxGrid').addEventListener('mouseleave', hideBoxTt);
document.getElementById('boxGrid').addEventListener('mouseout', e => {
  if (!e.relatedTarget || !document.getElementById('boxGrid').contains(e.relatedTarget)) hideBoxTt();
});

document.getElementById('detailOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('detailOverlay')) closeDetail();
});

document.getElementById('prevBtn').addEventListener('click', () => {
  currentBox = (currentBox - 1 + numBoxes()) % numBoxes();
  renderGrid(true, -1);
});
document.getElementById('nextBtn').addEventListener('click', () => {
  currentBox = (currentBox + 1) % numBoxes();
  renderGrid(true, 1);
});

document.getElementById('boxDots').addEventListener('click', e => {
  const dot = e.target.closest('.box-dot');
  if (!dot || +dot.dataset.box === currentBox) return;
  const dir = +dot.dataset.box > currentBox ? 1 : -1;
  currentBox = +dot.dataset.box;
  renderGrid(true, dir);
});

document.getElementById('clearBtn').addEventListener('click', () => {
  const box = getBoxData();
  const start = currentBox * SLOTS_PER_BOX;
  const inBox = box.slice(start, start + SLOTS_PER_BOX).filter(e => e && POKEMON_DATA[e?.pkIdx]);
  if (!inBox.length) { showToast(t('box_is_empty_toast')); return; }
  if (!confirm(t('confirm_delete_box_pokemon', {box: currentBox + 1, n: inBox.length}))) return;
  for (let i = start; i < start + SLOTS_PER_BOX; i++) box[i] = null;
  setBoxData(box);
  renderGrid(false);
  showToast(t('box_cleared_toast', {box: currentBox + 1}));
});

/* ── INIT ── */
renderGrid(false);

/* ════════════════════════════
   ADD TO BOX FLOW
════════════════════════════ */
let addSlotIdx   = -1;
let addPokemon   = null;
let addNature    = null;
let addItem      = null;
let addAbility   = null;
let addMoves     = [null,null,null,null];
let addEvs       = {H:0,A:0,B:0,C:0,D:0,S:0};
let addGender    = null;
let addMoveEditIdx = -1;
let addPokeFilter  = 'all';
let addTypeFilter  = null;
let addMoveFilter  = 'all';
let addItemFilter  = 'all';
let _addAbilList   = [];

/* ── Poke Modal ── */
function buildTypeFilterRow() {
  const types = Object.keys(TYPE_COLORS);
  document.getElementById('typeFilterRow').innerHTML = types.map(tp =>
    `<button class="type-f-btn${addTypeFilter===tp?' on':''}" data-t="${tp}" style="background:${TYPE_COLORS[tp]};--btn-col:${TYPE_COLORS[tp]}">${term('types', tp)}</button>`
  ).join('');
}

function openPokeModal(slotIdx) {
  addSlotIdx = slotIdx;
  addPokeFilter = 'all';
  addTypeFilter = null;
  document.querySelectorAll('#pokeFilterRow .f-btn').forEach(b => b.classList.toggle('on', b.dataset.f === 'all'));
  document.getElementById('pokeSearch').value = '';
  buildTypeFilterRow();
  renderPokeGrid('');
  document.getElementById('pokeModal').classList.add('open');
  setTimeout(() => document.getElementById('pokeSearch').focus(), 50);
}
function closePokeModal() { document.getElementById('pokeModal').classList.remove('open'); }

function renderPokeGrid(q) {
  let list = POKEMON_DATA.map((p,i) => ({p,i}));
  if (addPokeFilter === 'ingame') list = list.filter(({p}) => p.champions);
  if (addTypeFilter) list = list.filter(({p}) => p.type1 === addTypeFilter || p.type2 === addTypeFilter);
  if (q) list = list.filter(({p}) => matchPokemonQuery(p,q));
  document.getElementById('pokeGrid').innerHTML = list.map(({p:pk,i}) => `
    <div class="poke-card" data-idx="${i}">
      <img src="${spriteUrl(pk.name, pk.no)}" alt="${pokeName(pk.name, pk.no)}" loading="lazy">
      <div class="pc-no">#${pk.no}</div>
      <div class="pc-name">${pokeName(pk.name, pk.no)}</div>
      <div class="pc-types">${[pk.type1,pk.type2].filter(Boolean).map(tp=>`<span class="pc-tbadge" style="background:${TYPE_COLORS[tp]||'#888'}">${term('types', tp)}</span>`).join('')}</div>
    </div>`).join('');
}

document.getElementById('pokeGrid').addEventListener('click', e => {
  const card = e.target.closest('.poke-card');
  if (!card) return;
  const pk = POKEMON_DATA[+card.dataset.idx];
  if (!pk) return;
  addPokemon = pk;
  addNature = null; addItem = null;
  addMoves = [null,null,null,null];
  addEvs = {H:0,A:0,B:0,C:0,D:0,S:0};
  addGender = pk.name.endsWith('♂') ? '♂' : pk.name.endsWith('♀') ? '♀' : null;
  const abd = ABILITY_DATA?.[pk.name];
  addAbility = abd?.normal?.[0] || null;
  closePokeModal();
  openBuilder();
});

document.getElementById('closePokeModal').addEventListener('click', closePokeModal);
document.getElementById('pokeModal').addEventListener('click', e => { if(e.target===document.getElementById('pokeModal')) closePokeModal(); });
document.getElementById('pokeSearch').addEventListener('input', e => renderPokeGrid(e.target.value));
document.getElementById('pokeFilterRow').addEventListener('click', e => {
  const btn = e.target.closest('.f-btn');
  if (!btn) return;
  document.querySelectorAll('#pokeFilterRow .f-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on'); addPokeFilter = btn.dataset.f;
  renderPokeGrid(document.getElementById('pokeSearch').value);
});
document.getElementById('typeFilterRow').addEventListener('click', e => {
  const btn = e.target.closest('.type-f-btn');
  if (!btn) return;
  const t = btn.dataset.t;
  addTypeFilter = (addTypeFilter === t) ? null : t;
  buildTypeFilterRow();
  renderPokeGrid(document.getElementById('pokeSearch').value);
});

/* ── Builder ── */
function openBuilder() { renderBuilder(); document.getElementById('builderOverlay').classList.add('open'); }
function closeBuilder() { document.getElementById('builderOverlay').classList.remove('open'); }

function renderBuilder() {
  const pk = addPokemon;
  if (!pk) return;
  const dispPkName = pokeName(pk.name, pk.no);
  const NAT_LABELS_I18N = {A:t('stat_atk'),B:t('stat_def'),C:t('stat_spatk'),D:t('stat_spdef'),S:t('stat_speed')};
  const STAT_NAMES_I18N = {H:t('hp_lbl'),A:t('stat_atk'),B:t('stat_def'),C:t('stat_spatk'),D:t('stat_spdef'),S:t('stat_speed')};

    : null;
  const statRows = STAT_KEYS.map(k => {
    const isHP = k==='H', nm = addNature?.up===k ? 1.1 : addNature?.dn===k ? 0.9 : 1;
    const val = calcStat(pk[k], addEvs[k]||0, isHP, nm);
    const pct = Math.min(100, Math.round(val/3)), col = statColor(val);
    return `<div class="b-stat-row">
      <div class="b-stat-lbl">${STAT_NAMES_I18N[k]}</div>
      <div class="b-stat-base">${pk[k]}</div>

      <div class="b-stat-val">${val}</div>
      <input class="b-ev-input" type="text" inputmode="numeric" value="${addEvs[k]||0}" data-stat="${k}" autocomplete="off">
    </div>`;
  }).join('');
  const evTotal = Object.values(addEvs).reduce((a,b)=>a+b,0);
  const movesHtml = [0,1,2,3].map(i => {
    const mv = addMoves[i];
    return mv
      ? `<div class="b-move-slot" data-mi="${i}" style="background:${TYPE_COLORS[mv.type]||'#888'};color:#fff">${term('moves', mv.name)}</div>`
      : `<div class="b-move-slot empty" data-mi="${i}">— ${t('no_move_set')}</div>`;

      <div class="b-sprite-wrap"><img class="b-sprite" src="${spriteUrl(pk.name,pk.no)}" alt="${dispPkName}"></div>
      <div class="b-info">
        <div class="b-poke-name">#${pk.no} ${dispPkName}</div>
        <div class="b-types-row">${types}</div>
        <div class="b-section">${t('gender_lbl')}</div>
        <div class="b-gender-row">${genderHtml}</div>

      ${addAbility?.desc ? `<span class="b-cfg-desc">${termDesc('abilities', addAbility.name, addAbility.desc)}</span>` : ''}
    </div>

      <span class="b-cfg-lbl">${t('item')}</span>
      ${addItem?.sprite ? `<img src="${addItem.sprite}" style="width:18px;height:18px;object-fit:contain;flex-shrink:0">` : ''}

    <div class="b-section">${t('stats_and_evs')}</div>
    ${statRows}

    <div class="b-section">${t('moves')}</div>
    <div class="b-moves-grid">${movesHtml}</div>

  document.getElementById('bItemRow').onclick = openItemModal;

    btn.onclick = () => { addGender = btn.dataset.gender || null; renderBuilder(); };

    slot.onclick = () => { addMoveEditIdx = +slot.dataset.mi; openMoveModal(); };

  document.querySelectorAll('.b-ev-input').forEach(inp => {
    inp.onfocus = () => { if (inp.value === '0') inp.value = ''; else setTimeout(() => inp.select(), 0); };
    inp.oninput = () => {
      const k = inp.dataset.stat;
      let v = Math.min(32, Math.max(0, +inp.value || 0));
      const others = Object.entries(addEvs).filter(([sk]) => sk !== k).reduce((a, [, val]) => a + val, 0);
      if (others + v > 66) v = 66 - others;
      inp.value = v;
      addEvs[k] = v;
      const total = Object.values(addEvs).reduce((a, b) => a + b, 0);
      const totalEl = document.querySelector('.b-ev-total');
      if (totalEl) totalEl.textContent = t('ev_total_max', {n: total});
    };
    inp.onblur = () => renderBuilder();
  });
}

function saveAddToBox() {
  if (!addPokemon || addSlotIdx < 0) return;
  const box = getBoxData();
  const entry = {
    pkIdx:   POKEMON_DATA.indexOf(addPokemon),
    itIdx:   addItem   ? ITEM_DATA.indexOf(addItem)   : -1,
    natIdx:  addNature ? NATURES.indexOf(addNature)   : -1,
    ability: addAbility ? {name: addAbility.name, desc: addAbility.desc||''} : null,
    moves:   addMoves.map(mv => mv ? MOVE_DATA.indexOf(mv) : -1),
    evs:     {...addEvs},
    gender:  addGender || null,
    savedAt: Date.now()
  };
  while (box.length <= addSlotIdx) box.push(null);
  box[addSlotIdx] = entry;
  setBoxData(box);
  const name = pokeName(addPokemon.name, addPokemon.no);
  closeBuilder(); addSlotIdx = -1;
  renderGrid(false);
  showToast(t('saved_pokemon_toast', {name}));
}

    /* 같은 기술이 이미 다른 칸에 있으면 자리를 서로 맞바꿔 중복 방지 */

  closeMoveModal(); renderBuilder();
});

/* ── Nature Modal ── */
function buildNatureTable(curNature) {
  const rows = NAT_STATS, cols = NAT_STATS;
  const NAT_LABELS_I18N = {A:t('stat_atk'),B:t('stat_def'),C:t('stat_spatk'),D:t('stat_spdef'),S:t('stat_speed')};
  const natGrid = {};
  rows.forEach(r => { natGrid[r] = {}; cols.forEach(c => natGrid[r][c] = null); });
  NATURES.forEach(n => { if (n.up && n.dn) natGrid[n.up][n.dn] = n; });
  const neutralByRow = {};
  NATURES.filter(n=>!n.up).forEach((n,i) => { neutralByRow[rows[i]] = n; });

  let html = `<thead><tr><th></th>${cols.map(c=>`<th class="col-lbl">▼${NAT_LABELS_I18N[c]}</th>`).join('')}</tr></thead><tbody>`;
  rows.forEach((r,ri) => {
    html += `<tr><th class="row-lbl">▲${NAT_LABELS_I18N[r]}</th>`;
    cols.forEach(c => {
      if (r===c) {
        const n = neutralByRow[r] || NATURES.filter(n=>!n.up)[ri];
        html += `<td class="nat-neutral${curNature?.name===n?.name?' nat-selected':''}" data-nidx="${NATURES.indexOf(n)}">${n?term('natures', n.name):'-'}</td>`;
      } else {
        const n = natGrid[r][c];
        html += `<td class="${curNature?.name===n?.name?'nat-selected':''}" data-nidx="${NATURES.indexOf(n)}">${n?term('natures', n.name):'?'}</td>`;
      }
    });
    html += '</tr>';
  });
  html += '</tbody>';
  return html;
}

function openNatureModal() {
  document.getElementById('natureTable').innerHTML = buildNatureTable(addNature);
  document.getElementById('natureModal').classList.add('open');

});

;(function(){
  const vp = document.querySelector('.box-viewport');
  if (!vp) return;
  let tx0 = 0, ty0 = 0;
  vp.addEventListener('touchstart', e => {
    tx0 = e.touches[0].clientX;
    ty0 = e.touches[0].clientY;
  }, {passive: true});
  vp.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx0;
    const dy = e.changedTouches[0].clientY - ty0;
    if (Math.abs(dx) < 40 || Math.abs(dx) < Math.abs(dy) * 1.2) return;
    if (dx < 0) document.getElementById('nextBtn').click();
    else document.getElementById('prevBtn').click();
  }, {passive: true});
})();

  if (typeof buildTypeFilterRow === 'function') buildTypeFilterRow();
  if (typeof renderGrid === 'function') renderGrid(false);
  if (typeof renderBuilder === 'function' && typeof addPokemon !== 'undefined' && addPokemon) renderBuilder();
  document.querySelectorAll('#setThemeSel option[data-ko-name]').forEach(o => {
    o.textContent = pokeName(o.dataset.koName, o.dataset.no) + ' ' + t('theme_lbl');
  });
}

/* ── 이브이즈 테마 ── */
const THEME_DEFS = [
  { id: 'eevee',    name: '이브이',     no: 133 },
  { id: 'vaporeon', name: '샤미드',     no: 134 },
  { id: 'jolteon',  name: '쥬피썬더',   no: 135 },
  { id: 'flareon',  name: '부스터',     no: 136 },
  { id: 'espeon',   name: '에브이',     no: 196 },
  { id: 'umbreon',  name: '블래키',     no: 197 },
  { id: 'leafeon',  name: '리피아',     no: 470 },
  { id: 'glaceon',  name: '글레이시아', no: 471 },
  { id: 'sylveon',  name: '님피아',     no: 700 },
];
function applyTheme(themeId) {
  if (themeId) document.documentElement.setAttribute('data-theme', themeId);
  else document.documentElement.removeAttribute('data-theme');
}
function detectDefaultTheme() {
  const saved = localStorage.getItem('pochams_theme');
  if (saved !== null) return saved;
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) return 'umbreon';
  return '';
}
applyTheme(detectDefaultTheme());

loadI18n().then(applyNavSettingsLabels);
</script>
<script>
(function initSettingsModal() {
  const overlay = document.getElementById('setOverlay');
  const logo = document.querySelector('.nav-logo');
  const closeBtn = document.getElementById('setCloseBtn');
  const clearBtn = document.getElementById('setClearBtn');
  const langSel = document.getElementById('setLangSel');
  if (!overlay || !logo) return;
  document.getElementById('navSettingsBtn')?.addEventListener('click', () => overlay.classList.add('open'));
  closeBtn?.addEventListener('click', () => overlay.classList.remove('open'));
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
  clearBtn?.addEventListener('click', () => {
    if (!confirm(t('confirm_clear_all_data'))) return;
    Object.keys(localStorage).filter(k => k.startsWith('pochams_')).forEach(k => localStorage.removeItem(k));
    alert(t('alert_data_cleared'));
    location.reload();
  });
  if (langSel) {
    langSel.value = localStorage.getItem('lang') || 'ko';
    langSel.addEventListener('change', () => {
      localStorage.setItem('lang', langSel.value);
      LANG = langSel.value;
      applyNavSettingsLabels();
    });
  }
  const themeSel = document.getElementById('setThemeSel');
  if (themeSel) {
    THEME_DEFS.forEach(theme => {
      const o = document.createElement('option');
      o.value = theme.id;
      o.textContent = pokeName(theme.name, theme.no) + ' ' + t('theme_lbl');
      o.dataset.koName = theme.name;
      o.dataset.no = theme.no;
      themeSel.appendChild(o);
    });
    themeSel.value = localStorage.getItem('pochams_theme') || '';
    themeSel.addEventListener('change', () => {
      localStorage.setItem('pochams_theme', themeSel.value);
      applyTheme(themeSel.value);
    });
  }
})();
</script>
