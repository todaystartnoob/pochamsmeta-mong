name: Update Champions Data

# 하루 1번(UTC 18:00 = KST 03:00) 자동 실행 + 수동 실행 버튼
on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch: {}

# 레포에 커밋할 권한
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download & localize ranked teams
        run: python scripts/build_ranked_teams.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "변경 없음 - 커밋 스킵"
          else
            git commit -m "chore: update champions ranked-team data ($(date -u +%Y-%m-%d))"
            git push
          fi
