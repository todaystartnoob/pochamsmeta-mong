<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <title>포챔스메타몽 - 박스</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background: #b89dcc; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    .navbar {
      height: 54px; background: rgba(255,255,255,.97); flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; box-shadow: 0 2px 10px rgba(0,0,0,.12); position: relative; z-index: 20;
    }
    .nav-logo { display:flex; align-items:center; }
    .nav-logo img { height:38px; object-fit:contain; }
    .nav-links { display: flex; gap: 6px; }
    .nav-links a {
      text-decoration: none; color: #444; font-size: 14px;
      padding: 5px 14px; border-radius: 6px; transition: background .2s, color .2s;
    }
    .nav-links a:hover  { background: #ede0f5; color: #7b3fa0; }
    .nav-links a.active { background: #d4b8e8; color: #4a1d8a; font-weight: 600; }

    .page-layout {
      flex: 1; min-height: 0;
      display: flex; flex-direction: row; gap: 10px; padding: 12px;
    }

    .side-ad {
      flex: 0 0 180px; background: rgba(0,0,0,.12); border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; color: rgba(255,255,255,.5); letter-spacing: 2px;
    }

    .hub-center {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; gap: 10px;
    }

    .hub-cards {
      flex: 1; min-height: 0;
      display: flex; flex-direction: row; gap: 10px;
    }

    .hub-card {
      flex: 1;
      background: rgba(238,230,250,.97);
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(80,40,120,.15);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      text-decoration: none; color: inherit;
      cursor: pointer;
      transition: transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s, border-color .15s;
      border: 2px solid rgba(160,120,220,.25);
      padding: 32px 24px;
      overflow: hidden;
      position: relative;
    }
    .hub-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 14px 40px rgba(90,40,150,.22);
      border-color: rgba(140,80,200,.55);
    }

    .hub-sprites {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .hub-sprites-row {
      display: flex;
      align-items: flex-end;
    }
    .hub-sprites-row img {
      width: 64px; height: 64px;
      image-rendering: pixelated; object-fit: contain;
      filter: drop-shadow(0 3px 8px rgba(60,20,100,.22));
      flex-shrink: 0;
    }
    .hub-sprites-row.back img { width: 54px; height: 54px; opacity: .75; }
    .hub-sprites-row img:nth-child(1) { margin-right: -14px; transform: rotate(-6deg) translateY(4px); z-index: 0; }
    .hub-sprites-row img:nth-child(2) { z-index: 2; position: relative; }
    .hub-sprites-row img:nth-child(3) { margin-left: -14px; transform: rotate(6deg) translateY(4px); z-index: 0; }
    /* 포켓몬 박스: 3개짜리 단일 행 */
    .hub-sprites-single {
      display: flex;
      align-items: flex-end;
      height: 90px;
    }
    .hub-sprites-single img {
      width: 72px; height: 72px;
      image-rendering: pixelated; object-fit: contain;
      filter: drop-shadow(0 4px 10px rgba(60,20,100,.25));
      flex-shrink: 0;
    }
    .hub-sprites-single img:nth-child(1) { margin-right: -18px; opacity: .85; transform: rotate(-8deg) translateY(6px); z-index: 0; }
    .hub-sprites-single img:nth-child(2) { width: 88px; height: 88px; z-index: 2; position: relative; }
    .hub-sprites-single img:nth-child(3) { margin-left: -18px; opacity: .85; transform: rotate(8deg) translateY(6px); z-index: 0; }

    .hub-card-title {
      font-size: 20px; font-weight: 700; color: #3a1a5c;
      letter-spacing: .3px;
    }
    .hub-card-desc {
      font-size: 12px; color: #7060a0; text-align: center; line-height: 1.7;
    }
    .hub-card-count {
      background: #7b3fa0; color: #fff;
      font-size: 10px; font-weight: 700;
      padding: 3px 12px; border-radius: 20px;
      min-width: 60px; text-align: center;
    }
    .hub-card-count.empty { background: rgba(0,0,0,.18); }

    .bottom-ad {
      flex: 0 0 140px; background: rgba(0,0,0,.12); border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; color: rgba(255,255,255,.5); letter-spacing: 2px;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,.05); border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,.18); border-radius: 3px; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-logo"><img src="pochamsMetamongLogo.png" alt="포챔스메타몽"></div>
  <div class="nav-links">
    <a href="index.html">파티 구성</a>
    <a href="pokemon-box.html" class="active">포켓몬 박스</a>
    <a href="meta-usage.html">메타 사용률</a>

  </div>
</nav>

<div class="page-layout">
  <div class="side-ad">광고</div>

  <div class="hub-center">
    <div class="hub-cards">

      <a href="party-box.html" class="hub-card">
        <div class="hub-sprites" id="partySprites">
          <div class="hub-sprites-row back">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/376.png" alt="메타그로스">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/149.png" alt="망나뇽">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/248.png" alt="마기라스">
          </div>
          <div class="hub-sprites-row">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/448.png" alt="루카리오">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/445.png" alt="한카리아스">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/130.png" alt="가라도스">
          </div>
        </div>
        <div class="hub-card-title">파티 박스</div>
        <div class="hub-card-desc">저장된 파티 구성을<br>불러오고 관리합니다</div>
        <div class="hub-card-count" id="partyCount">불러오는 중...</div>
      </a>

      <a href="pokemon-storage.html" class="hub-card">
        <div class="hub-sprites-single" id="pokeSprites">
          <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/6.png" alt="리자몽">
          <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/130.png" alt="갸라도스">
          <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/376.png" alt="메타그로스">
        </div>
        <div class="hub-card-title">포켓몬 박스</div>
        <div class="hub-card-desc">저장된 개별 포켓몬을<br>파티에 추가합니다</div>
        <div class="hub-card-count" id="pokemonCount">불러오는 중...</div>
      </a>

    </div>
    <div class="bottom-ad">광고</div>
  </div>

  <div class="side-ad">광고</div>
</div>

<script src="pokemon-sprites.js"></script>
<script>
const partySaves = JSON.parse(localStorage.getItem('pochams_party_saves') || '[]');
const pokemonBox = JSON.parse(localStorage.getItem('pochams_box') || '[]');

const partyEl = document.getElementById('partyCount');
const pokeEl  = document.getElementById('pokemonCount');

if (partySaves.length === 0) {
  partyEl.textContent = '저장된 파티 없음';
  partyEl.classList.add('empty');
} else {
  partyEl.textContent = `${partySaves.length}개 저장됨`;
}

if (pokemonBox.length === 0) {
  pokeEl.textContent = '저장된 포켓몬 없음';
  pokeEl.classList.add('empty');
} else {
  pokeEl.textContent = `${pokemonBox.length}마리 저장됨`;
}

/* 포켓몬 박스 카드: 실제 저장된 포켓몬 스프라이트로 교체 */
if (pokemonBox.length >= 3 && typeof POKEMON_SPRITES !== 'undefined') {

</script>
</body>
</html>
