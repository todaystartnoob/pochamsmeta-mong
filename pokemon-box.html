    body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background: var(--purple); height: 100vh; overflow: hidden; display: flex; flex-direction: column; transition: background-color .25s ease; }

    .navbar {
      height: 54px; background: var(--navbar-bg); flex-shrink: 0;

    .nav-logo { display:flex; align-items:center; }

    .nav-links { display: flex; gap: 6px; }
    .nav-links a {
      text-decoration: none; color: var(--text-dim); font-size: 14px;
      padding: 5px 14px; border-radius: 6px; transition: background .2s, color .2s;
    }
    .nav-links a:hover  { background: var(--hover-bg); color: var(--accent); }
    .nav-settings-btn{background:none;border:none;font-size:17px;cursor:pointer;color:var(--text-faint);padding:4px 9px;border-radius:6px;transition:background .15s,color .15s;margin-left:2px;line-height:1;}
    .nav-settings-btn:hover{background:var(--hover-bg);color:var(--accent);}
    .nav-links a.active { background: var(--nav-active-bg); color: var(--nav-active-text); font-weight: 600; }

    .page-layout {
      flex: 1; min-height: 0;
      display: flex; flex-direction: row; gap: 10px; padding: 12px;
    }

    .side-ad {
      flex: 0 0 180px; background: rgba(0,0,0,.12); border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; color: rgba(255,255,255,.5); letter-spacing: 2px;
      opacity: 0;
    }

    .hub-center {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; gap: 10px;
    }

    .hub-cards {
      flex: 1; min-height: 0;
      display: flex; flex-direction: row; gap: 10px;
    }

    .hub-card {
      flex: 1;
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(80,40,120,.15);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      text-decoration: none; color: inherit;
      cursor: pointer;
      transition: transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s, border-color .15s;
      border: 2px solid color-mix(in srgb, var(--accent) 25%, transparent);
      padding: 32px 24px;
      overflow: hidden;
      position: relative;
    }
    .hub-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 14px 40px rgba(0,0,0,.3);
      border-color: var(--accent);
    }

    .hub-sprites {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .hub-sprites-row {
      display: flex;
      align-items: flex-end;
    }
    .hub-sprites-row img {
      width: 64px; height: 64px;
      image-rendering: pixelated; object-fit: contain;
      filter: drop-shadow(0 3px 8px rgba(60,20,100,.22));
      flex-shrink: 0;
    }
    .hub-sprites-row.back img { width: 54px; height: 54px; opacity: .75; }
    .hub-sprites-row img:nth-child(1) { margin-right: -14px; transform: rotate(-6deg) translateY(4px); z-index: 0; }
    .hub-sprites-row img:nth-child(2) { z-index: 2; position: relative; }
    .hub-sprites-row img:nth-child(3) { margin-left: -14px; transform: rotate(6deg) translateY(4px); z-index: 0; }
    /* 포켓몬 박스: 3개짜리 단일 행 */
    .hub-sprites-single {
      display: flex;
      align-items: flex-end;
      height: 90px;
    }
    .hub-sprites-single img {
      width: 72px; height: 72px;
      image-rendering: pixelated; object-fit: contain;
      filter: drop-shadow(0 4px 10px rgba(60,20,100,.25));
      flex-shrink: 0;
    }
    .hub-sprites-single img:nth-child(1) { margin-right: -18px; opacity: .85; transform: rotate(-8deg) translateY(6px); z-index: 0; }
    .hub-sprites-single img:nth-child(2) { width: 88px; height: 88px; z-index: 2; position: relative; }
    .hub-sprites-single img:nth-child(3) { margin-left: -18px; opacity: .85; transform: rotate(8deg) translateY(6px); z-index: 0; }

    .hub-card-title {
      font-size: 20px; font-weight: 700; color: var(--card-title);
      letter-spacing: .3px;
    }
    .hub-card-desc {
      font-size: 12px; color: var(--card-desc); text-align: center; line-height: 1.7;
    }
    .hub-card-count {

    .hub-card-count.empty { background: rgba(0,0,0,.18); }

    .bottom-ad {

    .set-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}

    .set-box{background:var(--card-bg);border-radius:14px;padding:18px 20px;width:380px;max-width:92vw;max-height:84vh;overflow-y:auto;box-shadow:0 12px 44px rgba(0,0,0,.3);}

<script>
/* ── i18n (한/영/일) — 메인 스크립트보다 먼저 정의되어야 함 ── */
let I18N = null;
function detectDefaultLang() {
  const saved = localStorage.getItem('lang');
  if (saved) return saved;
  const nav = (navigator.language || navigator.userLanguage || '').toLowerCase();
  if (nav.startsWith('ko')) return 'ko';
  if (nav.startsWith('ja')) return 'ja';
  if (nav.startsWith('en')) return 'en';
  return 'en';
}
let LANG = detectDefaultLang();

async function loadI18n() {
  try { I18N = await fetch('i18n_names.json').then(r => r.json()); }
  catch (e) { console.error('i18n_names.json fetch 실패:', e); I18N = null; }
}

function pokeName(koName, dexNo) {
  if (LANG === 'ko' || !I18N || !koName) return koName;
  const full = I18N.pokemonFullNames && I18N.pokemonFullNames[koName];
  if (full && full[LANG]) return full[LANG];
  const p = I18N.pokemon[String(dexNo)];
  if (!p) return koName;
  const base = p[LANG] || p.ko;
  let workingName = koName;
  let megaPrefix = '';
  if (workingName.startsWith('메가') && workingName.slice(2).startsWith(p.ko)) {
    megaPrefix = LANG === 'ja' ? 'メガ' : 'Mega ';
    workingName = workingName.slice(2);
  }
  let result = megaPrefix + workingName.split(p.ko).join(base);
  /* 괄호 접미사 폼 (예: 아르세우스(강철), 디아루가(오리진폼)) */
  const suffixMatch = result.match(/\(([^)]+)\)$/);
  if (suffixMatch) {
    const formKo = suffixMatch[1];
    const src = I18N.forms[formKo] || I18N.types[formKo];
    const formTrans = src && src[LANG];
    if (formTrans) result = result.slice(0, suffixMatch.index) + '(' + formTrans + ')';
  }
  for (const formKo in I18N.forms) {
    if (result.includes(formKo)) {
      const f = (I18N.forms[formKo][LANG] || formKo) + ' ';
      result = result.split(formKo).join(f);
    }
  }
  return result.replace(/\s+/g, ' ').trim();
}

const LOC_MAP_FIELD = {items:'item_ja2ko', abilities:'ability_ja2ko', moves:'move_ja2ko', natures:'nature_ja2ko'};
function normKoName(category, koName) {
  if (typeof CHAMPIONS_LOC_MAP !== 'undefined') {
    const field = LOC_MAP_FIELD[category];
    const fixed = field && CHAMPIONS_LOC_MAP[field]?.[koName];
    if (fixed) return fixed;
  }
  return koName;
}
function term(category, koName) {
  if (!koName) return koName;
  koName = normKoName(category, koName);
  if (LANG === 'ko' || !I18N) return koName;
  const m = I18N[category]?.[koName];
  return (m && m[LANG]) || koName;
}
function termDesc(category, koName, koDesc) {
  if (LANG === 'ko' || !koName || !I18N) return koDesc;
  koName = normKoName(category, koName);
  const m = I18N[category]?.[koName];
  if (!m) return koDesc;
  const d = LANG === 'en' ? m.descEn : LANG === 'ja' ? m.descJa : null;
  return d || koDesc;
}

function t(key, vars) {
  if (!I18N) return key;
  const e = I18N.ui[key];
  let s = (e && (e[LANG] || e.ko)) || key;
  if (vars) for (const k in vars) s = s.replace(`{${k}}`, vars[k]);
  return s;
}
</script>

<script>
(function initSettingsModal() {
  const overlay = document.getElementById('setOverlay');
  const logo = document.querySelector('.nav-logo');
  const closeBtn = document.getElementById('setCloseBtn');
  const clearBtn = document.getElementById('setClearBtn');
  const langSel = document.getElementById('setLangSel');
  if (!overlay || !logo) return;
  document.getElementById('navSettingsBtn')?.addEventListener('click', () => overlay.classList.add('open'));
  closeBtn?.addEventListener('click', () => overlay.classList.remove('open'));
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
  clearBtn?.addEventListener('click', () => {
    if (!confirm(t('confirm_clear_all_data'))) return;
    Object.keys(localStorage).filter(k => k.startsWith('pochams_')).forEach(k => localStorage.removeItem(k));
    alert(t('alert_data_cleared'));
    location.reload();
  });
  if (langSel) {
    langSel.value = typeof LANG !== 'undefined' ? LANG : (localStorage.getItem('lang') || 'ko');
    langSel.addEventListener('change', () => {
      localStorage.setItem('lang', langSel.value);
      LANG = langSel.value;
      applyNavSettingsLabels();
    });
  }
  const themeSel = document.getElementById('setThemeSel');
  if (themeSel) {
    THEME_DEFS.forEach(theme => {
      const o = document.createElement('option');
      o.value = theme.id;
      o.textContent = pokeName(theme.name, theme.no) + ' ' + t('theme_lbl');
      o.dataset.koName = theme.name;
      o.dataset.no = theme.no;
      themeSel.appendChild(o);
    });
    themeSel.value = document.documentElement.getAttribute('data-theme') || '';
    themeSel.addEventListener('change', () => {
      localStorage.setItem('pochams_theme', themeSel.value);
      applyTheme(themeSel.value);
    });
  }
})();
</script>
