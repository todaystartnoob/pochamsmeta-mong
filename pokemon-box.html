  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background: #b89dcc; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    .navbar {
      height: 54px; background: rgba(255,255,255,.97); flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; box-shadow: 0 2px 10px rgba(0,0,0,.12); position: relative; z-index: 20;
    }
    .nav-logo { display:flex; align-items:center; }
    .nav-logo img { height:46px; object-fit:contain; }
    .nav-links { display: flex; gap: 6px; }
    .nav-links a {
      text-decoration: none; color: #444; font-size: 14px;
      padding: 5px 14px; border-radius: 6px; transition: background .2s, color .2s;
    }
    .nav-links a:hover  { background: #ede0f5; color: #7b3fa0; }
    .nav-links a.active { background: #d4b8e8; color: #4a1d8a; font-weight: 600; }

    .page-layout {
      flex: 1; min-height: 0;
      display: flex; flex-direction: row; gap: 10px; padding: 12px;
    }

    .side-ad {
      flex: 0 0 180px; background: rgba(0,0,0,.12); border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; color: rgba(255,255,255,.5); letter-spacing: 2px;
      opacity: 0;
    }

    .hub-center {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; gap: 10px;
    }

    .hub-cards {
      flex: 1; min-height: 0;
      display: flex; flex-direction: row; gap: 10px;
    }

    .hub-card {
      flex: 1;
      background: rgba(238,230,250,.97);
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(80,40,120,.15);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      text-decoration: none; color: inherit;
      cursor: pointer;
      transition: transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s, border-color .15s;
      border: 2px solid rgba(160,120,220,.25);
      padding: 32px 24px;
      overflow: hidden;
      position: relative;
    }
    .hub-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 14px 40px rgba(90,40,150,.22);
      border-color: rgba(140,80,200,.55);
    }

    .hub-sprites {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .hub-sprites-row {
      display: flex;
      align-items: flex-end;
    }
    .hub-sprites-row img {
      width: 64px; height: 64px;
      image-rendering: pixelated; object-fit: contain;
      filter: drop-shadow(0 3px 8px rgba(60,20,100,.22));
      flex-shrink: 0;
    }
    .hub-sprites-row.back img { width: 54px; height: 54px; opacity: .75; }
    .hub-sprites-row img:nth-child(1) { margin-right: -14px; transform: rotate(-6deg) translateY(4px); z-index: 0; }
    .hub-sprites-row img:nth-child(2) { z-index: 2; position: relative; }
    .hub-sprites-row img:nth-child(3) { margin-left: -14px; transform: rotate(6deg) translateY(4px); z-index: 0; }
    /* 포켓몬 박스: 3개짜리 단일 행 */
    .hub-sprites-single {
      display: flex;
      align-items: flex-end;
      height: 90px;
    }
    .hub-sprites-single img {
      width: 72px; height: 72px;
      image-rendering: pixelated; object-fit: contain;
      filter: drop-shadow(0 4px 10px rgba(60,20,100,.25));
      flex-shrink: 0;
    }
    .hub-sprites-single img:nth-child(1) { margin-right: -18px; opacity: .85; transform: rotate(-8deg) translateY(6px); z-index: 0; }
    .hub-sprites-single img:nth-child(2) { width: 88px; height: 88px; z-index: 2; position: relative; }
    .hub-sprites-single img:nth-child(3) { margin-left: -18px; opacity: .85; transform: rotate(8deg) translateY(6px); z-index: 0; }

    .hub-card-title {
      font-size: 20px; font-weight: 700; color: #3a1a5c;
      letter-spacing: .3px;
    }
    .hub-card-desc {
      font-size: 12px; color: #7060a0; text-align: center; line-height: 1.7;
    }
    .hub-card-count {
      background: #7b3fa0; color: #fff;
      font-size: 10px; font-weight: 700;
      padding: 3px 12px; border-radius: 20px;
      min-width: 60px; text-align: center;
    }
    .hub-card-count.empty { background: rgba(0,0,0,.18); }

    .bottom-ad {
      flex: 0 0 140px; background: rgba(0,0,0,.12); border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; color: rgba(255,255,255,.5); letter-spacing: 2px;
      opacity: 0;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,.05); border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,.18); border-radius: 3px; }

    /* ── RESPONSIVE ── */
    @media (max-width:1280px),(pointer:coarse){
      .navbar{height:48px;padding:0 16px;}
      .nav-logo img{height:36px;}
      .nav-links a{padding:5px 8px;font-size:11.5px;}
    }
    @media (max-width:1024px),(pointer:coarse){
      .side-ad{display:none!important;}
      .page-layout{flex-direction:column;gap:8px;padding:10px;}
      .hub-center{gap:8px;}
      .hub-cards{flex-direction:column;gap:8px;flex:none;}
      .hub-card{flex:none;padding:22px 18px;gap:12px;transform:none!important;}
      .hub-sprites-row img{width:52px;height:52px;}
      .hub-sprites-row.back img{width:42px;height:42px;}
      .hub-sprites-single{height:72px;}
      .hub-sprites-single img{width:54px;height:54px;}
      .hub-sprites-single img:nth-child(2){width:68px;height:68px;}
      .hub-card-title{font-size:17px;}
      .bottom-ad{flex:1;min-height:60px;}
    }
  
    /* ── SETTINGS MODAL ── */
    .nav-logo{cursor:pointer;}
    .nav-logo img{transition:transform .2s cubic-bezier(.34,1.56,.64,1);}
    .nav-logo:hover img{transform:scale(1.1);}
    .set-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
    .set-overlay.open{opacity:1;pointer-events:all;}
    .set-box{background:#fff;border-radius:14px;padding:18px 20px;width:380px;max-width:92vw;max-height:84vh;overflow-y:auto;box-shadow:0 12px 44px rgba(0,0,0,.3);}
    .set-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .set-title{font-size:15px;font-weight:700;color:#333;}
    .set-x{background:none;border:none;font-size:17px;cursor:pointer;color:#777;transition:color .15s;}
    .set-x:hover{color:#c00;}
    .set-section{margin-bottom:16px;}
    .set-section:last-child{margin-bottom:0;}
    .set-lbl{font-size:11px;font-weight:700;color:#9070b0;letter-spacing:.4px;margin-bottom:6px;}
    .set-sel{width:100%;padding:7px 10px;border:1.5px solid #e0d0f0;border-radius:7px;font-size:13px;font-family:inherit;background:#f8f4fc;color:#555;cursor:not-allowed;}
    .set-danger-btn{width:100%;padding:8px;border:1.5px solid #f0b0b0;border-radius:7px;background:#fff5f5;color:#c44;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;}
    .set-danger-btn:hover{background:#ffe5e5;}
    .set-desc{font-size:10.5px;color:#999;margin-top:5px;line-height:1.5;}
    .set-email{font-size:12px;color:#7b3fa0;text-decoration:none;font-weight:600;}
    .set-email:hover{text-decoration:underline;}
</style>

<script>
(function initSettingsModal() {
  const overlay = document.getElementById('setOverlay');
  const logo = document.querySelector('.nav-logo');
  const closeBtn = document.getElementById('setCloseBtn');
  const clearBtn = document.getElementById('setClearBtn');
  if (!overlay || !logo) return;
  logo.addEventListener('click', () => overlay.classList.add('open'));
  closeBtn?.addEventListener('click', () => overlay.classList.remove('open'));
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
  clearBtn?.addEventListener('click', () => {
    if (!confirm('저장된 모든 데이터를 삭제하시겠습니까?\n파티, 박스, 계산기 설정이 전부 초기화됩니다.')) return;
    Object.keys(localStorage).filter(k => k.startsWith('pochams_')).forEach(k => localStorage.removeItem(k));
    alert('삭제되었습니다. 페이지를 새로고침합니다.');
    location.reload();
  });
})();
</script>
