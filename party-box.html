<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <title>포챔스메타몽 - 파티 박스</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background: #b89dcc; min-height: 100vh; }

    .navbar {
      height: 54px; background: rgba(255,255,255,.97);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; box-shadow: 0 2px 10px rgba(0,0,0,.12);
      position: relative; z-index: 20;
    }
    .nav-logo { display:flex;align-items:center; } .nav-logo img { height:38px;object-fit:contain; }
    .nav-links { display: flex; gap: 6px; }
    .nav-links a {
      text-decoration: none; color: #444; font-size: 14px;
      padding: 5px 14px; border-radius: 6px; transition: background .2s, color .2s;
    }
    .nav-links a:hover  { background: #ede0f5; color: #7b3fa0; }
    .nav-links a.active { background: #d4b8e8; color: #4a1d8a; font-weight: 600; }

    .page-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }

    /* ── TOOLBAR ── */
    .toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .toolbar h1 { font-size: 18px; font-weight: 700; color: #fff; }
    .back-btn {
      text-decoration: none; background: rgba(255,255,255,.85); color: #5a2d7a;
      padding: 5px 12px; border-radius: 7px; font-size: 12px; font-weight: 600;
      transition: background .15s;
    }
    .back-btn:hover { background: #fff; }
    .save-count { font-size: 12px; color: rgba(255,255,255,.85); }

    /* ── CURRENT PARTY SECTION ── */
    .section-card {
      background: rgba(255,255,255,.93); border-radius: 14px;
      padding: 18px 20px; box-shadow: 0 3px 14px rgba(0,0,0,.1);
    }
    .section-title {
      font-size: 13px; font-weight: 700; color: #5a2d7a;
      margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
    }
    .section-title-badge {
      background: #7b3fa0; color: #fff; font-size: 9px; font-weight: 700;
      padding: 2px 8px; border-radius: 10px;
    }

    .current-party-row {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .cp-slots { display: flex; gap: 6px; flex-wrap: wrap; }
    .cp-slot {
      width: 56px; height: 56px; background: #f0e8f8; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .cp-slot img { width: 48px; height: 48px; image-rendering: pixelated; object-fit: contain; }
    .cp-slot-empty { background: #e8e0f0; color: #bbb; font-size: 20px; }

    .save-form { display: flex; gap: 8px; align-items: center; margin-left: auto; flex-wrap: wrap; }
    .save-name-input {
      border: 1.5px solid #c4a0e0; border-radius: 8px; padding: 7px 12px;
      font-size: 13px; font-family: inherit; outline: none; width: 180px;
      transition: border-color .15s;
    }
    .save-name-input:focus { border-color: #7b3fa0; }
    .save-btn {
      background: #7b3fa0; color: #fff; border: none; padding: 8px 18px;
      border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: background .15s; white-space: nowrap;
    }
    .save-btn:hover { background: #5a2d7a; }
    .save-btn:disabled { background: #bbb; cursor: default; }

    .no-party-msg {
      color: #aaa; font-size: 13px; padding: 8px 0;
    }

    /* ── SAVED PARTIES GRID ── */
    .parties-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 12px;
    }

    .party-card {
      background: rgba(255,255,255,.93); border-radius: 14px;
      padding: 14px 16px; box-shadow: 0 3px 12px rgba(0,0,0,.1);
      display: flex; flex-direction: column; gap: 10px;
      border: 2px solid transparent; transition: border-color .15s;
    }
    .party-card:hover { border-color: #c4a0e0; }

    .pc-header { display: flex; align-items: center; gap: 8px; }
    .pc-name {
      font-size: 14px; font-weight: 700; color: #3a1a5c; flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .pc-date { font-size: 10px; color: #aaa; flex-shrink: 0; }

    .pc-slots { display: flex; gap: 6px; flex-wrap: wrap; }
    .pc-slot {
      width: 52px; height: 52px; background: #f0e8f8; border-radius: 9px;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .pc-slot img { width: 44px; height: 44px; image-rendering: pixelated; object-fit: contain; }
    .pc-slot-empty { color: #ccc; font-size: 18px; }

    .pc-pokemon-names {
      font-size: 10px; color: #888; line-height: 1.8;
    }

    .pc-actions { display: flex; gap: 6px; }
    .pc-btn {
      flex: 1; padding: 7px 4px; border: none; border-radius: 8px;
      font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit;
      transition: background .15s;
    }
    .pc-btn-load { background: #7b3fa0; color: #fff; }
    .pc-btn-load:hover { background: #5a2d7a; }
    .pc-btn-del { background: #fde0e0; color: #c00; }
    .pc-btn-del:hover { background: #f5b8b8; }

    .empty-state {
      grid-column: 1/-1; text-align: center; padding: 48px 20px;
      color: rgba(255,255,255,.8); font-size: 14px; line-height: 2.2;
    }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #5a2d7a; color: #fff; padding: 9px 22px;
      border-radius: 20px; font-size: 12px; z-index: 9999;
      pointer-events: none; opacity: 0; transition: opacity .3s;
      white-space: nowrap; box-shadow: 0 4px 14px rgba(0,0,0,.25);
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,.05); border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,.18); border-radius: 3px; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-logo"><img src="pochamsMetamongLogo.png" alt="포챔스메타몽"></div>
  <div class="nav-links">
    <a href="index.html">파티 구성</a>
    <a href="pokemon-box.html" class="active">포켓몬 박스</a>
    <a href="meta-usage.html">메타 사용률</a>
    <a href="pokedex.html">포켓몬 도감</a>
  </div>
</nav>

<div class="page-body">
  <div class="toolbar">
    <a href="pokemon-box.html" class="back-btn">← 박스 홈</a>
    <h1>파티 박스</h1>
    <span class="save-count" id="saveCount"></span>
  </div>

  <!-- 현재 파티 -->
  <div class="section-card">
    <div class="section-title">
      현재 파티
      <span class="section-title-badge">파티 구성에서 자동 저장됨</span>
    </div>
    <div class="current-party-row">
      <div class="cp-slots" id="currentPartySlots"></div>
      <div class="save-form" id="saveForm">
        <input type="text" class="save-name-input" id="saveNameInput" placeholder="파티 이름 입력..." maxlength="20">
        <button class="save-btn" id="savePartyBtn">박스에 저장</button>
      </div>
    </div>
  </div>

  <!-- 저장된 파티 목록 -->
  <div class="parties-grid" id="partiesGrid"></div>
</div>

<div class="toast" id="toastEl"></div>

<script src="pokemon-sprites.js"></script>
<script src="data.js"></script>
<script>
const NATURES = [
  {name:'덜렁이',  up:null,dn:null},{name:'외로움',    up:'A',dn:'B'},
  {name:'개구장이',up:'A', dn:'C'},{name:'장난꾸러기', up:'A',dn:'D'},
  {name:'용감',    up:'A', dn:'S'},{name:'겁쟁이',     up:'B',dn:'A'},
  {name:'온순',    up:null,dn:null},{name:'촐랑이',     up:'B',dn:'C'},
  {name:'버릇없이',up:'B', dn:'D'},{name:'느긋이',     up:'B',dn:'S'},
  {name:'얌전이',  up:'C', dn:'A'},{name:'온화',       up:'C',dn:'B'},
  {name:'수줍음',  up:null,dn:null},{name:'건방짐',     up:'C',dn:'D'},
  {name:'조용이',  up:'C', dn:'S'},{name:'차분',       up:'D',dn:'A'},
  {name:'부드러운',up:'D', dn:'B'},{name:'신중',       up:'D',dn:'C'},
  {name:'고집',    up:'D', dn:'S'},{name:'조심',       up:null,dn:null},
  {name:'성급이',  up:'S', dn:'A'},{name:'서두름',     up:'S',dn:'B'},
  {name:'경솔',    up:'S', dn:'C'},{name:'천진난만',   up:'S',dn:'D'},
  {name:'진지',    up:null,dn:null}
];

function spriteUrl(name, no) {
  const v = POKEMON_SPRITES?.[name];
  return v || `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${no}.png`;
}

function showToast(msg) {
  const t = document.getElementById('toastEl');
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._to);
  t._to = setTimeout(() => { t.style.opacity = '0'; }, 2400);
}

function getSaves() {
  try { return JSON.parse(localStorage.getItem('pochams_party_saves') || '[]'); } catch(e) { return []; }
}
function setSaves(saves) { localStorage.setItem('pochams_party_saves', JSON.stringify(saves)); }

function getCurrentParty() {
  try { return JSON.parse(localStorage.getItem('pochams_party') || 'null'); } catch(e) { return null; }
}

function slotHtml(slot, size = 52) {
  if (!slot || slot.pkIdx < 0 || !POKEMON_DATA[slot.pkIdx]) {
    return `<div class="cp-slot cp-slot-empty" style="width:${size}px;height:${size}px">+</div>`;
  }
  const pk = POKEMON_DATA[slot.pkIdx];
  return `<div class="cp-slot" style="width:${size}px;height:${size}px">
    <img src="${spriteUrl(pk.name, pk.no)}" alt="${pk.name}" title="${pk.name}" loading="lazy" style="width:${size-8}px;height:${size-8}px">
  </div>`;
}

function formatDate(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function renderCurrentParty() {
  const slots = getCurrentParty();
  const el = document.getElementById('currentPartySlots');
  const form = document.getElementById('saveForm');

  if (!slots || !slots.some(s => s && s.pkIdx >= 0)) {
    el.innerHTML = `<div class="no-party-msg">파티 구성 페이지에서 파티를 만들면 여기에 표시됩니다.</div>`;
    form.style.display = 'none';
    return;
  }

  el.innerHTML = slots.map(s => slotHtml(s, 56)).join('');
  form.style.display = 'flex';
}

function renderSaves() {
  const saves = getSaves();
  const grid = document.getElementById('partiesGrid');
  const countEl = document.getElementById('saveCount');
  countEl.textContent = `${saves.length}개 저장됨`;

  if (!saves.length) {
    grid.innerHTML = `<div class="empty-state">저장된 파티가 없습니다.<br>현재 파티를 박스에 저장해보세요.</div>`;
    return;
  }

  grid.innerHTML = saves.map((save, i) => {
    const slots = save.slots || [];
    const names = slots
      .filter(s => s && s.pkIdx >= 0 && POKEMON_DATA[s.pkIdx])
      .map(s => POKEMON_DATA[s.pkIdx].name)
      .join(', ');

    return `
    <div class="party-card">
      <div class="pc-header">
        <div class="pc-name">${save.name || '이름 없음'}</div>
        <div class="pc-date">${formatDate(save.savedAt)}</div>
      </div>
      <div class="pc-slots">
        ${slots.map(s => slotHtml(s, 52)).join('')}
      </div>
      <div class="pc-pokemon-names">${names || '(비어 있음)'}</div>
      <div class="pc-actions">
        <button class="pc-btn pc-btn-load" data-idx="${i}">파티 구성에 불러오기</button>
        <button class="pc-btn pc-btn-del"  data-del="${i}">삭제</button>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('savePartyBtn').addEventListener('click', () => {
  const slots = getCurrentParty();
  if (!slots || !slots.some(s => s && s.pkIdx >= 0)) {
    showToast('저장할 파티가 없습니다.');
    return;
  }
  const name = document.getElementById('saveNameInput').value.trim() || `파티 ${getSaves().length + 1}`;
  const saves = getSaves();
  saves.unshift({ id: Date.now(), name, savedAt: Date.now(), slots });
  setSaves(saves);
  document.getElementById('saveNameInput').value = '';
  showToast(`"${name}"을(를) 저장했습니다!`);
  renderSaves();
});

document.getElementById('partiesGrid').addEventListener('click', e => {
  const loadBtn = e.target.closest('[data-idx]');
  const delBtn  = e.target.closest('[data-del]');

  if (loadBtn) {
    const i = +loadBtn.dataset.idx;
    const saves = getSaves();
    if (!saves[i]) return;
    if (!confirm(`"${saves[i].name}" 파티를 불러오시겠습니까?\n현재 파티 구성이 교체됩니다.`)) return;
    localStorage.setItem('pochams_party', JSON.stringify(saves[i].slots));
    window.location.href = 'index.html';
  }

  if (delBtn) {
    const i = +delBtn.dataset.del;
    const saves = getSaves();
    if (!saves[i]) return;
    if (!confirm(`"${saves[i].name}" 파티를 삭제하시겠습니까?`)) return;
    saves.splice(i, 1);
    setSaves(saves);
    showToast('삭제했습니다.');
    renderSaves();
  }
});

renderCurrentParty();
renderSaves();
</script>
</body>
</html>
