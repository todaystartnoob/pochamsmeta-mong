    body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background: var(--purple); min-height: 100vh; transition: background-color .25s ease; }

    .navbar {
      height: 54px; background: var(--navbar-bg);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; box-shadow: 0 2px 10px rgba(0,0,0,.12);
      position: relative; z-index: 20;
    }
    .nav-logo { display:flex;align-items:center; } .nav-logo img { height:46px;object-fit:contain; }
    .nav-links { display: flex; gap: 6px; }
    .nav-links a {
      text-decoration: none; color: var(--text-dim); font-size: 14px;
      padding: 5px 14px; border-radius: 6px; transition: background .2s, color .2s;
    }
    .nav-links a:hover  { background: var(--hover-bg); color: var(--accent); }
    .nav-settings-btn{background:none;border:none;font-size:17px;cursor:pointer;color:var(--text-faint);padding:4px 9px;border-radius:6px;transition:background .15s,color .15s;margin-left:2px;line-height:1;}
    .nav-settings-btn:hover{background:var(--hover-bg);color:var(--accent);}
    .nav-links a.active { background: var(--nav-active-bg); color: var(--nav-active-text); font-weight: 600; }

    .page-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }

    /* ── TOOLBAR ── */
    .toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .toolbar h1 { font-size: 18px; font-weight: 700; color: #fff; }
    .back-btn {
      text-decoration: none; background: rgba(255,255,255,.85); color: var(--accent-dark);
      padding: 5px 12px; border-radius: 7px; font-size: 12px; font-weight: 600;
      transition: background .15s;
    }
    .back-btn:hover { background: #fff; }
    .save-count { font-size: 12px; color: rgba(255,255,255,.85); }

    /* ── CURRENT PARTY SECTION ── */
    .section-card {
      background: var(--card-bg); border-radius: 14px;
      padding: 18px 20px; box-shadow: 0 3px 14px rgba(0,0,0,.1);
    }
    .section-title {
      font-size: 13px; font-weight: 700; color: var(--accent-dark);
      margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
    }
    .section-title-badge {
      background: var(--accent); color: #fff; font-size: 9px; font-weight: 700;
      padding: 2px 8px; border-radius: 10px;
    }

    .current-party-row {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .cp-slots { display: flex; gap: 6px; flex-wrap: wrap; }
    .cp-slot {
      width: 56px; height: 56px; background: var(--slot-bg); border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .cp-slot img { width: 48px; height: 48px; image-rendering: pixelated; object-fit: contain; }
    .cp-slot-empty { background: var(--slot-empty-bg); color: #bbb; font-size: 20px; }

    .save-form { display: flex; gap: 8px; align-items: center; margin-left: auto; flex-wrap: wrap; }
    .save-name-input {
      border: 1.5px solid var(--slot-bg); border-radius: 8px; padding: 7px 12px;
      font-size: 13px; font-family: inherit; outline: none; width: 180px;
      transition: border-color .15s; background: var(--card-bg); color: var(--text-main);
    }
    .save-name-input:focus { border-color: var(--accent); }
    .save-btn {
      background: var(--accent); color: #fff; border: none; padding: 8px 18px;
      border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: background .15s; white-space: nowrap;
    }
    .save-btn:hover { background: var(--accent-dark); }
    .save-btn:disabled { background: #bbb; cursor: default; }

    .pc-rename-btn {
      flex-shrink: 0; background: none; border: 1.5px solid var(--nav-active-bg); color: #9060b8;
      border-radius: 5px; padding: 2px 7px; font-size: 10px; cursor: pointer;
      font-family: inherit; transition: all .14s; line-height: 1.4;
    }
    .pc-rename-btn:hover { background: var(--hover-bg); }
    .pc-rename-inp {
      flex: 1; min-width: 0; border: 1.5px solid var(--accent); border-radius: 6px;
      padding: 3px 8px; font-size: 13px; font-weight: 700; color: var(--card-title);
      font-family: inherit; outline: none; background: var(--card-bg);
    }
    .pc-rename-confirm {
      flex-shrink: 0; background: var(--accent); color: #fff; border: none;
      border-radius: 5px; padding: 3px 9px; font-size: 10px; cursor: pointer;
      font-family: inherit;
    }

    .no-party-msg {
      color: var(--text-mute); font-size: 13px; padding: 8px 0;
    }

    /* ── SAVED PARTIES GRID ── */
    .parties-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 12px;
    }

    .party-card {
      background: var(--card-bg); border-radius: 14px;
      padding: 14px 16px; box-shadow: 0 3px 12px rgba(0,0,0,.1);
      display: flex; flex-direction: column; gap: 10px;
      border: 2px solid transparent; transition: border-color .15s;
    }
    .party-card:hover { border-color: var(--accent); }

    .pc-header { display: flex; align-items: center; gap: 8px; }
    .pc-name {
      font-size: 14px; font-weight: 700; color: var(--card-title); flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .pc-date { font-size: 10px; color: var(--text-mute); flex-shrink: 0; }

    .pc-slots { display: flex; gap: 6px; flex-wrap: wrap; }
    .pc-slot {
      width: 52px; height: 52px; background: var(--slot-bg); border-radius: 9px;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .pc-slot img { width: 44px; height: 44px; image-rendering: pixelated; object-fit: contain; }
    .pc-slot-empty { color: #ccc; font-size: 18px; }

    .pc-pokemon-names {
      font-size: 10px; color: var(--text-mute); line-height: 1.8;
    }

    .pc-actions { display: flex; gap: 6px; }
    .pc-btn {
      flex: 1; padding: 7px 4px; border: none; border-radius: 8px;
      font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit;
      transition: background .15s;
    }
    .pc-btn-load { background: var(--accent); color: #fff; }
    .pc-btn-load:hover { background: var(--accent-dark); }
    .pc-btn-del { background: #fde0e0; color: #c00; }
    .pc-btn-del:hover { background: #f5b8b8; }

    .empty-state {
      grid-column: 1/-1; text-align: center; padding: 48px 20px;
      color: rgba(255,255,255,.8); font-size: 14px; line-height: 2.2;
    }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--accent-dark); color: #fff; padding: 9px 22px;
      border-radius: 20px; font-size: 12px; z-index: 9999;
      pointer-events: none; opacity: 0; transition: opacity .3s;
      white-space: nowrap; box-shadow: 0 4px 14px rgba(0,0,0,.25);
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--scroll-track); border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 3px; }

    /* ── PARTY DETAIL MODAL ── */
    .pd-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 200;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .pd-overlay.open { opacity: 1; pointer-events: all; }
    .pd-card {
      background: var(--card-bg); border-radius: 16px; padding: 18px 20px;
      width: 1060px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 14px 50px rgba(0,0,0,.4);
    }
    .pd-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .pd-title { font-size: 15px; font-weight: 700; color: var(--text-main); }
    .pd-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-mute); }
    .pd-close:hover { color: var(--accent); }
    .pd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .pd-mon { background: var(--slot-bg); border: 1px solid var(--hover-bg); border-radius: 10px; padding: 10px 12px; display: flex; gap: 10px; }
    .pd-mon-empty { display: flex; align-items: center; justify-content: center; color: var(--text-mute); font-size: 12px; }
    .pd-sprite-col { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 84px; }
    .pd-sprite { width: 56px; height: 56px; image-rendering: pixelated; object-fit: contain; }
    .pd-name { font-size: 11px; font-weight: 700; color: var(--text-main); text-align: center; line-height: 1.3; }
    .pd-gender { font-size: 10px; }
    .pd-gender.male { color: #6890F0; }
    .pd-gender.female { color: #F85888; }
    .pd-types { display: flex; gap: 2px; margin-top: 2px; flex-wrap: wrap; justify-content: center; }
    .pd-type-badge { font-size: 7.5px; font-weight: 700; color: #fff; padding: 1px 4px; border-radius: 3px; }
    .pd-info-col { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
    .pd-row { display: flex; gap: 5px; font-size: 10.5px; align-items: baseline; }
    .pd-row-lbl { color: var(--label-muted); flex-shrink: 0; min-width: 30px; }
    .pd-row-val { color: var(--text-main); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pd-moves { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; margin-top: 2px; }
    .pd-move { display: flex; align-items: center; gap: 4px; font-size: 9.5px; padding: 2px 5px; border-radius: 4px; background: var(--slot-bg); color: var(--text-main); overflow: hidden; }
    .pd-move-type { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .pd-move-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pd-ev-chip { font-size: 9px; background: var(--hover-bg); color: var(--accent); border-radius: 3px; padding: 1px 5px; margin-right: 3px; }
    @media (max-width: 700px) {
      .pd-grid { grid-template-columns: 1fr; }
      .pd-card { padding: 14px 14px; }
    }

    /* ── RESPONSIVE ── */
    @media (max-width:1280px),(pointer:coarse){
      .navbar{height:48px;padding:0 16px;}
      .nav-logo img{height:36px;}
      .nav-links a{padding:5px 8px;font-size:11.5px;}
    }
    @media (max-width:1024px),(pointer:coarse){
      .page-body{padding:12px 14px;gap:12px;}
      .section-card{padding:14px 14px;}
      .current-party-row{flex-direction:column;align-items:flex-start;gap:10px;}
      /* both .cp-slots and .pc-slots use .cp-slot internally (from slotHtml()) */
      .cp-slots,.pc-slots{display:grid!important;grid-template-columns:repeat(6,1fr);gap:5px;width:100%;}
      .cp-slot{width:auto!important;height:auto!important;aspect-ratio:1;}
      .cp-slot img{width:80%!important;height:80%!important;}
      .save-form{margin-left:0;width:100%;flex-wrap:nowrap;}
      .save-name-input{flex:1;min-width:0;width:auto;}
      .parties-grid{grid-template-columns:1fr;}
      .cp-slots .no-party-msg{grid-column:1/-1;}
    }
    @media (max-width:380px){
      .cp-slots,.pc-slots{grid-template-columns:repeat(3,1fr)!important;}
    }
    @media (max-width:480px) {
      .navbar { padding:0 10px; }
      .nav-links a { padding:4px 6px; font-size:11px; }
    }

    /* ── SETTINGS MODAL ── */
    .nav-logo{cursor:pointer;}
    .nav-logo img{transition:transform .2s cubic-bezier(.34,1.56,.64,1);}
    .nav-logo:hover img{transform:scale(1.1);}
    .set-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
    .set-overlay.open{opacity:1;pointer-events:all;}
    .set-box{background:var(--card-bg);border-radius:14px;padding:18px 20px;width:380px;max-width:92vw;max-height:84vh;overflow-y:auto;box-shadow:0 12px 44px rgba(0,0,0,.3);}
    .set-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .set-title{font-size:15px;font-weight:700;color:var(--text-main);}
    .set-x{background:none;border:none;font-size:17px;cursor:pointer;color:var(--text-faint);transition:color .15s;}
    .set-x:hover{color:#c00;}
    .set-section{margin-bottom:16px;}
    .set-section:last-child{margin-bottom:0;}
    .set-lbl{font-size:11px;font-weight:700;color:var(--label-muted);letter-spacing:.4px;margin-bottom:6px;}
    .set-sel{width:100%;padding:7px 10px;border:1.5px solid var(--slot-bg);border-radius:7px;font-size:13px;font-family:inherit;background:var(--hover-bg);color:var(--text-soft);cursor:pointer;}
    .set-sel option{background:var(--card-bg);color:var(--text-main);}
    .set-sel:disabled{cursor:not-allowed;}
    .set-danger-btn{width:100%;padding:8px;border:1.5px solid #f0b0b0;border-radius:7px;background:#fff5f5;color:#c44;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;}
    .set-danger-btn:hover{background:#ffe5e5;}
    .set-desc{font-size:10.5px;color:#999;margin-top:5px;line-height:1.5;}
    .set-email{font-size:12px;color:var(--accent);text-decoration:none;font-weight:600;}
    .set-email:hover{text-decoration:underline;}
</style>
</head>
<body>

<nav class="navbar">

<script>
/* ── i18n (한/영/일) — 메인 스크립트보다 먼저 정의되어야 함 ── */
let I18N = null;
function detectDefaultLang() {
  const saved = localStorage.getItem('lang');
  if (saved) return saved;
  const nav = (navigator.language || navigator.userLanguage || '').toLowerCase();
  if (nav.startsWith('ko')) return 'ko';
  if (nav.startsWith('ja')) return 'ja';
  if (nav.startsWith('en')) return 'en';
  return 'en';
}
let LANG = detectDefaultLang();

async function loadI18n() {
  try { I18N = await fetch('i18n_names.json').then(r => r.json()); }
  catch (e) { console.error('i18n_names.json fetch 실패:', e); I18N = null; }
}

function pokeName(koName, dexNo) {
  if (LANG === 'ko' || !I18N || !koName) return koName;
  const full = I18N.pokemonFullNames && I18N.pokemonFullNames[koName];
  if (full && full[LANG]) return full[LANG];
  const p = I18N.pokemon[String(dexNo)];
  if (!p) return koName;
  const base = p[LANG] || p.ko;
  let workingName = koName;
  let megaPrefix = '';
  if (workingName.startsWith('메가') && workingName.slice(2).startsWith(p.ko)) {
    megaPrefix = LANG === 'ja' ? 'メガ' : 'Mega ';
    workingName = workingName.slice(2);
  }
  let result = megaPrefix + workingName.split(p.ko).join(base);
  /* 괄호 접미사 폼 (예: 아르세우스(강철), 디아루가(오리진폼)) */
  const suffixMatch = result.match(/\(([^)]+)\)$/);
  if (suffixMatch) {
    const formKo = suffixMatch[1];
    const src = I18N.forms[formKo] || I18N.types[formKo];
    const formTrans = src && src[LANG];
    if (formTrans) result = result.slice(0, suffixMatch.index) + '(' + formTrans + ')';
  }
  for (const formKo in I18N.forms) {
    if (result.includes(formKo)) {
      const f = (I18N.forms[formKo][LANG] || formKo) + ' ';
      result = result.split(formKo).join(f);
    }
  }
  return result.replace(/\s+/g, ' ').trim();
}

const LOC_MAP_FIELD = {items:'item_ja2ko', abilities:'ability_ja2ko', moves:'move_ja2ko', natures:'nature_ja2ko'};
function normKoName(category, koName) {
  if (typeof CHAMPIONS_LOC_MAP !== 'undefined') {
    const field = LOC_MAP_FIELD[category];
    const fixed = field && CHAMPIONS_LOC_MAP[field]?.[koName];
    if (fixed) return fixed;
  }
  return koName;
}
function term(category, koName) {
  if (!koName) return koName;
  koName = normKoName(category, koName);
  if (LANG === 'ko' || !I18N) return koName;
  const m = I18N[category]?.[koName];
  return (m && m[LANG]) || koName;
}
function termDesc(category, koName, koDesc) {
  if (LANG === 'ko' || !koName || !I18N) return koDesc;
  koName = normKoName(category, koName);
  const m = I18N[category]?.[koName];
  if (!m) return koDesc;
  const d = LANG === 'en' ? m.descEn : LANG === 'ja' ? m.descJa : null;
  return d || koDesc;
}

function t(key, vars) {
  if (!I18N) return key;
  const e = I18N.ui[key];
  let s = (e && (e[LANG] || e.ko)) || key;
  if (vars) for (const k in vars) s = s.replace(`{${k}}`, vars[k]);
  return s;
}
</script>

  {name:'변덕',      up:null, dn:null},

  /* +Spe */
  {name:'겁쟁이',    up:'S',  dn:'A'},
  {name:'성급',      up:'S',  dn:'B'},
  {name:'명랑',      up:'S',  dn:'C'},
  {name:'천진난만',  up:'S',  dn:'D'},
  {name:'성실',      up:null, dn:null},
];
const TYPE_COLORS = {
  '노말':'#9A9A7A','불꽃':'#F08030','물':'#6890F0','풀':'#78C850',
  '전기':'#F8C600','얼음':'#98D8D8','격투':'#C03028','독':'#A040A0',
  '땅':'#C8A840','비행':'#A890F0','에스퍼':'#F85888','벌레':'#A8B820',
  '바위':'#B8A038','고스트':'#705898','드래곤':'#7038F8','악':'#6B5040',
  '강철':'#A8A8C0','페어리':'#EE99AC'
};

function spriteUrl(name, no) {
  const v = POKEMON_SPRITES?.[name];
  return v || `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${no}.png`;
}

function showToast(msg) {
  const t = document.getElementById('toastEl');
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._to);
  t._to = setTimeout(() => { t.style.opacity = '0'; }, 2400);
}

function getSaves() {
  try { return JSON.parse(localStorage.getItem('pochams_party_saves') || '[]'); } catch(e) { return []; }
}
function setSaves(saves) { localStorage.setItem('pochams_party_saves', JSON.stringify(saves)); }

function getCurrentParty() {
  try { return JSON.parse(localStorage.getItem('pochams_party') || 'null'); } catch(e) { return null; }
}

function slotHtml(slot, size = 52) {
  if (!slot || slot.pkIdx < 0 || !POKEMON_DATA[slot.pkIdx]) {
    return `<div class="cp-slot cp-slot-empty" style="width:${size}px;height:${size}px">+</div>`;
  }
  const pk = POKEMON_DATA[slot.pkIdx];
  const dispName = pokeName(pk.name, pk.no);
  return `<div class="cp-slot" style="width:${size}px;height:${size}px">
    <img src="${spriteUrl(pk.name, pk.no)}" alt="${dispName}" title="${dispName}" loading="lazy" style="width:${size-8}px;height:${size-8}px">
  </div>`;
}

function formatDate(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function renderCurrentParty() {
  const slots = getCurrentParty();
  const el = document.getElementById('currentPartySlots');
  const form = document.getElementById('saveForm');

  if (!slots || !slots.some(s => s && s.pkIdx >= 0)) {
    el.innerHTML = `<div class="no-party-msg">${t('no_party_msg')}</div>`;
    form.style.display = 'none';
    return;
  }

  el.innerHTML = slots.map(s => slotHtml(s, 56)).join('');
  form.style.display = 'flex';
}

function renderSaves() {
  const saves = getSaves();
  const grid = document.getElementById('partiesGrid');
  const countEl = document.getElementById('saveCount');
  countEl.textContent = t('saves_count', {n: saves.length});

  if (!saves.length) {
    grid.innerHTML = `<div class="empty-state">${t('empty_saves_msg')}</div>`;
    return;
  }

  grid.innerHTML = saves.map((save, i) => {
    const slots = save.slots || [];
    const names = slots
      .filter(s => s && s.pkIdx >= 0 && POKEMON_DATA[s.pkIdx])
      .map(s => pokeName(POKEMON_DATA[s.pkIdx].name, POKEMON_DATA[s.pkIdx].no))
      .join(', ');

    return `
    <div class="party-card">
      <div class="pc-header">
        <div class="pc-name">${dispPartyName(save.name)}</div>
        <button class="pc-rename-btn" data-rename="${i}">✏</button>
        <div class="pc-date">${formatDate(save.savedAt)}</div>
      </div>
      <div class="pc-slots" data-view="${i}" style="cursor:pointer" title="${t('party_detail_title')}">
        ${slots.map(s => slotHtml(s, 52)).join('')}
      </div>
      <div class="pc-pokemon-names" data-view="${i}" style="cursor:pointer">${names || t('empty_parens')}</div>
      <div class="pc-actions">
        <button class="pc-btn pc-btn-load" data-idx="${i}">${t('load_to_party_builder_btn')}</button>
        <button class="pc-btn pc-btn-del"  data-del="${i}">${t('delete_btn')}</button>
      </div>
    </div>`;
  }).join('');
}

function dispPartyName(name) { return (!name || name === '이름 없음') ? t('unnamed_party') : name; }

/* ── 파티 상세보기 모달 ── */
function buildMonDetailHtml(slot) {
  if (!slot || slot.pkIdx == null || slot.pkIdx < 0 || !POKEMON_DATA[slot.pkIdx]) {
    return `<div class="pd-mon pd-mon-empty">${t('no_pokemon')}</div>`;
  }
  const pk = POKEMON_DATA[slot.pkIdx];
  const dispName = pokeName(pk.name, pk.no);
  const it = (slot.itIdx >= 0 && typeof ITEM_DATA !== 'undefined' && ITEM_DATA[slot.itIdx]) ? ITEM_DATA[slot.itIdx] : null;
  const nat = (slot.natIdx >= 0 && NATURES[slot.natIdx]) ? NATURES[slot.natIdx] : null;
  const ability = slot.ability || null;
  const moves = (slot.moves || []).map(mi => (mi >= 0 && typeof MOVE_DATA !== 'undefined' && MOVE_DATA[mi]) ? MOVE_DATA[mi] : null);
  const evs = slot.evs || {};
  const evStr = ['H','A','B','C','D','S'].filter(k => evs[k] > 0).map(k => `${k}:${evs[k]}`).join(' ');

  const genderIcon = slot.gender === '♂' ? `<span class="pd-gender male">♂</span>` : slot.gender === '♀' ? `<span class="pd-gender female">♀</span>` : '';
  const typesHtml = [pk.type1, pk.type2].filter(Boolean).map(tp =>
    `<span class="pd-type-badge" style="background:${TYPE_COLORS[tp]||'#888'}">${term('types', tp)}</span>`
  ).join('');
  const movesHtml = [0,1,2,3].map(i => {
    const mv = moves[i];
    if (!mv) return `<div class="pd-move"><span class="pd-move-name" style="opacity:.4">${t('no_move_set')}</span></div>`;
    return `<div class="pd-move"><span class="pd-move-type" style="background:${TYPE_COLORS[mv.type]||'#888'}"></span><span class="pd-move-name">${term('moves', mv.name)}</span></div>`;
  }).join('');

  return `
  <div class="pd-mon">
    <div class="pd-sprite-col">
      <img class="pd-sprite" src="${spriteUrl(pk.name, pk.no)}" alt="${dispName}">
      <div class="pd-name">${slot.nickname || dispName}${genderIcon}</div>
      <div class="pd-types">${typesHtml}</div>
    </div>
    <div class="pd-info-col">
      <div class="pd-row"><span class="pd-row-lbl">${t('item')}</span><span class="pd-row-val">${it ? term('items', it.name) : t('item_none')}</span></div>
      <div class="pd-row"><span class="pd-row-lbl">${t('ability')}</span><span class="pd-row-val">${ability ? term('abilities', ability.name) : t('ability_none')}</span></div>
      <div class="pd-row"><span class="pd-row-lbl">${t('nature')}</span><span class="pd-row-val">${nat ? term('natures', nat.name) : t('nature_none')}</span></div>
      ${evStr ? `<div class="pd-row"><span class="pd-row-lbl">${t('evs')}</span><span class="pd-row-val">${evStr}</span></div>` : ''}
      <div class="pd-moves">${movesHtml}</div>
    </div>
  </div>`;
}

function openPartyDetail(saveIdx) {
  const saves = getSaves();
  const save = saves[saveIdx];
  if (!save) return;
  document.getElementById('pdTitle').textContent = dispPartyName(save.name);
  const slots = save.slots || [];
  document.getElementById('pdGrid').innerHTML = Array.from({length: 6}, (_, i) => buildMonDetailHtml(slots[i])).join('');
  document.getElementById('pdOverlay').classList.add('open');
}
function closePartyDetail() { document.getElementById('pdOverlay').classList.remove('open'); }
document.getElementById('pdCloseBtn').addEventListener('click', closePartyDetail);
document.getElementById('pdOverlay').addEventListener('click', e => { if (e.target === document.getElementById('pdOverlay')) closePartyDetail(); });

document.getElementById('savePartyBtn').addEventListener('click', () => {
  const slots = getCurrentParty();
  if (!slots || !slots.some(s => s && s.pkIdx >= 0)) {
    showToast(t('no_party_to_save_toast'));
    return;
  }
  const name = document.getElementById('saveNameInput').value.trim() || t('party_n', {n: getSaves().length + 1});
  const saves = getSaves();
  saves.unshift({ id: Date.now(), name, savedAt: Date.now(), slots });
  setSaves(saves);
  document.getElementById('saveNameInput').value = '';
  showToast(t('saved_party_toast', {name}));
  renderSaves();
});

document.getElementById('partiesGrid').addEventListener('click', e => {
  const viewTrigger = e.target.closest('[data-view]');
  if (viewTrigger) { openPartyDetail(+viewTrigger.dataset.view); return; }
  const renameBtn = e.target.closest('.pc-rename-btn');
  if (renameBtn) {
    const i = +renameBtn.dataset.rename;
    const header = renameBtn.closest('.pc-header');
    const nameEl = header.querySelector('.pc-name');
    const inp = document.createElement('input');
    inp.type = 'text'; inp.className = 'pc-rename-inp';
    const curName = getSaves()[i]?.name;
    inp.value = (!curName || curName === '이름 없음') ? '' : curName;
    inp.maxLength = 20; inp.dataset.editIdx = i;
    nameEl.replaceWith(inp);
    inp.focus(); inp.select();
    renameBtn.textContent = t('save_btn'); renameBtn.className = 'pc-rename-confirm';
    renameBtn.removeAttribute('data-rename'); renameBtn.dataset.confirmIdx = i;
    const doSave = () => {
      const newName = inp.value.trim() || '이름 없음';
      const saves = getSaves();
      if (saves[i]) { saves[i].name = newName; setSaves(saves); }
      renderSaves();
    };
    inp.addEventListener('keydown', ev => { if (ev.key === 'Enter') doSave(); if (ev.key === 'Escape') renderSaves(); });
    inp.addEventListener('blur', () => setTimeout(() => { if (document.contains(inp)) doSave(); }, 200));
    return;
  }
  const confirmBtn = e.target.closest('.pc-rename-confirm');
  if (confirmBtn) {
    const i = +confirmBtn.dataset.confirmIdx;
    const inp = confirmBtn.closest('.pc-header').querySelector('.pc-rename-inp');
    const newName = (inp ? inp.value.trim() : '') || '이름 없음';
    const saves = getSaves();
    if (saves[i]) { saves[i].name = newName; setSaves(saves); }
    renderSaves(); return;
  }

  const loadBtn = e.target.closest('[data-idx]');
  const delBtn  = e.target.closest('[data-del]');

  if (loadBtn) {
    const i = +loadBtn.dataset.idx;
    const saves = getSaves();
    if (!saves[i]) return;
    if (!confirm(t('confirm_load_party', {name: dispPartyName(saves[i].name)}))) return;
    localStorage.setItem('pochams_party', JSON.stringify(saves[i].slots));
    window.location.href = 'index.html';
  }

  if (delBtn) {
    const i = +delBtn.dataset.del;
    const saves = getSaves();
    if (!saves[i]) return;
    if (!confirm(t('confirm_delete_party', {name: dispPartyName(saves[i].name)}))) return;
    saves.splice(i, 1);
    setSaves(saves);
    showToast(t('generic_deleted_toast'));
    renderSaves();
  }
});

renderCurrentParty();
renderSaves();

  { id: 'eevee',    name: '이브이',     no: 133 },

  { id: 'flareon',  name: '부스터',     no: 136 },
  { id: 'espeon',   name: '에브이',     no: 196 },
  { id: 'umbreon',  name: '블래키',     no: 197 },
  { id: 'leafeon',  name: '리피아',     no: 470 },
  { id: 'glaceon',  name: '글레이시아', no: 471 },
  { id: 'sylveon',  name: '님피아',     no: 700 },
];
function applyTheme(themeId) {
  if (themeId) document.documentElement.setAttribute('data-theme', themeId);
  else document.documentElement.removeAttribute('data-theme');
}
function detectDefaultTheme() {
  const saved = localStorage.getItem('pochams_theme');
  if (saved !== null) return saved;
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) return 'umbreon';
  return '';
}
applyTheme(detectDefaultTheme());

loadI18n().then(applyNavSettingsLabels);
</script>
<script>
(function initSettingsModal() {
  const overlay = document.getElementById('setOverlay');
  const logo = document.querySelector('.nav-logo');
  const closeBtn = document.getElementById('setCloseBtn');
  const clearBtn = document.getElementById('setClearBtn');
  const langSel = document.getElementById('setLangSel');
  if (!overlay || !logo) return;
  document.getElementById('navSettingsBtn')?.addEventListener('click', () => overlay.classList.add('open'));
  closeBtn?.addEventListener('click', () => overlay.classList.remove('open'));
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
  clearBtn?.addEventListener('click', () => {
    if (!confirm(t('confirm_clear_all_data'))) return;
    Object.keys(localStorage).filter(k => k.startsWith('pochams_')).forEach(k => localStorage.removeItem(k));
    alert(t('alert_data_cleared'));
    location.reload();
  });
  if (langSel) {
    langSel.value = typeof LANG !== 'undefined' ? LANG : (localStorage.getItem('lang') || 'ko');
    langSel.addEventListener('change', () => {
      localStorage.setItem('lang', langSel.value);
      LANG = langSel.value;
      applyNavSettingsLabels();
    });
  }
  const themeSel = document.getElementById('setThemeSel');
  if (themeSel) {
    THEME_DEFS.forEach(theme => {
      const o = document.createElement('option');
      o.value = theme.id;
      o.textContent = pokeName(theme.name, theme.no) + ' ' + t('theme_lbl');
      o.dataset.koName = theme.name;
      o.dataset.no = theme.no;
      themeSel.appendChild(o);
    });
    themeSel.value = document.documentElement.getAttribute('data-theme') || '';
    themeSel.addEventListener('change', () => {
      localStorage.setItem('pochams_theme', themeSel.value);
      applyTheme(themeSel.value);
    });
  }
})();
</script>
</body>
