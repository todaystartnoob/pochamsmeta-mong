    if (ec) ec.style.opacity = '';
    requestAnimationFrame(() => {
      _PANEL_IDS.forEach(id => document.getElementById(id)?.classList.add('visible'));

   RENDER DETAIL CARD
════════════════════════════ */
function renderDetail(idx) {
  const mem    = party[idx];
  const pk     = mem.pokemon;
  if (!pk) return;

  const evs    = mem.evs;
  const nature = mem.nature;
  const stats  = ['H','A','B','C','D','S'];
  const bases  = {H:pk.H,A:pk.A,B:pk.B,C:pk.C,D:pk.D,S:pk.S};

  const eff  = applyAbilityDefEff(defEffectiveness(pk.type1, pk.type2||null), mem.ability);
  const x4   = ALL_TYPES.filter(t => eff[t]===4);
  const x2   = ALL_TYPES.filter(t => eff[t]===2);
  const x1   = ALL_TYPES.filter(t => eff[t]===1);
  const x05  = ALL_TYPES.filter(t => eff[t]===0.5);
  const x025 = ALL_TYPES.filter(t => eff[t]===0.25);
  const x0   = ALL_TYPES.filter(t => eff[t]===0);

  const dur     = calcDurability(pk, evs, nature, mem.item);
  const evTotal = totalEVs(evs);

  // Stat grade panel
  const POW_BREAKS = [18000, 28000, 38000, 48000];
  const DUR_BREAKS = [30000, 42500, 55000, 75000];
  const SPD_BREAKS = [106, 136, 161, 181];
  const physMvs  = (mem.moves||[]).filter(m=>m&&m.category==='물리');
  const specMvs  = (mem.moves||[]).filter(m=>m&&m.category==='특수');
  const statMvs  = (mem.moves||[]).filter(m=>m&&m.category==='변화');
  const physPow = physMvs.length ? Math.max(...physMvs.map(m=>calcDecisivePower(pk,evs,m,nature,mem.item,mem.ability))) : 0;
  const specPow = specMvs.length ? Math.max(...specMvs.map(m=>calcDecisivePower(pk,evs,m,nature,mem.item,mem.ability))) : 0;
  const speedStat = Math.floor(calcStat(pk.S, evs.S, false, natMult(nature,'S')) * getItemStatMult(mem.item, pk, 'S') * getAbilityStatMult(mem.ability, 'S'));
  const physPowG = physPow>0 ? getStatGrade(physPow, POW_BREAKS) : null;
  const specPowG = specPow>0 ? getStatGrade(specPow, POW_BREAKS) : null;
  const physDurG = getStatGrade(dur.phys, DUR_BREAKS);
  const specDurG = getStatGrade(dur.spec, DUR_BREAKS);
  const speedG   = getStatGrade(speedStat, SPD_BREAKS);
  const avgDur = (dur.phys+dur.spec)/2;
  const maxPow = Math.max(physPow, specPow);
  const damagingMvCnt = physMvs.length + specMvs.length;
  const speedTag = speedStat>=161?t('speed_high'):speedStat>=136?t('speed_mid'):t('speed_low');
  const durTag   = avgDur>=55000?t('dur_high'):avgDur>=42500?t('dur_mid'):t('dur_low');
  let roleTag;
  if (physPow===0&&specPow===0)                           roleTag=t('role_support');
  else if (statMvs.length>damagingMvCnt&&maxPow<28000)   roleTag=t('role_support');
  else if (physPow>0&&specPow===0)    roleTag=t('role_phys_attacker');
  else if (specPow>0&&physPow===0)    roleTag=t('role_spec_attacker');
  else if (physPow>=specPow*1.25)     roleTag=t('role_phys_attacker');
  else if (specPow>=physPow*1.25)     roleTag=t('role_spec_attacker');
  else                                roleTag=t('role_mixed');
  if      (avgDur>=75000&&maxPow<38000) roleTag=t('role_tank');
  else if (avgDur>=55000&&maxPow<28000) roleTag=t('role_tank');
  const archetype = `${speedTag} ${durTag} ${roleTag}`;

  const typeBadges = [pk.type1, pk.type2].filter(Boolean)
    .map(tp => `<span class="type-mini-badge" style="background:${TYPE_COLORS[tp]}">${term('types', tp)}</span>`)
    .join('');

  const statRows = stats.map(s => {
    const base   = bases[s];
    const isHP   = s==='H';
    const nm     = isHP ? 1 : natMult(nature, s);
    const actual = calcStat(base, evs[s], isHP, nm);
    const pct    = Math.min(100, base/200*100).toFixed(1);
    const lblCls = isHP ? '' : (nature?.up===s ? ' nat-up' : nature?.dn===s ? ' nat-dn' : '');
    return `
    <div class="stat-row">
      <span class="stat-lbl${lblCls}">${s}</span>
      <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${pct}%;background:${statColor(base)};"></div></div>
      <span class="stat-actual${lblCls}">${actual}</span>
      <span class="stat-base">(${base})</span>
      <input class="ev-input" autocomplete="off" type="number" min="0" max="32" value="${evs[s]||0}" data-stat="${s}" data-slot="${idx}">
    </div>`;

function updateMobChartView() {
  const view = document.getElementById('mobChartView');
  const card = document.getElementById('detailCard');
  if (!view) return;
  const hasDetail = card && card.innerHTML.trim().length > 0;
  if (hasDetail) {
    view.classList.add('hidden');
  } else {
    view.classList.remove('hidden');
  }
}

function cardClickHandler(e) {
  if (e.target.id === 'detailCloseBtn') {
    selectedSlot=-1; localStorage.setItem('pochams_selected',-1); hidePanel(); renderSlots();
    return;
  }
  /* 성별 버튼 (3-tab 방식) */
  const gBtn = e.target.closest('[data-gender-slot]');
  if (gBtn) {
    const slotIdx = +gBtn.dataset.genderSlot;
    const newGender = gBtn.dataset.gender || null;
    party[slotIdx].gender = newGender;
    /* 성별 폼 전환 */
    const pair = GENDER_FORM_MAP[party[slotIdx].pokemon?.name];
    if (pair && newGender) {
      const targetName = newGender === '♂' ? pair.male : pair.female;
      const newPk = POKEMON_DATA.find(p => p.name === targetName);
      if (newPk) {
        party[slotIdx].pokemon = newPk;
        const abd = ABILITY_DATA?.[newPk.name];
        party[slotIdx].ability = abd?.normal?.[0] || null;
      }
    }
    saveParty();
    renderSlots();
    renderDetail(slotIdx);
    return;
  }
  const btn = e.target.closest('.poke-img-col[data-action], .cfg-row[data-action], .move-row[data-mi], .btn-chg, .btn-box-action[data-action]');
  if (!btn) return;
  const slotIdx = +btn.dataset.slot;
  const action  =  btn.dataset.action;
  const mi      =  btn.dataset.mi;
  if (action==='changePoke')          openPokeModal(slotIdx);
  else if (action==='changeItem')     openItemModal(slotIdx);
  else if (action==='changeAbility')  openAbilityModal(slotIdx);
  else if (action==='changeNature')   openNatureModal(slotIdx);
  else if (action==='boxSave')        saveToBox(slotIdx);
  else if (action==='boxLoad')        openBoxModal(slotIdx);
  else if (mi!==undefined)            openMoveModal(slotIdx, +mi);
}

function updateSGPanel(idx) {
  const mem = party[idx];
  const pk  = mem?.pokemon;
  if (!pk) return;
  const evs = mem.evs, nature = mem.nature;

  const POW_BREAKS = [18000, 28000, 38000, 48000];
  const DUR_BREAKS = [30000, 42500, 55000, 75000];
  const SPD_BREAKS = [106, 136, 161, 181];

  const dur = calcDurability(pk, evs, nature, mem.item);
  const physEl = document.getElementById('durPhys');
  const specEl = document.getElementById('durSpec');
  if (physEl) physEl.textContent = dur.phys.toLocaleString();
  if (specEl) specEl.textContent = dur.spec.toLocaleString();

  const physMvs  = (mem.moves||[]).filter(m=>m&&m.category==='물리');
  const specMvs  = (mem.moves||[]).filter(m=>m&&m.category==='특수');
  const statMvs  = (mem.moves||[]).filter(m=>m&&m.category==='변화');
  const physPow = physMvs.length ? Math.max(...physMvs.map(m=>calcDecisivePower(pk,evs,m,nature,mem.item,mem.ability))) : 0;
  const specPow = specMvs.length ? Math.max(...specMvs.map(m=>calcDecisivePower(pk,evs,m,nature,mem.item,mem.ability))) : 0;
  const speedStat = Math.floor(calcStat(pk.S, evs.S, false, natMult(nature,'S')) * getItemStatMult(mem.item, pk, 'S') * getAbilityStatMult(mem.ability, 'S'));

  const physPowG = physPow>0 ? getStatGrade(physPow, POW_BREAKS) : null;
  const specPowG = specPow>0 ? getStatGrade(specPow, POW_BREAKS) : null;
  const physDurG = getStatGrade(dur.phys, DUR_BREAKS);
  const specDurG = getStatGrade(dur.spec, DUR_BREAKS);
  const speedG   = getStatGrade(speedStat, SPD_BREAKS);

  const avgDur   = (dur.phys+dur.spec)/2;
  const maxPow = Math.max(physPow, specPow);
  const damagingMvCnt = physMvs.length + specMvs.length;
  const speedTag = speedStat>=161?'고스핏':speedStat>=136?'중스핏':'저스핏';
  const durTag   = avgDur>=55000?'고내구':avgDur>=42500?'중내구':'저내구';
  let roleTag;
  if (physPow===0&&specPow===0)                           roleTag='지원형';
  else if (statMvs.length>damagingMvCnt&&maxPow<28000)   roleTag='지원형';
  else if (physPow>0&&specPow===0)    roleTag='물리 어태커';
  else if (specPow>0&&physPow===0)    roleTag='특수 어태커';
  else if (physPow>=specPow*1.25)     roleTag='물리 어태커';
  else if (specPow>=physPow*1.25)     roleTag='특수 어태커';
  else                                roleTag='쌍두형';
  if      (avgDur>=75000&&maxPow<38000) roleTag='탱커';
  else if (avgDur>=55000&&maxPow<28000) roleTag='탱커';

  const arcEl = document.querySelector('.sg-archetype');
  if (arcEl) arcEl.textContent = `${speedTag} ${durTag} ${roleTag}`;

  const grades = [physPowG, physDurG, speedG, specPowG, specDurG];
  document.querySelectorAll('.sg-val').forEach((el, i) => {
    const g = grades[i];
    el.className = `sg-val ${g?.cls||'sg-na'}`;
    el.textContent = g?.label||'—';
  });
}

function evChangeHandler(e) {
  const inp = e.target.closest('.ev-input');
  if (!inp) return;
  const slotIdx = +inp.dataset.slot;
  const stat    =  inp.dataset.stat;
  let val = Math.min(32, Math.max(0, +inp.value||0));

  const mem  = party[slotIdx];
  const evs  = mem.evs;
  const others = totalEVs(evs) - (evs[stat]||0);
  if (others + val > 66) val = 66 - others;
  inp.value = val;
  mem.evs[stat] = val;

  /* update stat display without full re-render */
  const statRow    = inp.closest('.stat-row');
  const actualSpan = statRow.querySelector('.stat-actual');
  const pk         = mem.pokemon;
  const bases      = {H:pk.H,A:pk.A,B:pk.B,C:pk.C,D:pk.D,S:pk.S};
  const isHP       = stat==='H';
  const nm         = isHP ? 1 : natMult(mem.nature, stat);
  actualSpan.textContent = calcStat(bases[stat], val, isHP, nm);

  const dispEl = document.getElementById('evTotalDisp');
  if (dispEl) dispEl.textContent = totalEVs(mem.evs);

  /* update durability + sg panel */
  updateSGPanel(slotIdx);

  /* update move decisive power */
  document.querySelectorAll('.move-power-txt').forEach((el, mi) => {
    const mv = mem.moves[mi];
    const dp = mv ? calcDecisivePower(pk, mem.evs, mv, mem.nature, mem.item, mem.ability) : 0;
    el.textContent = '결정력 : ' + (dp||'-');
  });
  updateAnalysis(slotIdx);
  if (window.dcSyncFromSlot) window.dcSyncFromSlot(slotIdx);
  if (window.scSyncFromSlot) window.scSyncFromSlot(slotIdx);
  renderSpeedRankList();
  saveParty();
}

function updateAnalysis(idx) {
  const pk    = party[idx].pokemon;
  const moves = party[idx].moves;
  if (!pk) return;

  const defEff = applyAbilityDefEff(defEffectiveness(pk.type1, pk.type2||null), party[idx].ability);
  const badge  = (tp, label) => `<span class="type-badge" style="background:${TYPE_COLORS[tp]||'#888'}">${label||term('types', tp)}</span>`;
  const row    = (lbl, color, html) =>
    html ? `<div class="chart-row"><span class="chart-lbl" style="color:${color}">${lbl}</span><div class="chart-types">${html}</div></div>` : '';

  /* ── 방어 상성 ── */
  const x4  = ALL_TYPES.filter(t=>defEff[t]===4);
  const x2  = ALL_TYPES.filter(t=>defEff[t]===2);
  const x05 = ALL_TYPES.filter(t=>defEff[t]===0.5);
  const x025= ALL_TYPES.filter(t=>defEff[t]===0.25);
  const x0  = ALL_TYPES.filter(t=>defEff[t]===0);

  document.getElementById('anaDefChart').innerHTML =
    row('×4',  '#c62828', x4.map(tp=>badge(tp)).join('')) +
    row('×2',  '#e65100', x2.map(tp=>badge(tp)).join('')) +
    row('½',   '#2e7d32', x05.map(tp=>badge(tp)).join('')) +
    row('¼',   '#1b5e20', x025.map(tp=>badge(tp)).join('')) +
    row(t('immune'), '#37474f', x0.map(tp=>badge(tp)).join('')) ||
    `<span class="chart-empty">${t('no_matchup')}</span>`;

  /* ── 공격 상성 ── */
  const powermoves = moves.filter(mv => mv?.power && mv.category!=='변화');

  if (!powermoves.length) {
    document.getElementById('anaAtkChart').innerHTML = `<span class="chart-empty">${t('no_moves_set')}</span>`;
    return;
  }

  const mem2 = party[idx];
  const bestEff = {};
  ALL_TYPES.forEach(def => {
    bestEff[def] = Math.max(0, ...powermoves.map(mv => {
      const et = getMoveEffectiveType(pk, mv, mem2.item, mem2.ability);
      return ATK_CHART[et]?.[def] ?? 1;
    }));
  });

  const a2  = ALL_TYPES.filter(t=>bestEff[t]>=4);
  const a2n = ALL_TYPES.filter(t=>bestEff[t]===2);
  const a05 = ALL_TYPES.filter(t=>bestEff[t]===0.5);
  const a0  = ALL_TYPES.filter(t=>bestEff[t]===0);

  document.getElementById('anaAtkChart').innerHTML =
    row('×4↑',  '#c62828', a2.map(t=>badge(t)).join('')) +
    row('×2',   '#e65100', a2n.map(t=>badge(t)).join('')) +
    row('½↓',   '#2e7d32', a05.map(t=>badge(t)).join('')) +
    row(t('immune'),  '#37474f', a0.map(t2=>badge(t2)).join('')) ||
    `<span class="chart-empty">${t('none')}</span>`;

}

function buildTypeChartHTML(slots) {
  if (!slots.length) return '';
  const effs = slots.map(s => applyAbilityDefEff(defEffectiveness(s.pokemon.type1, s.pokemon.type2||null), s.ability));
  const headerHTML = slots.map(s =>
    `<div class="ptc-th" title="${pokeName(s.pokemon.name, s.pokemon.no)}"><img src="${spriteUrl(s.pokemon.name, s.pokemon.no)}" alt="${pokeName(s.pokemon.name, s.pokemon.no)}"></div>`
  ).join('');
  const rowsHTML = ALL_TYPES.map(atkType => {
    const cells = effs.map(eff => {
      const m = eff[atkType];
      let cls, txt;
      if      (m >= 4)    { cls = 'ptc-4'; txt = '4×'; }
      else if (m === 2)   { cls = 'ptc-2'; txt = '2×'; }
      else if (m === 0.5) { cls = 'ptc-h'; txt = '½'; }
      else if (m === 0.25){ cls = 'ptc-q'; txt = '¼'; }
      else if (m === 0)   { cls = 'ptc-z'; txt = '0'; }
      else                { cls = 'ptc-n1'; txt = ''; }
      return `<div class="ptc-cell ${cls}">${txt}</div>`;
    }).join('');
    return `<div class="ptc-type-row"><div class="ptc-lbl" style="background:${TYPE_COLORS[atkType]}">${term('types', atkType)}</div>${cells}</div>`;
  }).join('');
  return `<div class="ptc-wrap"><div class="ptc-header">${headerHTML}</div>${rowsHTML}</div>`;
}

function buildTypeChartSummaryHTML(slots) {
  if (!slots.length) return '';
  const effs = slots.map(s => applyAbilityDefEff(defEffectiveness(s.pokemon.type1, s.pokemon.type2||null), s.ability));
  const weakTypes = [], strongTypes = [], neutralTypes = [];
  ALL_TYPES.forEach(t => {
    let w = 0, r = 0, n = 0;
    effs.forEach(eff => { const m = eff[t]; if (m > 1) w++; else if (m < 1) r++; else n++; });
    if (w > r) weakTypes.push(t);
    else if (r > w) strongTypes.push(t);
    else neutralTypes.push(t);
  });
  const tbadge = tp => `<span class="pcs-tbadge" style="background:${TYPE_COLORS[tp]}">${term('types', tp)}</span>`;
  return `<div class="pcs-wrap">
    <div class="pcs-row"><span class="pcs-lbl pcs-weak">${t('weak')}</span><div class="pcs-badges">${weakTypes.length ? weakTypes.map(tbadge).join('') : `<span class="pcs-none">${t('none')}</span>`}</div></div>
    <div class="pcs-row"><span class="pcs-lbl pcs-neutral">${t('neutral_1x')}</span><div class="pcs-badges">${neutralTypes.length ? neutralTypes.map(tbadge).join('') : `<span class="pcs-none">${t('none')}</span>`}</div></div>
    <div class="pcs-row"><span class="pcs-lbl pcs-strong">${t('strong')}</span><div class="pcs-badges">${strongTypes.length ? strongTypes.map(tbadge).join('') : `<span class="pcs-none">${t('none')}</span>`}</div></div>
  </div>`;
}

window.initPowerCalc = function initPowerCalc() {

  /* ── 아이템 세팅 헬퍼 ── */
  function setAtkItem(it) {
    atk.item = it || null;
    document.getElementById('dcItemQ').value = it ? term('items', it.name) : '';
    calcDamage();
  }
  function setDefItem(it) {
    def.item = it || null;
    document.getElementById('dcDefItemQ').value = it ? term('items', it.name) : '';
    calcDamage();
  }

  /* ── 랭크 배율 ── */
  function rankMult(r) { return r>=0 ? (2+r)/2 : 2/(2-r); }

  /* ── 공격/방어 스탯 표시 갱신 ── */
  function updateAtkDisplay() {
    const {pokemon:pk, move:mv, ev, natM, rank} = atk;
    if (!pk) return;
    const isPhys = !mv || mv.category === '물리';
    const base = pk[isPhys?'A':'C'] || 0;
    const actual = Math.floor(calcStat(base, ev, false, natM));
    document.getElementById('dcBase').textContent = base;
    document.getElementById('dcActual').textContent = actual;
  }

  function updateDefDisplay() {
    const {pokemon:pk, hpEV, defEV, natM} = def;
    if (!pk) return;
    const hBase = pk.H || 0;
    document.getElementById('dcDefHBase').textContent = hBase;
    document.getElementById('dcDefHActual').textContent = Math.floor(calcStat(hBase, hpEV, true, 1.0));
    const mv = atk.move;
    if (mv) {
      const dKey = mv.category==='물리' ? 'B' : 'D';
      const dBase = pk[dKey] || 0;
      document.getElementById('dcDefDBase').textContent = dBase;
      document.getElementById('dcDefActual').textContent = Math.floor(calcStat(dBase, defEV, false, natM));
    }
  }

  /* ── 대미지 계산 ── */
  function calcDamage() {
    const rangeEl = document.getElementById('dcDmgRange');
    const rollsEl = document.getElementById('dcDmgRolls');
    const hitsEl  = document.getElementById('dcDmgHits');
    const {pokemon:atkPk, move:mv, ev, natM:aNatM, rank:aRank, item:aItem, ability:aAbil,
           gender:aGender, status:aStatus, hpPct:aHP, critical, charge, helpingHand, battery, powerSpot, supremeCount} = atk;
    const {pokemon:defPk, hpEV, defEV, natM:dNatM, rank:dRank,
           gender:dGender, hpPct:dHP, reflect, lightScreen, auroraVeil, friendGuard} = def;

    updateAtkDisplay();
    updateDefDisplay();

    saveCalcState();

    /* 내구력: defPk 있으면 계산, 없으면 초기화 */
    if (defPk) {
      /* 날씨는 아직 미확정이므로 env.weather 직접 사용 */
      const _effW = env.weather || (def.ability?.name==='타오르는불꽃'?'맑음':'');
      const hpAct = Math.floor(calcStat(defPk.H, hpEV, true, 1.0));
      const _hasMove = !!atk.move && atk.move.category !== '변화';
      const _isPhysMove = atk.move?.category === '물리';
      const defBNatM = (!_hasMove || _isPhysMove) ? dNatM : 1.0;
      const defDNatM = (!_hasMove || !_isPhysMove) ? dNatM : 1.0;
      const defB  = Math.floor(calcStat(defPk.B, defEV, false, defBNatM));
      const defD  = Math.floor(calcStat(defPk.D, defEV, false, defDNatM));
      const durBItM = getItemStatMult(def.item, defPk, 'B');
      const durDItM = getItemStatMult(def.item, defPk, 'D');
      const durBAbM = getAbilityStatMult(def.ability, 'B', {weather:_effW});
      const durDAbM = getAbilityStatMult(def.ability, 'D', {weather:_effW});
      /* 장막 보정: 장막은 입히는 데미지를 ½ → 내구력 관점에선 ×2 */
      const scrPhys = (reflect||auroraVeil) ? 2 : 1;
      const scrSpec = (lightScreen||auroraVeil) ? 2 : 1;
      const phys = Math.floor(hpAct * defB * durBItM * durBAbM * scrPhys / 0.411);
      const spec = Math.floor(hpAct * defD * durDItM * durDAbM * scrSpec / 0.411);
      const el1=document.getElementById('dcPhysDur'), el2=document.getElementById('dcSpecDur');
      const el3=document.getElementById('dcDefPhysDur'), el4=document.getElementById('dcDefSpecDur');
      if(el1) el1.textContent=phys.toLocaleString();
      if(el2) el2.textContent=spec.toLocaleString();
      if(el3) el3.textContent=phys.toLocaleString();
      if(el4) el4.textContent=spec.toLocaleString();
    } else {
      ['dcPhysDur','dcSpecDur','dcDefPhysDur','dcDefSpecDur'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent='—';});
    }

    /* 공격 측 입력 없으면 조기 종료 */
    if (!atkPk || !mv || mv.category==='변화') {
      rangeEl.innerHTML = `<span class="dc-dmg-empty">${t('pokemon_and_move_select')}</span>`;
      rollsEl.textContent = ''; hitsEl.textContent = '';
      const dp=document.getElementById('dcDecPower'); if(dp) dp.textContent='—'; return;
    }

    const isPhys = mv.category === '물리';

    /* 유효 날씨 (특성 자동 날씨 포함) */
    let effWeather = env.weather;
    if (!effWeather) {
      if (atkPk.name==='메가메가니움'||aAbil?.name==='메가솔라'||aAbil?.name==='타오르는불꽃') effWeather='맑음';
    }
    const effField = env.field;
    const ctx = { weather:effWeather, field:effField, status:aStatus, hpPct:aHP };

    /* 공격 스탯 (바디프레스는 방어 스탯을 공격으로 사용) */
    const isBodyPress = mv.name === '바디프레스';
    const atkStatKey = isBodyPress ? 'B' : (isPhys ? 'A' : 'C');
    const atkBase = atkPk[atkStatKey] || 0;
    const atkAct  = Math.floor(calcStat(atkBase, isBodyPress ? (def.defEV||0) : ev, false, aNatM));
    const atkRk   = Math.floor(atkAct * rankMult(aRank));
    const atkItM  = getItemStatMult(aItem, atkPk, atkStatKey);
    const atkAbM  = getAbilityStatMult(aAbil, atkStatKey, ctx);
    /* 쿼크차지/고대활성: 해당 공격 스탯이 최고일 때 ×1.3 */
    let quarkM = 1;
    if ((aAbil?.name==='쿼크차지'&&effField==='일렉')||(aAbil?.name==='고대활성'&&effWeather==='맑음')) {
      const sk=atkStatKey;
      if(['A','B','C'].includes(sk)&&atkPk[sk]>=Math.max(atkPk.A,atkPk.B,atkPk.C,atkPk.D,atkPk.S)) quarkM=1.3;
    }
    /* 화상: 물리 ×0.5 (근성 있으면 면제) */
    const burnM = (aStatus==='화상'&&isPhys&&aAbil?.name!=='근성') ? 0.5 : 1;
    /* 재앙: 목간(공↓)/그릇(특↓) */
    const ruinAtkM = (isPhys ? env.tabletRuin : env.vesselRuin) ? 0.75 : 1;
    const A = Math.floor(Math.floor(Math.floor(atkRk * atkItM) * atkAbM * quarkM) * burnM * ruinAtkM);

    /* 유효 기술 타입/위력 — defPk 없이도 계산 가능 */
    const effType = getMoveEffectiveType(atkPk, mv, aItem, aAbil, effWeather);
    const powerCtx = { hpPct:aHP, defHpPct:dHP, defS:defPk?.S||1, defWeight:defPk?.weight||null, status:aStatus, field:effField, defStatus:def.status||'' };
    const effPow  = getMoveEffectivePower(atkPk, mv, aAbil, effWeather, powerCtx);
    if (!effPow) {
      rangeEl.innerHTML = `<span class="dc-dmg-empty">${t('opp_select_poke')}</span>`;
      rollsEl.textContent = ''; hitsEl.textContent = '';
      const dp=document.getElementById('dcDecPower'); if(dp) dp.textContent='—'; return;
    }

    /* STAB (리베로/변환자재 = 항상 자속) */
    let isStab = effType===atkPk.type1||effType===atkPk.type2;
    if (!isStab) { const ot=getItemTypeOverride(aItem,atkPk); if(ot&&ot===effType) isStab=true; }
    if (aAbil?.name==='리베로'||aAbil?.name==='변환자재') isStab=true;
    const stab = (aAbil?.name==='적응력'&&isStab)?2:(isStab?1.5:1);

    /* 기술/아이템 배율 */
    const itemPM = getItemPowerMult(aItem,mv,effType) * getPkmPowerMult(aItem,atkPk,mv);
    const abilPM = getAbilityPowerMult(aAbil, mv, effType, ctx);

    /* 날씨 배율 */
    let weatherM=1;
    if (effWeather==='맑음') {
      if(effType==='불꽃') weatherM=1.5;
      /* 하이드로스팀: 쾌청에서 물 패널티 없이 1.5배 */
      if(effType==='물') weatherM = mv.name==='하이드로스팀' ? 1.5 : 0.5;
    }
    else if (effWeather==='비') { if(effType==='물') weatherM=1.5; if(effType==='불꽃') weatherM=0.5; }

    /* 필드 배율 */
    let fieldM=1;
    if (effField==='그래스'&&effType==='풀') fieldM=1.3;
    else if (effField==='일렉'&&effType==='전기') fieldM=1.3;
    else if (effField==='사이코'&&effType==='에스퍼') fieldM=1.3;
    if (effField==='그래스'&&['지진','마그니튜드','구르기'].includes(mv.name)) fieldM*=0.5;

    /* 오라 배율 */
    let auraM=1;
    if (env.aura==='페어리'&&effType==='페어리') auraM=env.auraBreak?0.75:4/3;
    else if (env.aura==='다크'&&effType==='악') auraM=env.auraBreak?0.75:4/3;

    /* 급소 */
    const critM = critical ? (aAbil?.name==='스나이퍼'?2.25:1.5) : 1;

    /* 충전 */
    const chargeM = (charge&&effType==='전기') ? 2 : 1;

    /* 도우미/배터리/파워스폿 */
    const hhM   = helpingHand ? 1.5 : 1;
    const battM = (battery&&!isPhys) ? 1.3 : 1;
    const psM   = powerSpot ? 1.3 : 1;

    /* 투쟁심 */
    let rivalryM=1;
    if (aAbil?.name==='투쟁심'&&aGender&&dGender) rivalryM=aGender===dGender?1.25:0.75;

    /* 총대장 */
    const supremeM = supremeCount>0 ? (1+supremeCount*0.1) : 1;

    /* OVERRIDE_POWER 기술(트리플킥 등)은 총합 위력이므로 1타로 표시 */
    const hits = OVERRIDE_POWER[mv.name] ? 1 : (MULTI_HIT_COUNT[mv.name] || mv.hits || 1);

    /* 결정력 = 공격측 위력 지수 (수비자 독립) */
    const decPow = Math.floor(A * effPow * hits * stab * itemPM * abilPM * weatherM * fieldM * auraM * critM * chargeM * hhM * battM * psM * rivalryM * supremeM);
    const dp=document.getElementById('dcDecPower');
    if(dp) dp.textContent=decPow.toLocaleString();

    /* 수비 포켓몬 없으면 데미지 계산 생략 */
    if (!defPk) {
      rangeEl.innerHTML = `<span class="dc-dmg-empty">${t('def_select_poke')}</span>`;
      rollsEl.textContent=''; hitsEl.textContent=''; return;
    }

    /* 방어 스탯 */
    const defStatK = isPhys ? 'B' : 'D';
    const defBase  = defPk[defStatK] || 0;
    const defAct   = Math.floor(calcStat(defBase, defEV, false, dNatM));
    const defRk    = Math.floor(defAct * rankMult(dRank));
    const defItM   = getItemStatMult(def.item, defPk, defStatK);
    const defAbM   = getAbilityStatMult(def.ability, defStatK, {weather:effWeather});
    /* 날씨 방어 보정: 모래→바위 특방×1.5, 눈→얼음 방어×1.5 */
    let dWeatherM = 1;
    if (effWeather==='모래'&&!isPhys&&(defPk.type1==='바위'||defPk.type2==='바위')) dWeatherM=1.5;
    if (effWeather==='눈' &&isPhys &&(defPk.type1==='얼음'||defPk.type2==='얼음')) dWeatherM=1.5;
    /* 재앙: 검(방↓)/구슬(특방↓) */
    const ruinDefM = (isPhys ? env.swordRuin : env.beadRuin) ? 0.75 : 1;
    const D = Math.floor(Math.floor(defRk * defItM * defAbM) * dWeatherM * ruinDefM);

    if (A<=0||D<=0) {
      rangeEl.innerHTML=`<span class="dc-dmg-empty">${t('stat_error')}</span>`;
      rollsEl.textContent='';hitsEl.textContent='';return;
    }

    const defHAct   = Math.floor(calcStat(defPk.H, hpEV, true, 1.0));
    const defCurHP  = Math.max(1, Math.floor(defHAct * dHP / 100));

    /* 카타스트로피: 현재 HP 절반 고정 데미지 */
    if (mv.name === '카타스트로피') {
      const fixedDmg = Math.floor(defCurHP / 2);
      const pct = (fixedDmg / defHAct * 100).toFixed(1);
      rangeEl.innerHTML = `${fixedDmg} <span class="dc-dmg-pct">(${pct}%) ${t('half_current_hp')}</span>`;
      rollsEl.textContent=''; hitsEl.textContent='';
      if(dp) dp.textContent='—'; return;
    }
    /* 적당히손봐주기 / 칼등치기: HP 1 남기는 고정 데미지 */
    if (['적당히손봐주기','칼등치기'].includes(mv.name)) {
      const fixedDmg = defCurHP - 1;
      const pct = (fixedDmg / defHAct * 100).toFixed(1);
      rangeEl.innerHTML = `${fixedDmg} <span class="dc-dmg-pct">(${pct}%) ${t('leave_hp_1')}</span>`;
      rollsEl.textContent=''; hitsEl.textContent='';
      if(dp) dp.textContent='—'; return;
    }

    /* 타입 상성 */
    const dAbil = def.ability;
    /* 특성 무효 */
    const noEffect = (abilNameKo) => `${t('no_effect')}${abilNameKo ? ` (${term('abilities', abilNameKo)})` : ''}`;
    if (dAbil?.name==='부유'&&effType==='땅') { rangeEl.textContent=noEffect('부유');rollsEl.textContent='';hitsEl.textContent='';return; }
    if (dAbil?.name==='흙먹기'&&effType==='땅') { rangeEl.textContent=noEffect('흙먹기');rollsEl.textContent='';hitsEl.textContent='';return; }
    if ((dAbil?.name==='저수'||dAbil?.name==='마중물')&&effType==='물') { rangeEl.textContent=noEffect();rollsEl.textContent='';hitsEl.textContent='';return; }
    if (dAbil?.name==='수포'&&effType==='물') { rangeEl.textContent=noEffect('수포');rollsEl.textContent='';hitsEl.textContent='';return; }
    if ((dAbil?.name==='전기엔진'||dAbil?.name==='피뢰침'||dAbil?.name==='축전')&&effType==='전기') { rangeEl.textContent=noEffect();rollsEl.textContent='';hitsEl.textContent='';return; }
    if (dAbil?.name==='초식'&&effType==='풀') { rangeEl.textContent=noEffect('초식');rollsEl.textContent='';hitsEl.textContent='';return; }
    if (dAbil?.name==='방탄'&&BALL_MOVES.has(mv.name)) { rangeEl.textContent=noEffect('방탄');rollsEl.textContent='';hitsEl.textContent='';return; }
    if (dAbil?.name==='방음'&&SOUND_MOVES.has(mv.name)) { rangeEl.textContent=noEffect('방음');rollsEl.textContent='';hitsEl.textContent='';return; }
    if (dAbil?.name==='바람타기'&&WIND_MOVES.has(mv.name)) { rangeEl.textContent=noEffect('바람타기');rollsEl.textContent='';hitsEl.textContent='';return; }

    const e1 = ATK_CHART[effType]?.[defPk.type1] ?? 1;
    const e2 = defPk.type2 ? (ATK_CHART[effType]?.[defPk.type2] ?? 1) : 1;
    let typeEff = e1 * e2;
    /* 불가사의부적: 효과 최고 이외 무효 */
    if (dAbil?.name==='불가사의부적'&&typeEff<2) { rangeEl.textContent=noEffect('불가사의부적');rollsEl.textContent='';hitsEl.textContent='';return; }
    /* 색안경: 불효과 → 통상 배율로 */
    if (aAbil?.name==='색안경'&&typeEff>0&&typeEff<1) typeEff=Math.min(typeEff*2,1);
    if (typeEff===0) { rangeEl.textContent=noEffect();rollsEl.textContent='';hitsEl.textContent='';return; }

    /* 장막 (급소면 무시) */
    let screenM=1;
    if (!critical) {
      if (auroraVeil) screenM=0.5;
      else if (isPhys&&reflect) screenM=0.5;
      else if (!isPhys&&lightScreen) screenM=0.5;
    }

    /* 프렌드가드 */
    const fgM = friendGuard ? 0.75 : 1;

    /* 방어 특성 배율 */
    let defAbilM=1;
    /* 체력 만탱 조건 */
    if ((dAbil?.name==='멀티스케일'||dAbil?.name==='스펙터가드'||dAbil?.name==='테라셸')&&dHP>=100) defAbilM*=0.5;
    /* 퍼코트: 물리 전체 절반 (체력 무관) */
    if (dAbil?.name==='퍼코트'&&isPhys) defAbilM*=0.5;
    /* 얼음인분: 특수 절반 */
    if (dAbil?.name==='얼음인분'&&!isPhys) defAbilM*=0.5;
    /* 초고효과 경감 */
    if ((dAbil?.name==='필터'||dAbil?.name==='프리즘아머'||dAbil?.name==='하드록')&&typeEff>1) defAbilM*=0.75;
    /* 타입별 경감 */
    if (dAbil?.name==='두꺼운지방'&&(effType==='불꽃'||effType==='얼음')) defAbilM*=0.5;
    if ((dAbil?.name==='내열'||dAbil?.name==='수포')&&effType==='불꽃') defAbilM*=0.5;
    /* 건조피부: 불꽃 1.25× */
    if (dAbil?.name==='건조피부'&&effType==='불꽃') defAbilM*=1.25;
    /* 복슬복슬: 접촉 절반, 불꽃 2× */
    if (dAbil?.name==='복슬복슬'&&isPhys&&CONTACT_MOVES.has(mv.name)) defAbilM*=0.5;
    if (dAbil?.name==='복슬복슬'&&effType==='불꽃') defAbilM*=2;
    /* 소리 경감 */
    if (dAbil?.name==='펑크록'&&SOUND_MOVES.has(mv.name)) defAbilM*=0.5;

    /* Level 50 damage formula — 랜덤 롤을 baseDmg 직후에 적용 (STAB/타입보다 먼저) */
    const baseDmg = Math.floor(Math.floor(22 * effPow * A / D) / 50) + 2;

    /* 16 랜덤 롤: random → STAB → 타입 → 나머지 배율 순으로 floor 적용 */
    const rolls=[];
    for (let i=0;i<16;i++) {
      let dmg = Math.floor(baseDmg * (85+i) / 100);
      dmg = Math.floor(dmg * stab);
      dmg = Math.floor(dmg * typeEff);
      dmg = Math.floor(dmg * itemPM * abilPM * weatherM * fieldM * auraM);
      dmg = Math.floor(dmg * critM);
      dmg = Math.floor(dmg * chargeM * hhM * battM * psM);
      dmg = Math.floor(dmg * screenM * fgM * defAbilM);
      dmg = Math.floor(dmg * rivalryM * supremeM);
      rolls.push(dmg);
    }
    const minD=rolls[0]*hits, maxD=rolls[15]*hits;

    const minPct=(minD/defHAct*100).toFixed(1);
    const maxPct=(maxD/defHAct*100).toFixed(1);

    rangeEl.innerHTML=`${minD}~${maxD} <span class="dc-dmg-pct">(${minPct}%~${maxPct}%)</span>`;
    rollsEl.textContent=(hits>1?`×${hits}타 | `:'')+rolls.join(', ');

    if (maxD<=0) { hitsEl.textContent='';return; }
    const minHits=Math.ceil(defCurHP/maxD);
    const maxHits=minD>0?Math.ceil(defCurHP/minD):99;
    hitsEl.className='dc-dmg-hits';
    if (maxD>=defCurHP) {
      const cnt=rolls.filter(r=>r*hits>=defCurHP).length;
      if (cnt===16) { hitsEl.textContent=t('ohko_label');hitsEl.className='dc-dmg-hits ohko'; }
      else hitsEl.textContent=t('random_ohko_label', {pct: (cnt/16*100).toFixed(1)});
    } else if (minHits===maxHits) {
      hitsEl.textContent=t('guaranteed_hits', {n: minHits});
    } else {
      hitsEl.textContent=t('random_hits_range', {min: minHits, max: maxHits});
    }
  }

  /* ── 파티 pill (공격) ── */
  function renderPills() {
    const el = document.getElementById('dcPills');
    if (!el) return;
    el.innerHTML = party.map((s,i) => !s.pokemon ? '' :
      `<button class="dc-pill${atk.pokemon?.name===s.pokemon.name?' dc-sel':''}" data-pi="${i}" title="${pokeName(s.pokemon.name,s.pokemon.no)}">
        <img src="${spriteUrl(s.pokemon.name,s.pokemon.no)}" alt="${pokeName(s.pokemon.name,s.pokemon.no)}">
      </button>`
    ).join('');
    el.querySelectorAll('.dc-pill').forEach(btn => btn.addEventListener('click', () => {
      const idx = +btn.dataset.pi;
      const s = party[idx];
      if (!s?.pokemon) return;
      atk.pokemon = s.pokemon;
      document.getElementById('dcPokeQ').value = pokeName(s.pokemon.name, s.pokemon.no);
      document.getElementById('dcPokeList').classList.remove('open');
      fillAbilSel(s.pokemon, 'dcAbilSel');
      updateBigSlot('dcBigSlot','dcBigSlotImg','dcBigSlotPlus', s.pokemon);
      el.querySelectorAll('.dc-pill').forEach(b => b.classList.remove('dc-sel'));
      el.querySelector(`[data-pi="${idx}"]`)?.classList.add('dc-sel');
      renderPartyMoveButtons(s.moves);
      atk.move = null;
      document.getElementById('dcMoveQ').value = '';
      document.getElementById('dcMoveInfo').innerHTML = '';
      atk.item = s.item; atk.ability = s.ability;
      atk.ev = s.evs?.[atk.move?.category==='물리'?'A':'C'] || 0;
      document.getElementById('dcEV').value = atk.ev;
      document.getElementById('dcItemQ').value = s.item?.name||'';
      document.getElementById('dcAbilSel').value = s.ability?.name||'';
      const olRow=document.getElementById('dcOLRow');
      if(olRow){const isOL=s.ability?.name==='총대장';olRow.style.display=isOL?'flex':'none';if(!isOL){atk.supremeCount=0;document.querySelectorAll('.dc-toggle-btn[data-ol]').forEach((b,i)=>b.classList.toggle('on',i===0));}}
      calcDamage();
    }));
  }

  /* ── 파티 기술 빠른선택 버튼 ── */
  function renderPartyMoveButtons(moves) {
    const el = document.getElementById('dcPartyMoves');
    if (!el) return;
    const valid = (moves || []).filter(Boolean);
    if (!valid.length) { el.style.display = 'none'; el.innerHTML = ''; return; }
    /* 기술 미선택 상태(검색창 비어있음)이면 바로 보이게 */
    el.style.display = document.getElementById('dcMoveQ')?.value ? 'none' : 'flex';
    const CAT_I18N_PM = {'물리':t('cat_physical'),'특수':t('cat_special'),'변화':t('cat_status')};
    el.innerHTML = valid.map(mv => {
      const tc = TYPE_COLORS[mv.type] || '#888';
      const isStatus = mv.category === '변화';
      return `<button class="dc-pmove-btn${atk.move?.name===mv.name?' on':''}" data-mv="${mv.name}"
        style="display:flex;align-items:center;gap:5px;padding:3px 7px;border-radius:6px;
          border:1px solid rgba(0,0,0,.12);background:var(--slot-bg);cursor:pointer;text-align:left;
          opacity:${isStatus?.55:1};" title="${term('moves', mv.name)}">
        <span class="dc-type-tag" style="background:${tc};font-size:9px;padding:1px 4px;">${term('types', mv.type)}</span>
        <span style="font-size:11px;font-weight:600;flex:1;">${term('moves', mv.name)}</span>
        <span style="font-size:9px;color:var(--label-muted);">${CAT_I18N_PM[mv.category]||mv.category}${mv.power?' '+mv.power:''}</span>
      </button>`;

    el.querySelectorAll('.dc-pmove-btn').forEach(btn => {

  /* ── 검색 드롭다운 헬퍼 ── */
  const allDrops = [];
  function makeSearch(inputId, listId, getData, onSelect) {
    const inp = document.getElementById(inputId);
    const lst = document.getElementById(listId);
    const drop = lst.closest('.dc-drop');
    allDrops.push({lst, drop});

    function showRows(q) {
      let rows = getData(q);
      if (!q) rows = [...rows].sort((a,b)=>(a.data?.name||'').localeCompare(b.data?.name||'','ko'));
      if (!rows.length) { lst.classList.remove('open'); drop.style.zIndex=''; return; }
      allDrops.forEach(d => { if(d.lst!==lst){ d.lst.classList.remove('open'); d.drop.style.zIndex=''; } });
      lst.innerHTML = rows.map(r=>r.html).join('');
      lst.classList.add('open');
      drop.style.zIndex = '60';
      lst.querySelectorAll('.dc-drop-item').forEach((el,i) => el.addEventListener('click', ()=>{ onSelect(rows[i].data); lst.classList.remove('open'); drop.style.zIndex=''; }));
    }

    inp.addEventListener('focus', () => showRows(inp.value.trim()));
    inp.addEventListener('input', () => showRows(inp.value.trim()));
    inp.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      e.preventDefault();
      if (!inp.value.trim()) { lst.classList.remove('open'); drop.style.zIndex=''; inp.blur(); return; }
      lst.querySelector('.dc-drop-item')?.click();
    });
    document.addEventListener('click', e => {
      if (!e.target.closest('#'+inputId) && !e.target.closest('#'+listId)) {
        lst.classList.remove('open'); drop.style.zIndex='';
      }
    });
  }

          mvName:atk.move?.name||null, ev:atk.ev, natM:atk.natM, rank:atk.rank,
          itemName:atk.item?.name||null, abilityName:atk.ability?.name||null,
          gender:atk.gender, status:atk.status, hpPct:atk.hpPct,
          critical:atk.critical, charge:atk.charge, helpingHand:atk.helpingHand,
          battery:atk.battery, powerSpot:atk.powerSpot, supremeCount:atk.supremeCount,
        },
        def: {

          hpEV:def.hpEV, defEV:def.defEV, natM:def.natM, rank:def.rank,
          itemName:def.item?.name||null, abilityName:def.ability?.name||null,
          gender:def.gender, status:def.status, hpPct:def.hpPct,
          reflect:def.reflect, lightScreen:def.lightScreen, auroraVeil:def.auroraVeil, friendGuard:def.friendGuard,
        },

  function loadCalcState() {
    try {
      const raw = localStorage.getItem('pochams_calc');
      if (!raw) return;
      const s = JSON.parse(raw);

      if (s.atk) {
        const a = s.atk;
        if (a.pkName != null) {
          const pk = (POKEMON_DATA||[]).find(p=>p.name===a.pkName&&p.no===a.pkNo);
          if (pk) {

        const defBoolMap={reflect:'dcReflect',lightScreen:'dcLightScr',auroraVeil:'dcAuVeil',friendGuard:'dcFG'};
        Object.entries(defBoolMap).forEach(([k,id])=>{if(d[k]!=null){def[k]=d[k];document.getElementById(id)?.classList.toggle('on',d[k]);}});

        Object.entries(ruinMap).forEach(([k,id])=>{if(env[k]) document.getElementById(id)?.classList.add('on');});

      calcDamage();

  loadCalcState();

  /* detail-card 변경 시 공격 side 동기화 */
  window.dcSyncFromSlot = function(idx) {

      def.hpEV = s.evs?.H || 0;

      document.getElementById('dcDefEV').value = def.defEV;

      document.getElementById('dcDefItemQ').value = s.item?.name || '';

      document.getElementById('dcDefNatRow').querySelectorAll('.dc-nat-btn')
        .forEach(b => b.classList.toggle('on', +b.dataset.m === def.natM));

    if (changed) calcDamage();

/* ════════════════════════════
   추천 포켓몬 패널
════════════════════════════ */
function analyzeParty() {
  const slots = party.filter(s => s.pokemon);
  const weakMap = {};
  ALL_TYPES.forEach(t => { weakMap[t] = 0; });
  slots.forEach(({ pokemon: pk, ability }) => {
    const eff = applyAbilityDefEff(defEffectiveness(pk.type1, pk.type2 || null), ability);
    ALL_TYPES.forEach(t => { if (eff[t] >= 2) weakMap[t]++; });
  });
  const offCovered = {};
  ALL_TYPES.forEach(t => { offCovered[t] = false; });
  slots.forEach(s => {
    const moveTypes = [];
    (s.moves || []).filter(Boolean).forEach(m => { if (m.type) moveTypes.push(m.type); });
    const ms = getMetaSet(s.pokemon.name);
    (ms?.moves || []).slice(0, 4).forEach(mv => {
      const md = MOVE_DATA?.find(m => m.name === mv.name);
      if (md?.type && md.category !== '변화') moveTypes.push(md.type);
    });
    ALL_TYPES.forEach(defT => {
      moveTypes.forEach(mt => { if (defEffectiveness(defT, null)[mt] >= 2) offCovered[defT] = true; });
    });
  });
  let physCount = 0, specCount = 0, tankCount = 0;
  slots.forEach(s => {
    const physMvs = (s.moves || []).filter(m => m?.category === '물리');
    const specMvs = (s.moves || []).filter(m => m?.category === '특수');
    const dur = calcDurability(s.pokemon, s.evs || {}, s.nature, s.item);
    const avgDur = (dur.phys + dur.spec) / 2;
    if ((physMvs.length === 0 && specMvs.length === 0) || avgDur >= 55000) tankCount++;
    else if (physMvs.length >= specMvs.length) physCount++;
    else specCount++;
  });
  return { weakMap, offCovered, physCount, specCount, tankCount, total: slots.length };
}

function scoreCandidate(pk, pa) {
  const isMega = pk.name.startsWith('메가') && pk.name !== '메가니움';
  const basePk = isMega ? (POKEMON_DATA.find(p => p.no === pk.no && !p.name.startsWith('메가')) || pk) : pk;
  const key = 's1_single';
  const usage = META_USAGE_DATA?.[key]?.usage || [];
  /* FORM_IDX_TO_NAME 매핑 기반으로 이 폼이 맞는 메타 항목을 찾음 */
  let rankIdx = usage.slice(0, 50).findIndex(u => {
    if (u.id && FORM_IDX_TO_NAME[u.id]) return FORM_IDX_TO_NAME[u.id] === basePk.name;
    return u.name === basePk.name;
  });
  /* 매핑 없는 폼: 같은 덱스번호 중 폼 매핑이 없는 항목으로만 재탐색
     단, 리전폼은 다른 폼(기본형 등)과 정체성이 완전히 다르므로 덱스번호만으로 빌려오면 안 됨 */
  if (rankIdx < 0 && pk.form !== '리전폼') {
    rankIdx = usage.slice(0, 50).findIndex(u => {
      if (!u.id) return false;
      const dNo = parseInt(u.id.split('-')[0]);
      if (dNo !== pk.no) return false;
      if (FORM_IDX_TO_NAME[u.id]) return false; // 이미 다른 폼에 매핑된 항목 건너뜀
      return true;
    });
  }
  const rank = rankIdx >= 0 ? rankIdx + 1 : 99;
  let ms = getMetaSet(basePk.name);
  if (!ms && pk.form !== '리전폼') ms = getMetaSet(pk.no);

  /* ── 사용순위 (max 50) ── */
  let usageScore = rank <= 50 ? Math.round((51 - rank) * 1) : 0;
  if (isMega) {
    const stoneName = MEGA_STONE_MAP[pk.name];
    const stoneItem = ms?.items?.find(it => it.name === stoneName);
    const stoneRate = stoneItem ? stoneItem.rate / 100 : 0.05;
    usageScore = Math.round(usageScore * stoneRate);
  }

  /* ── 타입 (max 80) ── */
  const candEff = defEffectiveness(pk.type1, pk.type2 || null);
  let typeScore = 0;
  ALL_TYPES.forEach(t => {
    const w = pa.weakMap[t]; if (!w) return;
    const m = candEff[t];
    if (m === 0)      typeScore += w * 22;
    else if (m <= 0.5) typeScore += w * 16;
    else if (m >= 2)  typeScore -= w * 10;
  });
  typeScore = Math.max(0, Math.min(80, typeScore));

  /* ── 스피드 (max 15) ── */
  const evS = ms?.ev_spreads?.[0]?.evs?.S || 0;
  const natName = ms?.natures?.[0]?.name;
  const spdNatM = natName ? natMult(NATURES?.find(n => n.name === natName), 'S') : 1;
  const spd = calcStat(pk.S, evS, false, spdNatM);
  let speedScore = 0, speedTag = '';
  if (spd >= 161)      { speedScore = 15; speedTag = t('speed_high'); }
  else if (spd >= 136) { speedScore = 12; speedTag = t('rec_speed_midhigh'); }
  else if (spd >= 106) { speedScore = 8;  speedTag = t('rec_speed_mid'); }
  else                 { speedScore = 3;  speedTag = t('rec_speed_low'); }

  /* ── 조합 근거 (max 80) ── */
  const topMoves = (ms?.moves || []).slice(0, 4);
  const topMvData = topMoves.map(mv => MOVE_DATA?.find(m => m.name === mv.name)).filter(Boolean);
  const candPhys = topMvData.filter(m => m.category === '물리').length;
  const candSpec = topMvData.filter(m => m.category === '특수').length;
  const zeroDur = calcDurability(pk, {H:0,A:0,B:0,C:0,D:0,S:0}, null, null);
  const isTanky = (zeroDur.phys + zeroDur.spec) / 2 >= 40000 && candPhys === 0 && candSpec === 0;

  let comboScore = 0, comboReason = '';
  if (isTanky && pa.tankCount === 0 && pa.total >= 2)              { comboScore = 70; comboReason = t('combo_tank_fill'); }
  else if (candSpec > candPhys && pa.physCount >= pa.specCount + 2) { comboScore = 60; comboReason = t('combo_spec_boost'); }
  else if (candPhys > candSpec && pa.specCount >= pa.physCount + 2) { comboScore = 60; comboReason = t('combo_phys_boost'); }
  else if (candSpec > candPhys && pa.specCount === 0)               { comboScore = 55; comboReason = t('combo_spec_add'); }
  else if (candPhys > candSpec && pa.physCount === 0)               { comboScore = 55; comboReason = t('combo_phys_add'); }

  let newCov = 0;
  topMvData.forEach(mv => {
    if (!mv.type || mv.category === '변화') return;
    ALL_TYPES.forEach(defT => { if (!pa.offCovered[defT] && defEffectiveness(defT, null)[mv.type] >= 2) newCov++; });
  });
  if (newCov >= 3)      { comboScore = Math.min(80, comboScore + 20); if (!comboReason) comboReason = t('combo_type_cov'); }
  else if (newCov >= 1) { comboScore = Math.min(80, comboScore + 8); }

  const tags = [];
  if (typeScore >= 10) tags.push(t('type_complement'));
  if (speedTag !== t('rec_speed_low')) tags.push(speedTag);
  if (comboReason && !tags.includes(comboReason)) tags.push(comboReason);

  return { pk, basePk, isMega, rank, ms, spd, usageScore, typeScore, speedScore, comboScore,
    totalScore: usageScore + typeScore + speedScore + comboScore,
    comboReason, tags, topMoves: topMoves.map(m => m.name) };
}

function renderRecommended() {
  const el = document.getElementById('recPokemonList');
  if (!el) return;
  if (typeof META_USAGE_DATA === 'undefined' || !POKEMON_DATA?.length) { el.innerHTML = ''; return; }

  const key = 's1_single';
  const usage = META_USAGE_DATA[key]?.usage || [];
  const inParty = new Set(party.map(s => s.pokemon?.name).filter(Boolean));

  const candidates = [];
  const seenMegas = new Set();
  const seenCands = new Set();
  const addCandWithMegas = pk => {
    if (inParty.has(pk.name) || seenCands.has(pk.name)) return;
    seenCands.add(pk.name);
    candidates.push(pk);
    POKEMON_DATA.filter(p => p.no === pk.no && p.name.startsWith('메가') && p.name !== '메가니움' && p.champions && !inParty.has(p.name) && !seenMegas.has(p.name))
      .forEach(mega => { candidates.push(mega); seenMegas.add(mega.name); });
  };
  usage.slice(0, 50).forEach(u => {
    const dexNo = u.id ? parseInt(u.id.split('-')[0]) : null;
    /* 메타 항목이 가리키는 정확한 폼을 먼저 추가 */
    const primaryPk = resolveUsageForm(u);
    if (primaryPk) addCandWithMegas(primaryPk);
    /* 같은 Pokédex 번호의 나머지 챔피언 폼도 추가 (다른 타입 커버리지 고려) */
    if (dexNo && primaryPk) {
      POKEMON_DATA.filter(p => p.no === dexNo && p.champions && !(p.name.startsWith('메가') && p.name !== '메가니움') && p.name !== primaryPk.name)
        .forEach(altPk => addCandWithMegas(altPk));
    }
  });

  const pa = analyzeParty();
  const scored = candidates.map(pk => scoreCandidate(pk, pa)).sort((a, b) => b.totalScore - a.totalScore);

  const top = []; const seenDex = new Set();
  for (const r of scored) {
    if (inParty.has(r.pk.name)) continue;
    if (seenDex.has(r.pk.no)) continue;
    seenDex.add(r.pk.no);
    top.push(r);
    if (top.length >= 5) break;
  }

  const addPokemon = (pkName) => {
    const pk = POKEMON_DATA.find(p => p.name === pkName);
    if (!pk) return;
    const emptySlot = party.findIndex(s => !s.pokemon);
    if (emptySlot < 0) { showToast?.(t('no_empty_slot')); return; }
    party[emptySlot].pokemon = pk;
    party[emptySlot].ability = ABILITY_DATA?.[pk.name]?.normal?.[0] || null;
    party[emptySlot].evs = {H:0,A:0,B:0,C:0,D:0,S:0};
    party[emptySlot].moves = [null,null,null,null];
    party[emptySlot].nature = null;
    const autoItemName = MEGA_STONE_MAP[pk.name] || FORM_ITEM_MAP[pk.name] || DEFAULT_FORM_ITEM[getBaseName(pk.name)];
    party[emptySlot].item = autoItemName ? (ITEM_DATA.find(it => it.name === autoItemName) || null) : null;
    party[emptySlot].gender = pk.name.endsWith('♂') || GENDER_FORM_MAP[pk.name]?.male === pk.name ? '♂'
      : pk.name.endsWith('♀') || GENDER_FORM_MAP[pk.name]?.female === pk.name ? '♀' : null;
    applyFormChange(emptySlot);
    saveParty(); renderSlots(); renderRecommended();
  };

  el.innerHTML = top.map(r => {
    const { pk, rank, ms, spd, usageScore, typeScore, speedScore, comboScore, totalScore, comboReason, tags, topMoves } = r;
    const typeBadges = [pk.type1, pk.type2].filter(Boolean)
      .map(tp => `<span class="tt-type" style="background:${TYPE_COLORS[tp]}">${term('types', tp)}</span>`).join('');
    const tagChips = tags.slice(0, 3).map(tg => `<span class="rcv-chip rcv-tag">${tg}</span>`).join('');
    const rawItemName = ms?.items?.[0]?.name || '—';
    const itemNameKo = (CHAMPIONS_LOC_MAP?.item_ja2ko?.[rawItemName]) || rawItemName;
    const itemName = itemNameKo === '—' ? '—' : term('items', itemNameKo);
    const topMoveKo = topMoves[0] || '—';
    const topMove = topMoveKo === '—' ? '—' : term('moves', topMoveKo);
    const rawAbility = ms?.abilities?.[0]?.name || '—';
    const abilityNameKo = (CHAMPIONS_LOC_MAP?.ability_ja2ko?.[rawAbility]) || rawAbility;
    const abilityName = abilityNameKo === '—' ? '—' : term('abilities', abilityNameKo);
    /* 추천 아이템이 메가스톤이면 카드 전체를 해당 메가폼 기준으로 표시 (이름·타입·스피드) */
    const megaNameForItem = itemNameKo !== '—' ? Object.entries(MEGA_STONE_MAP||{}).find(([mn,sn])=>sn===itemNameKo)?.[0] : null;
    const megaPk = megaNameForItem ? POKEMON_DATA.find(p=>p.name===megaNameForItem) : null;
    const displayPk = megaPk || pk;
    const sprPk = displayPk;
    const displayPkName = pokeName(displayPk.name, displayPk.no);
    const dispTypeBadges = megaPk
      ? [megaPk.type1, megaPk.type2].filter(Boolean).map(tp => `<span class="tt-type" style="background:${TYPE_COLORS[tp]}">${term('types', tp)}</span>`).join('')
      : typeBadges;
    const dispSpeed = megaPk ? calcStat(megaPk.S, ms?.ev_spreads?.[0]?.evs?.S || 0, false, ms?.natures?.[0]?.name ? natMult(NATURES?.find(n=>n.name===ms.natures[0].name), 'S') : 1) : spd;
    return `<div class="rcv-card">
      <div class="rcv-head">
        <span class="rcv-name">${displayPkName}</span>${dispTypeBadges}
        <span class="rcv-chip rcv-rank">${t('usage_rank_lbl')} ${rank <= 50 ? rank : '—'}</span>
        <span class="rcv-chip rcv-score">${t('rec_score')} ${totalScore}</span>${tagChips}
      </div>
      <div class="rcv-body">
        <img src="${spriteUrl(sprPk.name, sprPk.no)}" class="rcv-sprite" alt="${displayPkName}">
        <div class="rcv-stats-grid">
          <div class="rcv-stat"><div class="rcv-stat-lbl">${t('rec_item')}</div><div class="rcv-stat-val">${itemName}</div></div>
          <div class="rcv-stat"><div class="rcv-stat-lbl">${t('rec_move')}</div><div class="rcv-stat-val">${topMove}</div></div>
          <div class="rcv-stat"><div class="rcv-stat-lbl">${t('rec_ability')}</div><div class="rcv-stat-val">${abilityName}</div></div>

/* 영/일 모드에서 칩이 줄바꿈되어 카드가 길어지는 경우 패널 높이를 내용에 맞게 자동 조절 */
function resizeRecPanel() {
  const panel = document.getElementById('recPanel');
  const list = document.getElementById('recPokemonList');
  if (!panel || !list) return;
  if (panel.classList.contains('collapsed')) { panel.style.flexBasis = ''; return; }
  requestAnimationFrame(() => {
    const titleEl = panel.querySelector('.rec-title');
    const titleH = titleEl ? titleEl.offsetHeight : 0;
    /* align-items:stretch가 카드를 현재 패널 높이로 강제하면 scrollHeight가 줄어든 높이를 그대로 반환하므로,
       측정 중에만 stretch를 풀어 각 카드가 자기 내용만큼 자연스럽게 늘어난 상태에서 높이를 잰다 */
    list.style.alignItems = 'flex-start';
    const cards = [...list.querySelectorAll('.rcv-card')];
    const maxCardH = cards.reduce((max, c) => Math.max(max, c.scrollHeight), 0);
    list.style.alignItems = '';
    const listCs = getComputedStyle(list);
    const panelCs = getComputedStyle(panel);
    const listPad = parseFloat(listCs.paddingTop) + parseFloat(listCs.paddingBottom);
    const panelPad = parseFloat(panelCs.paddingTop) + parseFloat(panelCs.paddingBottom);
    const needed = titleH + maxCardH + listPad + panelPad + 4;
    panel.style.flexBasis = Math.max(230, needed) + 'px';
  });
}

document.getElementById('pokeGrid').addEventListener('click', e => {
  const card = e.target.closest('.poke-card');
  if (!card) return;
  const pk = POKEMON_DATA[+card.dataset.idx];
  if (!pk) return;
  /* 계산기 전용 콜백 모드 */
  if (calcModalCallback) {

    closePokeModal(); cb(pk); return;
  }
  if (modalSlot < 0) return;
  /* 중복 체크: 이미 파티에 있으면 두 슬롯의 자리를 서로 맞바꿈 */
  const _dupIdx = party.findIndex((s, i) => i !== modalSlot && s.pokemon?.no === pk.no && s.pokemon?.name === pk.name);
  if (_dupIdx >= 0) {
    const _tmp = party[modalSlot];
    party[modalSlot] = party[_dupIdx];
    party[_dupIdx] = _tmp;
    saveParty();
    closePokeModal();
    selectedSlot = modalSlot;
    document.getElementById('appBody')?.classList.remove('big-mode');
    renderSlots(); renderRecommended(); renderDetail(selectedSlot); showPanel();
    return;
  }
  party[modalSlot].pokemon = pk;
  /* auto-set ability */
  const abd = ABILITY_DATA?.[pk.name];
  party[modalSlot].ability = abd?.normal?.[0] || null;
  /* reset evs, moves, nature, item */
  party[modalSlot].evs    = {H:0,A:0,B:0,C:0,D:0,S:0};
  party[modalSlot].moves  = [null,null,null,null];
  party[modalSlot].nature = null;
  party[modalSlot].item   = null;

  if (pk.name.endsWith('♂') || GENDER_FORM_MAP[pk.name]?.male === pk.name) party[modalSlot].gender = '♂';
  else if (pk.name.endsWith('♀') || GENDER_FORM_MAP[pk.name]?.female === pk.name) party[modalSlot].gender = '♀';
  else party[modalSlot].gender = null;
  /* 전용도구/메가스톤 자동 장착 */

    || DEFAULT_FORM_ITEM[getBaseName(pk.name)];    // 기본폼 선택 (자시안 → 녹슨검)

    const autoItemObj = ITEM_DATA.find(it => it.name === autoItemName);

  saveParty();
  closePokeModal();

  renderSlots(); renderRecommended(); renderDetail(selectedSlot); showPanel();
});

/* ════════════════════════════
   NATURE MODAL
════════════════════════════ */
function buildNatureTable(curNature) {
  /* 5×5 grid: row=raised, col=lowered */
  const rows = NAT_STATS;
  const cols = NAT_STATS;
  /* create lookup: [upStat][dnStat] → nature (or null for neutral diagonal) */
  const natGrid = {};
  rows.forEach(r => { natGrid[r] = {}; cols.forEach(c => natGrid[r][c] = null); });
  NATURES.forEach(n => {
    if (n.up && n.dn) natGrid[n.up][n.dn] = n;
  });
  /* neutral natures on diagonal */
  const neutralByRow = {};
  NATURES.filter(n=>!n.up).forEach((n,i) => { neutralByRow[rows[i]] = n; });

  const NAT_LABELS_I18N2 = {A:t('stat_atk'),B:t('stat_def'),C:t('stat_spatk'),D:t('stat_spdef'),S:t('stat_speed')};
  let html = `<thead><tr><th></th>${cols.map(c=>`<th class="col-lbl">▼${NAT_LABELS_I18N2[c]}</th>`).join('')}</tr></thead><tbody>`;
  rows.forEach((r,ri) => {
    html += `<tr><th class="row-lbl">▲${NAT_LABELS_I18N2[r]}</th>`;
    cols.forEach(c => {
      if (r===c) {
        const n = neutralByRow[r]||NATURES.filter(n=>!n.up)[ri];
        html += `<td class="nat-neutral ${curNature?.name===n?.name?'nat-selected':''}" data-nidx="${NATURES.indexOf(n)}">${n?term('natures', n.name):'-'}</td>`;
      } else {
        const n = natGrid[r][c];
        html += `<td class="${curNature?.name===n?.name?'nat-selected':''}" data-nidx="${NATURES.indexOf(n)}">${n?term('natures', n.name):'?'}</td>`;
      }
    });
    html += '</tr>';
  });
  html += '</tbody>';
  return html;
}

function saveParty() {
  const data = party.map(slot => {
    if (!slot.pokemon) return null;
    return {
      pkIdx:   POKEMON_DATA.indexOf(slot.pokemon),
      itIdx:   slot.item    ? ITEM_DATA.indexOf(slot.item)   : -1,
      natIdx:  slot.nature  ? NATURES.indexOf(slot.nature)   : -1,
      ability: slot.ability ? {name:slot.ability.name, desc:slot.ability.desc||''} : null,
      moves:   slot.moves.map(mv => mv ? MOVE_DATA.indexOf(mv) : -1),
      evs:     {...slot.evs},
      gender:  slot.gender || null,
      nickname: slot.nickname || null
    };
  });
  localStorage.setItem('pochams_party', JSON.stringify(data));
  localStorage.setItem('pochams_selected', selectedSlot);
}

function applySlotData(d, i) {
  if (!d) return;
  const pk = POKEMON_DATA[d.pkIdx];
  if (!pk) return;
  party[i].pokemon = pk;
  party[i].item    = (d.itIdx  >= 0 && ITEM_DATA[d.itIdx])  ? ITEM_DATA[d.itIdx]  : null;
  party[i].nature  = (d.natIdx >= 0 && NATURES[d.natIdx])   ? NATURES[d.natIdx]   : null;
  party[i].ability = d.ability || null;
  party[i].moves   = (d.moves||[-1,-1,-1,-1]).map(mi => (mi>=0 && MOVE_DATA[mi]) ? MOVE_DATA[mi] : null);
  party[i].evs     = d.evs || {H:0,A:0,B:0,C:0,D:0,S:0};
  party[i].gender  = d.gender || null;
  party[i].nickname = d.nickname || null;
}

function loadParty() {
  try {
    const raw = localStorage.getItem('pochams_party');
    if (!raw) return;
    JSON.parse(raw).forEach((d, i) => { if (i < PARTY_SIZE) applySlotData(d, i); });
  } catch(e) {}
}

    evs:     {...mem.evs},
    gender:  mem.gender || null,
    nickname: mem.nickname || null,
    savedAt: Date.now()
  };
  try {
    const box = JSON.parse(localStorage.getItem('pochams_box')||'[]');

function buildBoxTooltipHtml(entry) {

  if (!pk) return '';
  const item   = (entry.itIdx  >= 0 && ITEM_DATA[entry.itIdx])  ? ITEM_DATA[entry.itIdx]  : null;
  const nature = (entry.natIdx >= 0 && NATURES[entry.natIdx])   ? NATURES[entry.natIdx]   : null;
  const evs    = entry.evs || {H:0,A:0,B:0,C:0,D:0,S:0};
  const moves  = (entry.moves||[]).map(mi => (mi>=0&&MOVE_DATA[mi]) ? MOVE_DATA[mi] : null);
  const hp   = calcStat(pk.H, evs.H, true);
  const def  = Math.floor(calcStat(pk.B, evs.B, false, natMult(nature,'B')) * getItemStatMult(item,pk,'B'));
  const spdf = Math.floor(calcStat(pk.D, evs.D, false, natMult(nature,'D')) * getItemStatMult(item,pk,'D'));
  const spd  = Math.floor(calcStat(pk.S, evs.S, false, natMult(nature,'S')) * getItemStatMult(item,pk,'S'));

  const evStr = ['H','A','B','C','D','S'].filter(k=>evs[k]>0).map(k=>`${k}:${evs[k]}`).join(' ');
  const dispPkName = pokeName(pk.name, pk.no);
  const nickLine = entry.nickname ? `${entry.nickname} <span style="opacity:.6;font-size:9px;font-weight:400">(${dispPkName})</span>` : dispPkName;
  return `
    <div style="font-size:11px;font-weight:700;margin-bottom:3px">${nickLine}${tb(pk.type1)}${pk.type2?tb(pk.type2):''}</div>
    ${(item||entry.ability)?`<div style="color:var(--label-muted);margin-bottom:2px">${item?`${t('item')} ${term('items', item.name)} `:''}${entry.ability?`${t('ability')} ${term('abilities', entry.ability.name)}`:''}</div>`:''}
    ${nature?`<div>${t('nature')} ${term('natures', nature.name)}</div>`:''}
    ${evStr?`<div>${t('evs')} ${evStr}</div>`:''}
    <div style="margin-top:4px;color:var(--tooltip-text)">${moves.map(mv=>mv?`<div>● ${term('moves', mv.name)}</div>`:'').join('')}</div>
    <div style="margin-top:5px;border-top:1px solid var(--tooltip-border);padding-top:4px">${t('phys_dur')} ${Math.floor(hp*def/0.411).toLocaleString()} ${t('spec_dur')} ${Math.floor(hp*spdf/0.411).toLocaleString()}<br>${t('speed_short')} ${spd}</div>
  `;
}

/* ════════════════════════════
   SPEED CALCULATOR
════════════════════════════ */
const sc = {
  pokemon: null, slotIdx: -1,
  ev: 0, iv: 31, natM: 1.0, rank: 0,
  itemName: '', abilityName: '',
  weather: '', field: '',
  status: '',
  tailwind: false, stickyWeb: false,
  unburden: false,
};

const _SC_ITEMS    = ['구애스카프','검은철구','스피드파우더','교정깁스','부스트에너지'];
const _SC_ABILS    = ['고대활성','곡예','눈치우기','모래헤치기','서핑테일','속보','슬로스타트','쓱쓱','엽록소','쿼크차지'];
const _SC_WEATHERS = ['쾌청','비바라기','모래바람','설경'];
const _SC_FIELDS   = ['일렉트릭필드','그래스필드','미스트필드','사이코필드'];

function calcStatIV(base, ev, iv, natM) {
  return Math.floor((base + 20 + (ev||0)) * (natM||1));
}

function scIsSpeedHighest(pk) {
  if (!pk) return false;
  return pk.S >= Math.max(pk.H, pk.A, pk.B, pk.C, pk.D);
}

function calcSCFinal() {
  const pk = sc.pokemon;
  if (!pk) return {base:0, speed:0};

  const base = calcStatIV(pk.S, sc.ev, sc.iv, sc.natM);

  const effRank = Math.max(-6, Math.min(6, sc.rank - (sc.stickyWeb ? 1 : 0)));
  const rankM   = effRank >= 0 ? (2+effRank)/2 : 2/(2-effRank);

  let itemM = 1;
  if      (sc.itemName==='구애스카프')   itemM = 1.5;
  else if (sc.itemName==='검은철구')     itemM = 0.5;
  else if (sc.itemName==='교정깁스')     itemM = 0.5;
  else if (sc.itemName==='스피드파우더') itemM = 2;

  let abilM = 1;
  const abl = sc.abilityName;
  const boostActive = sc.itemName === '부스트에너지';
  if      (abl==='쓱쓱'       && sc.weather==='비바라기')    abilM = 2;
  else if (abl==='엽록소'     && sc.weather==='쾌청')         abilM = 2;
  else if (abl==='모래헤치기' && sc.weather==='모래바람')     abilM = 2;
  else if (abl==='눈치우기'   && sc.weather==='설경')         abilM = 2;
  else if (abl==='서핑테일'   && sc.field==='일렉트릭필드')   abilM = 2;
  else if (abl==='속보'       && sc.status)                   abilM = 1.5;
  else if (abl==='슬로스타트')                                 abilM = 0.5;
  else if (abl==='곡예'       && sc.unburden)                 abilM = 2;
  else if ((abl==='쿼크차지' && (sc.field==='일렉트릭필드'||boostActive)) ||
           (abl==='고대활성' && (sc.weather==='쾌청'||boostActive))) {
    if (scIsSpeedHighest(pk)) abilM = 1.5;
  }

  let statusM = 1;
  if (sc.status==='마비' && abl!=='속보') statusM = 0.5;

  const twM   = sc.tailwind ? 2 : 1;
  const speed = Math.floor(Math.floor(base * rankM) * itemM * abilM * statusM * twM);
  return {base, speed};
}

function scSpinBlock(field, val, bigStep, fmt) {
  const label   = field==='ev'?'노력치':field==='iv'?'개체값':'랭크업';

/* ════════════════════════════
   SPEED SAMPLE RANKING
════════════════════════════ */
let _speedSampleCache = null;

/* 메타 usage id → POKEMON_DATA 실제 폼 이름 매핑 */
function buildSpeedSample() {
  if (_speedSampleCache) return _speedSampleCache;
  if (typeof META_USAGE_DATA === 'undefined' || typeof META_SETS_DATA === 'undefined') return null;

  const key = 's1_single';
  const usage = META_USAGE_DATA[key]?.usage || [];
  const setsMap = {};
  (META_SETS_DATA[key]?.pokemon || []).forEach(p => { setsMap[p.id] = p; });

  const baseEntries = usage.slice(0, 50).map(u => {
    const pk = resolveUsageForm(u);
    if (!pk) return null;

    const setData = setsMap[u.id];
    let evS = 0, natM = 1, natName = null;

    if (setData) {
      evS = setData.ev_spreads?.[0]?.evs?.S || 0;
      natName = setData.natures?.[0]?.name || null;
      if (natName) {
        const nat = NATURES.find(n => n.name === natName);
        natM = natMult(nat, 'S');
      }
    }

    const speed = calcStat(pk.S, evS, false, natM);
    return { name: pk.name, no: pk.no, speed, evS, natM, natName };
  }).filter(Boolean);

  /* add mega forms for each top-50 Pokémon */
  const megaEntries = [];
  const seenMegas = new Set();
  baseEntries.forEach(e => {
    POKEMON_DATA.filter(p =>
      p.no === e.no &&
      p.name.startsWith('메가') &&
      p.name !== '메가니움' &&
      p.champions
    ).forEach(mega => {
      if (seenMegas.has(mega.name)) return;
      seenMegas.add(mega.name);
      const speed = calcStat(mega.S, e.evS, false, e.natM);
      megaEntries.push({ name: mega.name, no: mega.no, speed, evS: e.evS, natName: e.natName });
    });
  });

  const entries = [...baseEntries, ...megaEntries];
  entries.sort((a, b) => b.speed - a.speed);
  _speedSampleCache = entries;
  return entries;
}

function renderSpeedRankList() {
  const el = document.getElementById('speedRankList');
  if (!el) return;

  const entries = buildSpeedSample();
  if (!entries || !entries.length) { el.innerHTML = ''; return; }

  let mySpeed = null, myName = null, myNo = null, myEvS = 0;
  if (sc.pokemon) {
    mySpeed = calcSCFinal().speed;
    myName = sc.pokemon.name;
    myNo = sc.pokemon.no;
    myEvS = sc.ev;
  }

  const isMegaName = n => n.startsWith('메가') && n !== '메가니움';
  const megaBadge = `<span class="sr-mega">${term('forms', '메가')}</span>`;

  const rows = [];
  let myInserted = false;
  let rankCounter = 0;

  for (let i = 0; i < entries.length; i++) {
    const e = entries[i];
    if (mySpeed !== null && !myInserted && mySpeed > e.speed) {
      rankCounter++;
      rows.push({ isMe: true, rank: rankCounter, name: myName, no: myNo, speed: mySpeed, evS: myEvS, natM: sc.natM });
      myInserted = true;
    }
    rankCounter++;
    rows.push({ isMe: false, rank: rankCounter, name: e.name, no: e.no, speed: e.speed, evS: e.evS, natName: e.natName });
  }
  if (mySpeed !== null && !myInserted) {
    rankCounter++;
    rows.push({ isMe: true, rank: rankCounter, name: myName, no: myNo, speed: mySpeed, evS: myEvS, natM: sc.natM });
  }

  const rowHTML = r => {
    const mega = isMegaName(r.name);
    const baseDisplayName = mega ? r.name.replace(/^메가/, '') : r.name;
    const displayName = pokeName(baseDisplayName, r.no);
    const rankSpan = `<span class="sr-rank">${r.rank}</span>`;
    const sprite = `<img src="${spriteUrl(r.name, r.no)}" class="sr-sprite" alt="${displayName}">`;
    const natLabel = r.isMe
      ? (r.natM > 1 ? '↑' : r.natM < 1 ? '↓' : '-')
      : (r.natName ? term('natures', r.natName) : '-');
    const natTxt = `<span class="sr-nat" title="${r.isMe ? '' : (r.natName ? term('natures', r.natName) : '')}">${natLabel}</span>`;
    const evTxt = `<span class="sr-ev">S:${r.evS}</span>`;
    const namePart = `<div class="sr-name-wrap"><span class="sr-name">${displayName}</span>${mega ? megaBadge : ''}</div>`;
    const spdPart = `<span class="sr-spd">${r.speed}</span>`;
    if (r.isMe) {
      return `<div class="sr-item sr-me">${rankSpan}${sprite}${namePart}${natTxt}${evTxt}${spdPart}</div>`;
    }
    return `<div class="sr-item">${rankSpan}${sprite}${namePart}${natTxt}${evTxt}${spdPart}</div>`;
  };

  const html = rows.map(rowHTML).join('');
  el.innerHTML = html;
  const mobEl = document.getElementById('mobSpeedRankList');

  if (mySpeed !== null) {
    const myIdx = rows.findIndex(r => r.isMe);
    if (myIdx >= 0) el.children[myIdx]?.scrollIntoView({ block: 'nearest' });
  }
}

/* ── 메타 사용률/세트 데이터: 항상 깃허브 최신 시즌을 fetch (로컬 정적 파일 미사용) ── */
(async function loadMetaFromGithub() {
  const GITHUB_RAW = 'https://raw.githubusercontent.com/todaystartnoob/pochamsmeta-mong/main/';
  async function ghFetch(path) {
    const r = await fetch(GITHUB_RAW + path);
    if (!r.ok) throw new Error(`fetch ${path} → ${r.status}`);
    return r.json();
  }
  try {
    const idx = await ghFetch('data/index.json');
    let latest = 1;
    (idx.files || []).forEach(fname => {
      const m = fname.match(/champions_s(\d+)_single\.json$/);
      if (m) latest = Math.max(latest, parseInt(m[1]));
    });
    const [usage, sets] = await Promise.all([
      ghFetch(`data/champions_s${latest}_single.json`),
      ghFetch(`data/champions_s${latest}_single_sets.json`).catch(() => null),
    ]);
    window.META_USAGE_DATA = { s1_single: usage };
    window.META_SETS_DATA  = { s1_single: sets || { pokemon: [] } };
  } catch (e) {
    console.error('메타 사용률 데이터 fetch 실패:', e);
    return;
  }
  /* 데이터가 늦게 도착하므로 의존 렌더를 다시 실행 */
  _speedSampleCache = null;
  renderRecommended();
  renderSpeedRankList();
})();

/* 내/상대 파티 슬롯 스트립: 좌우 스와이프로 전환 (방어 상성도 같이 전환) */
(function initPartyEnemySwipe() {
  const stage = document.getElementById('partyEnemyStage');
  if (!stage) return;
  let px = 0, py = 0;
  stage.addEventListener('touchstart', e => {
    px = e.touches[0].clientX; py = e.touches[0].clientY;
  }, { passive: true });
  stage.addEventListener('touchend', e => {
    if (!document.getElementById('appBody')?.classList.contains('big-mode')) return;
    const dx = e.changedTouches[0].clientX - px;
    const dy = e.changedTouches[0].clientY - py;
    if (Math.abs(dx) < 40 || Math.abs(dx) < Math.abs(dy) * 1.2) return;
    if (dx < 0) setPartyEnemyView('enemy');  // 왼쪽 스와이프 → 상대 파티
    if (dx > 0) setPartyEnemyView('party');  // 오른쪽 스와이프 → 내 파티
  }, { passive: true });
})();

(function initMobileNav() {
  const MOBILE_BP = 1280;
  const PANELS = ['speed', 'detail', 'calc'];
  const wrap = document.getElementById('mobPanelWrap');
  const tabBar = document.getElementById('mobileTabBar');
  let curPanel = 'detail';

  function isMobile() {
    return window.innerWidth <= MOBILE_BP || window.matchMedia('(pointer:coarse)').matches;
  }

  function setPanel(p) {
    if (!PANELS.includes(p)) return;
    curPanel = p;
    if (wrap) wrap.dataset.panel = p;
    document.querySelectorAll('.mob-tab-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.panel === p));
  }

  function applyMobile() {
    if (!isMobile()) return;
    if (wrap && !wrap.dataset.panel) setPanel('detail');
  }

  /* Tab bar clicks — use delegation so HTML order doesn't matter */
  document.body.addEventListener('click', e => {
    const btn = e.target.closest('.mob-tab-btn');
    if (btn) setPanel(btn.dataset.panel);
  });

  /* Mobile action bar buttons */
  document.body.addEventListener('click', e => {
    if (e.target.closest('#mobSaveBtn')) {
      saveParty();
      window.location.href = 'party-box.html';
    }
    if (e.target.closest('#mobLoadBtn')) {
      window.location.href = 'party-box.html';
    }
    if (e.target.closest('#mobEnemyClearBtn')) {
      for (let i = 0; i < 6; i++) enemyParty[i] = { pokemon: null };
      saveEnemyParty(); renderEnemySlots();
    }
  });

  /* Calc sub-panel: swipe within 계산기 tab to switch 결정력 ↔ 내구력 */
  let dcSide = 'power';
  function setDcSide(s) {
    dcSide = s;
    const cols = document.querySelector('#powerCalcBody .dc-cols');
    if (cols) cols.classList.toggle('show-dur', s === 'dur');
    const title = document.querySelector('#powerCalcPanel .calc-panel-title');
    if (title) title.textContent = s === 'dur' ? t('dur_calc_title') : t('power_calc_title');
  }
  let cx = 0, cy = 0;
  const calcPanelEl = document.getElementById('powerCalcPanel');
  if (calcPanelEl) {
    calcPanelEl.addEventListener('touchstart', e => {
      cx = e.touches[0].clientX; cy = e.touches[0].clientY;
    }, { passive: true });
    calcPanelEl.addEventListener('touchend', e => {
      if (!isMobile()) return;
      const dx = e.changedTouches[0].clientX - cx;
      const dy = e.changedTouches[0].clientY - cy;
      if (Math.abs(dx) < 40 || Math.abs(dx) < Math.abs(dy) * 1.2) return;
      if (dx < 0 && dcSide === 'power') setDcSide('dur');  // 왼쪽 스와이프 → 내구력
      if (dx > 0 && dcSide === 'dur') setDcSide('power');  // 오른쪽 스와이프 → 결정력
    }, { passive: true });
  }

  /* Speed sub-panel: swipe within 스피드 tab to switch 계산기 ↔ 샘플 */
  let scSide = 'calc';
  function setScSide(s) {
    scSide = s;
    const cols = document.getElementById('scCols');
    if (cols) cols.classList.toggle('show-sample', s === 'sample');
    const title = document.querySelector('#speedCalcPanel .calc-panel-title');
    if (title) title.textContent = s === 'sample' ? t('speed_sample_title') : t('speed_calc_title');
  }
  let sx = 0, sy = 0;
  const speedPanelEl = document.getElementById('speedCalcPanel');
  if (speedPanelEl) {
    speedPanelEl.addEventListener('touchstart', e => {
      sx = e.touches[0].clientX; sy = e.touches[0].clientY;
    }, { passive: true });
    speedPanelEl.addEventListener('touchend', e => {
      if (!isMobile()) return;
      const dx = e.changedTouches[0].clientX - sx;
      const dy = e.changedTouches[0].clientY - sy;
      if (Math.abs(dx) < 40 || Math.abs(dx) < Math.abs(dy) * 1.2) return;
      if (dx > 0 && scSide === 'calc') setScSide('sample');   // 오른쪽 스와이프 → 샘플(왼쪽)
      if (dx < 0 && scSide === 'sample') setScSide('calc');  // 왼쪽 스와이프 → 계산기(오른쪽)
    }, { passive: true });
  }

  /* Global setter (used by showPanel) */
  window._setMobPanel = function(p) { if (isMobile()) setPanel(p); };

  /* Init + resize */
  applyMobile();
  window.addEventListener('resize', applyMobile);
})();
</script>

/* i18n 핵심 함수(I18N/LANG/loadI18n/pokeName/term/t/itemCat)는 파일 상단으로 이동됨 */
function applyNavSettingsLabels() {
  const navMap = { navParty: 'nav_party', navBox: 'nav_box', navMeta: 'nav_meta', navDex: 'nav_dex' };
  for (const id in navMap) { const el = document.getElementById(id); if (el) el.textContent = t(navMap[id]); }
  const navSettingsBtn = document.getElementById('navSettingsBtn');
  if (navSettingsBtn) navSettingsBtn.title = t('settings_btn_title');
  const setMap = {
    setTitleLbl: 'settings_title', setLangLbl: 'lang_lbl', setThemeLbl: 'theme_lbl',
    setDataMgmtLbl: 'data_mgmt_lbl', setClearBtn: 'clear_btn',
    setClearDesc: 'clear_desc', setContactLbl: 'contact_lbl',
  };
  for (const id in setMap) { const el = document.getElementById(id); if (el) el.textContent = t(setMap[id]); }
  document.querySelectorAll('#setThemeSel option[data-ko-name]').forEach(o => {
    o.textContent = pokeName(o.dataset.koName, o.dataset.no) + ' ' + t('theme_lbl');
  });

  const powerTitle = document.querySelector('#powerCalcPanel .calc-panel-title');
  if (powerTitle) powerTitle.textContent = (typeof dcSide !== 'undefined' && dcSide === 'dur') ? t('dur_calc_title') : t('power_calc_title');
  const speedTitle = document.querySelector('#speedCalcPanel .calc-panel-title');
  if (speedTitle) speedTitle.textContent = (typeof scSide !== 'undefined' && scSide === 'sample') ? t('speed_sample_title') : t('speed_calc_title');
  ['srTitleMob','srTitleMain'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = t('speed_sample_title'); });
  ['srHdNat1','srHdNat2'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = t('nature'); });
  ['srHdEv1','srHdEv2'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = t('evs'); });
  ['srHdSpd1','srHdSpd2'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = t('actual_value2'); });
  const recTitleText = document.getElementById('recTitleText');
  if (recTitleText) recTitleText.textContent = t('recommended_pokemon_title');
  const mobTabMap = { mobTabSpeedTxt: 'mob_tab_speed', mobTabDetailTxt: 'mob_tab_detail', mobTabCalcTxt: 'mob_tab_calc' };
  for (const id in mobTabMap) { const el = document.getElementById(id); if (el) el.textContent = t(mobTabMap[id]); }
  const mobActMap = {
    mobSaveBtnTxt: 'mob_save_btn', mobLoadBtnTxt: 'mob_load_btn', mobEnemyClearBtnTxt: 'mob_enemy_clear_btn',
    mobChartTabParty: 'my_party_matchup_tab', mobChartTabEnemy: 'opp_party_matchup_tab',
  };
  for (const id in mobActMap) { const el = document.getElementById(id); if (el) el.textContent = t(mobActMap[id]); }

  const staticModalMap = {
    pokeModalTitle: 'select_pokemon_title', moveModalTitleStatic: 'select_move_title',
    itemModalTitle: 'select_item_title', natureModalTitle: 'select_nature_title',
    natureTableHint: 'nature_table_hint', boxModalTitle: 'nav_box',
    pokeFilterAllBtn: 'all', pokeFilterIngameBtn: 'champions_legal',
    moveFilterAllBtn: 'all', moveFilterPhysBtn: 'cat_physical',
    moveFilterSpecBtn: 'cat_special', moveFilterStatusBtn: 'cat_status',
  };
  for (const id in staticModalMap) { const el = document.getElementById(id); if (el) el.textContent = t(staticModalMap[id]); }
  const pokeSearchInp = document.getElementById('pokeSearch');
  if (pokeSearchInp) pokeSearchInp.placeholder = t('search_by_name_placeholder');
  const moveSearchInp = document.getElementById('moveSearch');
  if (moveSearchInp) moveSearchInp.placeholder = t('move_name_search_placeholder');
  const itemSearchInp = document.getElementById('itemSearch');
  if (itemSearchInp) itemSearchInp.placeholder = t('item_name_search_placeholder');
  document.querySelectorAll('#itemFilterRow .f-btn[data-if]').forEach(b => {
    const f = b.dataset.if;
    b.textContent = f === 'all' ? t('all') : f === '포챔스' ? t('champions_legal') : itemCat(f);
  });
  document.querySelectorAll('#typeFilterRow .tf-btn[data-type]').forEach(b => {
    b.textContent = term('types', b.dataset.type);
  });

  /* 메인 콘텐츠도 함께 재렌더링 (언어 전환 시 즉시 반영) */
  if (typeof renderSlots === 'function') renderSlots();

  if (typeof selectedSlot !== 'undefined' && selectedSlot >= 0 && typeof renderDetail === 'function') renderDetail(selectedSlot);
  if (typeof window.initPowerCalc === 'function') window.initPowerCalc();
}

loadI18n().then(applyNavSettingsLabels);

<script>
/* ── 이브이즈 테마 ── */
const THEME_DEFS = [
  { id: 'eevee',    name: '이브이',     no: 133 },
  { id: 'vaporeon', name: '샤미드',     no: 134 },
  { id: 'jolteon',  name: '쥬피썬더',   no: 135 },
  { id: 'flareon',  name: '부스터',     no: 136 },
  { id: 'espeon',   name: '에브이',     no: 196 },
  { id: 'umbreon',  name: '블래키',     no: 197 },
  { id: 'leafeon',  name: '리피아',     no: 470 },
  { id: 'glaceon',  name: '글레이시아', no: 471 },
  { id: 'sylveon',  name: '님피아',     no: 700 },
];
function applyTheme(themeId) {
  if (themeId) document.documentElement.setAttribute('data-theme', themeId);
  else document.documentElement.removeAttribute('data-theme');
}
function detectDefaultTheme() {
  const saved = localStorage.getItem('pochams_theme');
  if (saved !== null) return saved;
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) return 'umbreon';
  return '';
}
applyTheme(detectDefaultTheme());

(function initSettingsModal() {
  const overlay = document.getElementById('setOverlay');
  const logo = document.querySelector('.nav-logo');
  const closeBtn = document.getElementById('setCloseBtn');
  const clearBtn = document.getElementById('setClearBtn');
  const langSel = document.getElementById('setLangSel');
  const themeSel = document.getElementById('setThemeSel');
  if (!overlay || !logo) return;
  document.getElementById('navSettingsBtn')?.addEventListener('click', () => overlay.classList.add('open'));
  closeBtn?.addEventListener('click', () => overlay.classList.remove('open'));
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
  clearBtn?.addEventListener('click', () => {
    if (!confirm(t('confirm_clear_all_data'))) return;
    Object.keys(localStorage).filter(k => k.startsWith('pochams_')).forEach(k => localStorage.removeItem(k));
    alert(t('alert_data_cleared'));
    location.reload();
  });
  if (langSel) {
    langSel.value = typeof LANG !== 'undefined' ? LANG : (localStorage.getItem('lang') || 'ko');
    langSel.addEventListener('change', () => {
      localStorage.setItem('lang', langSel.value);
      LANG = langSel.value;
      applyNavSettingsLabels();
    });
  }
  if (themeSel) {
    THEME_DEFS.forEach(theme => {
      const o = document.createElement('option');
      o.value = theme.id;
      o.textContent = pokeName(theme.name, theme.no) + ' ' + t('theme_lbl');
      o.dataset.koName = theme.name;
      o.dataset.no = theme.no;
      themeSel.appendChild(o);
    });
    themeSel.value = document.documentElement.getAttribute('data-theme') || '';
    themeSel.addEventListener('change', () => {
      localStorage.setItem('pochams_theme', themeSel.value);
      applyTheme(themeSel.value);
    });
  }
})();
</script>
