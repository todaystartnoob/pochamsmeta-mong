    } catch(e) {}
  })();

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --purple:#b89dcc;
      --slot-bg:rgba(255,255,255,.92);
      --card-bg:rgba(238,230,250,.97);
      --row-bg:#ddd0ee;
      --move-bg:#bcaace;
      --chart-bg:#3f3858;
      --btn-red:#e53935;
      --accent:#7b3fa0;
      --accent-dark:#5a2d7a;
      --label-muted:#9070b0;
      --hover-bg:#ede0f5;
      --nav-active-bg:#d4b8e8;
      --nav-active-text:#4a1d8a;
      --text-main:#333;
      --text-soft:#555;
      --text-mute:#888;
      --text-dim:#444;
      --navbar-bg:rgba(255,255,255,.97);
      --tooltip-bg:rgba(30,24,50,.97);
      --tooltip-text:#e8e0f8;
      --tooltip-border:rgba(255,255,255,.08);
      --tooltip-stat:#c8b8e8;
    --scroll-thumb:rgba(51,51,51,.22);--scroll-track:rgba(51,51,51,.05);--scroll-thumb-accent:rgba(123,63,160,.32);}
    /* ── 이브이즈 테마 ── */
    [data-theme="eevee"]{--purple:#d9c0a0;--slot-bg:rgba(255,250,240,.92);--card-bg:rgba(250,240,225,.97);--row-bg:#ede0c8;--move-bg:#d8c0a0;--chart-bg:#4a3828;--accent:#8b5a2b;--accent-dark:#6b4420;--label-muted:#a07850;--hover-bg:#f5ebd8;--nav-active-bg:#e0c8a0;--nav-active-text:#5a3a18;--scroll-thumb:rgba(51,51,51,.22);--scroll-track:rgba(51,51,51,.05);--scroll-thumb-accent:rgba(139,90,43,.32);}
    [data-theme="vaporeon"]{--purple:#a8c8e8;--slot-bg:rgba(240,248,255,.92);--card-bg:rgba(225,240,250,.97);--row-bg:#cce5f5;--move-bg:#a8c8dc;--chart-bg:#1e3a52;--accent:#2e6da4;--accent-dark:#1d4d78;--label-muted:#5a8ab8;--hover-bg:#e0f0fa;--nav-active-bg:#b8d8f0;--nav-active-text:#1a4a78;--scroll-thumb:rgba(51,51,51,.22);--scroll-track:rgba(51,51,51,.05);--scroll-thumb-accent:rgba(46,109,164,.32);}
    [data-theme="jolteon"]{--purple:#f5e08a;--slot-bg:rgba(255,253,235,.92);--card-bg:rgba(253,248,225,.97);--row-bg:#f5e8b0;--move-bg:#e0cc80;--chart-bg:#4a3c10;--accent:#cf9d00;--accent-dark:#a8830a;--label-muted:#b89a3c;--hover-bg:#fdf6d8;--nav-active-bg:#f0d878;--nav-active-text:#6a4f00;--scroll-thumb:rgba(51,51,51,.22);--scroll-track:rgba(51,51,51,.05);--scroll-thumb-accent:rgba(207,157,0,.32);}
    [data-theme="flareon"]{--purple:#f0b088;--slot-bg:rgba(255,243,235,.92);--card-bg:rgba(253,235,220,.97);--row-bg:#f5d0b8;--move-bg:#e0a878;--chart-bg:#4a2818;--accent:#d4651e;--accent-dark:#a84a14;--label-muted:#c07848;--hover-bg:#fde8d8;--nav-active-bg:#f0c0a0;--nav-active-text:#7a3008;--scroll-thumb:rgba(51,51,51,.22);--scroll-track:rgba(51,51,51,.05);--scroll-thumb-accent:rgba(212,101,30,.32);}
    [data-theme="espeon"]{--purple:#d0a8e0;--slot-bg:rgba(250,240,253,.92);--card-bg:rgba(245,230,250,.97);--row-bg:#ecd0f0;--move-bg:#d0a8dc;--chart-bg:#3a2050;--accent:#9b3fc0;--accent-dark:#7a2d9a;--label-muted:#b070c8;--hover-bg:#f5e0fa;--nav-active-bg:#e0b8f0;--nav-active-text:#5a1d7a;--scroll-thumb:rgba(51,51,51,.22);--scroll-track:rgba(51,51,51,.05);--scroll-thumb-accent:rgba(155,63,192,.32);}
    [data-theme="umbreon"]{--purple:#23222b;--slot-bg:rgba(50,47,45,.95);--card-bg:rgba(38,37,45,.97);--row-bg:#322e2c;--move-bg:#3c3946;--chart-bg:#1c1b22;--accent:#bfa05a;--accent-dark:#8f7a45;--label-muted:#8c8296;--hover-bg:#3a3528;--nav-active-bg:#423c2c;--nav-active-text:#d8bf6e;--text-main:#d6d2dc;--text-soft:#b8b3c2;--text-mute:#8e899a;--text-dim:#a8a3b2;--navbar-bg:rgba(34,33,40,.97);--tooltip-bg:rgba(46,44,53,.97);--tooltip-text:#d6d2dc;--tooltip-border:rgba(191,160,90,.18);--tooltip-stat:#bfa05a;--scroll-thumb:rgba(214,210,220,.22);--scroll-track:rgba(214,210,220,.05);--scroll-thumb-accent:rgba(191,160,90,.32);}
    [data-theme="leafeon"]{--purple:#a8d0a0;--slot-bg:rgba(240,250,238,.92);--card-bg:rgba(228,245,225,.97);--row-bg:#c8e8c0;--move-bg:#a0c898;--chart-bg:#1e3a1a;--accent:#2e8b3d;--accent-dark:#1d6b2a;--label-muted:#5a9a5c;--hover-bg:#e0f5dc;--nav-active-bg:#b8e0b0;--nav-active-text:#1a5a20;--scroll-thumb:rgba(51,51,51,.22);--scroll-track:rgba(51,51,51,.05);--scroll-thumb-accent:rgba(46,139,61,.32);}
    [data-theme="glaceon"]{--purple:#aee0ec;--slot-bg:rgba(238,252,253,.92);--card-bg:rgba(224,248,250,.97);--row-bg:#c8eef2;--move-bg:#9cd0da;--chart-bg:#163842;--accent:#1e9bb0;--accent-dark:#157888;--label-muted:#4ea0b0;--hover-bg:#daf6f8;--nav-active-bg:#b0e8ee;--nav-active-text:#0d5a68;--scroll-thumb:rgba(51,51,51,.22);--scroll-track:rgba(51,51,51,.05);--scroll-thumb-accent:rgba(30,155,176,.32);}
    [data-theme="sylveon"]{--purple:#f0b8d0;--slot-bg:rgba(255,242,248,.92);--card-bg:rgba(253,232,242,.97);--row-bg:#f7d4e4;--move-bg:#eab0c8;--chart-bg:#4a2038;--accent:#d4508a;--accent-dark:#a83a6c;--label-muted:#c0709c;--hover-bg:#fde4f0;--nav-active-bg:#f0c0d8;--nav-active-text:#7a1d4e;--scroll-thumb:rgba(51,51,51,.22);--scroll-track:rgba(51,51,51,.05);--scroll-thumb-accent:rgba(212,80,138,.32);}
    body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--purple);height:100vh;height:100dvh;overflow:hidden;transition:background-color .25s ease;}

    /* ── NAVBAR ── */
    .navbar{height:54px;background:var(--navbar-bg);display:flex;align-items:center;justify-content:space-between;padding:0 32px;box-shadow:0 2px 10px rgba(0,0,0,.12);position:relative;z-index:20;}
    .nav-logo{display:flex;align-items:center;}.nav-logo img{height:46px;object-fit:contain;}
    .nav-links{display:flex;gap:6px;}
    .nav-links a{text-decoration:none;color:var(--text-dim);font-size:14px;padding:5px 14px;border-radius:6px;transition:background .2s,color .2s;}
    .nav-links a:hover{background:var(--hover-bg);color:var(--accent);}
    .nav-settings-btn{background:none;border:none;font-size:17px;cursor:pointer;color:#777;padding:4px 9px;border-radius:6px;transition:background .15s,color .15s;margin-left:2px;line-height:1;}
    .nav-settings-btn:hover{background:var(--hover-bg);color:var(--accent);}
    .nav-links a.active{background:var(--nav-active-bg);color:var(--nav-active-text);font-weight:600;}
    .nav-ana-toggle{display:none;background:var(--accent);color:#fff;border:none;padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;}

    /* ── APP BODY ── */
    .app-wrap{display:flex;flex-direction:column;height:calc(100vh - 54px);}
    .app-body{display:flex;flex:1;min-height:0;padding:10px 12px;gap:10px;overflow:hidden;}
    .rec-panel{flex:0 0 230px;background:var(--card-bg);display:flex;flex-direction:column;padding:8px 0 10px;gap:6px;overflow:hidden;border-radius:14px;margin:0 12px 10px;opacity:0;pointer-events:none;transform:translateY(10px);transition:flex-basis .25s ease,opacity .18s ease,transform .18s ease;}
    .rec-panel.visible{opacity:1;pointer-events:all;transform:translateY(0);transition:flex-basis .25s ease,opacity .3s ease .15s,transform .3s ease .15s;}
    .rec-panel.collapsed{flex-basis:36px;}
    /* ── REC CARDS V2 ── */

    .rcv-card{background:var(--chart-bg);border:1px solid var(--tooltip-border);border-radius:10px;padding:9px 12px 12px;flex-shrink:0;width:320px;display:flex;flex-direction:column;gap:5px;transition:border-color .15s,box-shadow .15s;}
    .rcv-card:hover{border-color:var(--accent);box-shadow:0 2px 12px rgba(0,0,0,.25);}
    .rcv-head{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
    .rcv-name{font-size:12px;font-weight:700;color:var(--tooltip-text);margin-right:2px;flex-shrink:0;}
    .rcv-chip{font-size:8px;font-weight:700;padding:2px 6px;border-radius:3px;white-space:nowrap;flex-shrink:0;}
    .rcv-rank{background:var(--tooltip-bg);color:var(--label-muted);border:1px solid var(--tooltip-border);}
    .rcv-score{background:var(--accent);color:#fff;}
    .rcv-tag{background:var(--tooltip-bg);color:var(--accent);border:1px solid var(--tooltip-border);}
    .rcv-body{display:flex;align-items:center;gap:8px;}
    .rcv-sprite{width:50px;height:50px;image-rendering:pixelated;object-fit:contain;flex-shrink:0;}
    .rcv-stats-grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:3px 5px;}
    .rcv-stat{background:rgba(255,255,255,.04);border-radius:5px;padding:4px 6px;}
    .rcv-stat-lbl{font-size:7px;color:var(--label-muted);margin-bottom:1px;}
    .rcv-stat-val{font-size:9.5px;font-weight:600;color:var(--tooltip-text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .rcv-spd{color:var(--tooltip-text)!important;font-size:12px!important;}
    .rcv-reason{font-size:8.5px;color:var(--label-muted);padding:1px 0;}
    .rcv-reason span{color:var(--accent);font-weight:700;}
    .rcv-bottom{display:flex;align-items:center;gap:4px;flex-wrap:wrap;padding-top:6px;border-top:1px solid var(--tooltip-border);margin-top:auto;}
    .rcv-sc{font-size:7.5px;color:var(--label-muted);background:var(--tooltip-bg);border-radius:3px;padding:2px 5px;}
    .rcv-add-btn{margin-left:auto;font-size:9px;font-weight:700;padding:4px 12px;border:1.5px solid var(--accent-dark);border-radius:5px;background:transparent;color:var(--accent);cursor:pointer;font-family:inherit;transition:background .12s,color .12s;flex-shrink:0;}
    .rcv-add-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
    .rec-toggle-chevron{margin-left:auto;font-size:9px;transition:transform .25s ease;line-height:1;color:var(--label-muted);}
    .rec-panel.collapsed .rec-toggle-chevron{transform:rotate(180deg);}
    .rec-title{font-size:12px;font-weight:700;color:var(--label-muted);padding:0 14px 6px;border-bottom:1px solid var(--hover-bg);letter-spacing:.4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;user-select:none;}
    .rec-title:hover .rec-toggle-chevron{color:var(--accent);}
    .rec-list{display:flex;flex-direction:row;gap:7px;overflow-x:auto;overflow-y:visible;flex:1;align-items:stretch;padding:2px 14px 4px;justify-content:safe center;}
    .rec-list::-webkit-scrollbar{height:4px;}
    .rec-list::-webkit-scrollbar-thumb{background:var(--scroll-thumb-accent);border-radius:2px;}
    .rec-card{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 6px 5px;border-radius:14px;background:rgba(255,255,255,.7);cursor:pointer;flex-shrink:0;width:72px;transition:background .14s,transform .14s;border:2px solid transparent;}
    .rec-card:hover{background:#fff;border-color:var(--accent);transform:translateY(-3px);}
    .rec-card img{width:52px;height:52px;image-rendering:pixelated;object-fit:contain;}
    .rec-card-name{font-size:9px;color:var(--text-dim);text-align:center;word-break:keep-all;line-height:1.3;max-width:68px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .rec-card-types{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;}

    /* ── PARTY SIDEBAR ── */
    .party-sidebar{display:flex;flex-direction:column;gap:7px;flex-shrink:0;}
    .party-action-btns{display:flex;flex-direction:column;gap:7px;margin-top:auto;padding-top:7px;}
    .party-act-btn{width:68px;height:68px;border-radius:10px;border:none;font-size:10px;font-weight:700;cursor:pointer;transition:transform .18s cubic-bezier(.34,1.56,.64,1),box-shadow .18s,filter .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;box-shadow:0 2px 8px rgba(0,0,0,.12);line-height:1.3;flex-shrink:0;}
    .party-act-btn:hover{transform:scale(1.07);box-shadow:0 4px 14px rgba(0,0,0,.18);filter:brightness(1.05);}
    .party-act-btn.save{background:var(--accent);color:#fff;}
    .party-act-btn.load{background:var(--hover-bg);color:var(--accent-dark);}
    .party-slot{width:68px;height:68px;background:var(--slot-bg);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;transition:transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .22s ease,background .18s ease;box-shadow:0 2px 8px rgba(0,0,0,.1);flex-shrink:0;}
    .party-slot:hover{transform:scale(1.09) translateX(5px);box-shadow:6px 4px 18px rgba(0,0,0,.22);background:var(--card-bg);}
    .party-slot.active{transform:translateX(6px);box-shadow:-3px 0 0 0 var(--accent),5px 4px 14px rgba(0,0,0,.2);background:var(--card-bg);}
    .slot-plus{color:#bbb;font-size:24px;font-weight:200;user-select:none;transition:color .2s;}
    .party-slot:hover .slot-plus{color:var(--accent);}
    .slot-img{width:56px;height:56px;image-rendering:pixelated;object-fit:contain;}
    .slot-del{position:absolute;top:3px;right:3px;width:15px;height:15px;background:rgba(180,0,0,.8);color:#fff;border-radius:50%;font-size:8px;display:none;align-items:center;justify-content:center;cursor:pointer;z-index:2;transition:background .15s;}
    .party-slot:hover .slot-del.on{display:flex;}
    .slot-del:hover{background:#c00;}

    /* ── AD PANELS ── */
    .ad-panel{display:none;background:rgba(0,0,0,.12);width:190px;flex-shrink:0;opacity:0;}
    /* ── BIG MODE (default state) ── */
    .app-body.big-mode{flex:0 0 auto;display:flex;flex-direction:row;align-items:stretch;padding:10px 8px;gap:8px;box-sizing:border-box;}
    #appBody.big-mode ~ #recPanel{display:none;}
    .app-body.big-mode .detail-area,
    .app-body.big-mode .calc-panel,
    .app-body.big-mode > .analysis-sidebar{display:none;}
    .app-body.big-mode .mob-panel-wrap{display:none;}
    /* party-enemy-stage: transparent passthrough on desktop so partySidebar/enemySidebar act as direct flex children */
    .party-enemy-stage{display:contents;}
    .pe-stage-dots{display:none;}
    /* explicit flex order so desktop visual sequence is DOM-position independent (party-enemy-stage groups them in markup) */
    .app-body.big-mode #leftAd{order:1;}
    .app-body.big-mode #partySidebar{order:2;}
    .app-body.big-mode #bigPartyChart{order:3;}
    .app-body.big-mode #bigEnemyChart{order:4;}
    .app-body.big-mode #enemySidebar{order:5;}
    .app-body.big-mode #rightAd{order:6;}
    /* ad panels */
    .app-body.big-mode .ad-panel{display:flex;width:150px;flex-shrink:0;border-radius:10px;}
    /* party: narrow vertical column */
    .app-body.big-mode #partySidebar{display:flex;flex-direction:column;width:112px;flex-shrink:0;gap:5px;padding:6px;align-items:center;}
    .app-body.big-mode .party-slot{width:94px;height:94px;border-radius:10px;}
    .app-body.big-mode .party-slot:hover{transform:scale(1.04);box-shadow:0 4px 16px rgba(0,0,0,.2);background:var(--card-bg);}
    .app-body.big-mode .slot-img{width:78px;height:78px;}
    .app-body.big-mode .slot-plus{font-size:28px;}
    .app-body.big-mode .party-action-btns{display:none;}
    /* ── ENEMY SIDEBAR ── */
    .enemy-sidebar{display:none;flex-direction:column;width:112px;flex-shrink:0;gap:5px;padding:6px;align-items:center;}
    .app-body.big-mode #enemySidebar{display:flex;}
    .enemy-slot{width:94px;height:94px;background:var(--slot-bg);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;transition:transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .22s ease,background .18s ease;box-shadow:0 2px 8px rgba(0,0,0,.1);flex-shrink:0;}
    .enemy-slot:hover{transform:scale(1.04);box-shadow:0 4px 16px rgba(0,0,0,.2);background:var(--card-bg);}
    .enemy-slot:hover .slot-del.on{display:flex;}
    /* ── BIG MODE BUTTONS ── */
    .big-mode-btns{display:flex;flex-direction:column;gap:4px;width:100%;padding-top:4px;}
    .big-act-btn{width:100%;padding:7px 2px;border-radius:8px;border:none;font-size:10px;font-weight:700;cursor:pointer;transition:filter .15s;white-space:nowrap;text-align:center;}
    .big-act-btn:hover{filter:brightness(1.1);}
    .big-act-btn.load{background:var(--accent);color:#fff;}
    .big-act-btn.clear{background:var(--hover-bg);color:var(--accent-dark);}
    /* ── BIG MODE CHART PANELS ── */
    .big-mode-chart{display:none;background:var(--chart-bg);border-radius:12px;padding:10px 12px;overflow-y:auto;flex-shrink:0;scrollbar-width:none;transition:opacity .25s ease;}
    .big-mode-chart::-webkit-scrollbar{display:none;}
    .app-body.big-mode #bigPartyChart{display:flex;flex-direction:column;flex:1;min-width:0;}
    .app-body.big-mode #bigEnemyChart{display:flex;flex-direction:column;flex:1;min-width:0;}
    .big-chart-title{font-size:11px;font-weight:700;color:var(--label-muted);padding-bottom:5px;border-bottom:1px solid var(--hover-bg);margin-bottom:6px;letter-spacing:.4px;flex-shrink:0;}
    /* scale-up ptc inside big-mode charts */
    .big-mode-chart .ptc-lbl{flex:0 0 38px;font-size:10px;height:20px;line-height:20px;padding:0 3px;}
    .big-mode-chart .ptc-cell{height:20px;font-size:10px;}
    .big-mode-chart .ptc-th img{width:26px;height:26px;}
    .big-mode-chart .ptc-header{padding-left:40px;margin-bottom:4px;}
    .big-mode-chart .ptc-type-row{margin-bottom:2px;}
    /* party chart summary */
    .pcs-wrap{margin-top:8px;padding-top:8px;border-top:1px solid var(--hover-bg);flex-shrink:0;display:flex;flex-direction:column;gap:5px;}
    .pcs-row{display:flex;align-items:flex-start;gap:6px;}
    .pcs-lbl{font-size:9px;font-weight:700;color:#fff;padding:2px 6px;border-radius:4px;flex-shrink:0;margin-top:2px;min-width:28px;text-align:center;line-height:1.4;}
    .pcs-lbl.pcs-weak{background:#c62828;}
    .pcs-lbl.pcs-strong{background:#2e7d32;}
    .pcs-lbl.pcs-neutral{background:#546e7a;}
    .pcs-badges{display:flex;flex-wrap:wrap;gap:3px;}
    .pcs-tbadge{font-size:9px;font-weight:700;color:#fff;padding:2px 6px;border-radius:4px;}
    .pcs-none{font-size:9px;color:var(--label-muted);margin-top:3px;}
    /* ── BOTTOM AD ── */
    .bottom-ad-panel{display:none;min-height:72px;background:rgba(0,0,0,.12);border-radius:10px;margin:0 8px 8px;flex:1;opacity:0;}
    #appBody.big-mode ~ .bottom-ad-panel{display:block;}

    /* ── DETAIL OVERLAY ── */
    .detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:4;opacity:0;pointer-events:none;transition:opacity .3s ease;}
    .detail-overlay.visible{opacity:1;}

    /* ── DETAIL AREA ── */
    .detail-area{width:410px;flex:none;opacity:0;transform:translateX(-16px);transition:opacity .3s ease,transform .3s ease;pointer-events:none;overflow-y:auto;position:relative;z-index:5;}
    .detail-area.visible{opacity:1;transform:translateX(0);pointer-events:all;}
    .party-sidebar{position:relative;z-index:5;}
    .detail-card{background:var(--card-bg);border-radius:14px;padding:12px 18px 14px;box-shadow:0 4px 22px rgba(0,0,0,.13);min-height:100%;}
    .detail-charts{display:flex;flex-direction:row;gap:8px;padding:10px 0 14px;}
    .detail-charts .analysis-box{flex:1;min-width:0;}
    .card-topbar{display:flex;align-items:center;margin-bottom:8px;gap:5px;}
    .btn-box-action{background:var(--hover-bg);border:none;padding:3px 8px;border-radius:5px;font-size:10px;cursor:pointer;color:var(--accent-dark);transition:background .15s;font-family:inherit;}
    .btn-box-action:hover{background:var(--nav-active-bg);}
    .detail-close{background:var(--hover-bg);border:none;padding:3px 10px;border-radius:5px;font-size:11px;cursor:pointer;color:var(--text-dim);transition:all .15s;font-family:inherit;}
    .detail-close:hover{background:#f0c8c8;color:#c00;}

    /* Pokemon header */
    .poke-header{display:flex;gap:12px;margin-bottom:12px;}
    .poke-img-col{flex-shrink:0;width:155px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
    .poke-img-col:hover .poke-main-img{opacity:.75;transform:scale(1.05);}
    .poke-main-img{transition:opacity .18s,transform .18s;}
    .poke-main-img{width:132px;height:132px;image-rendering:pixelated;object-fit:contain;}
    .poke-name-row{display:flex;align-items:center;gap:6px;}
    .poke-name{font-size:14px;font-weight:700;color:var(--text-main);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:98px;}
    .poke-nickname-inp{flex:1;min-width:0;border:1.5px solid var(--nav-active-bg);border-radius:6px;padding:3px 8px;font-size:11px;font-family:inherit;outline:none;background:#faf6ff;transition:border-color .15s;}
    .poke-nickname-inp:focus{border-color:var(--accent);background:#fff;}
    .poke-type-row{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;}
    .type-mini-badge{padding:2px 8px;border-radius:4px;font-size:11px;color:#fff;font-weight:600;}

    /* Stats */
    .stats-col{flex:1;min-width:0;}
    .stat-row{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
    .stat-lbl{width:16px;font-size:13px;font-weight:700;color:var(--text-soft);text-align:center;flex-shrink:0;}
    .stat-bar-bg{flex:1;height:9px;background:#ddd;border-radius:4px;overflow:hidden;}
    .stat-bar-fill{height:100%;border-radius:4px;transition:width .5s ease;}
    .stat-actual{width:34px;font-size:12px;text-align:right;color:var(--text-main);font-weight:600;flex-shrink:0;}
    .stat-base{width:24px;font-size:10px;text-align:right;color:#aaa;flex-shrink:0;}
    .ev-input{width:42px;height:22px;border:1px solid var(--slot-bg);border-radius:4px;font-size:11px;text-align:center;outline:none;padding:0 2px;transition:border-color .15s;background:var(--card-bg);color:var(--text-main);}
    .ev-input:focus{border-color:var(--accent);}

    .stat-lbl.nat-up{color:#e53935!important;}
    .stat-lbl.nat-dn{color:#1976d2!important;}
    .stat-actual.nat-up{color:#e53935!important;}
    .stat-actual.nat-dn{color:#1976d2!important;}
    .ev-total-row{font-size:12px;color:var(--text-mute);margin-top:3px;margin-bottom:3px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:3px 6px;}
    .ev-total-row span{color:var(--accent);font-weight:700;}
    .gender-btn{border:none;background:rgba(0,0,0,.06);cursor:pointer;font-size:13px;font-weight:700;padding:1px 7px;border-radius:5px;color:#bbb;transition:color .15s,background .15s;line-height:1.5;}
    .gender-btn.male{color:#4a90e2;background:rgba(74,144,226,.15);}
    .gender-btn.female{color:#e2609a;background:rgba(226,96,154,.15);}
    .det-gender-tab{border:1.5px solid var(--slot-bg);background:var(--slot-bg);cursor:pointer;font-size:12px;font-weight:700;padding:2px 8px;border-radius:5px;color:var(--text-mute);transition:all .13s;}
    .det-gender-tab.on{background:var(--accent);color:#fff;border-color:var(--accent);}
    .det-gender-tab.male.on{background:#4a90e2;border-color:#4a90e2;}
    .det-gender-tab.female.on{background:#e2609a;border-color:#e2609a;}
    .dc-big-slot{flex:1;height:93px;background:var(--slot-bg);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid transparent;transition:all .15s;}
    .dc-big-slot:hover{background:var(--hover-bg);border-color:var(--accent);}
    .dc-big-slot img{width:82px;height:82px;image-rendering:pixelated;object-fit:contain;}
    .dc-big-slot-plus{font-size:20px;color:var(--accent);font-weight:400;}
    .dc-hp-row{display:flex;align-items:center;gap:6px;margin-top:6px;}
    .dc-hp-slider{flex:1;-webkit-appearance:none;appearance:none;height:7px;border-radius:4px;outline:none;cursor:pointer;background:linear-gradient(to right,#7ac143 100%,var(--slot-bg) 100%);}
    .dc-hp-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:#7ac143;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.25);}
    .dc-hp-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#7ac143;border:none;cursor:pointer;}
    .dc-hp-pct{font-size:10px;color:var(--label-muted);font-weight:700;min-width:32px;text-align:right;white-space:nowrap;}
    .dur-row{display:flex;gap:10px;justify-content:flex-end;margin-bottom:5px;}
    .dur-item{font-size:12px;color:#666;}
    .dur-item span{font-weight:700;color:var(--accent);}
    .speed-cmp-btn{width:100%;background:var(--accent);color:#fff;border:none;padding:5px 6px;border-radius:5px;font-size:11px;cursor:pointer;transition:background .18s;}
    .speed-cmp-btn:hover{background:var(--accent-dark);}

    /* Config rows */
    .cfg-row{display:flex;align-items:center;background:var(--row-bg);border-radius:7px;padding:9px 13px;margin-bottom:6px;gap:8px;cursor:pointer;transition:background .15s,box-shadow .15s;position:relative;}
    .cfg-row:hover{background:var(--hover-bg);box-shadow:0 2px 8px rgba(0,0,0,.12);}
    .cfg-lbl{font-size:13px;font-weight:700;color:var(--text-soft);min-width:24px;flex-shrink:0;}
    .cfg-content{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0;overflow:hidden;}
    .cfg-name{font-size:12px;color:var(--text-main);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .cfg-desc{font-size:11px;color:var(--text-mute);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .cfg-name.ph{color:#aaa;font-weight:400;}
    .item-sprite-sm{width:22px;height:22px;image-rendering:pixelated;flex-shrink:0;}
    .cfg-tooltip{
      display:none;position:absolute;bottom:calc(100% + 6px);left:13px;
      background:var(--tooltip-bg);color:var(--tooltip-text);font-size:11px;line-height:1.5;
      padding:7px 11px;border-radius:7px;white-space:normal;max-width:280px;min-width:160px;
      box-shadow:0 4px 16px rgba(0,0,0,.4);pointer-events:none;z-index:50;
      border:1px solid var(--tooltip-border);
    }
    .cfg-row:hover .cfg-tooltip{display:block;}

    /* Move rows */
    .move-row{display:flex;align-items:center;border-radius:7px;padding:9px 13px;margin-bottom:6px;gap:8px;cursor:pointer;transition:filter .15s;position:relative;}
    .move-row:hover{filter:brightness(1.12);}
    .move-type-img{width:32px;height:14px;object-fit:contain;flex-shrink:0;}
    .move-name-txt{font-size:13px;color:#fff;font-weight:600;min-width:88px;}
    .move-desc-txt{display:none;}
    .move-meta-txt{font-size:11px;color:rgba(255,255,255,.7);white-space:nowrap;}
    .move-power-txt{font-size:12px;color:rgba(255,255,255,.9);white-space:nowrap;min-width:95px;text-align:right;}
    .move-tooltip{
      display:none;position:absolute;bottom:calc(100% + 6px);left:0;
      background:var(--tooltip-bg);color:var(--tooltip-text);font-size:11px;line-height:1.5;
      padding:7px 11px;border-radius:7px;white-space:normal;max-width:280px;min-width:160px;
      box-shadow:0 4px 16px rgba(0,0,0,.4);pointer-events:none;z-index:50;
      border:1px solid var(--tooltip-border);
    }
    .move-row:hover .move-tooltip{display:block;}
    .move-tooltip-stats{display:flex;gap:9px;margin-top:5px;padding-top:5px;border-top:1px solid var(--tooltip-border);font-weight:600;color:var(--tooltip-stat);}

    .dmg-calc-btn{display:block;width:100%;margin-top:7px;background:var(--accent);color:#fff;border:none;padding:7px;border-radius:8px;font-size:12px;cursor:pointer;text-align:center;transition:background .18s;}
    .dmg-calc-btn:hover{background:var(--accent-dark);}

    /* Defense chart */
    .def-chart{margin-top:10px;background:var(--chart-bg);border-radius:9px;padding:10px 12px;}
    .def-chart-title{font-size:11px;color:var(--label-muted);text-align:center;margin-bottom:7px;letter-spacing:.5px;}
    .def-chart-cols{display:flex;gap:6px;}
    .def-col{flex:1;}
    .def-col-lbl{font-size:10px;color:var(--label-muted);margin-bottom:4px;text-align:center;border-bottom:1px solid var(--hover-bg);padding-bottom:2px;}
    .def-types{display:flex;flex-wrap:wrap;gap:2px;}
    .type-badge{padding:2px 7px;border-radius:4px;font-size:10px;color:#fff;font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.3);}

    /* ── CALC PANELS ── */
    .calc-panel{flex:1;background:var(--card-bg);border-radius:14px;padding:12px 14px;overflow-y:auto;scrollbar-gutter:stable;display:flex;flex-direction:column;min-width:0;box-shadow:0 4px 22px rgba(0,0,0,.08);opacity:0;pointer-events:none;transform:translateY(-10px);transition:opacity .3s ease,transform .3s ease;}
    .calc-panel.visible{opacity:1;pointer-events:all;transform:translateY(0);}
    .calc-panel.speed-calc{flex:0 0 275px;scrollbar-width:thin;scrollbar-color:var(--scroll-thumb-accent) transparent;}
.calc-panel.speed-calc::-webkit-scrollbar{width:4px;}
.calc-panel.speed-calc::-webkit-scrollbar-track{background:transparent;}
.calc-panel.speed-calc::-webkit-scrollbar-thumb{background:var(--scroll-thumb-accent);border-radius:4px;}
    /* ── SPEED CALCULATOR ── */
    .sc-body{display:flex;flex-direction:column;gap:6px;padding-bottom:12px;}
#speedCalcBody .dc-drop-list{max-height:130px;}
.sc-stat-btn{border:1.5px solid var(--slot-bg);border-radius:10px;background:var(--slot-bg);font-size:10px;font-weight:600;cursor:pointer;color:var(--label-muted);padding:2px 7px;white-space:nowrap;transition:all .13s;font-family:inherit;flex-shrink:0;}
.sc-stat-btn.sc-stat-on{background:var(--accent);color:#fff;border-color:var(--accent);}
    .sc-pk-stats{font-size:10px;color:var(--label-muted);margin-top:4px;}
    .sc-spinrow{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;align-items:center;}
    .sc-bigval{font-size:18px;font-weight:700;color:var(--accent);min-width:28px;text-align:center;line-height:1.3;}
    .sc-speed-val{color:var(--accent)!important;font-size:22px!important;}
    .sc-spin-btn{border:none;border-radius:3px;cursor:pointer;font-size:9px;padding:2px 5px;font-family:inherit;line-height:1.4;transition:filter .1s;}
    .sc-spin-btn.sc-up{background:var(--accent);color:#fff;}
    .sc-spin-btn.sc-dn{background:var(--slot-bg);color:var(--label-muted);}
    .sc-spin-btn:hover{filter:brightness(1.12);}
    .sc-nat-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:7px;}
    .sc-nat-btn{border:none;background:none;cursor:pointer;font-size:12px;color:var(--label-muted);padding:2px 5px;border-radius:4px;font-family:inherit;transition:all .13s;}
    .sc-nat-btn.sc-nat-on{background:var(--accent);color:#fff;font-weight:700;}
    .sc-nat-sep{color:var(--text-mute);font-size:13px;}
    .sc-row2{display:grid;grid-template-columns:1fr auto;gap:6px;margin-top:6px;align-items:end;}
    .sc-toggles{display:flex;flex-direction:column;gap:3px;}
    .sc-tog{border:1.5px solid var(--slot-bg);border-radius:5px;background:var(--slot-bg);color:var(--label-muted);cursor:pointer;font-size:11px;padding:3px 8px;font-family:inherit;transition:all .13s;white-space:nowrap;}
    .sc-tog.sc-tog-on{background:var(--accent);color:#fff;border-color:var(--accent);}
    .sc-tog-full{width:100%;margin-top:4px;}
    .sc-selrow{margin-bottom:5px;}
    .sc-sel{padding:4px 6px!important;font-size:11px!important;}
    .sc-pk-info{margin-top:6px;display:flex;flex-direction:column;gap:1px;}
    .sc-pk-name{font-size:13px;font-weight:700;color:var(--accent);}
    .sc-pk-stats{font-size:10px;color:var(--label-muted);}
    .sc-pk-empty{font-size:11px;color:var(--label-muted);margin-top:6px;text-align:center;}
    .sc-big-slot{width:60px;height:93px;background:var(--slot-bg);border-radius:10px;display:flex;align-items:center;justify-content:center;border:2px solid transparent;flex-shrink:0;cursor:pointer;transition:all .15s;}
    .sc-big-slot:hover{background:var(--hover-bg);border-color:var(--accent);}
    .sc-big-slot img{width:54px;height:54px;image-rendering:pixelated;object-fit:contain;}
    .sc-big-slot-plus{font-size:26px;color:var(--accent);font-weight:400;}
    .calc-panel-title{font-size:12px;font-weight:700;color:var(--label-muted);padding-bottom:6px;border-bottom:1px solid var(--hover-bg);margin-bottom:6px;letter-spacing:.4px;}

    /* ── DAMAGE CALC ── */
    .dc-block{background:var(--row-bg);border-radius:9px;padding:9px 11px;flex-shrink:0;}
    .dc-block-title{font-size:10px;font-weight:700;color:var(--label-muted);margin-bottom:7px;letter-spacing:.3px;}
    .dc-party-pills{display:grid;grid-template-columns:repeat(3,44px);gap:5px;justify-content:center;}
    .dc-pill{border:2px solid transparent;background:var(--slot-bg);border-radius:9px;cursor:pointer;padding:3px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
    .dc-pill:hover{background:var(--hover-bg);transform:scale(1.06);}
    .dc-pill.dc-sel{border-color:var(--accent);background:var(--nav-active-bg);}
    .dc-pill img{width:36px;height:36px;image-rendering:pixelated;object-fit:contain;}
    .dc-input{width:100%;box-sizing:border-box;padding:6px 9px;border:1.5px solid var(--slot-bg);border-radius:7px;font-size:11px;outline:none;font-family:inherit;background:var(--card-bg);color:var(--text-main);transition:border-color .15s;margin-top:5px;}
    .dc-input:focus{border-color:var(--accent);}
    .dc-drop{position:relative;z-index:30;}
    .dc-drop-list{position:absolute;top:calc(100% + 2px);left:0;right:0;max-height:240px;overflow-y:auto;border:1.5px solid var(--slot-bg);border-radius:7px;background:var(--card-bg);box-shadow:0 4px 14px rgba(0,0,0,.12);display:none;}
    .dc-drop-list.open{display:block;}
    .dc-drop-item{padding:5px 10px;font-size:11px;cursor:pointer;border-bottom:1px solid var(--slot-bg);display:flex;align-items:center;gap:6px;color:var(--text-main);}
    .dc-drop-item:hover{background:var(--hover-bg);}
    .dc-drop-item:last-child{border-bottom:none;}
    .dc-stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;}
    .dc-stat-box{display:flex;flex-direction:column;align-items:center;gap:3px;}
    .dc-stat-lbl{font-size:10px;color:#999;font-weight:600;}
    .dc-stat-val{font-size:15px;font-weight:700;color:var(--text-main);}
    .dc-ev-inp{width:46px;height:26px;border:1.5px solid var(--slot-bg);border-radius:5px;font-size:12px;text-align:center;outline:none;font-family:inherit;font-weight:700;background:var(--card-bg);color:var(--text-main);}
    .dc-ev-inp:focus{border-color:var(--accent);}
    .dc-rank-row{display:flex;align-items:center;gap:3px;}
    .dc-rank-btn{width:22px;height:22px;border:none;border-radius:5px;background:var(--slot-bg);cursor:pointer;font-size:13px;font-weight:700;color:var(--accent);line-height:1;transition:background .12s;}
    .dc-rank-btn:hover{background:rgba(123,63,160,.3);}
    .dc-rank-val{font-size:13px;font-weight:700;color:var(--text-main);min-width:22px;text-align:center;}
    .dc-nat-row{display:flex;align-items:center;gap:5px;margin-top:8px;}
    .dc-nat-lbl{font-size:10px;color:#999;font-weight:600;min-width:24px;}
    .dc-nat-btn{padding:3px 9px;border:1.5px solid var(--slot-bg);border-radius:6px;background:var(--slot-bg);font-size:11px;font-weight:700;cursor:pointer;color:var(--text-mute);transition:all .14s;}
    .dc-nat-btn.on{background:var(--accent);color:#fff;border-color:var(--accent);}
    .dc-sel-row{display:flex;gap:6px;}
    .dc-sel{flex:1;min-width:0;padding:5px 7px;border:1.5px solid var(--slot-bg);border-radius:7px;font-size:11px;outline:none;font-family:inherit;background:var(--card-bg);color:var(--text-main);cursor:pointer;transition:border-color .15s;}
    .dc-sel:focus{border-color:var(--accent);}
    .dc-result-box{background:var(--chart-bg);border-radius:10px;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;margin-top:2px;flex-shrink:0;}
    .dc-result-lbl{font-size:11px;font-weight:700;color:var(--label-muted);letter-spacing:.3px;}
    .dc-result-sub{font-size:10px;color:var(--label-muted);margin-top:2px;}
    .dc-result-val{font-size:30px;font-weight:900;color:#e8d8ff;letter-spacing:-.5px;}
    .dc-type-tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;color:#fff;font-weight:600;}
    /* 2-column calc layout */
    .dc-cols{display:grid;grid-template-columns:1fr 1fr;gap:8px;flex:1;min-height:0;overflow:hidden;}
    .dc-col{display:flex;flex-direction:column;gap:6px;overflow-y:auto;padding-right:2px;}
    .dc-col::-webkit-scrollbar{width:3px;}
    .dc-col::-webkit-scrollbar-thumb{background:var(--scroll-thumb-accent);border-radius:2px;}
    .dc-col-title{font-size:11px;font-weight:700;color:var(--accent);padding:3px 0 5px;border-bottom:1px solid var(--hover-bg);letter-spacing:.3px;margin-bottom:2px;flex-shrink:0;}
    .dc-dmg-box{background:var(--chart-bg);border-radius:10px;padding:10px 14px;flex-shrink:0;}
    .dc-dmg-range{font-size:18px;font-weight:900;color:var(--accent);letter-spacing:-.3px;}
    .dc-dmg-pct{font-size:13px;font-weight:600;color:var(--label-muted);margin-left:6px;}
    .dc-dmg-rolls{font-size:10px;color:var(--label-muted);margin:3px 0 5px;word-break:break-all;line-height:1.5;}
    .dc-dmg-hits{font-size:14px;font-weight:700;color:var(--accent);}
    .dc-dmg-hits.ohko{color:#ff6b6b;}
    .dc-dmg-empty{font-size:11px;color:var(--label-muted);}
    .dc-toggle-row{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px;}
    .dc-toggle-btn{padding:2px 7px;border:1.5px solid var(--slot-bg);border-radius:5px;background:var(--slot-bg);font-size:10px;font-weight:700;cursor:pointer;color:var(--text-mute);transition:all .13s;flex-shrink:0;white-space:nowrap;}
    .dc-toggle-btn.on{background:var(--accent);color:#fff;border-color:var(--accent);}
    .dc-toggle-btn.on-w{background:#e65100;color:#fff;border-color:#e65100;}
    .dc-pmove-btn.on{background:var(--accent)!important;border-color:var(--accent)!important;color:#fff!important;}
    .dc-pmove-btn.on span{color:#fff!important;}
    .dc-env-row{display:flex;align-items:center;gap:3px;flex-wrap:wrap;margin-top:4px;}
    .dc-env-lbl{font-size:9px;color:var(--label-muted);font-weight:700;white-space:nowrap;min-width:30px;}
    .dc-val-row{display:flex;gap:5px;margin-top:6px;}
    .dc-val-box{flex:1;background:var(--chart-bg);border-radius:6px;padding:3px 8px;text-align:center;min-width:0;}
    .dc-val-lbl{font-size:9px;color:var(--label-muted);font-weight:700;}
    .dc-val-num{font-size:11px;font-weight:900;color:var(--accent);}

    /* ── SLOT TOOLTIP ── */
    .slot-tooltip{position:fixed;z-index:200;background:var(--tooltip-bg);border:1px solid var(--accent-dark);border-radius:10px;padding:9px 11px;width:230px;font-size:10px;color:var(--tooltip-text);pointer-events:none;opacity:0;transition:opacity .15s ease;box-shadow:0 6px 24px rgba(0,0,0,.55);line-height:1.45;}
    .slot-tooltip.visible{opacity:1;}
    .tt-header{display:flex;align-items:center;gap:4px;margin-bottom:6px;flex-wrap:wrap;}
    .tt-pkname{font-size:11px;font-weight:700;color:var(--tooltip-text);flex-shrink:0;}
    .tt-type{font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;color:#fff;flex-shrink:0;}
    .tt-divider{border:none;border-top:1px solid var(--tooltip-border);margin:5px 0;}
    .tt-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:3px;}
    .tt-lbl{color:var(--label-muted);flex-shrink:0;}
    .tt-ev{color:var(--tooltip-text);margin-bottom:3px;}
    .tt-move{display:flex;align-items:center;gap:4px;padding:2px 0;}
    .tt-mname{flex:1;color:var(--tooltip-text);}
    .tt-pow{font-size:9px;font-weight:700;color:var(--tooltip-stat);margin-left:auto;flex-shrink:0;}
    .tt-cat{font-size:8px;flex-shrink:0;}
    .tt-bottom{display:flex;gap:8px;flex-wrap:wrap;padding-top:5px;border-top:1px solid var(--tooltip-border);margin-top:4px;color:var(--tooltip-text);}
    .tt-bottom b{color:var(--tooltip-stat);}
    .tt-meta-label{font-size:9px;color:var(--label-muted);font-weight:700;letter-spacing:.3px;margin-bottom:3px;text-transform:uppercase;}
    .tt-sample-row{margin-bottom:3px;color:var(--tooltip-text);}
    .tt-moves-enemy{display:flex;flex-wrap:wrap;gap:3px;margin:4px 0;}
    .tt-movename{background:var(--tooltip-bg);border-radius:4px;padding:2px 5px;font-size:9px;color:var(--tooltip-text);}
    .tt-base-stats{color:var(--tooltip-text);margin-bottom:5px;}
    .tt-bst{color:var(--tooltip-stat);}
    .tt-spd-range{margin-top:5px;padding-top:5px;border-top:1px solid var(--tooltip-border);color:var(--tooltip-text);}
    .tt-spd-range b{color:var(--tooltip-stat);}
    /* ── ANALYSIS SIDEBAR ── */
    .analysis-sidebar{width:350px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:5;opacity:0;pointer-events:none;transform:translateX(16px);transition:opacity .3s ease .1s,transform .3s ease .1s;}
    .analysis-sidebar.visible{opacity:1;pointer-events:all;transform:translateX(0);}
    .speed-rank-col{flex:1;min-width:0;display:flex;flex-direction:column;overflow-y:auto;background:var(--chart-bg);border-radius:10px;padding:10px 12px;}
    .speed-rank-col .sr-title{font-size:11px;font-weight:700;color:var(--label-muted);padding-bottom:5px;border-bottom:1px solid var(--hover-bg);margin-bottom:4px;letter-spacing:.4px;}
    .sr-header{display:flex;align-items:center;gap:3px;padding:0 4px 4px;border-bottom:1px solid var(--hover-bg);margin-bottom:4px;}
    .sr-hd-name{flex:1;min-width:0;}
    .sr-hd-nat{width:24px;font-size:8px;font-weight:700;color:var(--label-muted);text-align:center;flex-shrink:0;}
    .sr-hd-ev{font-size:8px;font-weight:700;color:var(--label-muted);white-space:nowrap;flex-shrink:0;}
    .sr-hd-spd{width:26px;font-size:8px;font-weight:700;color:var(--label-muted);text-align:right;flex-shrink:0;}
    .sr-item{display:flex;align-items:center;gap:3px;padding:5px 4px;border-radius:6px;min-height:32px;}
    .sr-item.sr-me{background:color-mix(in srgb, var(--accent) 22%, transparent);outline:1.5px solid var(--accent);margin:2px 0;}
    .sr-sprite{width:26px;height:26px;image-rendering:pixelated;object-fit:contain;flex-shrink:0;}
    .sr-mega{font-size:7px;font-weight:800;color:#fff;background:var(--accent);border-radius:3px;padding:1px 3px;flex-shrink:0;line-height:1.3;}
    .sr-name-wrap{flex:1;display:flex;align-items:center;gap:3px;min-width:0;overflow:hidden;}
    .sr-name{font-size:9px;color:var(--label-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
    .sr-item.sr-me .sr-name{color:var(--tooltip-text);font-weight:700;}
    .sr-nat{width:24px;font-size:8px;color:var(--label-muted);text-align:center;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .sr-item.sr-me .sr-nat{color:var(--accent);font-weight:700;}
    .sr-ev{font-size:8px;color:var(--label-muted);flex-shrink:0;white-space:nowrap;}
    .sr-item.sr-me .sr-ev{color:var(--accent);}
    .sr-rank{width:18px;font-size:8px;color:var(--label-muted);text-align:right;flex-shrink:0;font-weight:600;}
    .sr-item.sr-me .sr-rank{color:var(--accent);}
    .sr-spd{width:26px;font-size:9px;font-weight:700;color:var(--label-muted);text-align:right;flex-shrink:0;}
    .sr-item.sr-me .sr-spd{color:var(--tooltip-text);}
    .type-chart-col{flex:1;min-width:0;display:flex;flex-direction:column;gap:8px;overflow-y:auto;}
    .analysis-box{background:var(--chart-bg);border-radius:10px;padding:10px 12px;}
.ptc-wrap{margin-top:0;}
.ptc-sub{display:none;}
.ptc-header{display:flex;gap:2px;padding-left:32px;margin-bottom:3px;}
.ptc-th{flex:1;display:flex;align-items:center;justify-content:center;}
.ptc-th img{width:18px;height:18px;image-rendering:pixelated;object-fit:contain;}
.ptc-type-row{display:flex;gap:2px;align-items:center;margin-bottom:2px;}
.ptc-lbl{flex:0 0 30px;font-size:7.5px;font-weight:700;color:#fff;border-radius:3px;padding:2px;text-align:center;white-space:nowrap;overflow:hidden;}
.ptc-cell{flex:1;height:13px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:#fff;}
.ptc-n1{background:rgba(144,112,176,.1);color:transparent;}
.ptc-4{background:#c62828;}.ptc-2{background:#ef6c00;}.ptc-h{background:#388e3c;}.ptc-q{background:#1b5e20;}.ptc-z{background:#546e7a;}
    .analysis-box h3{font-size:11px;color:var(--label-muted);font-weight:700;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--hover-bg);letter-spacing:.4px;}
    .chart-row{display:flex;align-items:flex-start;gap:6px;margin-bottom:5px;}
    .chart-lbl{font-size:10px;font-weight:700;min-width:34px;padding-top:2px;flex-shrink:0;}
    .chart-types{display:flex;flex-wrap:wrap;gap:2px;flex:1;}
    .type-badge{padding:2px 6px;border-radius:4px;font-size:10px;color:#fff;font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.3);}
    .chart-empty{font-size:11px;color:var(--label-muted);}

    /* EV + Durability bar (bottom of detail card) */
    .ev-dur-bar{background:var(--chart-bg);border-radius:9px;padding:9px 13px;margin-top:8px;display:flex;flex-direction:column;gap:5px;}
    .ev-dur-bar .ev-total-row{font-size:12px;color:var(--label-muted);margin:0;}
    .ev-dur-bar .ev-total-row span{color:var(--accent);font-weight:700;}
    .ev-dur-bar .dur-row{margin:0;justify-content:space-evenly;gap:0;}
    .ev-dur-bar .dur-item{font-size:12px;color:var(--label-muted);}
    .ev-dur-bar .dur-item span{color:var(--accent);font-weight:700;}
    .sg-archetype{font-size:12px;font-weight:700;color:var(--tooltip-text);text-align:center;padding-bottom:6px;border-bottom:1px solid var(--hover-bg);}
    .sg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px 2px;margin-top:6px;}
    .sg-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
    .sg-lbl{font-size:9px;color:var(--label-muted);font-weight:600;}
    .sg-val{font-size:11px;font-weight:700;}
    .sg-very-low{color:#ef5350;}
    .sg-low{color:#ff8a65;}
    .sg-mid{color:#b0a0d0;}
    .sg-high{color:#42a5f5;}
    .sg-very-high{color:#66bb6a;}
    .sg-na{color:#6a5a80;}

    /* ── MODALS ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal-box{background:var(--card-bg);border-radius:14px;padding:18px 20px;width:620px;max-width:92vw;max-height:84vh;display:flex;flex-direction:column;gap:9px;box-shadow:0 12px 44px rgba(0,0,0,.3);}
    .modal-head{display:flex;align-items:center;justify-content:space-between;}
    .modal-title{font-size:14px;font-weight:700;color:var(--text-main);}
    .modal-x{background:none;border:none;font-size:17px;cursor:pointer;color:var(--text-mute);transition:color .15s;}
    .modal-x:hover{color:#c00;}
    .modal-search{width:100%;padding:7px 12px;border:2px solid var(--slot-bg);border-radius:8px;font-size:13px;outline:none;transition:border-color .18s;font-family:inherit;background:var(--card-bg);color:var(--text-main);}
    .modal-search:focus{border-color:var(--accent);}
    .filter-row{display:flex;gap:5px;flex-wrap:wrap;}
    .f-btn{padding:3px 10px;border:1px solid var(--slot-bg);border-radius:20px;font-size:11px;cursor:pointer;background:var(--slot-bg);color:var(--text-dim);transition:all .15s;font-family:inherit;}
    .f-btn.on{background:var(--accent);color:#fff;border-color:var(--accent);}
    .f-btn[data-if="포챔스"]{background:var(--hover-bg);color:var(--accent);border-color:var(--accent);}
    .f-btn[data-if="포챔스"].on{background:var(--accent);color:#fff;border-color:var(--accent);}

    /* Pokemon grid */
    .poke-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));align-content:start;gap:6px;overflow-y:auto;height:400px;padding:2px;}
    .poke-card{display:flex;flex-direction:column;align-items:center;padding:6px 4px;border-radius:8px;cursor:pointer;border:2px solid transparent;background:var(--slot-bg);transition:all .14s;}
    .poke-card:hover{border-color:var(--accent);background:var(--hover-bg);transform:scale(1.04);}
    .poke-card img{width:52px;height:52px;image-rendering:pixelated;}
    .pc-no{font-size:9px;color:#bbb;}
    .pc-name{font-size:10px;color:var(--text-main);text-align:center;word-break:keep-all;line-height:1.3;}
    .pc-types{display:flex;gap:2px;margin-top:2px;}
    .pc-tbadge{padding:1px 4px;border-radius:3px;font-size:8px;color:#fff;font-weight:600;}

    /* Move modal */
    .move-list-wrap{overflow-y:auto;height:420px;}
    .move-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;transition:background .12s;}
    .move-item:hover{background:var(--hover-bg);}
    .mi-type{padding:2px 7px;border-radius:4px;font-size:10px;color:#fff;font-weight:600;min-width:42px;text-align:center;}
    .mi-name{font-size:12px;font-weight:600;min-width:110px;color:var(--text-main);}
    .mi-cat{font-size:10px;color:#999;min-width:28px;}
    .mi-pow{font-size:11px;color:var(--text-soft);min-width:32px;}
    .mi-acc{font-size:10px;color:var(--text-mute);min-width:36px;}
    .mi-desc{font-size:10px;color:#aaa;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1;}

    /* Item modal */
    .item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));align-content:start;gap:6px;overflow-y:auto;height:400px;padding:2px;}
    .item-card{display:flex;flex-direction:column;align-items:center;padding:7px 4px 5px;border-radius:8px;cursor:pointer;border:2px solid transparent;background:var(--slot-bg);transition:all .14s;position:relative;}
    .item-card:hover{border-color:var(--accent);background:var(--hover-bg);}
    .item-card img{width:32px;height:32px;image-rendering:pixelated;}
    .item-no-img{width:32px;height:32px;background:var(--hover-bg);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;}
    .item-name{font-size:10px;color:var(--text-main);text-align:center;word-break:keep-all;margin-top:3px;line-height:1.3;}
    .item-cat-badge{font-size:8px;color:var(--text-mute);text-align:center;}
    .item-card-tt{display:none;position:fixed;background:var(--tooltip-bg);color:var(--tooltip-text);font-size:10px;line-height:1.45;padding:7px 10px;border-radius:7px;width:170px;white-space:normal;box-shadow:0 4px 16px rgba(0,0,0,.4);pointer-events:none;z-index:600;border:1px solid var(--tooltip-border);}
    .item-card-tt.visible{display:block;}

    /* Ability modal */
    .ability-list{overflow-y:auto;height:350px;}
    .ability-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all .14s;margin-bottom:4px;background:var(--slot-bg);}
    .ability-item:hover{border-color:var(--accent);background:var(--hover-bg);}
    .ability-item.selected{border-color:var(--accent);background:var(--nav-active-bg);}
    .ability-item .ab-name{font-size:13px;font-weight:700;color:var(--text-main);min-width:90px;}
    .ability-item .ab-desc{font-size:11px;color:var(--text-soft);flex:1;line-height:1.5;}
    .ability-item .ab-tag{font-size:9px;background:var(--hover-bg);color:var(--text-dim);border-radius:3px;padding:1px 5px;flex-shrink:0;height:fit-content;}
    .ability-item .ab-tag.hidden-tag{background:#ffe0b2;color:#e65100;}

    /* Nature modal */
    .nature-table{width:100%;border-collapse:collapse;font-size:11px;}
    .nature-table th{padding:5px 6px;background:var(--hover-bg);color:var(--text-soft);font-weight:700;text-align:center;font-size:10px;border:1px solid var(--slot-bg);}
    .nature-table td{padding:4px 6px;text-align:center;border:1px solid var(--slot-bg);cursor:pointer;transition:background .12s;border-radius:0;color:var(--text-main);}
    .nature-table td:hover{background:var(--hover-bg);}
    .nature-table td.nat-neutral{background:var(--slot-bg);color:var(--text-mute);}
    .nature-table td.nat-neutral:hover{background:var(--hover-bg);}
    .nature-table td.nat-selected{background:var(--accent)!important;color:#fff!important;font-weight:700;}
    .nature-table .row-lbl{background:var(--slot-bg);color:#e53935;font-weight:700;cursor:default;}
    .nature-table .row-lbl:hover{background:var(--hover-bg);}
    .nature-table .col-lbl{background:var(--slot-bg);color:#1976d2;font-weight:700;cursor:default;}
    .nature-table .col-lbl:hover{background:var(--hover-bg);}

    /* Scrollbar */
    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-track{background:var(--scroll-track);border-radius:3px;}
    ::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:3px;}

    /* ── RESPONSIVE ── */
    @media(max-width:1500px){
      .analysis-sidebar{width:315px;}
      .calc-panel.speed-calc{flex:0 0 235px;}
    }
    @media(max-width:1300px){
      .analysis-sidebar{width:270px;}
      .calc-panel.speed-calc{flex:0 0 190px;}
    }
    @media(max-width:1250px){
      .calc-panel{display:none;}
      .analysis-sidebar{width:240px;}
      /* calc 패널 없을 때 상세카드가 남은 공간 채우기 */
      .detail-area{flex:1!important;width:auto!important;max-width:none;}
    }
    @media(max-width:960px){
      .nav-ana-toggle{display:block;}
    }

    /* ── MOB CHART VIEW (mobile type chart when no slot selected) ── */
    .mob-chart-view{display:none;} /* desktop: always hidden */
    #mobActionBar{display:none;}   /* desktop: always hidden */
    /* ── Speed sub-panel slider (transparent on desktop) ── */
    .sc-cols{display:flex;flex-direction:column;flex:1;min-height:0;}
    .sc-sample-page{display:none;} /* desktop: always hidden */
    .mob-chart-tabs{display:flex;gap:0;padding:10px 10px 0;flex-shrink:0;background:var(--chart-bg);}
    .mob-chart-tab{flex:1;border:none;padding:9px 0;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;color:var(--label-muted);background:rgba(255,255,255,.06);border-radius:8px 8px 0 0;transition:background .15s,color .15s;}
    .mob-chart-tab.on{background:var(--accent);color:#fff;}
    .mob-chart-body{padding:10px;overflow-y:auto;flex:1;min-height:0;}

    /* ═══ TABLET + MOBILE PANEL SYSTEM (≤ 1024px) ═══ */
    .mob-panel-wrap{display:contents;} /* desktop: transparent wrapper */
    .mobile-tab-bar{display:none;}     /* desktop: hidden */
    .mob-tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10px;font-weight:700;color:#bbb;background:none;border:none;cursor:pointer;transition:color .15s;font-family:inherit;padding:0;line-height:1.2;}
    .mob-tab-btn.active{color:var(--accent);}
    .mob-tab-btn svg{display:block;width:22px;height:22px;}

    @media(max-width:1280px),(pointer:coarse){
      /* ── Navbar ── */
      .navbar{height:48px;padding:0 16px;}
      .nav-logo img{height:36px;}
      .nav-links a{padding:5px 8px;font-size:11.5px;}
      .nav-ana-toggle{display:none!important;}

      /* ── Layout base ── */
      body{overflow:hidden;touch-action:pan-y;}
      .app-wrap{height:calc(100vh - 48px - 56px);height:calc(100dvh - 48px - 56px);overflow:hidden;display:flex;flex-direction:column;}
      .app-body{flex:1;flex-direction:column;padding:0;gap:0;min-height:0;overflow:hidden;height:100%;}

      /* ── Hide desktop-only elements ── */
      .ad-panel,.rec-panel,.detail-overlay,
      #bigPartyChart,#bigEnemyChart,
      .analysis-sidebar{display:none!important;}

      /* ── My party strip ── */
      #partySidebar{
        flex-direction:row!important;flex-wrap:nowrap;
        overflow-x:auto;overflow-y:hidden;
        flex-shrink:0;height:60px;min-height:60px;max-height:60px;
        padding:5px 10px;gap:8px;
        background:var(--card-bg);
        border-bottom:1px solid var(--hover-bg);
        border-radius:0;box-shadow:0 1px 4px rgba(0,0,0,.06);
        position:relative;z-index:5;scrollbar-width:none;
      }
      #partySidebar::-webkit-scrollbar{display:none;}
      #partySidebar .party-slot{width:48px;height:48px;flex-shrink:0;border-radius:8px;}
      #partySidebar .slot-img{width:40px;height:40px;}
      #partySidebar .slot-plus{font-size:20px;}
      #partySidebar .party-action-btns{display:none!important;}
      #partySidebar .big-mode-btns{display:none!important;}

      /* ── Enemy party strip (only shown in big-mode) ── */
      #enemySidebar{display:none!important;}
      #enemySidebar::-webkit-scrollbar{display:none;}
      #enemySidebar .enemy-slot{width:46px;height:46px;flex-shrink:0;border-radius:8px;}
      #enemySidebar .slot-img{width:38px;height:38px;}
      #enemySidebar .slot-plus{font-size:18px;color:#bbb;}
      #enemySidebar .big-mode-btns{display:none!important;}
      #enemySidebar .slot-del{display:none!important;}

      /* ── Panel wrapper becomes slide container ── */
      .mob-panel-wrap{
        display:block!important;
        flex:1;min-height:0;width:100%;
        position:relative;overflow:hidden;
        -webkit-transform:translateZ(0);transform:translateZ(0);
      }

      /* ── Each panel: absolutely stacked, full area ── */
      #mobPanelWrap>#detailArea,
      #mobPanelWrap>#powerCalcPanel,
      #mobPanelWrap>#speedCalcPanel{
        display:flex!important;flex-direction:column;
        position:absolute;
        top:0!important;right:0!important;bottom:0!important;left:0!important;
        width:100%!important;max-width:none!important;min-width:0!important;
        height:100%!important;max-height:none!important;
        box-sizing:border-box;
        overflow-y:auto;overflow-x:hidden;
        opacity:1!important;pointer-events:all!important;
        border-radius:0!important;background:var(--card-bg);
        will-change:transform;
        transition:transform .28s cubic-bezier(.4,0,.2,1)!important;
      }

      /* ── Default positions: speed ← detail → calc ── */
      #mobPanelWrap>#speedCalcPanel {transform:translateX(-100%);}
      #mobPanelWrap>#detailArea     {transform:translateX(0);}
      #mobPanelWrap>#powerCalcPanel {transform:translateX(100%);}

      /* ── Panel state: speed ── */

<script>
/* ── i18n (한/영/일) — 메인 스크립트보다 먼저 정의되어야 함 ── */
let I18N = null;
function detectDefaultLang() {
  const saved = localStorage.getItem('lang');
  if (saved) return saved;
  const nav = (navigator.language || navigator.userLanguage || '').toLowerCase();
  if (nav.startsWith('ko')) return 'ko';
  if (nav.startsWith('ja')) return 'ja';
  if (nav.startsWith('en')) return 'en';
  return 'en';
}
let LANG = detectDefaultLang();

async function loadI18n() {
  try { I18N = await fetch('i18n_names.json').then(r => r.json()); }
  catch (e) { console.error('i18n_names.json fetch 실패:', e); I18N = null; }
}

function pokeName(koName, dexNo) {
  if (LANG === 'ko' || !I18N || !koName) return koName;
  const full = I18N.pokemonFullNames && I18N.pokemonFullNames[koName];
  if (full && full[LANG]) return full[LANG];
  const p = I18N.pokemon[String(dexNo)];
  if (!p) return koName;
  const base = p[LANG] || p.ko;
  let workingName = koName;
  let megaPrefix = '';

function getItemPowerMult(item, mv, effType=null) {
  if (!item || !mv?.power || mv.category==='변화') return 1;
  const n = item.name, cat = mv.category, type = effType ?? mv.type;
  if (n==='구애머리띠' && cat==='물리') return 1.5;
  if (n==='구애안경'   && cat==='특수') return 1.5;
  /* Life Orb: 수명단축(게임 내) 또는 생명의구슬(데이터) */
  if (n==='수명단축' || n==='생명의구슬') return 1.3;
  /* Muscle Band */
  if ((n==='근력띠'||n==='근육의머리띠'||n==='힘의머리띠') && cat==='물리') return 1.1;
  /* Wise Glasses */
  if ((n==='현명안경'||n==='박식안경') && cat==='특수') return 1.1;
  if (_TYPE_BOOST_ITEMS[n]===type) return 1.2;
  /* 플레이트 · 메모리 계열: 이름 안에 타입 명 포함 */
  if (item.category==='플레이트'||item.category==='메모리') {
    if (ALL_TYPES.some(t => n.includes(t) && t===type)) return 1.2;
    const alias = {'불꽃':['화염','불'],'전기':['번개'],'격투':['주먹'],'고스트':['유령'],'악':['암흑'],'에스퍼':['정신']};
    for (const [t, alts] of Object.entries(alias)) {
      if (t===type && alts.some(a => n.includes(a))) return 1.2;
    }
  }
  return 1;
}

function getAbilityStatMult(ability, statKey, ctx={}) {
  if (!ability) return 1;
  const n = ability.name;
  const { weather='', field='', hpPct=100 } = ctx;
  if ((n==='천하장사'||n==='순수한힘') && statKey==='A') return 2;
  if (n==='의욕' && statKey==='A') return 1.5;
  if (n==='선파워' && statKey==='C' && weather==='맑음') return 1.5;
  if (n==='타오르는불꽃' && statKey==='A' && (!weather||weather==='맑음')) return 4/3;
  if (n==='하드론엔진' && statKey==='C' && field==='일렉') return 4/3;
  if (n==='슬로스타트' && (statKey==='A'||statKey==='S')) return 0.5;
  if (n==='무기력' && (statKey==='A'||statKey==='C') && hpPct<=50) return 0.5;
  if (n==='플라워기프트' && statKey==='D' && weather==='맑음') return 1.5;
  return 1;
}
function getAbilityMoveType(ability, mv) {
  if (!ability || !mv) return mv?.type;
  const skin = _SKIN_TYPES[ability.name];
  if (skin && mv.type==='노말') return skin;
  if (ability.name==='촉촉보이스' && SOUND_MOVES.has(mv.name)) return '물';
  return mv.type;
}

/* ── 폼/도구/특성을 모두 고려한 기술 유효 타입 ── */
function getMoveEffectiveType(pk, mv, item, ability, weather='') {
  if (!mv || !pk) return mv?.type;
  /* 노말스킨: 모든 기술 → 노말 (최우선) */
  if (ability?.name === '노말스킨') return '노말';
  /* 특성 타입 변환 (스킨 계열, 촉촉보이스) */
  const abilityType = getAbilityMoveType(ability, mv);
  if (abilityType !== mv.type) return abilityType;
  const mvName = mv.name;
  /* 심판의뭉치: 아르세우스 현재 타입 */
  if (mvName === '심판의뭉치' && pk.name.includes('아르세우스')) return pk.type1;
  /* 멀티어택: 실버디 현재 타입 */
  if (mvName === '멀티어택' && pk.name.startsWith('실버디')) return pk.type1;
  /* 덩굴방망이: 오거폰 마스크 타입 (기본폼은 풀, 마스크폼은 type2) */
  if (mvName === '덩굴방망이' && pk.name.startsWith('오거폰')) return pk.type2 || pk.type1;
  /* 웨더볼: 날씨에 따라 타입 변환 */
  if (mvName === '웨더볼') {
    const effW = weather || ((pk.name==='메가메가니움'||ability?.name==='메가솔라'||ability?.name==='타오르는불꽃') ? '맑음' : '');
    if (effW==='맑음') return '불꽃';
    if (effW==='비') return '물';
    if (effW==='모래') return '바위';
    if (effW==='눈') return '얼음';
    return '노말';
  }
  return mv.type;
}

/* ── 기술 유효 위력 (폼/도구/특성 오버라이드 포함) ── */
function getMoveEffectivePower(pk, mv, ability, weather='', ctx={}) {
  const n = mv.name;
  const { hpPct=100, defHpPct=100, defS=1, defWeight=null, status='', field='', defStatus='' } = ctx;

  if (OVERRIDE_POWER[n]) return OVERRIDE_POWER[n];

  /* 웨더볼 */
  if (n === '웨더볼') {
    const effW = weather || ((pk?.name==='메가메가니움'||ability?.name==='메가솔라'||ability?.name==='타오르는불꽃') ? '맑음' : '');
    return effW ? 100 : 50;
  }

  /* 해수스파우팅 / 분화 / 드래곤에너지: 자신 HP에 비례 (HP 많을수록 강함) */
  if (['해수스파우팅','분화','드래곤에너지'].includes(n)) {
    return Math.max(1, Math.floor(150 * hpPct / 100));
  }
  /* 기사회생 / 바둥바둥: 자신 HP에 반비례 (HP 적을수록 강함) */
  if (['기사회생','바둥바둥'].includes(n)) {
    if (hpPct > 50) return 20;
    if (hpPct > 35) return 40;
    if (hpPct > 20) return 80;
    if (hpPct > 10) return 100;
    if (hpPct >  4) return 150;
    return 200;
  }
  /* 소금물: 상대 HP ≤ 50% 일 때 위력 2배 */
  if (n === '소금물') return defHpPct <= 50 ? 130 : 65;
  /* 묵사발: 상대 HP 비율에 비례 (max 120) */
  if (n === '묵사발') return Math.max(1, Math.floor(120 * defHpPct / 100));
  /* 하드프레스: 상대 HP 비율에 비례 (max 100) */
  if (n === '하드프레스') return Math.max(1, Math.floor(100 * defHpPct / 100));
  /* 객기 (기술): 상태이상일 때 위력 2배 */
  if (n === '객기' && status) return (mv.power || 70) * 2;
  /* 자이로볼: 상대 스피드가 높을수록 강함 (min 1, max 150) */
  if (n === '자이로볼') {
    const atkS = pk?.S || 1;
    return Math.min(150, Math.max(1, Math.floor(25 * Math.max(1, defS) / Math.max(1, atkS))));
  }
  /* 일렉트릭볼: 자신/상대 스피드 비율 */
  if (n === '일렉트릭볼') {
    const atkS = pk?.S || 1;
    const r = Math.floor(atkS / Math.max(1, defS));
    if (r >= 4) return 150;
    if (r >= 3) return 120;
    if (r >= 2) return 80;
    if (r >= 1) return 60;
    return 40;
  }
  /* 헤비봄버 / 히트스탬프: 자신 몸무게 / 상대 몸무게 비율 */
  if (['헤비봄버','히트스탬프'].includes(n)) {
    const atkW = pk?.weight || null;
    if (!atkW || !defWeight) return null;
    const r = atkW / defWeight;
    if (r >= 5) return 120;
    if (r >= 4) return 100;
    if (r >= 3) return 80;
    if (r >= 2) return 60;
    return 40;
  }
  /* 풀묶기 / 안다리걸기: 상대 몸무게가 무거울수록 강함 */
  if (['풀묶기','안다리걸기'].includes(n)) {
    if (!defWeight) return null;
    if (defWeight >= 200) return 120;
    if (defWeight >= 100) return 100;
    if (defWeight >=  50) return 80;
    if (defWeight >=  25) return 60;
    if (defWeight >=  10) return 40;
    return 20;
  }
  /* 매그니튜드: 무작위 위력, 대표값 70 사용 */
  if (n === '매그니튜드') return 70;

  /* ── 필드 연동 ── */
  /* 라이징볼트: 일렉트릭필드에서 위력 2배 */
  if (n === '라이징볼트' && field === '일렉') return (mv.power || 70) * 2;
  /* 사이코블레이드: 일렉트릭필드에서 위력 1.5배 */
  if (n === '사이코블레이드' && field === '일렉') return Math.floor((mv.power || 80) * 1.5);
  /* 와이드포스: 사이코필드에서 위력 1.5배 */
  if (n === '와이드포스' && field === '사이코') return Math.floor((mv.power || 80) * 1.5);
  /* 미스트버스트: 미스트필드에서 위력 1.5배 */
  if (n === '미스트버스트' && field === '미스트') return Math.floor((mv.power || 100) * 1.5);

  /* ── 날씨 연동 ── */
  /* 하이드로스팀: 쾌청에서 패널티 없이 1.5배 (calcDamage weatherM에서 처리) */

  /* ── 상대 상태이상 연동 ── */
  const isDefPoisoned = defStatus === '독' || defStatus === '맹독';
  const isDefStatused = !!defStatus;
  /* 베놈쇼크: 상대가 독/맹독 상태이면 위력 2배 */
  if (n === '베놈쇼크' && isDefPoisoned) return (mv.power || 65) * 2;
  /* 독침천발: 상대가 독/맹독 상태이면 위력 2배 */
  if (n === '독침천발' && isDefPoisoned) return (mv.power || 60) * 2;
  /* 병상첨병: 상대가 상태이상이면 위력 2배 */
  if (n === '병상첨병' && isDefStatused) return (mv.power || 65) * 2;
  /* 백귀야행: 상대가 상태이상이면 위력 2배 */
  if (n === '백귀야행' && isDefStatused) return (mv.power || 65) * 2;

  return mv.power;
}

/* ── 쾌청 버프: 메가메가니움 또는 메가솔라 특성의 불꽃 기술 ×1.5 ── */
function getSunnyBoost(pk, effType, ability) {
  const hasSunny = pk?.name === '메가메가니움' || ability?.name === '메가솔라';
  if (hasSunny && effType === '불꽃') return 1.5;
  return 1;
}
function getAbilityPowerMult(ability, mv, effType=null, ctx={}) {
  if (!ability || !mv?.power || mv.category==='변화') return 1;
  const n = ability.name, p = mv.power;
  const type = effType ?? mv.type;
  const { weather='', field='', status='', hpPct=100 } = ctx;
  const isPhys = mv.category === '물리';
  const lowHP = hpPct <= 33;
  /* ── 기술명/태그 기반 ── */
  if (n==='테크니션' && p<=60) return 1.5;
  if (n==='예리함' && SLICING_MOVES.has(mv.name)) return 1.5;
  if (n==='옹골찬턱' && BITING_MOVES.has(mv.name)) return 1.5;
  if (n==='철주먹' && PUNCHING_MOVES.has(mv.name)) return 1.2;
  if (n==='메가런처' && PULSE_MOVES.has(mv.name)) return 1.5;
  if ((n==='펑크록') && SOUND_MOVES.has(mv.name)) return 1.3;
  if (n==='이판사판' && RECOIL_MOVES.has(mv.name)) return 1.2;
  if (n==='우격다짐' && SHEER_FORCE_MOVES.has(mv.name)) return 1.3;
  if (n==='단단한발톱' && CONTACT_MOVES.has(mv.name)) return 1.3;
  /* ── 타입 기반 ── */
  if ((n==='트랜지스터'||n==='트렌지스터') && type==='전기') return 1.5;
  if (n==='용의턱'     && type==='드래곤') return 1.5;
  if (n==='바위나르기' && type==='바위') return 1.5;
  if (n==='수포'       && type==='물') return 2;
  if ((n==='강철술사'||n==='강철정신') && type==='강철') return 1.5;
  /* ── 핀치 특성 (HP ≤33%) ── */
  if (n==='맹화' && type==='불꽃' && lowHP) return 1.5;
  if (n==='급류' && type==='물'   && lowHP) return 1.5;
  if (n==='심록' && type==='풀'   && lowHP) return 1.5;
  if (n==='벌레의알림' && type==='벌레' && lowHP) return 1.5;
  /* ── 상태이상 연동 ── */
  if (n==='근성'   && isPhys && status) return 1.5;
  if (n==='독폭주' && isPhys && status==='독') return 1.5;
  if (n==='열폭주' && !isPhys && status==='화상') return 1.5;
  /* ── 날씨/필드 연동 ── */
  if (n==='모래의힘' && weather==='모래' && ['땅','바위','강철'].includes(type)) return 1.3;
  /* ── 조건부 ── */
  if (n==='애널라이즈'||n==='브레인포스') return 1.3;
  /* ── 전체 기술 보정 ── */
  if (n==='부자유친') return 1.25;
  if (n==='노말스킨') return 1.2;
  if (_SKIN_TYPES[n] && mv.type==='노말') return 1.2;
  return 1;
}

function getStatGrade(value, breaks) {
  if (value < breaks[0]) return {label:t('grade_very_low'), cls:'sg-very-low'};
  if (value < breaks[1]) return {label:t('grade_low'),     cls:'sg-low'};
  if (value < breaks[2]) return {label:t('grade_mid'),   cls:'sg-mid'};
  if (value < breaks[3]) return {label:t('grade_high'),     cls:'sg-high'};
  return                        {label:t('grade_very_high'), cls:'sg-very-high'};
}

function calcDecisivePower(pk, evs, mv, nature, item, ability) {
  if (!mv || mv.category==='변화') return 0;
  const effPow = getMoveEffectivePower(pk, mv, ability);
  if (!effPow) return 0;
  const isPhys = mv.category==='물리';
  const base   = isPhys ? pk.A : pk.C;
  const evKey  = isPhys ? 'A' : 'C';
  const statM  = getItemStatMult(item, pk, evKey) * getAbilityStatMult(ability, evKey);
  const stat   = calcStat(base, evs[evKey], false, natMult(nature, evKey)) * statM;
  const effType = getMoveEffectiveType(pk, mv, item, ability);
  let isStab = effType===pk.type1 || effType===pk.type2;
  if (!isStab) {
    const ot = getItemTypeOverride(item, pk);
    if (ot && ot===effType) isStab = true;
  }
  const stab = (ability?.name==='적응력' && isStab) ? 2 : (isStab ? 1.5 : 1);
  const itemM    = getItemPowerMult(item, mv, effType) * getPkmPowerMult(item, pk, mv);
  const abilityM = getAbilityPowerMult(ability, mv, effType);
  const hits     = MULTI_HIT_COUNT[mv.name] || 1;
  const sunnyM   = getSunnyBoost(pk, effType, ability);
  return Math.floor(stat * effPow * hits * stab * itemM * abilityM * sunnyM);
}

function hexToRgb(hex) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function getBaseName(name) {
  /* 메가폼: '메가이상해꽃' → '이상해꽃', '메가리자몽X' → '리자몽' */
  if (name.startsWith('메가') && name !== '메가니움' && name !== '메가자리') {
    return name.replace('메가', '').replace(/[XYZ]$/, '');
  }
  if (/^아르세우스\(/.test(name)) return '아르세우스';
  if (/^실버디\(/.test(name))     return '실버디';
  if (/^오거폰\(/.test(name))     return '오거폰';
  /* ITEM_FORM_MAP에 등록된 폼들 (자시안(검왕), 디아루가(오리진폼) 등) */
  for (const {form, base} of Object.values(ITEM_FORM_MAP)) {
    if (name === form) return base;
  }
  return name;
}

function getTargetForm(baseName, itemName) {
  if (!itemName) return baseName;
  /* 메가스톤 → 메가폼 */
  const megaTarget = STONE_MEGA_MAP[itemName];
  if (megaTarget && getBaseName(megaTarget) === baseName) return megaTarget;
  /* 아르세우스 플레이트, 실버디 메모리 */
  if (baseName === '아르세우스') return PLATE_FORM[itemName] || baseName;
  if (baseName === '실버디') {
    if (MEMORY_FORM[itemName]) return MEMORY_FORM[itemName];
    /* 플레이트도 실버디 폼 변경 지원: 원령플레이트 → 실버디(고스트) */
    const plateTarget = PLATE_FORM[itemName];
    if (plateTarget) {
      const typeName = plateTarget.match(/\((.+)\)/)?.[1];
      if (typeName) return `실버디(${typeName})`;
    }
    return baseName;
  }
  /* 그 외 ITEM_FORM_MAP */
  const entry = ITEM_FORM_MAP[itemName];
  if (entry && entry.base === baseName) return entry.form;
  return baseName;
}

function applyFormChange(slotIdx) {
  const mem = party[slotIdx];
  if (!mem?.pokemon) return false;
  const baseName   = getBaseName(mem.pokemon.name);
  const itemName   = mem.item?.name || null;
  const targetName = getTargetForm(baseName, itemName);
  if (targetName === mem.pokemon.name) return false;
  const newPk = POKEMON_DATA.find(p => p.name === targetName);
  if (!newPk) return false;
  mem.pokemon = newPk;
  const abd = ABILITY_DATA?.[newPk.name];
  mem.ability = abd?.normal?.[0] || null;
  return true;
}

function showSlotTooltip(anchorEl, html) {
  const tt = document.getElementById('slotTooltip');
  if (!tt || !html) return;
  tt.innerHTML = html;
  tt.classList.remove('visible');
  const rect = anchorEl.getBoundingClientRect();
  const goRight = (rect.left + rect.width / 2) < window.innerWidth / 2;
  if (goRight) { tt.style.left = (rect.right + 10) + 'px'; tt.style.right = 'auto'; }
  else          { tt.style.left = 'auto'; tt.style.right = (window.innerWidth - rect.left + 10) + 'px'; }
  tt.style.top = rect.top + 'px'; tt.style.bottom = 'auto';
  requestAnimationFrame(() => {
    const tr = tt.getBoundingClientRect();
    if (tr.bottom > window.innerHeight - 8) tt.style.top = Math.max(8, window.innerHeight - tr.height - 8) + 'px';
    tt.classList.add('visible');
  });
}
function hideSlotTooltip() {

function showItemCardTt(anchorEl, html) {

/* usage 항목에서 실제 POKEMON_DATA 폼을 찾는 헬퍼 */
function resolveUsageForm(u) {
  if (u.id && FORM_IDX_TO_NAME[u.id]) {
    const mapped = POKEMON_DATA.find(p => p.name === FORM_IDX_TO_NAME[u.id]);
    if (mapped) return mapped;
  }
  const direct = POKEMON_DATA.find(p => p.name === u.name && p.champions);
  if (direct) return direct;
  if (u.id) {
    const dexNo = parseInt(u.id.split('-')[0]);
    const forms = POKEMON_DATA.filter(p => p.no === dexNo && p.champions && !p.name.startsWith('메가'));
    if (forms.length === 1) return forms[0];
  }
  return null;
}

function getMetaSet(pkNameOrNo) {
  if (typeof META_USAGE_DATA === 'undefined' || typeof META_SETS_DATA === 'undefined') return null;
  const key = 's1_single';
  const usage = META_USAGE_DATA[key]?.usage || [];
  const sets  = META_SETS_DATA[key]?.pokemon || [];
  let u;
  if (typeof pkNameOrNo === 'number') {
    /* 덱스 번호: FORM_IDX_TO_NAME 매핑 우선, 없으면 일반 덱스 탐색 */
    u = usage.slice(0, 50).find(u => u.id && FORM_IDX_TO_NAME[u.id] && parseInt(u.id.split('-')[0]) === pkNameOrNo)
      || usage.slice(0, 50).find(u => u.id && parseInt(u.id.split('-')[0]) === pkNameOrNo);
  } else {
    /* 이름: FORM_IDX_TO_NAME 역매핑(이름→id) 먼저, 없으면 직접 이름 탐색 */
    u = usage.slice(0, 50).find(u => u.id && FORM_IDX_TO_NAME[u.id] === pkNameOrNo)
      || usage.slice(0, 50).find(u => u.name === pkNameOrNo);
  }
  if (!u) return null;
  return sets.find(s => s.id === u.id) || null;
}

function buildMySlotTooltip(mem) {
  const pk = mem.pokemon;
  if (!pk) return '';
  const evs = mem.evs || {};
  const nature = mem.nature;
  const moves = (mem.moves || []).filter(Boolean);
  const speedStat = Math.floor(calcStat(pk.S, evs.S||0, false, natMult(nature,'S')) * getItemStatMult(mem.item, pk, 'S'));
  const dur = calcDurability(pk, evs, nature, mem.item);
  const evParts = ['H','A','B','C','D','S'].filter(s => evs[s]).map(s => `${s}:${evs[s]}`);
  const typeBadges = [pk.type1, pk.type2].filter(Boolean)
    .map(tp => `<span class="tt-type" style="background:${TYPE_COLORS[tp]}">${term('types', tp)}</span>`).join('');
  let movesHTML = '';
  for (const mv of moves) {
    const pow = mv.category !== '변화' ? calcDecisivePower(pk, evs, mv, nature, mem.item, mem.ability) : 0;
    const col = mv.category==='물리'?'#e8a060':mv.category==='특수'?'#60a8e8':'#808098';
    movesHTML += `<div class="tt-move"><span class="tt-cat" style="color:${col}">●</span><span class="tt-mname">${term('moves', mv.name)}</span>${pow>0?`<span class="tt-pow">${pow.toLocaleString()}</span>`:''}</div>`;
  }
  const dispPkName = pokeName(pk.name, pk.no);
  const displayName = mem.nickname ? `${mem.nickname} <span style="opacity:.6;font-size:10px;font-weight:400">(${dispPkName})</span>` : dispPkName;
  return `<div class="tt-header"><span class="tt-pkname">${displayName}</span>${typeBadges}</div>` +
    `<div class="tt-row">${mem.item?`<span><span class="tt-lbl">${t('item')}</span> ${term('items', mem.item.name)}</span>`:''}${mem.ability?`<span><span class="tt-lbl">${t('ability')}</span> ${term('abilities', mem.ability.name)}</span>`:''}</div>` +
    `<div class="tt-row">${nature?`<span class="tt-lbl">${t('nature')}</span> ${term('natures', nature.name)}`:''}</div>` +
    (evParts.length ? `<div class="tt-ev"><span class="tt-lbl">${t('evs')}</span> ${evParts.join(' ')}</div>` : '') +
    (movesHTML ? `<hr class="tt-divider">${movesHTML}` : '') +
    `<div class="tt-bottom"><span>${t('phys_dur')} <b>${dur.phys.toLocaleString()}</b></span><span>${t('spec_dur')} <b>${dur.spec.toLocaleString()}</b></span><span>${t('speed_short')} <b>${speedStat}</b></span></div>`;
}

function buildEnemySlotTooltip(pk) {
  if (!pk) return '';
  const dispPkName = pokeName(pk.name, pk.no);
  const typeBadges = [pk.type1, pk.type2].filter(Boolean)
    .map(tp => `<span class="tt-type" style="background:${TYPE_COLORS[tp]}">${term('types', tp)}</span>`).join('');
  const minSpd = calcStat(pk.S, 0, false, 0.9);
  const maxSpd = calcStat(pk.S, 32, false, 1.1);
  const spdLine = `<div class="tt-spd-range"><span class="tt-lbl">${t('speed_short')}</span> ${t('min_speed')} <b>${minSpd}</b> ~ ${t('max_speed')} <b>${maxSpd}</b></div>`;
  /* 메가폼이면 base form 이름으로 메타 조회 */
  let lookupName = pk.name;
  if (pk.name.startsWith('메가') && pk.name !== '메가니움') {
    const base = POKEMON_DATA.find(p => p.no === pk.no && !p.name.startsWith('메가'));
    if (base) lookupName = base.name;
  }
  const ms = getMetaSet(lookupName);
  if (ms) {
    const natName = ms.natures?.[0]?.name ? term('natures', ms.natures[0].name) : '—';
    const itemName = ms.items?.[0]?.name ? term('items', ms.items[0].name) : t('none');
    const ev = ms.ev_spreads?.[0]?.evs || {};
    const evStr = ['H','A','B','C','D','S'].filter(s => ev[s]).map(s => `${s}:${ev[s]}`).join(' ') || t('no_investment');
    const mvTags = (ms.moves || []).slice(0, 4).map(m => `<span class="tt-movename">${term('moves', m.name)}</span>`).join('');
    return `<div class="tt-header"><span class="tt-pkname">${dispPkName}</span>${typeBadges}</div>` +
      `<div class="tt-meta-label">${t('top_sample')}</div>` +
      `<div class="tt-sample-row"><span class="tt-lbl">${t('nature')}</span> ${natName} &nbsp;<span class="tt-lbl">${t('item')}</span> ${itemName}</div>` +
      `<div class="tt-sample-row"><span class="tt-lbl">${t('evs')}</span> ${evStr}</div>` +
      `<div class="tt-moves-enemy">${mvTags}</div>` + spdLine;
  } else {
    const bst = pk.H + pk.A + pk.B + pk.C + pk.D + pk.S;
    const sStr = `H:${pk.H} A:${pk.A} B:${pk.B} C:${pk.C} D:${pk.D} S:${pk.S}`;
    return `<div class="tt-header"><span class="tt-pkname">${dispPkName}</span>${typeBadges}</div>` +
      `<div class="tt-base-stats">${sStr} <span class="tt-bst">(${t('total_short')} ${bst})</span></div>` + spdLine;
  }
}

   RENDER SLOTS
════════════════════════════ */
function renderSlots() {
  const sb = document.getElementById('partySidebar');
  sb.innerHTML = '';
  for (let i = 0; i < PARTY_SIZE; i++) {
    const slot = document.createElement('div');
    slot.className = 'party-slot' + (selectedSlot===i?' active':'');
    const mem = party[i];
    if (mem.pokemon) {
      const img = document.createElement('img');
      img.src = spriteUrl(mem.pokemon.name, mem.pokemon.no);
      img.className = 'slot-img'; img.alt = mem.pokemon.name;
      slot.appendChild(img);
      const del = document.createElement('span');
      del.className = 'slot-del on'; del.textContent = '✕';
      del.addEventListener('click', e => { e.stopPropagation(); removePokemon(i); });
      slot.appendChild(del);
    } else {
      const plus = document.createElement('span');
      plus.className = 'slot-plus'; plus.textContent = '+';
      slot.appendChild(plus);
    }
    slot.addEventListener('click', () => { hideSlotTooltip(); onSlotClick(i); });
    if (mem.pokemon) {
      slot.addEventListener('mouseenter', () => showSlotTooltip(slot, buildMySlotTooltip(mem)));
      slot.addEventListener('mouseleave', hideSlotTooltip);
    }
    sb.appendChild(slot);
  }
  const isBigMode = document.getElementById('appBody')?.classList.contains('big-mode');
  if (isBigMode) {
    const bigBtns = document.createElement('div');
    bigBtns.className = 'big-mode-btns';
    bigBtns.innerHTML = `
      <button class="big-act-btn load" id="bigLoadBtn">📂 ${t('party_load_btn')}</button>
      <button class="big-act-btn clear" id="bigClearBtn">${t('clear_short')}</button>`;
    bigBtns.querySelector('#bigClearBtn').addEventListener('click', () => {
      for (let i = 0; i < PARTY_SIZE; i++) party[i] = newSlot();
      saveParty(); renderSlots();
    });
    sb.appendChild(bigBtns);
  } else {
    const btns = document.createElement('div');
    btns.className = 'party-action-btns';
    btns.innerHTML = `
      <button class="party-act-btn save" id="partySaveBtn"><span style="font-size:16px;line-height:1">💾</span>${t('party_save_btn')}</button>
      <button class="party-act-btn load" id="partyLoadBtn"><span style="font-size:16px;line-height:1">📂</span>${t('party_load_btn')}</button>`;
    sb.appendChild(btns);
  }

  document.dispatchEvent(new Event('pochams:partychange'));
}

function removePokemon(idx) {
  party[idx] = newSlot();
  saveParty();
  renderSlots(); renderRecommended();
  if (selectedSlot === idx) {
    openPokeModal(idx);
    return;
  }
}

function onSlotClick(idx) {
  if (!party[idx].pokemon) { openPokeModal(idx); }
  else if (selectedSlot === idx) { selectedSlot=-1; localStorage.setItem('pochams_selected',-1); hidePanel(); renderSlots(); }
  else { selectedSlot=idx; localStorage.setItem('pochams_selected',idx); document.getElementById('appBody')?.classList.remove('big-mode'); renderSlots(); renderDetail(idx); showPanel(); }
}

let _hidePanelTimer = null;
const _PANEL_IDS = ['detailArea','powerCalcPanel','speedCalcPanel','analysisSidebar','recPanel'];

function showPanel() {
  clearTimeout(_hidePanelTimer); _hidePanelTimer = null;
  /* 모바일: 상세보기 패널로 자동 전환 */
  if (window._setMobPanel) window._setMobPanel('detail');
  /* 빅차트 페이드아웃 → 레이아웃 전환 → 패널 페이드인 */

  if (pc) pc.style.opacity = '0';
  if (ec) ec.style.opacity = '0';

    document.getElementById('appBody')?.classList.remove('big-mode');
