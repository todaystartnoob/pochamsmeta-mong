<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <title>포챔스메타몽 - 파티 구성</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --purple:#b89dcc;
      --slot-bg:rgba(255,255,255,.92);
      --card-bg:rgba(238,230,250,.97);
      --row-bg:#ddd0ee;
      --move-bg:#bcaace;
      --chart-bg:#3f3858;
      --btn-red:#e53935;
      --accent:#7b3fa0;
    }
    body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--purple);height:100vh;overflow:hidden;}

    /* ── NAVBAR ── */
    .navbar{height:54px;background:rgba(255,255,255,.97);display:flex;align-items:center;justify-content:space-between;padding:0 32px;box-shadow:0 2px 10px rgba(0,0,0,.12);position:relative;z-index:20;}
    .nav-logo{display:flex;align-items:center;}.nav-logo img{height:46px;object-fit:contain;}
    .nav-links{display:flex;gap:6px;}
    .nav-links a{text-decoration:none;color:#444;font-size:14px;padding:5px 14px;border-radius:6px;transition:background .2s,color .2s;}
    .nav-links a:hover{background:#ede0f5;color:var(--accent);}
    .nav-links a.active{background:#d4b8e8;color:#4a1d8a;font-weight:600;}
    .nav-ana-toggle{display:none;background:var(--accent);color:#fff;border:none;padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;}

    /* ── APP BODY ── */
    .app-wrap{display:flex;flex-direction:column;height:calc(100vh - 54px);}
    .app-body{display:flex;flex:1;min-height:0;padding:10px 12px;gap:10px;overflow:hidden;}
    .rec-panel{flex:0 0 230px;background:var(--card-bg);display:flex;flex-direction:column;padding:8px 0 10px;gap:6px;overflow:hidden;border-radius:14px;margin:0 12px 10px;opacity:0;pointer-events:none;transform:translateY(10px);transition:flex-basis .25s ease,opacity .18s ease,transform .18s ease;}
    .rec-panel.visible{opacity:1;pointer-events:all;transform:translateY(0);transition:flex-basis .25s ease,opacity .3s ease .15s,transform .3s ease .15s;}
    .rec-panel.collapsed{flex-basis:36px;}
    /* ── REC CARDS V2 ── */

    .rcv-card{background:var(--chart-bg);border:1px solid #3a2a5a;border-radius:10px;padding:9px 12px 12px;flex-shrink:0;width:320px;display:flex;flex-direction:column;gap:5px;transition:border-color .15s,box-shadow .15s;}
    .rcv-card:hover{border-color:#7050a8;box-shadow:0 2px 12px rgba(100,60,180,.2);}
    .rcv-head{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
    .rcv-name{font-size:12px;font-weight:700;color:#e8e0ff;margin-right:2px;flex-shrink:0;}
    .rcv-chip{font-size:8px;font-weight:700;padding:2px 6px;border-radius:3px;white-space:nowrap;flex-shrink:0;}
    .rcv-rank{background:#2a1a40;color:#9080c0;border:1px solid #4a3a6a;}
    .rcv-score{background:#5030a0;color:#fff;}
    .rcv-tag{background:#1a2a3a;color:#70b8e8;border:1px solid #2a4a6a;}
    .rcv-body{display:flex;align-items:center;gap:8px;}
    .rcv-sprite{width:50px;height:50px;image-rendering:pixelated;object-fit:contain;flex-shrink:0;}
    .rcv-stats-grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:3px 5px;}
    .rcv-stat{background:rgba(255,255,255,.04);border-radius:5px;padding:4px 6px;}
    .rcv-stat-lbl{font-size:7px;color:#6858a0;margin-bottom:1px;}
    .rcv-stat-val{font-size:9.5px;font-weight:600;color:#c8c0e8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .rcv-spd{color:#f0e8ff!important;font-size:12px!important;}
    .rcv-reason{font-size:8.5px;color:#9080b8;padding:1px 0;}
    .rcv-reason span{color:#c4a8e8;font-weight:700;}
    .rcv-bottom{display:flex;align-items:center;gap:4px;flex-wrap:wrap;padding-top:6px;border-top:1px solid #2a1a48;margin-top:auto;}
    .rcv-sc{font-size:7.5px;color:#6a5a88;background:#1e1430;border-radius:3px;padding:2px 5px;}
    .rcv-add-btn{margin-left:auto;font-size:9px;font-weight:700;padding:4px 12px;border:1.5px solid #6050a0;border-radius:5px;background:transparent;color:#b0a0d8;cursor:pointer;font-family:inherit;transition:background .12s,color .12s;flex-shrink:0;}
    .rcv-add-btn:hover{background:#5030a0;color:#fff;border-color:#8060b8;}
    .rec-toggle-chevron{margin-left:auto;font-size:9px;transition:transform .25s ease;line-height:1;color:#a090c8;}
    .rec-panel.collapsed .rec-toggle-chevron{transform:rotate(180deg);}
    .rec-title{font-size:12px;font-weight:700;color:#7060a0;padding:0 14px 6px;border-bottom:1px solid #e0d0f0;letter-spacing:.4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;user-select:none;}
    .rec-title:hover .rec-toggle-chevron{color:#7040a0;}
    .rec-list{display:flex;flex-direction:row;gap:7px;overflow-x:auto;overflow-y:hidden;flex:1;align-items:stretch;padding:2px 14px 4px;justify-content:safe center;}
    .rec-list::-webkit-scrollbar{height:4px;}
    .rec-list::-webkit-scrollbar-thumb{background:rgba(123,63,160,.25);border-radius:2px;}
    .rec-card{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 6px 5px;border-radius:14px;background:rgba(255,255,255,.7);cursor:pointer;flex-shrink:0;width:72px;transition:background .14s,transform .14s;border:2px solid transparent;}
    .rec-card:hover{background:#fff;border-color:var(--accent);transform:translateY(-3px);}
    .rec-card img{width:52px;height:52px;image-rendering:pixelated;object-fit:contain;}
    .rec-card-name{font-size:9px;color:#444;text-align:center;word-break:keep-all;line-height:1.3;max-width:68px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .rec-card-types{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;}

    /* ── PARTY SIDEBAR ── */
    .party-sidebar{display:flex;flex-direction:column;gap:7px;flex-shrink:0;}
    .party-action-btns{display:flex;flex-direction:column;gap:7px;margin-top:auto;padding-top:7px;}
    .party-act-btn{width:68px;height:68px;border-radius:10px;border:none;font-size:10px;font-weight:700;cursor:pointer;transition:transform .18s cubic-bezier(.34,1.56,.64,1),box-shadow .18s,filter .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;box-shadow:0 2px 8px rgba(0,0,0,.12);line-height:1.3;flex-shrink:0;}
    .party-act-btn:hover{transform:scale(1.07);box-shadow:0 4px 14px rgba(0,0,0,.18);filter:brightness(1.05);}
    .party-act-btn.save{background:var(--accent);color:#fff;}
    .party-act-btn.load{background:#e8def8;color:#6040a0;}
    .party-slot{width:68px;height:68px;background:var(--slot-bg);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;transition:transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .22s ease,background .18s ease;box-shadow:0 2px 8px rgba(0,0,0,.1);flex-shrink:0;}
    .party-slot:hover{transform:scale(1.09) translateX(5px);box-shadow:6px 4px 18px rgba(0,0,0,.22);background:#fff;}
    .party-slot.active{transform:translateX(6px);box-shadow:-3px 0 0 0 var(--accent),5px 4px 14px rgba(0,0,0,.2);background:#fff;}
    .slot-plus{color:#bbb;font-size:24px;font-weight:200;user-select:none;transition:color .2s;}
    .party-slot:hover .slot-plus{color:#9b7fb5;}
    .slot-img{width:56px;height:56px;image-rendering:pixelated;object-fit:contain;}
    .slot-del{position:absolute;top:3px;right:3px;width:15px;height:15px;background:rgba(180,0,0,.8);color:#fff;border-radius:50%;font-size:8px;display:none;align-items:center;justify-content:center;cursor:pointer;z-index:2;transition:background .15s;}
    .party-slot:hover .slot-del.on{display:flex;}
    .slot-del:hover{background:#c00;}

    /* ── AD PANELS ── */
    .ad-panel{display:none;background:#c8c8c8;width:190px;flex-shrink:0;}
    /* ── BIG MODE (default state) ── */
    .app-body.big-mode{flex:0 0 auto;display:flex;flex-direction:row;align-items:stretch;padding:10px 8px;gap:8px;box-sizing:border-box;}
    #appBody.big-mode ~ #recPanel{display:none;}
    .app-body.big-mode > .detail-area,
    .app-body.big-mode > .calc-panel,
    .app-body.big-mode > .analysis-sidebar{display:none;}
    /* ad panels */
    .app-body.big-mode .ad-panel{display:flex;width:150px;flex-shrink:0;border-radius:10px;}
    /* party: narrow vertical column */
    .app-body.big-mode #partySidebar{display:flex;flex-direction:column;width:112px;flex-shrink:0;gap:5px;padding:6px;align-items:center;}
    .app-body.big-mode .party-slot{width:94px;height:94px;border-radius:10px;}
    .app-body.big-mode .party-slot:hover{transform:scale(1.04);box-shadow:0 4px 16px rgba(0,0,0,.2);background:#fff;}
    .app-body.big-mode .slot-img{width:78px;height:78px;}
    .app-body.big-mode .slot-plus{font-size:28px;}
    .app-body.big-mode .party-action-btns{display:none;}
    /* ── ENEMY SIDEBAR ── */
    .enemy-sidebar{display:none;flex-direction:column;width:112px;flex-shrink:0;gap:5px;padding:6px;align-items:center;margin-left:auto;}
    .app-body.big-mode #enemySidebar{display:flex;}
    .enemy-slot{width:94px;height:94px;background:var(--slot-bg);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;transition:transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .22s ease,background .18s ease;box-shadow:0 2px 8px rgba(0,0,0,.1);flex-shrink:0;}
    .enemy-slot:hover{transform:scale(1.04);box-shadow:0 4px 16px rgba(0,0,0,.2);background:#fff;}
    .enemy-slot:hover .slot-del.on{display:flex;}
    /* ── BIG MODE BUTTONS ── */
    .big-mode-btns{display:flex;flex-direction:column;gap:4px;width:100%;padding-top:4px;}
    .big-act-btn{width:100%;padding:7px 2px;border-radius:8px;border:none;font-size:10px;font-weight:700;cursor:pointer;transition:filter .15s;white-space:nowrap;text-align:center;}
    .big-act-btn:hover{filter:brightness(1.1);}
    .big-act-btn.load{background:var(--accent);color:#fff;}
    .big-act-btn.clear{background:#e8def8;color:#6040a0;}
    /* ── BIG MODE CHART PANELS ── */
    .big-mode-chart{display:none;background:var(--chart-bg);border-radius:12px;padding:10px 12px;overflow-y:auto;flex-shrink:0;scrollbar-width:none;transition:opacity .25s ease;}
    .big-mode-chart::-webkit-scrollbar{display:none;}
    .app-body.big-mode #bigPartyChart{display:flex;flex-direction:column;flex:1;min-width:0;}
    .app-body.big-mode #bigEnemyChart{display:flex;flex-direction:column;flex:1;min-width:0;}
    .big-chart-title{font-size:11px;font-weight:700;color:#9080c0;padding-bottom:5px;border-bottom:1px solid #332a50;margin-bottom:6px;letter-spacing:.4px;flex-shrink:0;}
    /* scale-up ptc inside big-mode charts */
    .big-mode-chart .ptc-lbl{flex:0 0 38px;font-size:10px;height:20px;line-height:20px;padding:0 3px;}
    .big-mode-chart .ptc-cell{height:20px;font-size:10px;}
    .big-mode-chart .ptc-th img{width:26px;height:26px;}
    .big-mode-chart .ptc-header{padding-left:40px;margin-bottom:4px;}
    .big-mode-chart .ptc-type-row{margin-bottom:2px;}
    /* party chart summary */
    .pcs-wrap{margin-top:8px;padding-top:8px;border-top:1px solid #332a50;flex-shrink:0;display:flex;flex-direction:column;gap:5px;}
    .pcs-row{display:flex;align-items:flex-start;gap:6px;}
    .pcs-lbl{font-size:9px;font-weight:700;color:#fff;padding:2px 6px;border-radius:4px;flex-shrink:0;margin-top:2px;min-width:28px;text-align:center;line-height:1.4;}
    .pcs-lbl.pcs-weak{background:#c62828;}
    .pcs-lbl.pcs-strong{background:#2e7d32;}
    .pcs-lbl.pcs-neutral{background:#546e7a;}
    .pcs-badges{display:flex;flex-wrap:wrap;gap:3px;}
    .pcs-tbadge{font-size:9px;font-weight:700;color:#fff;padding:2px 6px;border-radius:4px;}
    .pcs-none{font-size:9px;color:#6a5a90;margin-top:3px;}
    /* ── BOTTOM AD ── */
    .bottom-ad-panel{display:none;min-height:72px;background:#c8c8c8;border-radius:10px;margin:0 8px 8px;flex:1;}
    #appBody.big-mode ~ .bottom-ad-panel{display:block;}

    /* ── DETAIL OVERLAY ── */
    .detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:4;opacity:0;pointer-events:none;transition:opacity .3s ease;}
    .detail-overlay.visible{opacity:1;}

    /* ── DETAIL AREA ── */
    .detail-area{width:410px;flex:none;opacity:0;transform:translateX(-16px);transition:opacity .3s ease,transform .3s ease;pointer-events:none;overflow-y:auto;position:relative;z-index:5;}
    .detail-area.visible{opacity:1;transform:translateX(0);pointer-events:all;}
    .party-sidebar{position:relative;z-index:5;}
    .detail-card{background:var(--card-bg);border-radius:14px;padding:12px 18px 14px;box-shadow:0 4px 22px rgba(0,0,0,.13);min-height:100%;}
    .detail-charts{display:flex;flex-direction:row;gap:8px;padding:10px 0 14px;}
    .detail-charts .analysis-box{flex:1;min-width:0;}
    .card-topbar{display:flex;align-items:center;margin-bottom:8px;gap:5px;}
    .btn-box-action{background:#e8d8f8;border:none;padding:3px 8px;border-radius:5px;font-size:10px;cursor:pointer;color:#5a2d7a;transition:background .15s;font-family:inherit;}
    .btn-box-action:hover{background:#d0b8f0;}
    .detail-close{background:#e0d4f0;border:none;padding:3px 10px;border-radius:5px;font-size:11px;cursor:pointer;color:#666;transition:all .15s;font-family:inherit;}
    .detail-close:hover{background:#f0c8c8;color:#c00;}

    /* Pokemon header */
    .poke-header{display:flex;gap:12px;margin-bottom:12px;}
    .poke-img-col{flex-shrink:0;width:155px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
    .poke-img-col:hover .poke-main-img{opacity:.75;transform:scale(1.05);}
    .poke-main-img{transition:opacity .18s,transform .18s;}
    .poke-main-img{width:132px;height:132px;image-rendering:pixelated;object-fit:contain;}
    .poke-name-row{display:flex;align-items:center;gap:6px;}
    .poke-name{font-size:14px;font-weight:700;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:98px;}
    .poke-type-row{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;}
    .type-mini-badge{padding:2px 8px;border-radius:4px;font-size:11px;color:#fff;font-weight:600;}

    /* Stats */
    .stats-col{flex:1;min-width:0;}
    .stat-row{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
    .stat-lbl{width:16px;font-size:13px;font-weight:700;color:#555;text-align:center;flex-shrink:0;}
    .stat-bar-bg{flex:1;height:9px;background:#ddd;border-radius:4px;overflow:hidden;}
    .stat-bar-fill{height:100%;border-radius:4px;transition:width .5s ease;}
    .stat-actual{width:34px;font-size:12px;text-align:right;color:#333;font-weight:600;flex-shrink:0;}
    .stat-base{width:24px;font-size:10px;text-align:right;color:#aaa;flex-shrink:0;}
    .ev-input{width:42px;height:22px;border:1px solid #ccc;border-radius:4px;font-size:11px;text-align:center;outline:none;padding:0 2px;transition:border-color .15s;}
    .ev-input:focus{border-color:var(--accent);}

    .stat-lbl.nat-up{color:#e53935!important;}
    .stat-lbl.nat-dn{color:#1976d2!important;}
    .stat-actual.nat-up{color:#e53935!important;}
    .stat-actual.nat-dn{color:#1976d2!important;}
    .ev-total-row{font-size:12px;color:#888;margin-top:3px;margin-bottom:3px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:3px 6px;}
    .ev-total-row span{color:var(--accent);font-weight:700;}
    .gender-btn{border:none;background:rgba(0,0,0,.06);cursor:pointer;font-size:13px;font-weight:700;padding:1px 7px;border-radius:5px;color:#bbb;transition:color .15s,background .15s;line-height:1.5;}
    .gender-btn.male{color:#4a90e2;background:rgba(74,144,226,.15);}
    .gender-btn.female{color:#e2609a;background:rgba(226,96,154,.15);}
    .det-gender-tab{border:1.5px solid #d0c0e0;background:#fff;cursor:pointer;font-size:12px;font-weight:700;padding:2px 8px;border-radius:5px;color:#bbb;transition:all .13s;}
    .det-gender-tab.on{background:var(--accent);color:#fff;border-color:var(--accent);}
    .det-gender-tab.male.on{background:#4a90e2;border-color:#4a90e2;}
    .det-gender-tab.female.on{background:#e2609a;border-color:#e2609a;}
    .dc-big-slot{flex:1;height:93px;background:rgba(123,63,160,.08);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid transparent;transition:all .15s;}
    .dc-big-slot:hover{background:rgba(123,63,160,.2);border-color:var(--accent);}
    .dc-big-slot img{width:82px;height:82px;image-rendering:pixelated;object-fit:contain;}
    .dc-big-slot-plus{font-size:20px;color:#7B3FA0;font-weight:400;}
    .dc-hp-row{display:flex;align-items:center;gap:6px;margin-top:6px;}
    .dc-hp-slider{flex:1;-webkit-appearance:none;appearance:none;height:7px;border-radius:4px;outline:none;cursor:pointer;background:linear-gradient(to right,#7ac143 100%,rgba(123,63,160,.2) 100%);}
    .dc-hp-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:#7ac143;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.25);}
    .dc-hp-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#7ac143;border:none;cursor:pointer;}
    .dc-hp-pct{font-size:10px;color:#9070b0;font-weight:700;min-width:32px;text-align:right;white-space:nowrap;}
    .dur-row{display:flex;gap:10px;justify-content:flex-end;margin-bottom:5px;}
    .dur-item{font-size:12px;color:#666;}
    .dur-item span{font-weight:700;color:var(--accent);}
    .speed-cmp-btn{width:100%;background:var(--accent);color:#fff;border:none;padding:5px 6px;border-radius:5px;font-size:11px;cursor:pointer;transition:background .18s;}
    .speed-cmp-btn:hover{background:#5a2d7a;}

    /* Config rows */
    .cfg-row{display:flex;align-items:center;background:var(--row-bg);border-radius:7px;padding:9px 13px;margin-bottom:6px;gap:8px;cursor:pointer;transition:background .15s,box-shadow .15s;}
    .cfg-row:hover{background:#cfc0e0;box-shadow:0 2px 8px rgba(0,0,0,.12);}
    .cfg-lbl{font-size:13px;font-weight:700;color:#555;min-width:24px;flex-shrink:0;}
    .cfg-content{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0;overflow:hidden;}
    .cfg-name{font-size:12px;color:#333;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .cfg-desc{font-size:11px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .cfg-name.ph{color:#aaa;font-weight:400;}
    .item-sprite-sm{width:22px;height:22px;image-rendering:pixelated;flex-shrink:0;}

    /* Move rows */
    .move-row{display:flex;align-items:center;border-radius:7px;padding:9px 13px;margin-bottom:6px;gap:8px;cursor:pointer;transition:filter .15s;position:relative;}
    .move-row:hover{filter:brightness(1.12);}
    .move-type-img{width:32px;height:14px;object-fit:contain;flex-shrink:0;}
    .move-name-txt{font-size:13px;color:#fff;font-weight:600;min-width:88px;}
    .move-desc-txt{display:none;}
    .move-meta-txt{font-size:11px;color:rgba(255,255,255,.7);white-space:nowrap;}
    .move-power-txt{font-size:12px;color:rgba(255,255,255,.9);white-space:nowrap;min-width:95px;text-align:right;}
    .move-tooltip{
      display:none;position:absolute;bottom:calc(100% + 6px);left:0;
      background:rgba(30,24,50,.97);color:#e8e0f8;font-size:11px;line-height:1.5;
      padding:7px 11px;border-radius:7px;white-space:normal;max-width:280px;min-width:160px;
      box-shadow:0 4px 16px rgba(0,0,0,.4);pointer-events:none;z-index:50;
      border:1px solid rgba(255,255,255,.08);
    }
    .move-row:hover .move-tooltip{display:block;}

    .dmg-calc-btn{display:block;width:100%;margin-top:7px;background:var(--accent);color:#fff;border:none;padding:7px;border-radius:8px;font-size:12px;cursor:pointer;text-align:center;transition:background .18s;}
    .dmg-calc-btn:hover{background:#5a2d7a;}

    /* Defense chart */

    /* ── CALC PANELS ── */

    .calc-panel.speed-calc{flex:0 0 275px;scrollbar-width:thin;scrollbar-color:rgba(140,90,180,.25) transparent;}
.calc-panel.speed-calc::-webkit-scrollbar{width:4px;}
.calc-panel.speed-calc::-webkit-scrollbar-track{background:transparent;}
.calc-panel.speed-calc::-webkit-scrollbar-thumb{background:rgba(140,90,180,.25);border-radius:4px;}
    /* ── SPEED CALCULATOR ── */

#speedCalcBody .dc-drop-list{max-height:130px;}
.sc-stat-btn{border:1.5px solid #d4c0e8;border-radius:10px;background:#fff;font-size:10px;font-weight:600;cursor:pointer;color:#9070b0;padding:2px 7px;white-space:nowrap;transition:all .13s;font-family:inherit;flex-shrink:0;}
.sc-stat-btn.sc-stat-on{background:var(--accent);color:#fff;border-color:var(--accent);}
    .sc-pk-stats{font-size:10px;color:#9080c0;margin-top:4px;}
    .sc-spinrow{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;align-items:center;}
    .sc-bigval{font-size:18px;font-weight:700;color:#4a2070;min-width:28px;text-align:center;line-height:1.3;}
    .sc-speed-val{color:#9c27b0!important;font-size:22px!important;}
    .sc-spin-btn{border:none;border-radius:3px;cursor:pointer;font-size:9px;padding:2px 5px;font-family:inherit;line-height:1.4;transition:filter .1s;}
    .sc-spin-btn.sc-up{background:#b08bd0;color:#fff;}
    .sc-spin-btn.sc-dn{background:#d0b0f0;color:#8050c0;}

    .sc-nat-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:7px;}
    .sc-nat-btn{border:none;background:none;cursor:pointer;font-size:12px;color:#9080c0;padding:2px 5px;border-radius:4px;font-family:inherit;transition:all .13s;}
    .sc-nat-btn.sc-nat-on{background:var(--accent);color:#fff;font-weight:700;}
    .sc-nat-sep{color:#ddd;font-size:13px;}

    .sc-toggles{display:flex;flex-direction:column;gap:3px;}
    .sc-tog{border:1.5px solid #c9a0e8;border-radius:5px;background:#fff;color:#9070b0;cursor:pointer;font-size:11px;padding:3px 8px;font-family:inherit;transition:all .13s;white-space:nowrap;}

    .sc-tog-full{width:100%;margin-top:4px;}
    .sc-selrow{margin-bottom:5px;}
    .sc-sel{padding:4px 6px!important;font-size:11px!important;}
    .sc-pk-info{margin-top:6px;display:flex;flex-direction:column;gap:1px;}
    .sc-pk-name{font-size:13px;font-weight:700;color:#4a2070;}
    .sc-pk-stats{font-size:10px;color:#9080c0;}
    .sc-pk-empty{font-size:11px;color:#b0a0c8;margin-top:6px;text-align:center;}
    .sc-big-slot{width:60px;height:93px;background:rgba(123,63,160,.08);border-radius:10px;display:flex;align-items:center;justify-content:center;border:2px solid transparent;flex-shrink:0;cursor:pointer;transition:all .15s;}

    .sc-big-slot-plus{font-size:26px;color:#6a1baa;font-weight:400;}
    .calc-panel-title{font-size:12px;font-weight:700;color:#7060a0;padding-bottom:6px;border-bottom:1px solid #e0d0f0;margin-bottom:6px;letter-spacing:.4px;}

    /* ── DAMAGE CALC ── */
    .dc-block{background:var(--row-bg);border-radius:9px;padding:9px 11px;flex-shrink:0;}
    .dc-block-title{font-size:10px;font-weight:700;color:#9070b0;margin-bottom:7px;letter-spacing:.3px;}
    .dc-party-pills{display:grid;grid-template-columns:repeat(3,44px);gap:5px;justify-content:center;}
    .dc-pill{border:2px solid transparent;background:rgba(123,63,160,.08);border-radius:9px;cursor:pointer;padding:3px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}

    .dc-input{width:100%;box-sizing:border-box;padding:6px 9px;border:1.5px solid #d4c0e8;border-radius:7px;font-size:11px;outline:none;font-family:inherit;background:#fff;transition:border-color .15s;margin-top:5px;}

    .dc-drop{position:relative;z-index:30;}

    .dc-stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;}
    .dc-stat-box{display:flex;flex-direction:column;align-items:center;gap:3px;}

    .dc-ev-inp{width:46px;height:26px;border:1.5px solid #d4c0e8;border-radius:5px;font-size:12px;text-align:center;outline:none;font-family:inherit;font-weight:700;}

    .dc-rank-row{display:flex;align-items:center;gap:3px;}

    .dc-rank-val{font-size:13px;font-weight:700;color:#333;min-width:22px;text-align:center;}
    .dc-nat-row{display:flex;align-items:center;gap:5px;margin-top:8px;}

    .dc-sel-row{display:flex;gap:6px;}
    .dc-sel{flex:1;min-width:0;padding:5px 7px;border:1.5px solid #d4c0e8;border-radius:7px;font-size:11px;outline:none;font-family:inherit;background:#fff;color:#333;cursor:pointer;transition:border-color .15s;}
    .dc-sel:focus{border-color:var(--accent);}
    .dc-result-box{background:var(--chart-bg);border-radius:10px;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;margin-top:2px;flex-shrink:0;}
    .dc-result-lbl{font-size:11px;font-weight:700;color:#9080c0;letter-spacing:.3px;}
    .dc-result-sub{font-size:10px;color:#6a5a90;margin-top:2px;}
    .dc-result-val{font-size:30px;font-weight:900;color:#e8d8ff;letter-spacing:-.5px;}
    .dc-type-tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;color:#fff;font-weight:600;}
    /* 2-column calc layout */
    .dc-cols{display:grid;grid-template-columns:1fr 1fr;gap:8px;flex:1;min-height:0;overflow:hidden;}
    .dc-col{display:flex;flex-direction:column;gap:6px;overflow-y:auto;padding-right:2px;}
    .dc-col::-webkit-scrollbar{width:3px;}
    .dc-col::-webkit-scrollbar-thumb{background:rgba(123,63,160,.2);border-radius:2px;}
    .dc-col-title{font-size:11px;font-weight:700;color:var(--accent);padding:3px 0 5px;border-bottom:1px solid #e0d0f0;letter-spacing:.3px;margin-bottom:2px;flex-shrink:0;}
    .dc-dmg-box{background:var(--chart-bg);border-radius:10px;padding:10px 14px;flex-shrink:0;}
    .dc-dmg-range{font-size:18px;font-weight:900;color:#e8d8ff;letter-spacing:-.3px;}
    .dc-dmg-pct{font-size:13px;font-weight:600;color:#b0a0d0;margin-left:6px;}
    .dc-dmg-rolls{font-size:10px;color:#7060a0;margin:3px 0 5px;word-break:break-all;line-height:1.5;}

    .dc-dmg-hits.ohko{color:#ff6b6b;}
    .dc-dmg-empty{font-size:11px;color:#6a5a90;}
    .dc-toggle-row{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px;}
    .dc-toggle-btn{padding:2px 7px;border:1.5px solid #d0c0e0;border-radius:5px;background:#fff;font-size:10px;font-weight:700;cursor:pointer;color:#888;transition:all .13s;flex-shrink:0;white-space:nowrap;}
    .dc-toggle-btn.on{background:var(--accent);color:#fff;border-color:var(--accent);}
    .dc-toggle-btn.on-w{background:#e65100;color:#fff;border-color:#e65100;}
    .dc-env-row{display:flex;align-items:center;gap:3px;flex-wrap:wrap;margin-top:4px;}
    .dc-env-lbl{font-size:9px;color:#9070b0;font-weight:700;white-space:nowrap;min-width:30px;}
    .dc-val-row{display:flex;gap:5px;margin-top:6px;}
    .dc-val-box{flex:1;background:rgba(123,63,160,.12);border-radius:6px;padding:3px 8px;text-align:center;min-width:0;}
    .dc-val-lbl{font-size:9px;color:#9070b0;font-weight:700;}
    .dc-val-num{font-size:11px;font-weight:900;color:#c4a8e8;}

    /* ── SLOT TOOLTIP ── */
    .slot-tooltip{position:fixed;z-index:200;background:rgba(18,10,34,.97);border:1px solid #6040a0;border-radius:10px;padding:9px 11px;width:230px;font-size:10px;color:#c8c0e8;pointer-events:none;opacity:0;transition:opacity .15s ease;box-shadow:0 6px 24px rgba(0,0,0,.55);line-height:1.45;}

    .tt-header{display:flex;align-items:center;gap:4px;margin-bottom:6px;flex-wrap:wrap;}

    /* ── ANALYSIS SIDEBAR ── */
    .analysis-sidebar{width:350px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:5;opacity:0;pointer-events:none;transform:translateX(16px);transition:opacity .3s ease .1s,transform .3s ease .1s;}
    .analysis-sidebar.visible{opacity:1;pointer-events:all;transform:translateX(0);}
    .speed-rank-col{flex:1;min-width:0;display:flex;flex-direction:column;overflow-y:auto;background:var(--chart-bg);border-radius:10px;padding:10px 12px;}

    .type-chart-col{flex:1;min-width:0;display:flex;flex-direction:column;gap:8px;overflow-y:auto;}
    .analysis-box{background:var(--chart-bg);border-radius:10px;padding:10px 12px;}

    /* Nature modal */
    .nature-table{width:100%;border-collapse:collapse;font-size:11px;}
    .nature-table th{padding:5px 6px;background:#f0e6fa;color:#555;font-weight:700;text-align:center;font-size:10px;border:1px solid #ddd;}
    .nature-table td{padding:4px 6px;text-align:center;border:1px solid #eee;cursor:pointer;transition:background .12s;border-radius:0;}

    .nature-table .row-lbl{background:#fff0f0;color:#e53935;font-weight:700;cursor:default;}

    .nature-table .col-lbl{background:#e8f0fe;color:#1976d2;font-weight:700;cursor:default;}
    .nature-table .col-lbl:hover{background:#e8f0fe;}

    /* Scrollbar */
    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-track{background:rgba(0,0,0,.05);border-radius:3px;}
    ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.18);border-radius:3px;}

    /* ── RESPONSIVE ── */

    }
  </style>
</head>

};
const ALL_TYPES = Object.keys(TYPE_COLORS);
const TYPE_IMG = {

const DEF_CHART = {
  '노말':   {'격투':2,'고스트':0},
  '불꽃':   {'불꽃':.5,'물':2,'풀':.5,'얼음':.5,'땅':2,'바위':2,'강철':.5},

  '풀':     {'불꽃':2,'물':.5,'풀':.5,'전기':.5,'얼음':2,'독':2,'땅':.5,'비행':2,'벌레':2},
  '전기':   {'물':.5,'전기':.5,'풀':.5,'땅':2,'비행':.5},
  '얼음':   {'불꽃':2,'물':.5,'얼음':.5,'격투':2,'바위':2,'강철':2},
  '격투':   {'비행':2,'에스퍼':2,'벌레':.5,'바위':.5,'악':.5,'페어리':2},
  '독':     {'풀':.5,'격투':.5,'독':.5,'땅':2,'에스퍼':2,'벌레':.5,'페어리':.5},
  '땅':     {'불꽃':.5,'전기':0,'독':.5,'바위':.5,'물':2,'풀':2,'얼음':2},

  '에스퍼': {'격투':.5,'에스퍼':.5,'벌레':2,'고스트':2,'악':2},
  '벌레':   {'불꽃':2,'비행':2,'바위':2,'풀':.5,'격투':.5,'땅':.5},
  '바위':   {'불꽃':.5,'노말':.5,'독':.5,'비행':.5,'물':2,'풀':2,'격투':2,'땅':2,'강철':2},
  '고스트': {'노말':0,'격투':0,'독':.5,'벌레':.5,'고스트':2,'악':2},
  '드래곤': {'불꽃':.5,'물':.5,'전기':.5,'풀':.5,'얼음':2,'드래곤':2,'페어리':2},
  '악':     {'격투':2,'에스퍼':0,'고스트':.5,'악':.5,'페어리':2},
  '강철':   {'불꽃':2,'격투':2,'땅':2,'노말':.5,'풀':.5,'얼음':.5,'비행':.5,'에스퍼':.5,'벌레':.5,'바위':.5,'드래곤':.5,'강철':.5,'페어리':.5,'독':0},
  '페어리': {'독':2,'강철':2,'격투':.5,'벌레':.5,'악':.5,'드래곤':0}
};

/* Offensive type chart: ATK_CHART[attackType][defendType] = multiplier */
const ATK_CHART = {};
ALL_TYPES.forEach(atk => {
  ATK_CHART[atk] = {};
  ALL_TYPES.forEach(def => { ATK_CHART[atk][def] = DEF_CHART[def]?.[atk] ?? 1; });
});

/* ════════════════════════════
   NATURES
════════════════════════════ */
/* rows=stat raised, cols=stat lowered. null = neutral (same row/col) */
const NATURES = [
  /* +Atk */
  {name:'변덕',   up:null, dn:null}, // Hardy  (neutral)
  {name:'외로움',   up:'A',  dn:'B'},  // Lonely
  {name:'고집', up:'A',  dn:'C'},  // Adamant
  {name:'개구쟁이',up:'A', dn:'D'},  // Naughty
  {name:'용감',     up:'A',  dn:'S'},  // Brave
  /* +Def */
  {name:'대담',   up:'B',  dn:'A'},  // Bold
  {name:'수줍',     up:null, dn:null}, // Docile (neutral)
  {name:'장난꾸러기',   up:'B',  dn:'C'},  // Impish
  {name:'촐랑', up:'B',  dn:'D'},  // Lax
  {name:'무사태평',   up:'B',  dn:'S'},  // Relaxed
  /* +SpAtk */
  {name:'조심',   up:'C',  dn:'A'},  // Modest
  {name:'의젓',     up:'C',  dn:'B'},  // Mild
  {name:'노력',   up:null, dn:null}, // Bashful (neutral)
  {name:'덜렁',   up:'C',  dn:'D'},  // Rash
  {name:'냉정',   up:'C',  dn:'S'},  // Quiet
  /* +SpDef */
  {name:'차분',     up:'D',  dn:'A'},  // Calm
  {name:'얌전', up:'D',  dn:'B'},  // Gentle
  {name:'신중',     up:'D',  dn:'C'},  // Careful
  {name:'온순',     up:'D',  dn:'S'},  // Sassy
  {name:'건방',     up:null, dn:null}, // Quirky (neutral)
  /* +Spe */
  {name:'겁쟁이',   up:'S',  dn:'A'},  // Timid
  {name:'성급',   up:'S',  dn:'B'},  // Hasty
  {name:'명랑',     up:'S',  dn:'C'},  // Jolly
  {name:'천진난만', up:'S',  dn:'D'},  // Naive
  {name:'성실',     up:null, dn:null}, // Serious (neutral)
];
/* 5×5 layout: rows = [A,B,C,D,S], cols = [A,B,C,D,S] */
const NAT_STATS = ['A','B','C','D','S'];
const NAT_LABELS = {A:'공격',B:'방어',C:'특공',D:'특방',S:'스피드'};
function natMult(nature, stat) {
  if (!nature || !stat) return 1;
  return nature.up===stat ? 1.1 : nature.dn===stat ? 0.9 : 1;
}

/* ════════════════════════════
   STATE
════════════════════════════ */
const PARTY_SIZE = 6;
function newSlot() { return {pokemon:null,item:null,ability:null,nature:null,moves:[null,null,null,null],evs:{H:0,A:0,B:0,C:0,D:0,S:0},gender:null}; }
const party = Array.from({length: PARTY_SIZE}, newSlot);
let selectedSlot = -1;
let modalSlot    = -1;
let _modalSlotWasEmpty = false;
let calcModalCallback = null;
let editMoveIdx  = -1;
let pokeFilter   = 'all';
let moveFilter   = 'all';
let itemFilter   = 'all';
let typeFilter      = null;
let movePokeFilter  = false;
let moveStabFilter  = false;

/* ════════════════════════════
   UTILITIES
════════════════════════════ */
function spriteUrl(name, no) {
  const v = POKEMON_SPRITES?.[name];
  return v || `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${no}.png`;
}

function defEffectiveness(t1, t2) {
  const r = {}; ALL_TYPES.forEach(t => r[t] = 1);
  [t1, t2].filter(Boolean).forEach(def => {
    ALL_TYPES.forEach(atk => { r[atk] *= DEF_CHART[def]?.[atk] ?? 1; });
  });
  return r;
}

function statColor(v) {
  if (v>=130) return '#43a047'; if (v>=100) return '#7cb342';
  if (v>=75)  return '#fbc02d'; if (v>=50)  return '#ef6c00';
  return '#e53935';
}

function calcStat(base, ev, isHP, natM=1) {
  if (isHP) return base + 75 + (ev||0);
  return Math.floor((base + 20 + (ev||0)) * natM);
}

function totalEVs(evs) {
  return (evs.H||0)+(evs.A||0)+(evs.B||0)+(evs.C||0)+(evs.D||0)+(evs.S||0);
}

function calcDurability(pk, evs, nature, item) {
  const hp   = calcStat(pk.H, evs.H, true);
  const defM = getItemStatMult(item, pk, 'B');
  const spdM = getItemStatMult(item, pk, 'D');
  const def  = calcStat(pk.B, evs.B, false, natMult(nature,'B')) * defM;
  const spdf = calcStat(pk.D, evs.D, false, natMult(nature,'D')) * spdM;
  return {
    phys: Math.floor(hp * def  / 0.411),
    spec: Math.floor(hp * spdf / 0.411)
  };
}

/* ── 포켓몬 전용 도구: 능력치 배율 ──
   stat multiplier applied to the raw stat value before move calc */
function getItemStatMult(item, pk, statKey) {
  if (!item || !pk) return 1;
  const n = item.name, nm = pk.name;
  /* 전기구슬 → 피카츄 공격/특공 ×2 */
  if (n==='전기구슬' && nm.includes('피카츄'))
    return (statKey==='A'||statKey==='C') ? 2 : 1;
  /* 굵은뼈 → 뚜벅쵸/텅구리 공격 ×2 */
  if (n==='굵은뼈' && (nm==='뚜벅쵸'||nm==='텅구리'))
    return statKey==='A' ? 2 : 1;
  /* 심해의이빨 → 진주몽 특공 ×2 */
  if (n==='심해의이빨' && nm==='진주몽')
    return statKey==='C' ? 2 : 1;
  /* 심해의비늘 → 진주몽 특방 ×2 */
  if (n==='심해의비늘' && nm==='진주몽')
    return statKey==='D' ? 2 : 1;
  /* 마음의물방울 → 라티아스/라티오스 특공/특방 ×1.5 */
  if (n==='마음의물방울' && (nm.includes('라티아스')||nm.includes('라티오스')))
    return (statKey==='C'||statKey==='D') ? 1.5 : 1;
  /* 구애스카프 → 스피드 ×1.5 */
  if (n==='구애스카프' && statKey==='S') return 1.5;
  /* 검은철구 → 스피드 ×0.5 */
  if (n==='검은철구'   && statKey==='S') return 0.5;
  /* 교정깁스 → 스피드 ×0.5 */
  if (n==='교정깁스'   && statKey==='S') return 0.5;
  /* 스피드파우더 → 스피드 ×2 */
  if (n==='스피드파우더' && statKey==='S') return 2;
  return 1;
}

/* ── 포켓몬 전용 도구: 기술 위력 배율 ──
   (금강옥·백금옥 등 특정 포켓몬+타입 조합) */
const _PKM_POWER_ITEMS = {
  '금강옥': { poke:['디아루가'], types:['드래곤','강철'], mult:1.2 },
  '백금옥': { poke:['펄기아'],   types:['드래곤','물'],   mult:1.2 },
};
function getPkmPowerMult(item, pk, mv) {
  if (!item||!pk||!mv?.power||mv.category==='변화') return 1;
  const e = _PKM_POWER_ITEMS[item.name];
  if (!e) return 1;
  if (!e.poke.some(n => pk.name.includes(n))) return 1;
  return e.types.includes(mv.type) ? e.mult : 1;
}

/* ── 아르세우스(플레이트) · 실버디(메모리) 타입 오버라이드 ──
   Returns the type the pokemon becomes from holding this item */
function getItemTypeOverride(item, pk) {
  if (!item || !pk) return null;
  const isArceus  = pk.name.includes('아르세우스');
  const isSilvally = pk.name==='실버디' || pk.name.startsWith('실버디');
  if (!isArceus && !isSilvally) return null;
  if (isArceus  && item.category!=='플레이트') return null;
  if (isSilvally && item.category!=='메모리')  return null;
  for (const t of ALL_TYPES) { if (item.name.includes(t)) return t; }
  const alias = {'불꽃':['화염'],'전기':['번개'],'격투':['주먹'],'고스트':['유령'],'악':['암흑'],'에스퍼':['정신']};
  for (const [t, alts] of Object.entries(alias)) {
    if (alts.some(a => item.name.includes(a))) return t;
  }
  return null;
}

  /* 노말 */ '실크스카프':'노말',
  /* 페어리 */ '요정의깃털':'페어리'
};
function getItemPowerMult(item, mv, effType=null) {
  if (!item || !mv?.power || mv.category==='변화') return 1;
  const n = item.name, cat = mv.category, type = effType ?? mv.type;
  if (n==='구애머리띠' && cat==='물리') return 1.5;
  if (n==='구애안경'   && cat==='특수') return 1.5;
  /* Life Orb: 수명단축(게임 내) 또는 생명의구슬(데이터) */
  if (n==='수명단축' || n==='생명의구슬') return 1.3;
  /* Muscle Band */
  if ((n==='근력띠'||n==='근육의머리띠'||n==='힘의머리띠') && cat==='물리') return 1.1;
  /* Wise Glasses */
  if ((n==='현명안경'||n==='박식안경') && cat==='특수') return 1.1;
  if (_TYPE_BOOST_ITEMS[n]===type) return 1.2;
  /* 플레이트 · 메모리 계열: 이름 안에 타입 명 포함 */
  if (item.category==='플레이트'||item.category==='메모리') {
    if (ALL_TYPES.some(t => n.includes(t) && t===type)) return 1.2;
    const alias = {'불꽃':['화염','불'],'전기':['번개'],'격투':['주먹'],'고스트':['유령'],'악':['암흑'],'에스퍼':['정신']};
    for (const [t, alts] of Object.entries(alias)) {
      if (t===type && alts.some(a => n.includes(a))) return 1.2;
    }
  }
  return 1;
}

function getAbilityStatMult(ability, statKey, ctx={}) {
  if (!ability) return 1;
  const n = ability.name;
  const { weather='', field='', hpPct=100 } = ctx;
  if ((n==='천하장사'||n==='순수한힘') && statKey==='A') return 2;
  if (n==='의욕' && statKey==='A') return 1.5;
  if (n==='선파워' && statKey==='C' && weather==='맑음') return 1.5;
  if (n==='타오르는불꽃' && statKey==='A' && (!weather||weather==='맑음')) return 4/3;
  if (n==='하드론엔진' && statKey==='C' && field==='일렉') return 4/3;
  if (n==='슬로스타트' && (statKey==='A'||statKey==='S')) return 0.5;
  if (n==='무기력' && (statKey==='A'||statKey==='C') && hpPct<=50) return 0.5;
  if (n==='플라워기프트' && statKey==='D' && weather==='맑음') return 1.5;
  return 1;
}
function getAbilityMoveType(ability, mv) {
  if (!ability || !mv) return mv?.type;
  const skin = _SKIN_TYPES[ability.name];
  if (skin && mv.type==='노말') return skin;
  if (ability.name==='촉촉보이스' && SOUND_MOVES.has(mv.name)) return '물';
  return mv.type;
}

/* ── 폼/도구/특성을 모두 고려한 기술 유효 타입 ── */
function getMoveEffectiveType(pk, mv, item, ability, weather='') {
  if (!mv || !pk) return mv?.type;
  /* 노말스킨: 모든 기술 → 노말 (최우선) */
  if (ability?.name === '노말스킨') return '노말';
  /* 특성 타입 변환 (스킨 계열, 촉촉보이스) */
  const abilityType = getAbilityMoveType(ability, mv);
  if (abilityType !== mv.type) return abilityType;
  const mvName = mv.name;
  /* 심판의뭉치: 아르세우스 현재 타입 */
  if (mvName === '심판의뭉치' && pk.name.includes('아르세우스')) return pk.type1;
  /* 멀티어택: 실버디 현재 타입 */
  if (mvName === '멀티어택' && pk.name.startsWith('실버디')) return pk.type1;
  /* 덩굴방망이: 오거폰 마스크 타입 (기본폼은 풀, 마스크폼은 type2) */
  if (mvName === '덩굴방망이' && pk.name.startsWith('오거폰')) return pk.type2 || pk.type1;
  /* 웨더볼: 날씨에 따라 타입 변환 */
  if (mvName === '웨더볼') {
    const effW = weather || ((pk.name==='메가메가니움'||ability?.name==='메가솔라'||ability?.name==='타오르는불꽃') ? '맑음' : '');
    if (effW==='맑음') return '불꽃';
    if (effW==='비') return '물';
    if (effW==='모래') return '바위';
    if (effW==='눈') return '얼음';
    return '노말';
  }
  return mv.type;
}

/* ── 기술 유효 위력 (폼/도구/특성 오버라이드 포함) ── */
function getMoveEffectivePower(pk, mv, ability, weather='', ctx={}) {
  const n = mv.name;
  const { hpPct=100, defHpPct=100, defS=1, defWeight=null, status='' } = ctx;

  if (OVERRIDE_POWER[n]) return OVERRIDE_POWER[n];

  /* 웨더볼 */
  if (n === '웨더볼') {
    const effW = weather || ((pk?.name==='메가메가니움'||ability?.name==='메가솔라'||ability?.name==='타오르는불꽃') ? '맑음' : '');
    return effW ? 100 : 50;
  }

  /* 해수스파우팅 / 분화 / 드래곤에너지: 자신 HP에 비례 (HP 많을수록 강함) */
  if (['해수스파우팅','분화','드래곤에너지'].includes(n)) {
    return Math.max(1, Math.floor(150 * hpPct / 100));
  }
  /* 기사회생 / 바둥바둥: 자신 HP에 반비례 (HP 적을수록 강함) */
  if (['기사회생','바둥바둥'].includes(n)) {
    if (hpPct > 50) return 20;
    if (hpPct > 35) return 40;
    if (hpPct > 20) return 80;
    if (hpPct > 10) return 100;
    if (hpPct >  4) return 150;
    return 200;
  }
  /* 소금물: 상대 HP ≤ 50% 일 때 위력 2배 */
  if (n === '소금물') return defHpPct <= 50 ? 130 : 65;
  /* 묵사발: 상대 HP 비율에 비례 (max 120) */
  if (n === '묵사발') return Math.max(1, Math.floor(120 * defHpPct / 100));
  /* 객기 (기술): 상태이상일 때 위력 2배 */
  if (n === '객기' && status) return (mv.power || 70) * 2;
  /* 자이로볼: 상대 스피드가 높을수록 강함 (min 1, max 150) */
  if (n === '자이로볼') {
    const atkS = pk?.S || 1;
    return Math.min(150, Math.max(1, Math.floor(25 * Math.max(1, defS) / Math.max(1, atkS))));
  }
  /* 일렉트릭볼: 자신/상대 스피드 비율 */
  if (n === '일렉트릭볼') {
    const atkS = pk?.S || 1;
    const r = Math.floor(atkS / Math.max(1, defS));
    if (r >= 4) return 150;
    if (r >= 3) return 120;
    if (r >= 2) return 80;
    if (r >= 1) return 60;
    return 40;
  }
  /* 헤비봄버 / 히트스탬프: 자신 몸무게 / 상대 몸무게 비율 */
  if (['헤비봄버','히트스탬프'].includes(n)) {
    const atkW = pk?.weight || null;
    if (!atkW || !defWeight) return null;
    const r = atkW / defWeight;
    if (r >= 5) return 120;
    if (r >= 4) return 100;
    if (r >= 3) return 80;
    if (r >= 2) return 60;
    return 40;
  }
  /* 풀묶기 / 안다리걸기: 상대 몸무게가 무거울수록 강함 */
  if (['풀묶기','안다리걸기'].includes(n)) {
    if (!defWeight) return null;
    if (defWeight >= 200) return 120;
    if (defWeight >= 100) return 100;
    if (defWeight >=  50) return 80;
    if (defWeight >=  25) return 60;
    if (defWeight >=  10) return 40;
    return 20;
  }
  /* 매그니튜드: 무작위 위력, 대표값 70 사용 */
  if (n === '매그니튜드') return 70;

  return mv.power;
}

/* ── 쾌청 버프: 메가메가니움 또는 메가솔라 특성의 불꽃 기술 ×1.5 ── */
function getSunnyBoost(pk, effType, ability) {
  const hasSunny = pk?.name === '메가메가니움' || ability?.name === '메가솔라';
  if (hasSunny && effType === '불꽃') return 1.5;
  return 1;
}
function getAbilityPowerMult(ability, mv, effType=null, ctx={}) {
  if (!ability || !mv?.power || mv.category==='변화') return 1;
  const n = ability.name, p = mv.power;
  const type = effType ?? mv.type;
  const { weather='', field='', status='', hpPct=100 } = ctx;
  const isPhys = mv.category === '물리';
  const lowHP = hpPct <= 33;
  /* ── 기술명/태그 기반 ── */
  if (n==='테크니션' && p<=60) return 1.5;
  if (n==='예리함' && SLICING_MOVES.has(mv.name)) return 1.5;
  if (n==='옹골찬턱' && BITING_MOVES.has(mv.name)) return 1.5;
  if (n==='철주먹' && PUNCHING_MOVES.has(mv.name)) return 1.2;
  if (n==='메가런처' && PULSE_MOVES.has(mv.name)) return 1.5;
  if ((n==='펑크록') && SOUND_MOVES.has(mv.name)) return 1.3;
  if (n==='이판사판' && RECOIL_MOVES.has(mv.name)) return 1.2;
  if (n==='우격다짐' && SHEER_FORCE_MOVES.has(mv.name)) return 1.3;
  if (n==='단단한발톱' && CONTACT_MOVES.has(mv.name)) return 1.3;
  /* ── 타입 기반 ── */
  if ((n==='트랜지스터'||n==='트렌지스터') && type==='전기') return 1.5;
  if (n==='용의턱'     && type==='드래곤') return 1.5;
  if (n==='바위나르기' && type==='바위') return 1.5;
  if (n==='수포'       && type==='물') return 2;
  if ((n==='강철술사'||n==='강철정신') && type==='강철') return 1.5;
  /* ── 핀치 특성 (HP ≤33%) ── */
  if (n==='맹화' && type==='불꽃' && lowHP) return 1.5;
  if (n==='급류' && type==='물'   && lowHP) return 1.5;
  if (n==='심록' && type==='풀'   && lowHP) return 1.5;
  if (n==='벌레의알림' && type==='벌레' && lowHP) return 1.5;
  /* ── 상태이상 연동 ── */
  if (n==='근성'   && isPhys && status) return 1.5;
  if (n==='독폭주' && isPhys && status==='독') return 1.5;
  if (n==='열폭주' && !isPhys && status==='화상') return 1.5;
  /* ── 날씨/필드 연동 ── */
  if (n==='모래의힘' && weather==='모래' && ['땅','바위','강철'].includes(type)) return 1.3;
  /* ── 조건부 ── */
  if (n==='애널라이즈'||n==='브레인포스') return 1.3;
  /* ── 전체 기술 보정 ── */
  if (n==='부자유친') return 1.25;
  if (n==='노말스킨') return 1.2;
  if (_SKIN_TYPES[n] && mv.type==='노말') return 1.2;
  return 1;
}

function getStatGrade(value, breaks) {
  if (value < breaks[0]) return {label:'매우낮음', cls:'sg-very-low'};
  if (value < breaks[1]) return {label:'낮음',     cls:'sg-low'};
  if (value < breaks[2]) return {label:'준수함',   cls:'sg-mid'};
  if (value < breaks[3]) return {label:'높음',     cls:'sg-high'};
  return                        {label:'매우높음', cls:'sg-very-high'};
}

function calcDecisivePower(pk, evs, mv, nature, item, ability) {
  if (!mv || mv.category==='변화') return 0;
  const effPow = getMoveEffectivePower(pk, mv, ability);
  if (!effPow) return 0;
  const isPhys = mv.category==='물리';
  const base   = isPhys ? pk.A : pk.C;
  const evKey  = isPhys ? 'A' : 'C';
  const statM  = getItemStatMult(item, pk, evKey) * getAbilityStatMult(ability, evKey);
  const stat   = calcStat(base, evs[evKey], false, natMult(nature, evKey)) * statM;
  const effType = getMoveEffectiveType(pk, mv, item, ability);
  let isStab = effType===pk.type1 || effType===pk.type2;
  if (!isStab) {
    const ot = getItemTypeOverride(item, pk);
    if (ot && ot===effType) isStab = true;
  }
  const stab = (ability?.name==='적응력' && isStab) ? 2 : (isStab ? 1.5 : 1);
  const itemM    = getItemPowerMult(item, mv, effType) * getPkmPowerMult(item, pk, mv);
  const abilityM = getAbilityPowerMult(ability, mv, effType);
  const hits     = MULTI_HIT_COUNT[mv.name] || 1;
  const sunnyM   = getSunnyBoost(pk, effType, ability);
  return Math.floor(stat * effPow * hits * stab * itemM * abilityM * sunnyM);
}

function hexToRgb(hex) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

  '우물의가면':   { base:'오거폰',   form:'오거폰(우물의가면)' },
  '주춧돌의가면': { base:'오거폰',   form:'오거폰(주춧돌의가면)' },
  '화덕의가면':   { base:'오거폰',   form:'오거폰(화덕의가면)' },
};
const DEFAULT_FORM_ITEM = {};

/* 성별에 따라 모습이 다른 포켓몬: 이름 → {male, female} */
const GENDER_FORM_MAP = (() => {
  const pairs = [
    ['니드런♂','니드런♀'],['탱그릴♂','탱그릴♀'],['탱탱겔♂','탱탱겔♀'],
    ['화염레오♂','화염레오♀'],['냐오닉스♂','냐오닉스♀'],
    ['에써르♂','에써르♀'],['대쓰여너♂','대쓰여너♀'],['퍼퓨돈♂','퍼퓨돈♀'],
  ];
  const m = {};
  for (const [male, female] of pairs) {
    m[male]   = {male, female};
    m[female] = {male, female};
  }
  return m;
})();

/* 메가스톤 역방향 맵: 스톤명 → 메가폼명 (Z폼 제외하고 일반폼 우선) */
const STONE_MEGA_MAP = (() => {
  const m = {};
  for (const [mega, stone] of Object.entries(MEGA_STONE_MAP)) {
    if (!mega.endsWith('Z')) m[stone] = mega;
  }
  return m;
})();

/* 폼명 → 해당 아이템명 역방향 맵 */
const FORM_ITEM_MAP = {
  ...Object.fromEntries(Object.entries(PLATE_FORM).map(([item, form]) => [form, item])),
  ...Object.fromEntries(Object.entries(MEMORY_FORM).map(([item, form]) => [form, item])),
  ...Object.fromEntries(Object.entries(ITEM_FORM_MAP).map(([item, {form}]) => [form, item])),
};

function getBaseName(name) {
  /* 메가폼: '메가이상해꽃' → '이상해꽃', '메가리자몽X' → '리자몽' */
  if (name.startsWith('메가') && name !== '메가니움' && name !== '메가자리') {
    return name.replace('메가', '').replace(/[XYZ]$/, '');
  }
  if (/^아르세우스\(/.test(name)) return '아르세우스';
  if (/^실버디\(/.test(name))     return '실버디';
  if (/^오거폰\(/.test(name))     return '오거폰';
  /* ITEM_FORM_MAP에 등록된 폼들 (자시안(검왕), 디아루가(오리진폼) 등) */
  for (const {form, base} of Object.values(ITEM_FORM_MAP)) {
    if (name === form) return base;
  }
  return name;
}

function getTargetForm(baseName, itemName) {
  if (!itemName) return baseName;
  /* 메가스톤 → 메가폼 */
  const megaTarget = STONE_MEGA_MAP[itemName];
  if (megaTarget && getBaseName(megaTarget) === baseName) return megaTarget;
  /* 아르세우스 플레이트, 실버디 메모리 */
  if (baseName === '아르세우스') return PLATE_FORM[itemName] || baseName;
  if (baseName === '실버디') {
    if (MEMORY_FORM[itemName]) return MEMORY_FORM[itemName];
    /* 플레이트도 실버디 폼 변경 지원: 원령플레이트 → 실버디(고스트) */
    const plateTarget = PLATE_FORM[itemName];
    if (plateTarget) {
      const typeName = plateTarget.match(/\((.+)\)/)?.[1];
      if (typeName) return `실버디(${typeName})`;
    }
    return baseName;
  }
  /* 그 외 ITEM_FORM_MAP */
  const entry = ITEM_FORM_MAP[itemName];
  if (entry && entry.base === baseName) return entry.form;
  return baseName;
}

function applyFormChange(slotIdx) {
  const mem = party[slotIdx];
  if (!mem?.pokemon) return false;
  const baseName   = getBaseName(mem.pokemon.name);
  const itemName   = mem.item?.name || null;
  const targetName = getTargetForm(baseName, itemName);
  if (targetName === mem.pokemon.name) return false;
  const newPk = POKEMON_DATA.find(p => p.name === targetName);
  if (!newPk) return false;
  mem.pokemon = newPk;
  const abd = ABILITY_DATA?.[newPk.name];
  mem.ability = abd?.normal?.[0] || null;
  return true;
}

function showSlotTooltip(anchorEl, html) {
  const tt = document.getElementById('slotTooltip');
  if (!tt || !html) return;
  tt.innerHTML = html;
  tt.classList.remove('visible');
  const rect = anchorEl.getBoundingClientRect();
  const goRight = (rect.left + rect.width / 2) < window.innerWidth / 2;

    if (tr.bottom > window.innerHeight - 8) tt.style.top = Math.max(8, window.innerHeight - tr.height - 8) + 'px';
    tt.classList.add('visible');

/* 메타 usage id → POKEMON_DATA 실제 폼 이름 매핑 */
const FORM_IDX_TO_NAME = {
  '0479-01': '히트로토무',
  '0479-02': '워시로토무',
  '0479-03': '프로스트로토무',
  '0479-04': '스핀로토무',
  '0479-05': '커트로토무',
  '0670-05': '플라엣테(영원의꽃)',
  '0503-01': '히스이 대검귀',
  '0199-01': '가라르 야도킹',
  '0706-01': '히스이 미끄래곤',
  '0902-00': '대쓰여너♂',
  '0902-01': '대쓰여너♀',
  '0038-01': '알로라 나인테일',
  '0571-01': '히스이 조로아크',
  '0724-01': '히스이 모크나이퍼',
  '0059-01': '히스이 윈디',
  '0080-02': '가라르 야도란',
};

/* usage 항목에서 실제 POKEMON_DATA 폼을 찾는 헬퍼 */
function resolveUsageForm(u) {
  if (u.id && FORM_IDX_TO_NAME[u.id]) {
    const mapped = POKEMON_DATA.find(p => p.name === FORM_IDX_TO_NAME[u.id]);
    if (mapped) return mapped;
  }
  const direct = POKEMON_DATA.find(p => p.name === u.name && p.champions);
  if (direct) return direct;
  if (u.id) {
    const dexNo = parseInt(u.id.split('-')[0]);
    const forms = POKEMON_DATA.filter(p => p.no === dexNo && p.champions && !p.name.startsWith('메가'));
    if (forms.length === 1) return forms[0];
  }
  return null;
}

function getMetaSet(pkNameOrNo) {
  if (typeof META_USAGE_DATA === 'undefined' || typeof META_SETS_DATA === 'undefined') return null;
  const key = 's1_single';
  const usage = META_USAGE_DATA[key]?.usage || [];
  const sets  = META_SETS_DATA[key]?.pokemon || [];
  let u;
  if (typeof pkNameOrNo === 'number') {
    /* 덱스 번호: FORM_IDX_TO_NAME 매핑 우선, 없으면 일반 덱스 탐색 */
    u = usage.slice(0, 50).find(u => u.id && FORM_IDX_TO_NAME[u.id] && parseInt(u.id.split('-')[0]) === pkNameOrNo)
      || usage.slice(0, 50).find(u => u.id && parseInt(u.id.split('-')[0]) === pkNameOrNo);
  } else {
    /* 이름: FORM_IDX_TO_NAME 역매핑(이름→id) 먼저, 없으면 직접 이름 탐색 */
    u = usage.slice(0, 50).find(u => u.id && FORM_IDX_TO_NAME[u.id] === pkNameOrNo)
      || usage.slice(0, 50).find(u => u.name === pkNameOrNo);
  }
  if (!u) return null;
  return sets.find(s => s.id === u.id) || null;
}

function buildMySlotTooltip(mem) {
  const pk = mem.pokemon;
  if (!pk) return '';
  const evs = mem.evs || {};
  const nature = mem.nature;
  const moves = (mem.moves || []).filter(Boolean);
  const speedStat = Math.floor(calcStat(pk.S, evs.S||0, false, natMult(nature,'S')) * getItemStatMult(mem.item, pk, 'S'));
  const dur = calcDurability(pk, evs, nature, mem.item);
  const evParts = ['H','A','B','C','D','S'].filter(s => evs[s]).map(s => `${s}:${evs[s]}`);
  const typeBadges = [pk.type1, pk.type2].filter(Boolean)
    .map(t => `<span class="tt-type" style="background:${TYPE_COLORS[t]}">${t}</span>`).join('');
  let movesHTML = '';
  for (const mv of moves) {
    const pow = mv.category !== '변화' ? calcDecisivePower(pk, evs, mv, nature, mem.item, mem.ability) : 0;
    const col = mv.category==='물리'?'#e8a060':mv.category==='특수'?'#60a8e8':'#808098';
    movesHTML += `<div class="tt-move"><span class="tt-cat" style="color:${col}">●</span><span class="tt-mname">${mv.name}</span>${pow>0?`<span class="tt-pow">${pow.toLocaleString()}</span>`:''}</div>`;
  }
  return `<div class="tt-header"><span class="tt-pkname">${pk.name}</span>${typeBadges}</div>` +
    `<div class="tt-row">${mem.item?`<span><span class="tt-lbl">도구</span> ${mem.item.name}</span>`:''}${mem.ability?`<span><span class="tt-lbl">특성</span> ${mem.ability.name}</span>`:''}</div>` +
    `<div class="tt-row">${nature?`<span class="tt-lbl">성격</span> ${nature.name}`:''}</div>` +
    (evParts.length ? `<div class="tt-ev"><span class="tt-lbl">노력치</span> ${evParts.join(' ')}</div>` : '') +
    (movesHTML ? `<hr class="tt-divider">${movesHTML}` : '') +
    `<div class="tt-bottom"><span>물리내구 <b>${dur.phys.toLocaleString()}</b></span><span>특수내구 <b>${dur.spec.toLocaleString()}</b></span><span>스피드 <b>${speedStat}</b></span></div>`;
}

function buildEnemySlotTooltip(pk) {
  if (!pk) return '';
  const typeBadges = [pk.type1, pk.type2].filter(Boolean)
    .map(t => `<span class="tt-type" style="background:${TYPE_COLORS[t]}">${t}</span>`).join('');
  const minSpd = calcStat(pk.S, 0, false, 0.9);
  const maxSpd = calcStat(pk.S, 32, false, 1.1);
  const spdLine = `<div class="tt-spd-range"><span class="tt-lbl">스피드</span> 최저 <b>${minSpd}</b> ~ 최속 <b>${maxSpd}</b></div>`;
  /* 메가폼이면 base form 이름으로 메타 조회 */
  let lookupName = pk.name;
  if (pk.name.startsWith('메가') && pk.name !== '메가니움') {
    const base = POKEMON_DATA.find(p => p.no === pk.no && !p.name.startsWith('메가'));
    if (base) lookupName = base.name;
  }
  const ms = getMetaSet(lookupName);
  if (ms) {
    const natName = ms.natures?.[0]?.name || '—';
    const itemName = ms.items?.[0]?.name || '없음';
    const ev = ms.ev_spreads?.[0]?.evs || {};
    const evStr = ['H','A','B','C','D','S'].filter(s => ev[s]).map(s => `${s}:${ev[s]}`).join(' ') || '미투자';
    const mvTags = (ms.moves || []).slice(0, 4).map(m => `<span class="tt-movename">${m.name}</span>`).join('');
    return `<div class="tt-header"><span class="tt-pkname">${pk.name}</span>${typeBadges}</div>` +
      `<div class="tt-meta-label">주요 샘플</div>` +
      `<div class="tt-sample-row"><span class="tt-lbl">성격</span> ${natName} &nbsp;<span class="tt-lbl">도구</span> ${itemName}</div>` +
      `<div class="tt-sample-row"><span class="tt-lbl">노력치</span> ${evStr}</div>` +
      `<div class="tt-moves-enemy">${mvTags}</div>` + spdLine;
  } else {
    const bst = pk.H + pk.A + pk.B + pk.C + pk.D + pk.S;
    const sStr = `H:${pk.H} A:${pk.A} B:${pk.B} C:${pk.C} D:${pk.D} S:${pk.S}`;
    return `<div class="tt-header"><span class="tt-pkname">${pk.name}</span>${typeBadges}</div>` +
      `<div class="tt-base-stats">${sStr} <span class="tt-bst">(합계 ${bst})</span></div>` + spdLine;
  }
}

/* ════════════════════════════
   RENDER SLOTS
════════════════════════════ */
function renderSlots() {
  const sb = document.getElementById('partySidebar');
  sb.innerHTML = '';
  for (let i = 0; i < PARTY_SIZE; i++) {
    const slot = document.createElement('div');
    slot.className = 'party-slot' + (selectedSlot===i?' active':'');
    const mem = party[i];
    if (mem.pokemon) {
      const img = document.createElement('img');
      img.src = spriteUrl(mem.pokemon.name, mem.pokemon.no);
      img.className = 'slot-img'; img.alt = mem.pokemon.name;
      slot.appendChild(img);
      const del = document.createElement('span');
      del.className = 'slot-del on'; del.textContent = '✕';
      del.addEventListener('click', e => { e.stopPropagation(); removePokemon(i); });
      slot.appendChild(del);
    } else {
      const plus = document.createElement('span');
      plus.className = 'slot-plus'; plus.textContent = '+';
      slot.appendChild(plus);
    }
    slot.addEventListener('click', () => { hideSlotTooltip(); onSlotClick(i); });
    if (mem.pokemon) {
      slot.addEventListener('mouseenter', () => showSlotTooltip(slot, buildMySlotTooltip(mem)));
      slot.addEventListener('mouseleave', hideSlotTooltip);
    }
    sb.appendChild(slot);
  }
  const isBigMode = document.getElementById('appBody')?.classList.contains('big-mode');
  if (isBigMode) {
    const bigBtns = document.createElement('div');
    bigBtns.className = 'big-mode-btns';
    bigBtns.innerHTML = `
      <button class="big-act-btn load" id="bigLoadBtn">📂 파티 불러오기</button>
      <button class="big-act-btn clear" id="bigClearBtn">비우기</button>`;
    bigBtns.querySelector('#bigClearBtn').addEventListener('click', () => {
      for (let i = 0; i < PARTY_SIZE; i++) party[i] = newSlot();
      saveParty(); renderSlots();
    });
    sb.appendChild(bigBtns);
  } else {
    const btns = document.createElement('div');
    btns.className = 'party-action-btns';
    btns.innerHTML = `
      <button class="party-act-btn save" id="partySaveBtn"><span style="font-size:16px;line-height:1">💾</span>파티 저장</button>
      <button class="party-act-btn load" id="partyLoadBtn"><span style="font-size:16px;line-height:1">📂</span>파티 불러오기</button>`;
    sb.appendChild(btns);
  }

  document.dispatchEvent(new Event('pochams:partychange'));
}

function removePokemon(idx) {
  party[idx] = newSlot();
  saveParty();
  renderSlots(); renderRecommended();
  if (selectedSlot === idx) {
    openPokeModal(idx);
    return;
  }
}

function onSlotClick(idx) {
  if (!party[idx].pokemon) { openPokeModal(idx); }
  else if (selectedSlot === idx) { selectedSlot=-1; localStorage.setItem('pochams_selected',-1); hidePanel(); renderSlots(); }
  else { selectedSlot=idx; localStorage.setItem('pochams_selected',idx); document.getElementById('appBody')?.classList.remove('big-mode'); renderSlots(); renderDetail(idx); showPanel(); }
}

let _hidePanelTimer = null;
const _PANEL_IDS = ['detailArea','powerCalcPanel','speedCalcPanel','analysisSidebar','recPanel'];

function showPanel() {
  clearTimeout(_hidePanelTimer); _hidePanelTimer = null;
  /* 빅차트 페이드아웃 → 레이아웃 전환 → 패널 페이드인 */
  const pc = document.getElementById('bigPartyChart');
  const ec = document.getElementById('bigEnemyChart');
  if (pc) pc.style.opacity = '0';
  if (ec) ec.style.opacity = '0';
  setTimeout(() => {
    document.getElementById('appBody')?.classList.remove('big-mode');
    if (pc) pc.style.opacity = '';
    if (ec) ec.style.opacity = '';
    requestAnimationFrame(() => {
      _PANEL_IDS.forEach(id => document.getElementById(id)?.classList.add('visible'));
    });
  }, 240);
}
function hidePanel() {
  clearTimeout(_hidePanelTimer);
  /* 패널 페이드아웃 → 레이아웃 전환 */
  _PANEL_IDS.forEach(id => document.getElementById(id)?.classList.remove('visible'));
  _hidePanelTimer = setTimeout(() => {
    document.getElementById('appBody')?.classList.add('big-mode');
    renderSlots();
    _hidePanelTimer = null;
  }, 300);
}

/* ════════════════════════════
   RENDER DETAIL CARD
════════════════════════════ */
function renderDetail(idx) {
  const mem    = party[idx];
  const pk     = mem.pokemon;
  if (!pk) return;

  const evs    = mem.evs;
  const nature = mem.nature;
  const stats  = ['H','A','B','C','D','S'];
  const bases  = {H:pk.H,A:pk.A,B:pk.B,C:pk.C,D:pk.D,S:pk.S};

  const eff  = defEffectiveness(pk.type1, pk.type2||null);
  const x4   = ALL_TYPES.filter(t => eff[t]===4);
  const x2   = ALL_TYPES.filter(t => eff[t]===2);
  const x1   = ALL_TYPES.filter(t => eff[t]===1);
  const x05  = ALL_TYPES.filter(t => eff[t]===0.5);
  const x025 = ALL_TYPES.filter(t => eff[t]===0.25);
  const x0   = ALL_TYPES.filter(t => eff[t]===0);

  const dur     = calcDurability(pk, evs, nature, mem.item);
  const evTotal = totalEVs(evs);

  // Stat grade panel
  const POW_BREAKS = [18000, 28000, 38000, 48000];
  const DUR_BREAKS = [30000, 42500, 55000, 75000];
  const SPD_BREAKS = [106, 136, 161, 181];
  const physMvs = (mem.moves||[]).filter(m=>m&&m.category==='물리');
  const specMvs = (mem.moves||[]).filter(m=>m&&m.category==='특수');
  const physPow = physMvs.length ? Math.max(...physMvs.map(m=>calcDecisivePower(pk,evs,m,nature,mem.item,mem.ability))) : 0;
  const specPow = specMvs.length ? Math.max(...specMvs.map(m=>calcDecisivePower(pk,evs,m,nature,mem.item,mem.ability))) : 0;
  const speedStat = Math.floor(calcStat(pk.S, evs.S, false, natMult(nature,'S')) * getItemStatMult(mem.item, pk, 'S') * getAbilityStatMult(mem.ability, 'S'));
  const physPowG = physPow>0 ? getStatGrade(physPow, POW_BREAKS) : null;
  const specPowG = specPow>0 ? getStatGrade(specPow, POW_BREAKS) : null;
  const physDurG = getStatGrade(dur.phys, DUR_BREAKS);
  const specDurG = getStatGrade(dur.spec, DUR_BREAKS);
  const speedG   = getStatGrade(speedStat, SPD_BREAKS);
  const avgDur = (dur.phys+dur.spec)/2;
  const speedTag = speedStat>=161?'고스핏':speedStat>=136?'중스핏':'저스핏';
  const durTag   = avgDur>=55000?'고내구':avgDur>=42500?'중내구':'저내구';
  let roleTag;
  if (physPow===0&&specPow===0)       roleTag='지원형';
  else if (physPow>0&&specPow===0)    roleTag='물리 어태커';
  else if (specPow>0&&physPow===0)    roleTag='특수 어태커';
  else if (physPow>=specPow*1.25)     roleTag='물리 어태커';
  else if (specPow>=physPow*1.25)     roleTag='특수 어태커';
  else                                roleTag='균형형';
  if (avgDur>=55000&&physPow<18000&&specPow<18000) roleTag='탱커';
  const archetype = `${speedTag} ${durTag} ${roleTag}`;

  const typeBadges = [pk.type1, pk.type2].filter(Boolean)
    .map(t => `<span class="type-mini-badge" style="background:${TYPE_COLORS[t]}">${t}</span>`)
    .join('');

  const statRows = stats.map(s => {
    const base   = bases[s];
    const isHP   = s==='H';
    const nm     = isHP ? 1 : natMult(nature, s);
    const actual = calcStat(base, evs[s], isHP, nm);
    const pct    = Math.min(100, base/255*100).toFixed(1);
    const lblCls = isHP ? '' : (nature?.up===s ? ' nat-up' : nature?.dn===s ? ' nat-dn' : '');
    return `
    <div class="stat-row">
      <span class="stat-lbl${lblCls}">${s}</span>
      <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${pct}%;background:${statColor(base)};"></div></div>
      <span class="stat-actual${lblCls}">${actual}</span>
      <span class="stat-base">(${base})</span>
      <input class="ev-input" type="number" min="0" max="32" value="${evs[s]||0}" data-stat="${s}" data-slot="${idx}">
    </div>`;
  }).join('');

  const itemName    = mem.item?.name||'';

function cardClickHandler(e) {
  if (e.target.id === 'detailCloseBtn') {
    selectedSlot=-1; localStorage.setItem('pochams_selected',-1); hidePanel(); renderSlots();
    return;
  }
  /* 성별 버튼 (3-tab 방식) */
  const gBtn = e.target.closest('[data-gender-slot]');
  if (gBtn) {
    const slotIdx = +gBtn.dataset.genderSlot;
    const newGender = gBtn.dataset.gender || null;
    party[slotIdx].gender = newGender;
    /* 성별 폼 전환 */
    const pair = GENDER_FORM_MAP[party[slotIdx].pokemon?.name];
    if (pair && newGender) {
      const targetName = newGender === '♂' ? pair.male : pair.female;
      const newPk = POKEMON_DATA.find(p => p.name === targetName);
      if (newPk) {
        party[slotIdx].pokemon = newPk;
        const abd = ABILITY_DATA?.[newPk.name];
        party[slotIdx].ability = abd?.normal?.[0] || null;
      }
    }
    saveParty();
    renderSlots();
    renderDetail(slotIdx);
    return;
  }
  const btn = e.target.closest('.poke-img-col[data-action], .cfg-row[data-action], .move-row[data-mi], .btn-chg, .btn-box-action[data-action]');
  if (!btn) return;
  const slotIdx = +btn.dataset.slot;
  const action  =  btn.dataset.action;
  const mi      =  btn.dataset.mi;
  if (action==='changePoke')          openPokeModal(slotIdx);
  else if (action==='changeItem')     openItemModal(slotIdx);
  else if (action==='changeAbility')  openAbilityModal(slotIdx);
  else if (action==='changeNature')   openNatureModal(slotIdx);
  else if (action==='boxSave')        saveToBox(slotIdx);
  else if (action==='boxLoad')        openBoxModal(slotIdx);
  else if (mi!==undefined)            openMoveModal(slotIdx, +mi);
}

function updateSGPanel(idx) {
  const mem = party[idx];
  const pk  = mem?.pokemon;
  if (!pk) return;
  const evs = mem.evs, nature = mem.nature;

  const POW_BREAKS = [18000, 28000, 38000, 48000];
  const DUR_BREAKS = [30000, 42500, 55000, 75000];
  const SPD_BREAKS = [106, 136, 161, 181];

  const dur = calcDurability(pk, evs, nature, mem.item);
  const physEl = document.getElementById('durPhys');
  const specEl = document.getElementById('durSpec');
  if (physEl) physEl.textContent = dur.phys.toLocaleString();
  if (specEl) specEl.textContent = dur.spec.toLocaleString();

  const physMvs = (mem.moves||[]).filter(m=>m&&m.category==='물리');
  const specMvs = (mem.moves||[]).filter(m=>m&&m.category==='특수');
  const physPow = physMvs.length ? Math.max(...physMvs.map(m=>calcDecisivePower(pk,evs,m,nature,mem.item,mem.ability))) : 0;
  const specPow = specMvs.length ? Math.max(...specMvs.map(m=>calcDecisivePower(pk,evs,m,nature,mem.item,mem.ability))) : 0;
  const speedStat = Math.floor(calcStat(pk.S, evs.S, false, natMult(nature,'S')) * getItemStatMult(mem.item, pk, 'S') * getAbilityStatMult(mem.ability, 'S'));

  const physPowG = physPow>0 ? getStatGrade(physPow, POW_BREAKS) : null;
  const specPowG = specPow>0 ? getStatGrade(specPow, POW_BREAKS) : null;
  const physDurG = getStatGrade(dur.phys, DUR_BREAKS);
  const specDurG = getStatGrade(dur.spec, DUR_BREAKS);
  const speedG   = getStatGrade(speedStat, SPD_BREAKS);

  const avgDur   = (dur.phys+dur.spec)/2;
  const speedTag = speedStat>=161?'고스핏':speedStat>=136?'중스핏':'저스핏';
  const durTag   = avgDur>=55000?'고내구':avgDur>=42500?'중내구':'저내구';
  let roleTag;
  if (physPow===0&&specPow===0)       roleTag='지원형';
  else if (physPow>0&&specPow===0)    roleTag='물리 어태커';
  else if (specPow>0&&physPow===0)    roleTag='특수 어태커';
  else if (physPow>=specPow*1.25)     roleTag='물리 어태커';
  else if (specPow>=physPow*1.25)     roleTag='특수 어태커';
  else                                roleTag='균형형';
  if (avgDur>=55000&&physPow<18000&&specPow<18000) roleTag='탱커';

  const arcEl = document.querySelector('.sg-archetype');
  if (arcEl) arcEl.textContent = `${speedTag} ${durTag} ${roleTag}`;

  const grades = [physPowG, physDurG, speedG, specPowG, specDurG];
  document.querySelectorAll('.sg-val').forEach((el, i) => {
    const g = grades[i];
    el.className = `sg-val ${g?.cls||'sg-na'}`;
    el.textContent = g?.label||'—';
  });
}

function evChangeHandler(e) {
  const inp = e.target.closest('.ev-input');
  if (!inp) return;
  const slotIdx = +inp.dataset.slot;
  const stat    =  inp.dataset.stat;
  let val = Math.min(32, Math.max(0, +inp.value||0));

  const mem  = party[slotIdx];
  const evs  = mem.evs;
  const others = totalEVs(evs) - (evs[stat]||0);
  if (others + val > 66) val = 66 - others;
  inp.value = val;
  mem.evs[stat] = val;

  /* update stat display without full re-render */
  const statRow    = inp.closest('.stat-row');
  const actualSpan = statRow.querySelector('.stat-actual');
  const pk         = mem.pokemon;
  const bases      = {H:pk.H,A:pk.A,B:pk.B,C:pk.C,D:pk.D,S:pk.S};
  const isHP       = stat==='H';
  const nm         = isHP ? 1 : natMult(mem.nature, stat);
  actualSpan.textContent = calcStat(bases[stat], val, isHP, nm);

  const dispEl = document.getElementById('evTotalDisp');
  if (dispEl) dispEl.textContent = totalEVs(mem.evs);

  /* update durability + sg panel */
  updateSGPanel(slotIdx);

  /* update move decisive power */
  document.querySelectorAll('.move-power-txt').forEach((el, mi) => {
    const mv = mem.moves[mi];
    const dp = mv ? calcDecisivePower(pk, mem.evs, mv, mem.nature, mem.item, mem.ability) : 0;
    el.textContent = '결정력 : ' + (dp||'-');
  });
  updateAnalysis(slotIdx);
  if (window.dcSyncFromSlot) window.dcSyncFromSlot(slotIdx);
  if (window.scSyncFromSlot) window.scSyncFromSlot(slotIdx);
  renderSpeedRankList();
  saveParty();
}

function updateAnalysis(idx) {
  const pk    = party[idx].pokemon;
  const moves = party[idx].moves;
  if (!pk) return;

  const defEff = defEffectiveness(pk.type1, pk.type2||null);
  const badge  = (t, label) => `<span class="type-badge" style="background:${TYPE_COLORS[t]||'#888'}">${label||t}</span>`;
  const row    = (lbl, color, html) =>
    html ? `<div class="chart-row"><span class="chart-lbl" style="color:${color}">${lbl}</span><div class="chart-types">${html}</div></div>` : '';

  /* ── 방어 상성 ── */
  const x4  = ALL_TYPES.filter(t=>defEff[t]===4);
  const x2  = ALL_TYPES.filter(t=>defEff[t]===2);
  const x05 = ALL_TYPES.filter(t=>defEff[t]===0.5);
  const x025= ALL_TYPES.filter(t=>defEff[t]===0.25);
  const x0  = ALL_TYPES.filter(t=>defEff[t]===0);

  document.getElementById('anaDefChart').innerHTML =
    row('×4',  '#c62828', x4.map(t=>badge(t)).join('')) +
    row('×2',  '#e65100', x2.map(t=>badge(t)).join('')) +
    row('½',   '#2e7d32', x05.map(t=>badge(t)).join('')) +
    row('¼',   '#1b5e20', x025.map(t=>badge(t)).join('')) +
    row('무효', '#37474f', x0.map(t=>badge(t)).join('')) ||
    '<span class="chart-empty">상성 없음</span>';

  /* ── 공격 상성 ── */
  const powermoves = moves.filter(mv => mv?.power && mv.category!=='변화');

  if (!powermoves.length) {
    document.getElementById('anaAtkChart').innerHTML = '<span class="chart-empty">기술 미설정</span>';
    return;
  }

  const mem2 = party[idx];
  const bestEff = {};
  ALL_TYPES.forEach(def => {
    bestEff[def] = Math.max(0, ...powermoves.map(mv => {
      const et = getMoveEffectiveType(pk, mv, mem2.item, mem2.ability);
      return ATK_CHART[et]?.[def] ?? 1;
    }));
  });

  const a2  = ALL_TYPES.filter(t=>bestEff[t]>=4);
  const a2n = ALL_TYPES.filter(t=>bestEff[t]===2);
  const a05 = ALL_TYPES.filter(t=>bestEff[t]===0.5);
  const a0  = ALL_TYPES.filter(t=>bestEff[t]===0);

  document.getElementById('anaAtkChart').innerHTML =
    row('×4↑',  '#c62828', a2.map(t=>badge(t)).join('')) +
    row('×2',   '#e65100', a2n.map(t=>badge(t)).join('')) +
    row('½↓',   '#2e7d32', a05.map(t=>badge(t)).join('')) +
    row('무효',  '#37474f', a0.map(t=>badge(t)).join('')) ||
    '<span class="chart-empty">없음</span>';

}

function buildTypeChartHTML(slots) {
  if (!slots.length) return '';
  const effs = slots.map(s => defEffectiveness(s.pokemon.type1, s.pokemon.type2||null));
  const headerHTML = slots.map(s =>
    `<div class="ptc-th" title="${s.pokemon.name}"><img src="${spriteUrl(s.pokemon.name, s.pokemon.no)}" alt="${s.pokemon.name}"></div>`
  ).join('');
  const rowsHTML = ALL_TYPES.map(atkType => {
    const cells = effs.map(eff => {
      const m = eff[atkType];
      let cls, txt;
      if      (m >= 4)    { cls = 'ptc-4'; txt = '4×'; }
      else if (m === 2)   { cls = 'ptc-2'; txt = '2×'; }
      else if (m === 0.5) { cls = 'ptc-h'; txt = '½'; }
      else if (m === 0.25){ cls = 'ptc-q'; txt = '¼'; }
      else if (m === 0)   { cls = 'ptc-z'; txt = '0'; }
      else                { cls = 'ptc-n1'; txt = ''; }
      return `<div class="ptc-cell ${cls}">${txt}</div>`;
    }).join('');
    return `<div class="ptc-type-row"><div class="ptc-lbl" style="background:${TYPE_COLORS[atkType]}">${atkType}</div>${cells}</div>`;
  }).join('');
  return `<div class="ptc-wrap"><div class="ptc-header">${headerHTML}</div>${rowsHTML}</div>`;
}

function buildTypeChartSummaryHTML(slots) {
  if (!slots.length) return '';
  const effs = slots.map(s => defEffectiveness(s.pokemon.type1, s.pokemon.type2||null));
  const weakTypes = [], strongTypes = [], neutralTypes = [];
  const half = Math.ceil(effs.length / 2);
  ALL_TYPES.forEach(t => {
    let w = 0, r = 0, n = 0;
    effs.forEach(eff => { const m = eff[t]; if (m > 1) w++; else if (m < 1) r++; else n++; });
    if (w > r) weakTypes.push(t);
    else if (r > w) strongTypes.push(t);
    else if (n >= half) neutralTypes.push(t);
  });
  const tbadge = t => `<span class="pcs-tbadge" style="background:${TYPE_COLORS[t]}">${t}</span>`;
  return `<div class="pcs-wrap">
    <div class="pcs-row"><span class="pcs-lbl pcs-weak">약점</span><div class="pcs-badges">${weakTypes.length ? weakTypes.map(tbadge).join('') : '<span class="pcs-none">없음</span>'}</div></div>
    <div class="pcs-row"><span class="pcs-lbl pcs-neutral">1배</span><div class="pcs-badges">${neutralTypes.length ? neutralTypes.map(tbadge).join('') : '<span class="pcs-none">없음</span>'}</div></div>
    <div class="pcs-row"><span class="pcs-lbl pcs-strong">강함</span><div class="pcs-badges">${strongTypes.length ? strongTypes.map(tbadge).join('') : '<span class="pcs-none">없음</span>'}</div></div>
  </div>`;
}

    <div class="dc-dmg-box">
