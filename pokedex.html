<script>
/* ── i18n (한/영/일) — 메인 스크립트보다 먼저 정의되어야 함 ── */
let I18N = null;
function detectDefaultLang() {
  const saved = localStorage.getItem('lang');
  if (saved) return saved;
  const nav = (navigator.language || navigator.userLanguage || '').toLowerCase();
  if (nav.startsWith('ko')) return 'ko';
  if (nav.startsWith('ja')) return 'ja';
  if (nav.startsWith('en')) return 'en';
  return 'en';
}
let LANG = detectDefaultLang();

async function loadI18n() {
  try { I18N = await fetch('i18n_names.json').then(r => r.json()); }
  catch (e) { console.error('i18n_names.json fetch 실패:', e); I18N = null; }
}

function pokeName(koName, dexNo) {
  if (LANG === 'ko' || !I18N || !koName) return koName;
  const full = I18N.pokemonFullNames && I18N.pokemonFullNames[koName];
  if (full && full[LANG]) return full[LANG];
  const p = I18N.pokemon[String(dexNo)];
  if (!p) return koName;
  const base = p[LANG] || p.ko;
  let workingName = koName;
  let megaPrefix = '';
  if (workingName.startsWith('메가') && workingName.slice(2).startsWith(p.ko)) {
    megaPrefix = LANG === 'ja' ? 'メガ' : 'Mega ';
    workingName = workingName.slice(2);
  }
  let result = megaPrefix + workingName.split(p.ko).join(base);
  /* 괄호 접미사 폼 (예: 아르세우스(강철), 디아루가(오리진폼)) */
  const suffixMatch = result.match(/\(([^)]+)\)$/);
  if (suffixMatch) {
    const formKo = suffixMatch[1];
    const src = I18N.forms[formKo] || I18N.types[formKo];
    const formTrans = src && src[LANG];
    if (formTrans) result = result.slice(0, suffixMatch.index) + '(' + formTrans + ')';
  }
  for (const formKo in I18N.forms) {
    if (result.includes(formKo)) {
      const f = (I18N.forms[formKo][LANG] || formKo) + ' ';
      result = result.split(formKo).join(f);
    }
  }
  return result.replace(/\s+/g, ' ').trim();
}

const LOC_MAP_FIELD = {items:'item_ja2ko', abilities:'ability_ja2ko', moves:'move_ja2ko', natures:'nature_ja2ko'};
function normKoName(category, koName) {
  if (typeof CHAMPIONS_LOC_MAP !== 'undefined') {
    const field = LOC_MAP_FIELD[category];
    const fixed = field && CHAMPIONS_LOC_MAP[field]?.[koName];
    if (fixed) return fixed;
  }
  return koName;
}
function term(category, koName) {
  if (!koName) return koName;
  koName = normKoName(category, koName);
  if (LANG === 'ko' || !I18N) return koName;
  const m = I18N[category]?.[koName];
  return (m && m[LANG]) || koName;
}
function termDesc(category, koName, koDesc) {
  if (LANG === 'ko' || !koName || !I18N) return koDesc;
  koName = normKoName(category, koName);
  const m = I18N[category]?.[koName];
  if (!m) return koDesc;
  const d = LANG === 'en' ? m.descEn : LANG === 'ja' ? m.descJa : null;
  return d || koDesc;
}

/* 검색어가 한국어 원문 또는 영/일 번역명과 일치하는지 확인 (언어 모드와 무관하게 항상 다 검사) */

const CHOSEONG_LIST = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function getChoseong(str) {
  let result = '';
  for (const ch of str) {
    const code = ch.charCodeAt(0) - 0xAC00;
    if (code >= 0 && code <= 11171) result += CHOSEONG_LIST[Math.floor(code / 588)];
    else result += ch;
  }
  return result;
}
function isChoseongOnly(q) { return /^[ㄱ-ㅎ]+$/.test(q); }

function matchPokemonQuery(pk, q) {
  if (!q) return true;
  if (pk.name.includes(q)) return true;
  if (isChoseongOnly(q) && getChoseong(pk.name).includes(q)) return true;
  if (!I18N) return false;
  const ql = q.toLowerCase();
  const p = I18N.pokemon[String(pk.no)];
  if (p) {
    if (p.en && p.en.toLowerCase().includes(ql)) return true;
    if (p.ja && p.ja.includes(q)) return true;
  }
  for (const formKo in I18N.forms) {
    if (pk.name.includes(formKo)) {
      const f = I18N.forms[formKo];
      if (f.en && p?.en && (f.en + ' ' + p.en).toLowerCase().includes(ql)) return true;
      if (f.ja && p?.ja && (f.ja + p.ja).includes(q)) return true;
    }
  }
  return false;
}
function matchTermQuery(category, koName, q) {
  if (!q) return true;
  if (koName.includes(q)) return true;
  if (isChoseongOnly(q) && getChoseong(koName).includes(q)) return true;
  if (!I18N) return false;
  koName = normKoName(category, koName);
  if (koName.includes(q)) return true;
  const m = I18N[category]?.[koName];
  if (!m) return false;
  const ql = q.toLowerCase();
  if (m.en && m.en.toLowerCase().includes(ql)) return true;
  if (m.ja && m.ja.includes(q)) return true;
  return false;
}

function t(key, vars) {
  if (!I18N) return key;
  const e = I18N.ui[key];
  let s = (e && (e[LANG] || e.ko)) || key;
  if (vars) for (const k in vars) s = s.replace(`{${k}}`, vars[k]);
  return s;
}
</script>
<script>
  const TYPE_COLORS = {
    '노말':'#9A9A7A','불꽃':'#F08030','물':'#6890F0','풀':'#78C850',
    '전기':'#F8C600','얼음':'#98D8D8','격투':'#C03028','독':'#A040A0',
    '땅':'#C8A840','비행':'#A890F0','에스퍼':'#F85888','벌레':'#A8B820',
    '바위':'#B8A038','고스트':'#705898','드래곤':'#7038F8','악':'#6B5040',
    '강철':'#A8A8C0','페어리':'#EE99AC'
  };

  const ALL_TYPES = Object.keys(TYPE_COLORS);

  function spriteUrl(name, no) {
    return POKEMON_SPRITES?.[name]
      || `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${no}.png`;
  }

  function statColor(v) {
    if (v >= 130) return '#43a047';
    if (v >= 100) return '#7cb342';
    if (v >= 75)  return '#fbc02d';
    if (v >= 50)  return '#ef6c00';
    return '#e53935';
  }

  let dexMode  = 'all';
  let dexTypes = []; // max 2, queue order
  let dexQuery = '';
  let dexMega  = false;

  /* ── type filter buttons ── */
  (function buildTypeFilter() {
    const row = document.getElementById('typeFilter');
    const allBtn = document.createElement('button');
    allBtn.className = 'f-btn on';
    allBtn.dataset.type = '';
    allBtn.textContent = t('all_types_btn');
    row.appendChild(allBtn);

    ALL_TYPES.forEach(tp => {
      const btn = document.createElement('button');
      btn.className = 'f-btn';
      btn.dataset.type = tp;
      btn.textContent = term('types', tp);
      btn.style.setProperty('--tc', TYPE_COLORS[tp]);
      row.appendChild(btn);
    });
  })();

  function getFiltered() {
    let list = POKEMON_DATA;
    if (dexMode === 'ingame') list = list.filter(p => p.inGame);
    if (dexMega) list = list.filter(p => p.form === '메가진화');
    if (dexTypes.length === 1) list = list.filter(p => p.type1 === dexTypes[0] || p.type2 === dexTypes[0]);
    else if (dexTypes.length === 2) list = list.filter(p =>
      (p.type1 === dexTypes[0] || p.type2 === dexTypes[0]) &&
      (p.type1 === dexTypes[1] || p.type2 === dexTypes[1])
    );
    if (dexQuery) list = list.filter(p => matchPokemonQuery(p, dexQuery));
    return list;
  }

  function renderGrid() {
    const list = getFiltered();
    document.getElementById('dexCount').textContent = t('count_creatures', {n: list.length});

    document.getElementById('dexGrid').innerHTML = list.map(pk => `
      <div class="dex-card ${pk.inGame ? 'ingame' : ''}" data-idx="${POKEMON_DATA.indexOf(pk)}">
        <img src="${spriteUrl(pk.name, pk.no)}" alt="${pokeName(pk.name, pk.no)}" loading="lazy">
        <div class="dex-no">#${pk.no}</div>
        <div class="dex-name">${pokeName(pk.name, pk.no)}</div>
        <div class="dex-types">
          ${[pk.type1, pk.type2].filter(Boolean).map(tp =>
            `<span class="dt-badge" style="background:${TYPE_COLORS[tp]||'#888'}">${term('types', tp)}</span>`
          ).join('')}
        </div>
        ${pk.inGame ? `<div class="ingame-mark">${t('champions_legal')}</div>` : ''}
      </div>`).join('');
  }

  function openDetail(idx) {
    const pk = POKEMON_DATA[idx];
    if (!pk) return;
    const stats = [
      {l:'H',v:pk.H},{l:'A',v:pk.A},{l:'B',v:pk.B},
      {l:'C',v:pk.C},{l:'D',v:pk.D},{l:'S',v:pk.S}
    ];
    const total = pk.H+pk.A+pk.B+pk.C+pk.D+pk.S;
    const dispName = pokeName(pk.name, pk.no);
    const FORM_CAT_I18N = {'메가진화':'form_cat_mega','리전폼':'form_cat_region','폼':'form_cat_generic','암컷폼':'form_cat_female'};
    const formLabel = pk.form ? (FORM_CAT_I18N[pk.form] ? t(FORM_CAT_I18N[pk.form]) : pk.form) : '';

    document.getElementById('dexDetail').innerHTML = `
      <div class="dd-head">
        <img class="dd-img" src="${spriteUrl(pk.name, pk.no)}" alt="${dispName}">
        <div class="dd-info">
          <div class="dd-no">#${pk.no}</div>
          <div class="dd-name">${dispName}</div>
          <div class="dd-types">
            ${[pk.type1, pk.type2].filter(Boolean).map(tp =>
              `<span class="dt-badge" style="background:${TYPE_COLORS[tp]||'#888'};font-size:12px;padding:2px 8px">${term('types', tp)}</span>`
            ).join('')}
          </div>
          ${pk.form ? `<div class="dd-form">${t('classification')}: ${formLabel}</div>` : ''}
          ${pk.inGame ? `<div class="ingame-mark" style="display:inline-block">${t('champions_legal_full')}</div>` : ''}
        </div>
      </div>
      <div class="dd-stats">
        <h3>${t('base_stats')} (${t('total_short')}: ${total})</h3>
        ${stats.map(s => `
          <div class="ds-row">
            <span class="ds-lbl">${s.l}</span>
            <div class="ds-bg">
              <div class="ds-fill" style="width:${Math.min(100, s.v/200*100).toFixed(1)}%; background:${statColor(s.v)};"></div>
            </div>
            <span class="ds-val">${s.v}</span>
          </div>`).join('')}
      </div>
      ${(() => {
        const abd = (typeof ABILITY_DATA !== 'undefined') && ABILITY_DATA[pk.name];
        if (!abd) return '';
        const rows = (abd.normal || []).map(a =>
          `<div class="da-item"><span class="da-name">${term('abilities', a.name)}</span><span class="da-tag">${t('ability_tag_normal')}</span><span class="da-desc">${termDesc('abilities', a.name, a.desc || '')}</span></div>`
        ).join('');
        const hidden = abd.hidden
          ? `<div class="da-item"><span class="da-name">${term('abilities', abd.hidden.name)}</span><span class="da-tag hidden">${t('ability_tag_hidden')}</span><span class="da-desc">${termDesc('abilities', abd.hidden.name, abd.hidden.desc || '')}</span></div>`
          : '';
        return rows || hidden ? `<div class="dd-abilities"><h3>${t('ability')}</h3>${rows}${hidden}</div>` : '';
      })()}
      <button class="dd-close" id="ddCloseBtn">${t('close')}</button>
    `;

    document.getElementById('dexModal').classList.add('open');
    document.getElementById('ddCloseBtn').addEventListener('click', () => {
      document.getElementById('dexModal').classList.remove('open');
    });
  }

  /* ── event listeners ── */
  document.getElementById('dexGrid').addEventListener('click', e => {
    const card = e.target.closest('.dex-card');
    if (card) openDetail(+card.dataset.idx);
  });
  document.getElementById('dexModal').addEventListener('click', e => {
    if (e.target === e.currentTarget)
      document.getElementById('dexModal').classList.remove('open');
  });

  document.getElementById('dexSearch').addEventListener('input', e => {
    dexQuery = e.target.value;
    renderGrid();
  });

  document.getElementById('modeFilter').addEventListener('click', e => {
    const btn = e.target.closest('.f-btn');
    if (!btn) return;
    document.querySelectorAll('#modeFilter .f-btn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    dexMode = btn.dataset.mode;
    renderGrid();
  });

  document.getElementById('megaToggle').addEventListener('click', () => {
    dexMega = !dexMega;
    document.getElementById('megaToggle').classList.toggle('on', dexMega);
    renderGrid();
  });

  function syncTypeButtons() {
    document.querySelectorAll('#typeFilter .f-btn').forEach(b => {
      b.classList.toggle('on', dexTypes.includes(b.dataset.type) || (b.dataset.type === '' && dexTypes.length === 0));
    });
  }

  document.getElementById('typeFilter').addEventListener('click', e => {
    const btn = e.target.closest('.f-btn[data-type]');
    if (!btn) return;
    const t = btn.dataset.type; // '' = 전체
    if (t === '') {
      dexTypes = [];
    } else {
      const idx = dexTypes.indexOf(t);
      if (idx !== -1) {
        // 이미 선택된 타입 → 제거
        dexTypes.splice(idx, 1);
      } else if (dexTypes.length < 2) {
        dexTypes.push(t);
      } else {
        // 2개 이미 선택 → 가장 먼저 고른 것 제거 후 새 타입 추가
        dexTypes.shift();
        dexTypes.push(t);
      }
    }
    syncTypeButtons();
    renderGrid();
  });

  renderGrid();
</script>
<!-- SETTINGS MODAL -->
<div class="set-overlay" id="setOverlay">
  <div class="set-box">
    <div class="set-head">
      <span class="set-title" id="setTitleLbl">⚙ 설정</span>
      <button class="set-x" id="setCloseBtn">✕</button>
    </div>
    <div class="set-section">
      <div class="set-lbl" id="setLangLbl">언어</div>
      <select class="set-sel" id="setLangSel">
        <option value="ko">한국어</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
      </select>
    </div>
    <div class="set-section">
      <div class="set-lbl" id="setThemeLbl">테마</div>
      <select class="set-sel" id="setThemeSel"><option value="" id="setThemeOpt" data-ko-name="메타몽" data-no="132">메타몽</option></select>
    </div>
    <div class="set-section">
      <div class="set-lbl" id="setDataMgmtLbl">데이터 관리</div>
      <button class="set-danger-btn" id="setClearBtn">저장된 데이터 전체 삭제</button>
      <div class="set-desc" id="setClearDesc">파티·박스·계산기 설정 등 이 기기에 저장된 모든 데이터가 삭제됩니다. 이 작업은 되돌릴 수 없습니다.</div>
    </div>
    <div class="set-section">
      <div class="set-lbl" id="setContactLbl">문의 / 버그 리포트</div>
      <a class="set-email" href="mailto:pochamsmetamog@gmail.com">pochamsmetamog@gmail.com</a>
    </div>
  </div>
</div>
<script>
/* i18n 핵심 함수(I18N/LANG/loadI18n/pokeName/term/t)는 파일 상단으로 이동됨 */
function applyNavSettingsLabels() {
  const navMap = { navParty: 'nav_party', navBox: 'nav_box', navMeta: 'nav_meta', navDex: 'nav_dex' };
  for (const id in navMap) { const el = document.getElementById(id); if (el) el.textContent = t(navMap[id]); }
  const navSettingsBtn = document.getElementById('navSettingsBtn');
  if (navSettingsBtn) navSettingsBtn.title = t('settings_btn_title');
  const setMap = {
    setTitleLbl: 'settings_title', setLangLbl: 'lang_lbl', setThemeLbl: 'theme_lbl',
    setDataMgmtLbl: 'data_mgmt_lbl', setClearBtn: 'clear_btn',
    setClearDesc: 'clear_desc', setContactLbl: 'contact_lbl',
  };
  for (const id in setMap) { const el = document.getElementById(id); if (el) el.textContent = t(setMap[id]); }
  const modeAllBtn = document.getElementById('modeAllBtn');
  if (modeAllBtn) modeAllBtn.textContent = t('all');
  const modeIngameBtn = document.getElementById('modeIngameBtn');
  if (modeIngameBtn) modeIngameBtn.textContent = t('champions_legal');
  const megaToggle = document.getElementById('megaToggle');
  if (megaToggle) megaToggle.textContent = t('mega');
  const dexSearch = document.getElementById('dexSearch');
  if (dexSearch) dexSearch.placeholder = t('pokemon_search_placeholder');
  if (typeof renderGrid === 'function') renderGrid();
  document.querySelectorAll('#typeFilter .f-btn[data-type]').forEach(b => {
    b.textContent = b.dataset.type ? term('types', b.dataset.type) : t('all_types_btn');
  });
  document.querySelectorAll('#setThemeSel option[data-ko-name]').forEach(o => {
    o.textContent = pokeName(o.dataset.koName, o.dataset.no) + ' ' + t('theme_lbl');
  });
}

/* ── 이브이즈 테마 ── */
const THEME_DEFS = [
  { id: 'eevee',    name: '이브이',     no: 133 },
  { id: 'vaporeon', name: '샤미드',     no: 134 },
  { id: 'jolteon',  name: '쥬피썬더',   no: 135 },
  { id: 'flareon',  name: '부스터',     no: 136 },
  { id: 'espeon',   name: '에브이',     no: 196 },
  { id: 'umbreon',  name: '블래키',     no: 197 },
  { id: 'leafeon',  name: '리피아',     no: 470 },
  { id: 'glaceon',  name: '글레이시아', no: 471 },
  { id: 'sylveon',  name: '님피아',     no: 700 },
];
function applyTheme(themeId) {
  if (themeId) document.documentElement.setAttribute('data-theme', themeId);
  else document.documentElement.removeAttribute('data-theme');
}
function detectDefaultTheme() {
  const saved = localStorage.getItem('pochams_theme');
  if (saved !== null) return saved;
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) return 'umbreon';
  return '';
}
applyTheme(detectDefaultTheme());

loadI18n().then(applyNavSettingsLabels);
</script>
<script>
(function initSettingsModal() {
  const overlay = document.getElementById('setOverlay');
  const logo = document.querySelector('.nav-logo');
  const closeBtn = document.getElementById('setCloseBtn');
  const clearBtn = document.getElementById('setClearBtn');
  const langSel = document.getElementById('setLangSel');
  if (!overlay || !logo) return;
  document.getElementById('navSettingsBtn')?.addEventListener('click', () => overlay.classList.add('open'));
  closeBtn?.addEventListener('click', () => overlay.classList.remove('open'));
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
  clearBtn?.addEventListener('click', () => {
    if (!confirm(t('confirm_clear_all_data'))) return;
    Object.keys(localStorage).filter(k => k.startsWith('pochams_')).forEach(k => localStorage.removeItem(k));
    alert(t('alert_data_cleared'));
    location.reload();
  });
  if (langSel) {
    langSel.value = localStorage.getItem('lang') || 'ko';
    langSel.addEventListener('change', () => {
      localStorage.setItem('lang', langSel.value);
      LANG = langSel.value;
      applyNavSettingsLabels();
    });
  }
  const themeSel = document.getElementById('setThemeSel');
  if (themeSel) {
    THEME_DEFS.forEach(theme => {
      const o = document.createElement('option');
      o.value = theme.id;
      o.textContent = pokeName(theme.name, theme.no) + ' ' + t('theme_lbl');
      o.dataset.koName = theme.name;
      o.dataset.no = theme.no;
      themeSel.appendChild(o);
    });
    themeSel.value = document.documentElement.getAttribute('data-theme') || '';
    themeSel.addEventListener('change', () => {
      localStorage.setItem('pochams_theme', themeSel.value);
      applyTheme(themeSel.value);
    });
  }
})();
</script>
